# GitHub Pages / Jekyll config
# Ensure hidden discovery directory is published.
include:
  - .well-known
  - ai.txt
  - citation.cff

# Keep markdown URLs path-like (e.g. /verify)
permalink: pretty

# Site URL (canonical domain)
url: "https://www.trinityaccord.org"
baseurl: ""

# Suppress theme site header
title: ""
name: ""

# Exclude source/archive directories from Jekyll build
exclude:
  - audit/
  - archive/
  - node_modules/

