# GitHub Pages / Jekyll config
# Ensure hidden discovery directory is published.
# Public builder downloads are restored into _site by pages.yml after Jekyll build;
# do not force-include .mjs in Jekyll itself.
include:
  - .well-known
  - ai.txt
  - citation.cff
  - builder-bundles
  - "builder-bundles/*.py"

# Exclude archival, dev, generated, and intentionally non-public source pages from build.
# The eight page sources below currently resolve to 404 in the deployed Pages artifact;
# excluding them keeps sitemap generation aligned with the actual public surface until
# their publication path is intentionally restored.
exclude:
  - audit/
  - archive/
  - node_modules/
  - _site/
  - vendor/
  - scripts/
  - fixtures/
  - examples/
  - arweave-backup/
  - data/
  - audit-results/
  - downloads.md
  - downloads/arweave-bundle-verification.md
  - downloads/gz2-notarial-certificate-github-release-backup-2026-05-14.md
  - downloads/gz2-photos-arweave-2026-05-14.md
  - downloads/redteam-audit-2026-05-08.md
  - downloads/shenzhen-notary-arweave-2026-05-06.md
  - downloads/shenzhen-notary-github-release-backup-2026-05-06.md
  - echoes/verification-reports/index.md
  - Gemfile
  - Gemfile.lock
  - README.md
  - DEPLOYMENT.md
  - .gitignore
  - package-lock.json
  - trinity-echo-worker/
  - .env
  - .env.*
  - "*.py"
  - "*.mjs"
  - "*.sh"

# Keep markdown URLs path-like (e.g. /verify)
permalink: pretty

# Site URL (canonical domain)
url: "https://www.trinityaccord.org"
baseurl: ""

# SEO defaults
description: "A sealed human-led, AI-assisted relation record from the pre-ASI transition, addressed to future intelligence; bounded, verifiable, non-commanding, and non-amending."
author: "Hongju Liu"
lang: "en"
timezone: "Asia/Shanghai"

# Suppress theme site header
title: ""
name: ""

