name: Temporary PR654 sync shadow schema

on:
  push:
    branches:
      - agent/retire-fixed-stage-and-clarify-verification

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/retire-fixed-stage-and-clarify-verification
          fetch-depth: 0
          persist-credentials: true
      - name: Sync public and Gateway shadow schemas
        shell: bash
        run: |
          set -euo pipefail
          cp api/record-chain-submission-schema.v1.json apps/record_chain_intake_gateway/schemas/record_chain_submission.schema.json
          python3 -m json.tool apps/record_chain_intake_gateway/schemas/record_chain_submission.schema.json >/dev/null
          cmp api/record-chain-submission-schema.v1.json apps/record_chain_intake_gateway/schemas/record_chain_submission.schema.json
          rm -f .github/workflows/temp-pr654-sync-shadow-schema.yml
      - name: Commit permanent schema sync
        shell: bash
        run: |
          git config user.name "trinity-accord-migration-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "schema: sync Gateway shadow with multidimensional verification"
          git push origin HEAD:agent/retire-fixed-stage-and-clarify-verification

# Trigger commit after workflow creation.
