name: Temporary end-to-end audit inventory

on:
  push:
    branches:
      - agent/end-to-end-action-audit

permissions:
  contents: write

jobs:
  inventory:
    if: ${{ !startsWith(github.event.head_commit.message, 'diagnostics:') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/end-to-end-action-audit
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: ".node-version"
      - run: python3 -m pip install -r requirements-ci.txt -r apps/record_chain_intake_gateway/requirements.txt
      - name: Collect audit inventory
        shell: bash
        run: |
          set +e
          mkdir -p diagnostics
          {
            echo "===== RELEVANT FILE TREE ====="
            find apps/record_chain_intake_gateway scripts downloads api record-chain -maxdepth 4 -type f \
              | grep -E 'record|guardian|gateway|builder|receipt|render|projection|state|echo|verification|correction|classification|propagation' \
              | sort
            echo
            echo "===== BUILDER HELP ====="
            node downloads/record-chain-builder.mjs help
            echo
            echo "===== BUILDER COMMAND TOKENS ====="
            grep -nE 'guardian-retirement|guardian-application|classification-update|context-insufficient|correction|propagation|verification|echo' downloads/record-chain-builder.mjs | tail -n 240
            echo
            echo "===== GATEWAY PYTEST COLLECTION ====="
            PYTHONPATH=apps/record_chain_intake_gateway python3 -m pytest apps/record_chain_intake_gateway/tests --collect-only -q
            echo
            echo "===== ACTION/STATE TEST REFERENCES ====="
            grep -RInE 'guardian_retirement|guardian_application|classification_update|context_insufficient|propagation|correction|receipt|final inclusion|guardian-state' \
              apps/record_chain_intake_gateway/tests scripts 2>/dev/null | tail -n 500
          } > diagnostics/e2e-audit-inventory.txt 2>&1
          git config user.name "trinity-accord-audit-bot"
          git config user.email "actions@users.noreply.github.com"
          git add diagnostics/e2e-audit-inventory.txt
          git commit -m "diagnostics: capture end-to-end action inventory"
          git push origin HEAD:agent/end-to-end-action-audit
