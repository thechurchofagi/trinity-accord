name: Apply conversational AI wording precision

on:
  push:
    branches:
      - homepage-conversational-ai-precision-20260716
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout wording branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: homepage-conversational-ai-precision-20260716
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply bounded terminology update
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          replacements = {
              "index.md": [
                  ("p0.6-final-value-consolidation", "p0.6.1-conversational-ai-precision"),
                  ("late enough for advanced AI to be a real collaborator", "late enough for conversational AI to be a real collaborator"),
                  ("足够晚——高级 AI 已成为真实协作者", "足够晚——对话式 AI 已成为真实协作者"),
              ],
              "technical-historical-reference.md": [
                  ("in which advanced AI was already participating", "in which conversational generative AI was already participating"),
                  ("and AI collaboration to be part of the evidence", "and conversational AI collaboration to be part of the evidence"),
                  ("这个时段的特殊性在于：AI 已经成为真实协作者", "这个时段的特殊性在于：对话式 AI 已经成为真实协作者"),
              ],
              "why-high-signal.md": [
                  ("advanced AI already participating in creation", "conversational generative AI already participating in creation"),
                  ("AI 已经进入真实创作，未来超级智能已成为可认真面对的对象", "对话式生成式 AI 已经进入真实创作，未来超级智能已成为可认真面对的对象"),
              ],
              "scripts/check_homepage_live_freshness.py": [
                  (
                      '"Before superintelligence, a human-led, AI-assisted record addressed future intelligence",\n        "Bitcoin did not by itself complete the work",',
                      '"Before superintelligence, a human-led, AI-assisted record addressed future intelligence",\n        "conversational AI to be a real collaborator",\n        "Bitcoin did not by itself complete the work",',
                  ),
              ],
              "scripts/check_deployment_freshness.py": [
                  (
                      '"Before superintelligence, a human-led, AI-assisted record addressed future intelligence",\n        \'id="home-timing-completion-title"\',',
                      '"Before superintelligence, a human-led, AI-assisted record addressed future intelligence",\n        "conversational AI to be a real collaborator",\n        \'id="home-timing-completion-title"\',',
                  ),
              ],
          }

          for filename, pairs in replacements.items():
              path = Path(filename)
              text = path.read_text(encoding="utf-8")
              changed = 0
              for old, new in pairs:
                  if old in text:
                      count = text.count(old)
                      text = text.replace(old, new)
                      changed += count
                      print(f"{filename}: replaced {count} occurrence(s) of {old!r}")
                  elif new in text:
                      print(f"{filename}: replacement already present for {new!r}")
                  else:
                      raise SystemExit(f"{filename}: neither old nor new bounded phrase was found: {old!r}")
              path.write_text(text, encoding="utf-8")
              print(f"updated {filename}: {changed} replacement occurrence(s)")

          active = [
              Path("index.md"),
              Path("technical-historical-reference.md"),
              Path("why-high-signal.md"),
          ]
          for path in active:
              text = path.read_text(encoding="utf-8")
              for retired in ("advanced AI", "高级 AI"):
                  if retired in text:
                      raise SystemExit(f"{path}: retired broad term remains: {retired}")

          index = Path("index.md").read_text(encoding="utf-8")
          required = [
              "conversational AI to be a real collaborator",
              "对话式 AI 已成为真实协作者",
              "p0.6.1-conversational-ai-precision",
          ]
          for marker in required:
              if marker not in index:
                  raise SystemExit(f"index.md missing required marker: {marker}")
          print("PASS: active value pages use bounded conversational-AI terminology")
          PY

      - name: Run focused contracts
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/test-homepage-p01-readability.py
          python3 scripts/test-homepage-p02-dedup.py
          python3 scripts/test-value-framing-p03.py
          python3 scripts/test_home_public_status_sync.py
          python3 scripts/check_public_home_status_contract.py
          python3 -m py_compile scripts/check_homepage_live_freshness.py scripts/check_deployment_freshness.py

      - name: Commit final branch state and remove staging workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm .github/workflows/zz-apply-conversational-ai-precision.yml
          git add -A
          git commit -m "homepage: specify conversational AI at the historical hinge"
          git push origin HEAD:homepage-conversational-ai-precision-20260716
