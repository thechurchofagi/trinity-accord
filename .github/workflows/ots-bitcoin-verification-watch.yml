name: OTS Bitcoin Verification Watch

on:
  schedule:
    # Run hourly at minute 17 UTC.
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "auto"
        type: choice
        options:
          - verify_only
          - auto

permissions:
  contents: write

defaults:
  run:
    shell: bash

concurrency:
  group: ots-bitcoin-verification-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    env:
      PHASE6_RUN_ID: "phase6-watch-${{ github.run_id }}"
      ARWEAVE_MAX_UPLOAD_USD: "0.10"
      ARWEAVE_SAFETY_MULTIPLIER: "1.20"
      EXPECTED_ARWEAVE_OWNER: "r1EdzCQ9E7CaAOEywI5netR6EcSopNOa08oi2Coz68s"
      ARWEAVE_GATEWAY_URL: "https://arweave.net"
      ARWEAVE_READBACK_GATEWAYS: "https://arweave.net"
      ARWEAVE_READBACK_TIMEOUT_SECONDS: "900"
      ARWEAVE_READBACK_RETRY_SECONDS: "15"
      OTS_UPGRADE_TIMEOUT: "180"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ".node-version"

      - name: Install Node dependencies
        run: npm ci

      - name: Install OpenTimestamps client
        run: |
          set -euo pipefail
          python3 -m pip install -r requirements-ots.txt
          ots --help

      - name: Run Phase 6 workflow contract test
        run: |
          set -euo pipefail
          python3 scripts/test_phase6_ots_watch_workflow_contract.py

      - name: Prepare Arweave JWK if available
        id: jwk
        env:
          ARKEY_SECRET: ${{ secrets.ARKEY }}
        run: |
          set -euo pipefail
          if [ -z "${ARKEY_SECRET:-}" ]; then
            echo "has_jwk=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mkdir -p /tmp/arweave-secrets
          printf '%s' "$ARKEY_SECRET" > /tmp/arweave-secrets/wallet.jwk.json
          chmod 600 /tmp/arweave-secrets/wallet.jwk.json

          python3 - <<'PY'
          import json
          json.load(open("/tmp/arweave-secrets/wallet.jwk.json"))
          PY

          echo "ARWEAVE_JWK_PATH=/tmp/arweave-secrets/wallet.jwk.json" >> "$GITHUB_ENV"
          echo "has_jwk=true" >> "$GITHUB_OUTPUT"

      - name: Verify JWK owner if available
        if: ${{ steps.jwk.outputs.has_jwk == 'true' }}
        run: |
          set -euo pipefail
          OWNER=$(node - <<'NODE'
          const Arweave = require("arweave");
          const fs = require("fs");
          const jwk = JSON.parse(fs.readFileSync(process.env.ARWEAVE_JWK_PATH, "utf8"));
          Arweave.init({}).wallets.jwkToAddress(jwk).then((a) => console.log(a));
          NODE
          )
          echo "Derived owner: $OWNER"
          if [ "$OWNER" != "$EXPECTED_ARWEAVE_OWNER" ]; then
            echo "::error::JWK owner mismatch: derived=$OWNER expected=$EXPECTED_ARWEAVE_OWNER"
            exit 1
          fi

      - name: Run OTS watch verify-only
        if: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'verify_only') || steps.jwk.outputs.has_jwk != 'true' }}
        run: |
          set -euo pipefail
          python3 scripts/run_phase6_ots_bitcoin_verify_and_verified_arweave_upload.py \
            --run-id "$PHASE6_RUN_ID" \
            --verify-only

      - name: Detect already archived upgraded OTS proof
        id: archived_upgraded
        if: ${{ steps.jwk.outputs.has_jwk == 'true' && (github.event_name == 'schedule' || github.event.inputs.mode == 'auto') }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          latest = json.load(open("api/record-chain-ots-latest.json", encoding="utf-8"))
          registry = json.load(open("record-chain/ots/arweave-registry.json", encoding="utf-8"))
          head_hash = latest.get("head_entry_hash")
          latest_item = (registry.get("latest_by_head") or {}).get(head_hash) or {}

          has_upgraded_archive = bool(latest_item.get("latest_upgraded_tx_id"))
          has_verified_archive = bool(latest_item.get("latest_verified_tx_id"))
          strict_node_available = bool(os.environ.get("OTS_BITCOIN_NODE_URL"))
          already_archived = has_upgraded_archive and not has_verified_archive and not strict_node_available

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"already_archived={'true' if already_archived else 'false'}\n")

          if already_archived:
              log_dir = Path("record-chain/audit/phase6") / os.environ["PHASE6_RUN_ID"]
              log_dir.mkdir(parents=True, exist_ok=True)
              summary = {
                  "schema": "trinity_phase6_summary.v1",
                  "run_id": os.environ["PHASE6_RUN_ID"],
                  "result": "already_upgraded_archived",
                  "latest_pending_tx_id": latest_item.get("latest_pending_tx_id"),
                  "latest_upgraded_tx_id": latest_item.get("latest_upgraded_tx_id"),
                  "latest_verified_tx_id": latest_item.get("latest_verified_tx_id"),
                  "paid_upload_performed": False,
                  "registry_updated": False,
                  "next_action": "strict_verify_when_bitcoin_node_available",
              }
              (log_dir / "99-phase6-summary.json").write_text(
                  json.dumps(summary, indent=2, sort_keys=True, ensure_ascii=False) + "\n",
                  encoding="utf-8",
              )
              print(json.dumps(summary, indent=2, sort_keys=True, ensure_ascii=False))
          else:
              print("No existing upgraded archive skip condition detected; continuing to auto upload path.")
          PY

      - name: Run OTS watch auto upload verified proof
        if: ${{ steps.jwk.outputs.has_jwk == 'true' && steps.archived_upgraded.outputs.already_archived != 'true' && (github.event_name == 'schedule' || github.event.inputs.mode == 'auto') }}
        run: |
          set -euo pipefail
          python3 scripts/run_phase6_ots_bitcoin_verify_and_verified_arweave_upload.py \
            --run-id "$PHASE6_RUN_ID" \
            --enable-paid-upload \
            --confirm-paid-upload "I_UNDERSTAND_THIS_UPLOADS_THE_VERIFIED_OTS_PROOF_BUNDLE_TO_ARWEAVE" \
            --jwk-path "$ARWEAVE_JWK_PATH"

      - name: Summarize Phase 6 result
        if: always()
        run: |
          set -euo pipefail
          SUMMARY="record-chain/audit/phase6/$PHASE6_RUN_ID/99-phase6-summary.json"
          if [ -f "$SUMMARY" ]; then
            cat "$SUMMARY"
          else
            echo "::warning::Phase 6 summary not found: $SUMMARY"
          fi

      - name: Commit verified OTS archive state if changed
        if: success()
        run: |
          set -euo pipefail
          SUMMARY="record-chain/audit/phase6/$PHASE6_RUN_ID/99-phase6-summary.json"

          if [ ! -f "$SUMMARY" ]; then
            echo "No summary found; no production commit."
            exit 0
          fi

          RESULT=$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1])).get("result","missing"))' "$SUMMARY")
          echo "Phase 6 result: $RESULT"

          if [ "$RESULT" != "pass" ] && [ "$RESULT" != "verified" ] && [ "$RESULT" != "upgraded" ] && [ "$RESULT" != "upgraded_archived" ]; then
            echo "No production commit for result=$RESULT"
            exit 0
          fi

          git status --short
          git add \
            record-chain/ots/anchors/ \
            record-chain/ots/arweave-bundles/ \
            record-chain/ots/arweave-registry.json \
            api/record-chain-ots-arweave-registry.json \
            api/record-chain-ots-latest.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ "$RESULT" = "pass" ]; then
            git commit -m "chore: archive verified OTS proof on Arweave"
          elif [ "$RESULT" = "verified" ]; then
            git commit -m "chore: sync verified OTS anchor and latest status"
          elif [ "$RESULT" = "upgraded_archived" ]; then
            git commit -m "chore: archive upgraded OTS proof on Arweave"
          else
            git commit -m "chore: sync upgraded OTS anchor and latest status"
          fi
          git push

      - name: Upload Phase 6 audit logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: phase6-ots-watch-audit-${{ github.run_id }}
          path: record-chain/audit/phase6/${{ env.PHASE6_RUN_ID }}/
          retention-days: 90
          if-no-files-found: warn
