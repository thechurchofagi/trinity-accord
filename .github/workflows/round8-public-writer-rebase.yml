name: Round 8 Public-Writer Rebase

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  rebase:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/deep-audit-round8-public-writer-transactions'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: agent/deep-audit-round8-public-writer-transactions
      - name: Rebase audit branch onto current main
        run: |
          set -euo pipefail
          git fetch origin main --prune
          git rebase origin/main
          git push --force-with-lease origin HEAD:agent/deep-audit-round8-public-writer-transactions
