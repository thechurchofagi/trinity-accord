name: Diagnose Source Digest

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  list:
    runs-on: ubuntu-24.04
    outputs:
      failures: ${{ steps.failures.outputs.failures }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - id: failures
        run: |
          failures=$(python3 - <<'PY'
          import json
          import sys
          from pathlib import Path

          sys.path.insert(0, str(Path('scripts').resolve()))
          from public_metadata_utils import canonical_json_digest

          out = []
          for path in sorted(Path('api').rglob('*.json')):
              try:
                  data = json.loads(path.read_text(encoding='utf-8'))
              except Exception:
                  continue
              if not isinstance(data, dict) or 'source_digest' not in data:
                  continue
              expected = canonical_json_digest(path, ignored_fields={'source_digest'})
              stored = str(data['source_digest'])
              if stored not in (expected[:16], expected):
                  out.append(str(path))
          print(json.dumps(out, separators=(',', ':')))
          PY
          )
          echo "failures=$failures" >> "$GITHUB_OUTPUT"

  mismatch:
    needs: list
    if: ${{ needs.list.outputs.failures != '[]' }}
    name: ${{ matrix.file }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        file: ${{ fromJson(needs.list.outputs.failures) }}
    steps:
      - run: exit 1
