name: Diagnose Source Digest

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  digest:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Print digest mismatches only
        run: |
          python3 - <<'PY'
          import json
          import sys
          from pathlib import Path

          sys.path.insert(0, str(Path('scripts').resolve()))
          from public_metadata_utils import canonical_json_digest

          failures = []
          for path in sorted(Path('api').rglob('*.json')):
              try:
                  data = json.loads(path.read_text(encoding='utf-8'))
              except Exception:
                  continue
              if not isinstance(data, dict) or 'source_digest' not in data:
                  continue
              expected = canonical_json_digest(path, ignored_fields={'source_digest'})
              stored = str(data['source_digest'])
              if stored not in (expected[:16], expected):
                  failures.append((str(path), stored, expected[:16]))

          if failures:
              for path, stored, expected in failures:
                  print(f'{path}: stored={stored} expected={expected}')
              raise SystemExit(1)

          print('PASS: all source digests match')
          PY
