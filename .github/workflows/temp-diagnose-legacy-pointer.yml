name: Temporary Diagnose Legacy Pointer

on:
  pull_request:
    paths:
      - .github/workflows/temp-diagnose-legacy-pointer.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Run legacy pointer checker
        run: python3 scripts/check_legacy_pointer_coverage.py
