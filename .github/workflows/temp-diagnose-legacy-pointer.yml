name: Temporary Diagnose Legacy Pointer

on:
  pull_request:
    paths:
      - .github/workflows/temp-diagnose-legacy-pointer.yml

permissions:
  contents: write

jobs:
  diagnose:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: agent/complete-legacy-ar-eth-mirror-audit
      - name: Stop after diagnostic is captured
        id: sentinel
        shell: bash
        run: |
          if [[ -f .github/legacy-pointer-diagnostic-done ]]; then
            echo "done=true" >> "$GITHUB_OUTPUT"
          else
            echo "done=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Capture checker output
        if: steps.sentinel.outputs.done != 'true'
        shell: bash
        run: |
          set +e
          python3 scripts/check_legacy_pointer_coverage.py > legacy-pointer-diagnostic.txt 2>&1
          code=$?
          printf '\nexit_code=%s\n' "$code" >> legacy-pointer-diagnostic.txt
          printf 'captured\n' > .github/legacy-pointer-diagnostic-done
          exit 0
      - name: Commit diagnostic output
        if: steps.sentinel.outputs.done != 'true'
        shell: bash
        run: |
          set -euo pipefail
          git add legacy-pointer-diagnostic.txt .github/legacy-pointer-diagnostic-done
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "ci: capture legacy pointer diagnostic"
          git push origin HEAD:agent/complete-legacy-ar-eth-mirror-audit
