name: Record Chain Anchor

on:
  workflow_run:
    workflows: ["Append Record Chain Entries"]
    types: [completed]
  workflow_dispatch:
    inputs:
      force_batch:
        description: "Force batch build even below threshold"
        required: false
        default: "false"
  schedule:
    - cron: "17 */6 * * *"

concurrency:
  group: main-write-lock
  queue: max
  cancel-in-progress: false

permissions:
  contents: write

env:
  INPUT_FORCE_BATCH: ${{ github.event.inputs.force_batch }}

jobs:
  anchor:
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-24.04
    steps:
      - name: Authorize manual write actor
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          ACTOR: ${{ github.actor }}
          ALLOWED_ACTORS: ${{ format('{0},github-actions[bot]', vars.GUARDIAN_REGISTRY_WORKFLOW_ACTORS || 'thechurchofagi') }}
        run: |
          set -euo pipefail
          if echo ",${ALLOWED_ACTORS}," | grep -qF ",${ACTOR},"; then
            echo "Authorized write workflow actor: ${ACTOR}"
          else
            echo "Unauthorized actor: ${ACTOR}" >&2
            exit 1
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main

      - name: Record toolchain provenance
        run: |
          python3 scripts/toolchain_provenance.py > "$RUNNER_TEMP/toolchain-provenance.json"
          cat "$RUNNER_TEMP/toolchain-provenance.json"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install OpenTimestamps client
        run: python -m pip install -r requirements-ci.txt

      - name: Rebase current main before anchor generation
        run: |
          set -euo pipefail
          git fetch origin main --prune
          git rebase origin/main

      - name: Build Merkle batch
        run: |
          if [ "$INPUT_FORCE_BATCH" = "true" ]; then
            python scripts/trinity_record_chain.py build-batch --force
          else
            python scripts/trinity_record_chain.py build-batch
          fi

      - name: Stamp batch manifests
        run: python scripts/trinity_record_chain.py ots-stamp

      - name: Upgrade OTS proofs
        run: python scripts/trinity_record_chain.py ots-upgrade

      - name: Build anchor status
        run: python scripts/trinity_record_chain.py build-anchor-status

      - name: Verify record chain
        run: python scripts/trinity_record_chain.py verify

      - name: Commit anchor updates
        run: |
          set -euo pipefail

          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "No anchor updates."
            exit 0
          fi

          git config user.name "trinity-record-chain-bot"
          git config user.email "actions@github.com"

          stage_anchor_updates() {
            git status --short
            git add record-chain/ api/record-chain-anchor-status.json api/record-chain-overlays.json
            git diff --cached --check
          }

          rebuild_anchor_outputs() {
            if [ "$INPUT_FORCE_BATCH" = "true" ]; then
              python scripts/trinity_record_chain.py build-batch --force
            else
              python scripts/trinity_record_chain.py build-batch
            fi
            python scripts/trinity_record_chain.py ots-stamp
            python scripts/trinity_record_chain.py ots-upgrade
            python scripts/trinity_record_chain.py build-anchor-status
            python scripts/trinity_record_chain.py verify
          }

          stage_anchor_updates
          if git diff --cached --quiet; then
            echo "No staged anchor updates."
            exit 0
          fi

          git commit -m "anchor: build record-chain batch and OTS status"
          if [ -n "$(git status --porcelain)" ]; then
            echo "Worktree dirty after commit; generated files were not fully staged."
            git status --short
            exit 1
          fi

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Push succeeded."
              exit 0
            fi

            printf 'Push failed on attempt %s; rebasing and rebuilding.\n' "${attempt}"
            git fetch origin main --prune
            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "::error::Record Chain changed concurrently; anchor generation must restart on current main."
              exit 1
            fi

            rebuild_anchor_outputs
            stage_anchor_updates
            if ! git diff --cached --quiet; then
              git commit --amend --no-edit
            fi

            if [ -n "$(git status --porcelain)" ]; then
              echo "Worktree dirty after amend; refusing to push."
              git status --short
              exit 1
            fi
            sleep $((attempt * 5))
          done

          echo "::error::Failed to push anchor updates after retries."
          exit 1
