name: Record Chain Anchor

on:
  workflow_run:
    workflows: ["Append Record Chain Entries"]
    types: [completed]
  workflow_dispatch:
    inputs:
      force_batch:
        description: "Force batch build even below threshold"
        required: false
        default: "false"
  schedule:
    - cron: "17 */6 * * *"

concurrency:
  group: record-chain-anchor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  anchor:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install OpenTimestamps client
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt

      - name: Build Merkle batch
        run: |
          if [ "${{ github.event.inputs.force_batch }}" = "true" ]; then
            python scripts/trinity_record_chain.py build-batch --force
          else
            python scripts/trinity_record_chain.py build-batch
          fi

      - name: Stamp batch manifests
        run: python scripts/trinity_record_chain.py ots-stamp

      - name: Upgrade OTS proofs
        run: python scripts/trinity_record_chain.py ots-upgrade

      - name: Build anchor status
        run: python scripts/trinity_record_chain.py build-anchor-status

      - name: Verify record chain
        run: python scripts/trinity_record_chain.py verify

      - name: Commit anchor updates
        run: |
          set -euo pipefail
          if ! git diff --quiet; then
            git config user.name "trinity-record-chain-bot"
            git config user.email "actions@github.com"
            git add record-chain/ api/record-chain-anchor-status.json
            git commit -m "anchor: build record-chain batch and OTS status"

            for attempt in 1 2 3; do
              if git push; then
                exit 0
              fi
              printf 'Push failed on attempt %s; rebasing and retrying.\n' "${attempt}"
              git fetch origin main
              git rebase origin main || { git rebase --abort; }
              sleep $((attempt * 5))
            done

            echo "::error::Failed to push anchor updates after retries."
            exit 1
          fi
