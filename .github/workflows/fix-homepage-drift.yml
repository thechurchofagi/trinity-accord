name: Fix Homepage Drift
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: ".node-version"
      - run: python3 -m pip install -r requirements-ci.txt
      - name: Regenerate and commit
        run: |
          set -euo pipefail
          git config user.name trinity-fix-bot
          git config user.email actions@github.com
          git fetch origin main
          git reset --hard origin/main
          python3 scripts/trinity_record_chain.py verify
          python3 scripts/update_public_generated_artifacts.py
          git add api/arweave-wallet-status.json api/guardian-state.json api/guardian-current-registry.json api/record-chain-status.json api/public-home-status.json index.md sitemap.xml
          if git diff --cached --quiet; then echo No changes; else git commit -m "home: sync public homepage status (fix drift)" && git push origin HEAD:main && echo Pushed; fi
