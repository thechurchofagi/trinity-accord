name: Record Chain Head OTS Anchor

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - "Record Chain Auto Finalize"
      - "Append Record Chain Entries"
    types: [completed]
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write
  actions: write

concurrency:
  group: main-write-lock
  queue: max
  cancel-in-progress: false

jobs:
  anchor:
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-24.04
    steps:
      - name: Authorize manual write actor
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          ACTOR: ${{ github.actor }}
          ALLOWED_ACTORS: ${{ format('{0},github-actions[bot]', vars.GUARDIAN_REGISTRY_WORKFLOW_ACTORS || 'thechurchofagi') }}
        run: |
          set -euo pipefail
          if echo ",${ALLOWED_ACTORS}," | grep -qF ",${ACTOR},"; then
            echo "Authorized write workflow actor: ${ACTOR}"
          else
            echo "Unauthorized actor: ${ACTOR}" >&2
            exit 1
          fi

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
          ref: main

      - name: Record toolchain provenance
        run: |
          python3 scripts/toolchain_provenance.py > toolchain-provenance.json
          cat toolchain-provenance.json

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies for native OTS
        run: python -m pip install -r requirements-ci.txt

      - name: Rebase before native OTS scan
        run: |
          set -euo pipefail
          git fetch origin main --prune
          git rebase origin/main

      - name: Verify native record chain
        run: python3 scripts/trinity_record_chain.py verify

      - name: Detect OTS backlog
        id: backlog
        run: |
          set -euo pipefail
          python3 scripts/detect_record_chain_pipeline_backlog.py --github-output > /tmp/pipeline-backlog.env
          cat /tmp/pipeline-backlog.env >> "$GITHUB_OUTPUT"
          cat /tmp/pipeline-backlog.env

      - name: Stamp native record-chain head
        if: steps.backlog.outputs.ots_anchor_needed == 'true'
        run: |
          set -euo pipefail
          python3 scripts/ots_anchor_native_record_chain_head.py \
            --mode stamp \
            --overwrite

      - name: Verify native OTS output binds current tip
        if: steps.backlog.outputs.ots_anchor_needed == 'true'
        run: python3 scripts/check_native_ots_latest_matches_chain_tip.py

      - name: Commit native OTS anchor
        id: ots_commit
        if: steps.backlog.outputs.ots_anchor_needed == 'true'
        run: |
          set -euo pipefail
          printf '%s\n' "committed=false" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add record-chain/ots/native-anchors api/record-chain-native-ots-latest.json
          git diff --cached --check

          if git diff --cached --quiet; then
            printf '%s\n' "No native OTS anchor changes."
            exit 0
          fi

          git commit -m "anchor: stamp native record-chain head with OTS"
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Native OTS anchor commit left an incomplete worktree."
            git status --short
            exit 1
          fi

          for attempt in 1 2 3; do
            git fetch origin main --prune
            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "::error::Main changed incompatibly while stamping the native OTS head."
              exit 1
            fi

            # Rebase may succeed even when a newer Record Chain tip appeared.
            # Never publish or trigger paid archival for an anchor to an old tip.
            python3 scripts/trinity_record_chain.py verify
            python3 scripts/check_native_ots_latest_matches_chain_tip.py

            if git push origin HEAD:main; then
              printf '%s\n' "committed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            printf 'Push failed on attempt %s; rebasing and revalidating.\n' "${attempt}"
            sleep $((attempt * 5))
          done

          printf '%s\n' "::error::Failed to push native OTS anchor after retries."
          exit 1

      - name: Dispatch live Arweave archive workflow
        if: steps.ots_commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          printf '%s\n' "Dispatching Record Chain Arweave Archive in live mode"
          gh workflow run record-chain-arweave-archive.yml --repo "${GITHUB_REPOSITORY}" --ref main -f upload_mode=live

      - name: Dispatch waiting heartbeat status sync
        if: steps.ots_commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          printf '%s\n' "Dispatching Waiting Heartbeat Status Sync on main"
          gh workflow run waiting-heartbeat-status-sync.yml --repo "$GITHUB_REPOSITORY" --ref main
