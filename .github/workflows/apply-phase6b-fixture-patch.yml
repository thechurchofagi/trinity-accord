name: Apply Phase6B Fixture Patch

on:
  push:
    branches:
      - agent/audit-main-integrity-hardening

permissions:
  contents: write

jobs:
  apply:
    if: contains(github.event.head_commit.message, 'stage phase6b fixture runner')
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: agent/audit-main-integrity-hardening
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install focused dependencies
        run: python -m pip install -r requirements-ci.txt -r apps/record_chain_intake_gateway/requirements.txt
      - name: Apply and verify fixture patch
        run: |
          set -euo pipefail
          python scripts/apply_phase6b_chain_tip_fixture_patch.py
          python scripts/test_phase6b_hotfix.py
      - name: Remove one-time diagnostics and push
        run: |
          set -euo pipefail
          rm -f scripts/apply_phase6b_chain_tip_fixture_patch.py
          rm -f .github/workflows/apply-phase6b-fixture-patch.yml
          rm -f .github/workflows/audit-current-system-diagnostic.yml
          rm -f audit-current-system-diagnostic.log
          git config user.name "trinity-audit-bot"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Align Phase 6B chain-tip fixture with verifier"
          git push origin HEAD:agent/audit-main-integrity-hardening
