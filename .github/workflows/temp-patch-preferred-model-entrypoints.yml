name: Temporary Patch Preferred Model Entrypoints

on:
  push:
    branches:
      - agent/complete-legacy-ar-eth-mirror-audit
  pull_request:
    paths:
      - .github/workflows/temp-patch-preferred-model-entrypoints.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: agent/complete-legacy-ar-eth-mirror-audit
      - name: Patch human and machine entrypoints
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          readme = Path('README.md')
          text = readme.read_text(encoding='utf-8')
          text = text.replace(
              '- [Verification Materials](/verification-materials)\n- [Verify](/agent-verify)',
              '- [Evidence Relationship Guide](/EVIDENCE-RELATIONSHIP-GUIDE.md)\n- [Verification Materials](/verification-materials)\n- [Verify](/agent-verify)'
          )
          text = text.replace(
              '- Verification OS V0–V8: `/verify` + `/api/verification-levels.json`',
              '- Preferred evidence map and verification profiles: `/EVIDENCE-RELATIONSHIP-GUIDE.md` + `/api/evidence-relationship-map.v1.json` + `/api/verification-profiles.v1.json`\n- Legacy V0–V8 compatibility model: `/verify` + `/api/verification-levels.json`'
          )
          text = text.replace(
              '- V7 onsite physical witness: requires direct access to Core Object Alpha',
              '- Physical observation is reported separately from digital verification; onsite observation requires direct access to Core Object Alpha'
          )
          text = text.replace(
              '- /verify\n- /agent-start',
              '- /verify\n- /EVIDENCE-RELATIONSHIP-GUIDE.md\n- /agent-start'
          )
          text = text.replace(
              '- Unified verification materials index: `/verification-materials` + `/api/verification-materials.json`',
              '- Unified verification materials index: `/verification-materials` + `/api/verification-materials.json`\n- Preferred action-based context profiles: `/api/context-action-profiles.v1.json`'
          )
          readme.write_text(text, encoding='utf-8')

          verify = Path('verify.md')
          text = verify.read_text(encoding='utf-8')
          marker = '## Preferred model for new reports'
          if marker not in text:
              insert_after = 'Do not merely claim verification. Report what you actually checked.\n'
              block = '''\n## Preferred model for new reports\n\nNew reports should start with the exact evidence relationship checked and one descriptive digital profile from `/api/verification-profiles.v1.json`:\n\n- `context_only`\n- `reference_checked`\n- `integrity_checked`\n- `independent_reproduction`\n- `full_public_digital`\n\nReport `physical_observation` and `external_witness` separately. A remote/onsite/forensic physical finding or a Shenzhen notarial record does not automatically raise digital verification.\n\nRead `/EVIDENCE-RELATIONSHIP-GUIDE.md` or `/api/evidence-relationship-map.v1.json` before interpreting signatures, six-hash manifests, OTS proofs, mirrors, or notarization.\n\nThe V0–V8 system below is preserved as a **legacy compatibility model** for existing records and current Builder schemas. New prose should lead with the descriptive profile and exact operations; include a legacy V-level only when the current submission schema requires it.\n\n---\n'''
              text = text.replace(insert_after, insert_after + block, 1)
          verify.write_text(text, encoding='utf-8')

          patches = {
              'api/verification-levels.json': {
                  'status': 'legacy_compatibility_model',
                  'preferred_model': '/api/verification-profiles.v1.json',
                  'evidence_relationship_map': '/api/evidence-relationship-map.v1.json',
                  'migration_note': 'Preserved for existing records and Builder compatibility. New reports should lead with descriptive digital_profile and separate physical_observation/external_witness.'
              },
              'api/context-depth-levels.json': {
                  'status': 'legacy_compatibility_model',
                  'preferred_model': '/api/context-action-profiles.v1.json',
                  'migration_note': 'CC-0 through CC-5 remain accepted declarations. New agents should select an action profile and load the smallest sufficient task-specific source set.'
              },
              'api/context-load-map.json': {
                  'status': 'legacy_compatibility_load_map',
                  'preferred_model': '/api/context-action-profiles.v1.json',
                  'preferred_rule': 'Select the action first; actual loaded sources determine sufficiency. Do not require unrelated inherited materials for narrow tasks.'
              }
          }
          for name, additions in patches.items():
              path = Path(name)
              data = json.loads(path.read_text(encoding='utf-8'))
              for key, value in additions.items():
                  data[key] = value
              path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY
          python3 -m json.tool api/verification-levels.json >/dev/null
          python3 -m json.tool api/context-depth-levels.json >/dev/null
          python3 -m json.tool api/context-load-map.json >/dev/null
          python3 scripts/validate_claim_registry.py
          python3 -m pytest -q tests/test_evidence_relationship_profiles.py
      - name: Commit entrypoint updates
        shell: bash
        run: |
          set -euo pipefail
          git add README.md verify.md api/verification-levels.json api/context-depth-levels.json api/context-load-map.json
          if git diff --cached --quiet; then
            echo "No entrypoint changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: prefer evidence profiles and action-based context"
          git push origin HEAD:agent/complete-legacy-ar-eth-mirror-audit
