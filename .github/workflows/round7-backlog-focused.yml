name: Round 7 Backlog Dry-Run Focused Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  focused:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/deep-audit-round7-backlog-dry-run'
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/deep-audit-round7-backlog-dry-run
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Compile changed Python files
        run: |
          python -m py_compile \
            scripts/process_archive_backlog.py \
            scripts/test_archive_backlog_dry_run_behavior.py \
            scripts/test_arweave_paid_upload_wallet_wiring.py
      - name: Capture focused tests
        id: test
        continue-on-error: true
        run: |
          set +e
          {
            echo '=== behavior ==='
            python scripts/test_archive_backlog_dry_run_behavior.py
            first=$?
            echo "behavior_rc=$first"
            echo '=== registered contract ==='
            python scripts/test_arweave_paid_upload_wallet_wiring.py
            second=$?
            echo "contract_rc=$second"
            test "$first" = 0 -a "$second" = 0
          } > "$RUNNER_TEMP/focused.log" 2>&1
          code=$?
          echo "$code" > "$RUNNER_TEMP/focused.code"
          cat "$RUNNER_TEMP/focused.log"
          exit "$code"
      - name: Upload focused diagnostic
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: round7-backlog-focused-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/focused.log
            ${{ runner.temp }}/focused.code
          retention-days: 7
      - name: Require focused success
        if: always()
        run: |
          test -f "$RUNNER_TEMP/focused.code"
          test "$(cat "$RUNNER_TEMP/focused.code")" = "0"
