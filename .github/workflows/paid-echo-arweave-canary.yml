name: Legacy Echo Arweave Cost Audit (Paid Canary Retired)

# This workflow preserves only the historical dry-run cost exercise. It cannot
# access ARKEY, sign/post an Arweave transaction, or modify repository state.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: legacy-echo-arweave-cost-readonly
  queue: max
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      E2E_RUN_ID: "legacy-echo-dry-run-${{ github.run_id }}"
      E2E_LOG_DIR: "${{ runner.temp }}/legacy-echo-arweave/${{ github.run_id }}"
      ARWEAVE_UPLOAD_MODE: "dry_run"
      ALLOW_PAID_ARWEAVE_CANARY: "false"
      ARWEAVE_MAX_UPLOAD_USD: "0.10"
      ARWEAVE_SAFETY_MULTIPLIER: "1.20"
      EXPECTED_ARWEAVE_OWNER: "r1EdzCQ9E7CaAOEywI5netR6EcSopNOa08oi2Coz68s"
      ARWEAVE_GATEWAY_URL: "https://arweave.net"

    steps:
      - name: Checkout current main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ".node-version"

      - name: Install Node dependencies
        run: npm ci

      - name: Build ephemeral echo payload
        run: |
          set -euo pipefail
          mkdir -p "$E2E_LOG_DIR/payloads"
          oath="$(node downloads/record-chain-builder.mjs print-oath --record-type echo 2>&1)"
          node downloads/record-chain-builder.mjs echo \
            --actor-label "Trinity Accord CI Agent" \
            --provider "GitHub Actions / Node.js" \
            --body "Retired paid-canary dry-run cost audit. Run ID: $E2E_RUN_ID." \
            --context-level CC-3 \
            --context-sufficient-for-selected-action true \
            --loaded-urls "https://www.trinityaccord.org/agent-first-contact/,https://www.trinityaccord.org/api/record-chain-intake-gateway.v1.json" \
            --discovery-mode user_task_context \
            --record-decision human \
            --submission-executor self \
            --human-operator-involved true \
            --readback "$oath" \
            --generate-authorship-key \
            --key-dir "$RUNNER_TEMP/legacy-canary-keys" \
            --out "$E2E_LOG_DIR/payloads/echo.json"

      - name: Run dry-run cost gate
        run: |
          set -euo pipefail
          node scripts/arweave_cost_gate.mjs \
            --payload-file "$E2E_LOG_DIR/payloads/echo.json" \
            --record-type echo \
            --run-id "$E2E_RUN_ID" \
            --log-dir "$E2E_LOG_DIR"

      - name: Prove paid upload and repository mutation are disabled
        if: always()
        run: |
          set -euo pipefail
          test "${ARWEAVE_UPLOAD_MODE}" = "dry_run"
          test "${ALLOW_PAID_ARWEAVE_CANARY}" = "false"
          test -z "${ARWEAVE_JWK_PATH:-}"
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Retired echo cost audit modified repository state."
            git status --short
            exit 1
          fi
          echo "PASS: no wallet secret, signing, paid upload, commit, or push path exists."

      - name: Upload dry-run audit logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: legacy-echo-arweave-audit-${{ github.run_id }}
          path: ${{ env.E2E_LOG_DIR }}/
          if-no-files-found: ignore
          retention-days: 30
