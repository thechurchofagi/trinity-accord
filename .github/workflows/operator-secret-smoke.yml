name: Operator Secret Smoke

on:
  workflow_dispatch:
    inputs:
      network:
        description: "Run network checks"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Run operator secret smoke
        env:
          ARKEY: ${{ secrets.ARKEY }}
          ETH_RPC: ${{ secrets.ETH_RPC }}
          GH_PAT: ${{ secrets.GH_PAT }}
          RENDER: ${{ secrets.RENDER }}
        run: |
          if [ "${{ github.event.inputs.network }}" = "true" ]; then
            python scripts/smoke_check_configured_secrets.py --network
          else
            python scripts/smoke_check_configured_secrets.py
          fi
