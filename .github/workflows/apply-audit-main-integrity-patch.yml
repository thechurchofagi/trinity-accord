name: Apply Audit Main Integrity Patch

on:
  push:
    branches:
      - agent/audit-main-integrity-hardening

permissions:
  contents: write

jobs:
  apply:
    if: contains(github.event.head_commit.message, 'stage audit patch runner')
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: agent/audit-main-integrity-hardening

      - name: Apply exact audited patch
        run: python3 scripts/apply_audit_main_integrity_patch.py

      - name: Validate Python syntax
        run: |
          python3 -m py_compile \
            apps/record_chain_intake_gateway/app.py \
            apps/record_chain_intake_gateway/gateway/validation.py \
            scripts/trinity_record_chain.py \
            scripts/run_ci_group.py \
            scripts/test_record_chain_verifier_invariants.py \
            scripts/test_deep_integrity_group_nonempty.py

      - name: Remove one-time patch runner and push result
        run: |
          set -euo pipefail
          rm -f scripts/apply_audit_main_integrity_patch.py
          rm -f .github/workflows/apply-audit-main-integrity-patch.yml
          git config user.name "trinity-audit-bot"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Harden Record-Chain integrity invariants"
          git push origin HEAD:agent/audit-main-integrity-hardening
