name: Link Checker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly on Monday 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Check links in HTML and Markdown
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --accept 200,204,301,302,429
            --timeout 30
            --max-retries 3
            --retry-wait-time 5
            --cache
            --max-cache-age 1d
            --no-progress
            --format compact
            "_site/**/*.html"
            "**/*.md"
          fail: false

      - name: Upload link check report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: link-check-report
          path: ./lychee/out/
          retention-days: 30