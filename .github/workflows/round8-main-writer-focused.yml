name: Round 8 Main-Writer Focused Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  focused:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/deep-audit-round8-main-writer-transactions'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/deep-audit-round8-main-writer-transactions
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '24'
      - name: Install contract dependencies
        run: python -m pip install -r requirements-ci.txt
      - name: Run focused Round 8 contracts
        run: |
          set -euo pipefail
          python -m py_compile \
            scripts/check_native_ots_latest_matches_chain_tip.py \
            scripts/test_round8_main_writer_transaction_contract.py \
            scripts/test_record_chain_anchor_contract.py
          python scripts/test_round8_main_writer_transaction_contract.py
          python scripts/test_record_chain_anchor_contract.py
      - name: Capture full current-system result
        id: current
        continue-on-error: true
        run: |
          set +e
          python scripts/run_current_system_tests.py > "$RUNNER_TEMP/current-system.log" 2>&1
          code=$?
          echo "$code" > "$RUNNER_TEMP/current-system.code"
          tail -n 220 "$RUNNER_TEMP/current-system.log"
          exit "$code"
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: round8-main-writer-focused-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/current-system.log
            ${{ runner.temp }}/current-system.code
          retention-days: 7
      - name: Require current-system success
        if: always()
        run: |
          test -f "$RUNNER_TEMP/current-system.code"
          test "$(cat "$RUNNER_TEMP/current-system.code")" = "0"
