name: Record-Chain Gateway Tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-atomic-fix:
    if: ${{ github.event_name == 'pull_request' && github.head_ref == 'fix/atomic-intake-materialization' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Quiet checkout
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          git init -q
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth=1 origin "${HEAD_REF}"
          git checkout -q -B "${HEAD_REF}" FETCH_HEAD

      - name: Apply prepared root-cause patch
        run: |
          if grep -q "gateway.github_atomic import AtomicCreateConflict" apps/record_chain_intake_gateway/app.py; then
            echo "Atomic fix already applied."
            exit 0
          fi
          python3 - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/bootstrap-atomic-intake-fix.yml').read_text(encoding='utf-8')
          opener = "          python - <<'PY'\n"
          closer = "\n          PY\n"
          start = source.index(opener) + len(opener)
          end = source.index(closer, start)
          lines = source[start:end].splitlines()
          code = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n'

          section_start = code.index('# 1) Add an atomic Git Data API multi-file create primitive.')
          section_end = code.index('# 2) Make the live Gateway expose only the all-or-nothing transaction.')
          code = (
              code[:section_start]
              + "adapter_path = root / 'apps/record_chain_intake_gateway/gateway/github_atomic.py'\n\n"
              + code[section_end:]
          )

          old_import_assignment = (
              "new_import = 'from apps.record_chain_intake_gateway.gateway.github_adapter "
              "import AtomicCreateConflict, create_files_atomic, dispatch_workflow, "
              "get_file_sha, get_file_text'"
          )
          new_import_assignment = (
              "new_import = 'from apps.record_chain_intake_gateway.gateway.github_atomic "
              "import AtomicCreateConflict, create_files_atomic\\n"
              "from apps.record_chain_intake_gateway.gateway.github_adapter import "
              "dispatch_workflow, get_file_sha, get_file_text'"
          )
          if old_import_assignment not in code:
              raise SystemExit('could not locate app import replacement')
          code = code.replace(old_import_assignment, new_import_assignment, 1)

          code = code.replace(
              'apps/record_chain_intake_gateway/gateway/github_adapter.py").read_text',
              'apps/record_chain_intake_gateway/gateway/github_atomic.py").read_text',
              1,
          )

          fragile = (
              "assert old_policy in policy, 'readback policy marker missing'\n"
              "policy = policy.replace(old_policy, new_policy, 1)"
          )
          robust = (
              "if old_policy in policy:\n"
              "    policy = policy.replace(old_policy, new_policy, 1)\n"
              "else:\n"
              "    policy_start = policy.index('    for relative in [')\n"
              "    policy_end = policy.index('    print(\\\"READBACK_HASH_POLICY_OK\\\")', policy_start)\n"
              "    policy = policy[:policy_start] + new_policy + \\\"\\\\n\\\" + policy[policy_end:]"
          )
          if fragile not in code:
              raise SystemExit('could not locate readback policy patch instructions')
          code = code.replace(fragile, robust, 1)

          Path('/tmp/apply_atomic_fix.py').write_text(code, encoding='utf-8')
          PY

          set +e
          python3 /tmp/apply_atomic_fix.py > /tmp/atomic-fix.log 2>&1
          status=$?
          cat /tmp/atomic-fix.log
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            apps/record_chain_intake_gateway/app.py \
            apps/record_chain_intake_gateway/gateway/github_atomic.py \
            apps/record_chain_intake_gateway/tests/test_deep_audit_round2.py \
            scripts/test_readback_hash_policy.py \
            .github/workflows/record-chain-gateway-tests.yml
          git commit -m "fix: materialize intake artifacts atomically [atomic-fix-applied]"
          git push origin HEAD:${{ github.head_ref }}

  gateway-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          show-progress: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: ".node-version"

      - name: Install dependencies
        run: python -m pip install -r requirements-ci.txt -r apps/record_chain_intake_gateway/requirements.txt

      - name: Validate public JSON
        run: python -m json.tool api/record-chain-submission-schema.v1.json >/tmp/record-chain-submission-schema.checked.json

      - name: Verify receipt contract
        run: python scripts/test_record_chain_receipt_contract.py

      - name: Verify submission schema/runtime contract
        run: python scripts/test_record_chain_submission_schema_runtime_contract.py

      - name: Verify public agent entrypoints
        run: python scripts/check_public_agent_entrypoints.py api

      - name: Verify archived public web contract
        run: python -m scripts.test_archive_public_web

      - name: Run full current system tests
        run: python scripts/run_current_system_tests.py

      - name: Run gateway unit tests
        env:
          PYTHONPATH: apps/record_chain_intake_gateway
        shell: bash
        run: |
          set +e
          python -m pytest apps/record_chain_intake_gateway/tests -q > /tmp/gateway-unit-tests.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "::group::Gateway unit test failure tail"
            tail -n 200 /tmp/gateway-unit-tests.log
            echo "::endgroup::"
            exit "$status"
          fi
          tail -n 40 /tmp/gateway-unit-tests.log

      - name: Upload gateway unit test log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gateway-unit-test-log
          path: /tmp/gateway-unit-tests.log
          if-no-files-found: error
          retention-days: 3

      - name: Run top-level protocol and lifecycle tests
        run: python -m pytest tests -q

      - name: Run phase6b pytest-strict tests
        env:
          PYTHONPATH: apps/record_chain_intake_gateway
        run: |
          python -m pytest scripts/test_phase6b_hotfix.py scripts/test_authorship_projection_sanitization.py -q
          python scripts/test_phase6b_hotfix.py

      - name: Verify issue templates do not advertise retired submit paths
        run: |
          if grep -R "/agent-submit" -n .github/ISSUE_TEMPLATE | grep -v "retired\|Legacy\|do not use\|is retired"; then
            echo "::error::Issue templates contain active retired gateway paths"
            exit 1
          fi

      - name: Run builder Node tests
        run: |
          node scripts/test_builder_linked_guardian_disabled.mjs
          node scripts/test_legacy_guardian_retirement_tool_deprecated.mjs

      - name: Secret scans
        run: |
          python scripts/test_no_secret_material_committed.py
          python scripts/test_no_private_key_material_committed.py
