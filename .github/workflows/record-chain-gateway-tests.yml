name: Record-Chain Gateway Tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gateway-tests:
    runs-on: ubuntu-24.04
    steps:
      - name: Inspect active Public Internet Archive run
        run: |
          python3 - <<'PY'
          import json
          import urllib.request

          base = "https://api.github.com/repos/thechurchofagi/trinity-accord"
          headers = {
              "Accept": "application/vnd.github+json",
              "User-Agent": "trinity-accord-public-archive-active-monitor",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def get(url):
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request, timeout=60) as response:
                  return json.loads(response.read().decode("utf-8"))

          run = get(base + "/actions/workflows/public-internet-archive.yml/runs?per_page=1")["workflow_runs"][0]
          jobs = get(run["jobs_url"])["jobs"]
          artifacts = get(base + f"/actions/runs/{run['id']}/artifacts")["artifacts"]
          active = []
          completed = []
          for job in jobs:
              item = {
                  "id": job["id"],
                  "name": job["name"],
                  "status": job["status"],
                  "conclusion": job["conclusion"],
                  "started_at": job.get("started_at"),
                  "completed_at": job.get("completed_at"),
                  "steps": [
                      {
                          "name": step["name"],
                          "status": step["status"],
                          "conclusion": step["conclusion"],
                      }
                      for step in (job.get("steps") or [])
                      if step["status"] != "completed" or step["conclusion"] not in {"success", "skipped"}
                  ],
              }
              if job["status"] != "completed":
                  active.append(item)
              else:
                  completed.append(item)
          print("PUBLIC_ARCHIVE_ACTIVE=" + json.dumps({
              "run": {
                  "id": run["id"],
                  "run_number": run["run_number"],
                  "status": run["status"],
                  "conclusion": run["conclusion"],
                  "head_sha": run["head_sha"],
                  "created_at": run["created_at"],
                  "updated_at": run["updated_at"],
              },
              "active_jobs": active,
              "completed_job_count": len(completed),
              "artifact_count": len(artifacts),
              "artifacts": [artifact["name"] for artifact in artifacts],
          }, sort_keys=True))
          PY

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: ".node-version"

      - name: Install dependencies
        run: python -m pip install -r requirements-ci.txt -r apps/record_chain_intake_gateway/requirements.txt

      - name: Validate public JSON
        run: |
          python -m json.tool api/record-chain-submission-schema.v1.json >/tmp/record-chain-submission-schema.checked.json

      - name: Run source-level contract tests
        run: |
          python scripts/test_record_chain_receipt_contract.py
          python scripts/test_record_chain_submission_schema_runtime_contract.py
          python scripts/check_public_agent_entrypoints.py api
          python -m scripts.test_archive_public_web
          python scripts/run_current_system_tests.py

      - name: Run gateway unit tests
        env:
          PYTHONPATH: apps/record_chain_intake_gateway
        run: python -m pytest apps/record_chain_intake_gateway/tests -q

      - name: Run phase6b pytest-strict tests
        env:
          PYTHONPATH: apps/record_chain_intake_gateway
        run: |
          python -m pytest scripts/test_phase6b_hotfix.py scripts/test_authorship_projection_sanitization.py -q
          python scripts/test_phase6b_hotfix.py

      - name: Verify issue templates do not advertise retired submit paths
        run: |
          if grep -R "/agent-submit" -n .github/ISSUE_TEMPLATE | grep -v "retired\|Legacy\|do not use\|is retired"; then
            echo "::error::Issue templates contain active retired gateway paths"
            exit 1
          fi

      - name: Run builder Node tests
        run: |
          node scripts/test_builder_linked_guardian_disabled.mjs
          node scripts/test_legacy_guardian_retirement_tool_deprecated.mjs

      - name: Secret scans
        run: |
          python scripts/test_no_secret_material_committed.py
          python scripts/test_no_private_key_material_committed.py
