name: Record-Chain Gateway Tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gateway-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: ".node-version"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
      - name: Install system dependencies for cryptography
        run: sudo apt-get update && sudo apt-get update && sudo apt-get install -y libffi-dev build-essential

          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip --version
      - name: Install Python dependencies
        env:
          PIP_PREFER_BINARY: "1"
          PIP_ONLY_BINARY: "cryptography,cffi"
        run: python3 -m pip install -r requirements-ci.txt -r apps/record_chain_intake_gateway/requirements.txt

      - name: Validate public JSON
        run: |
          python -m json.tool api/record-chain-submission-schema.v1.json >/tmp/record-chain-submission-schema.checked.json

      - name: Run source-level contract tests
        run: |
          python scripts/test_record_chain_receipt_contract.py
          python scripts/test_record_chain_submission_schema_runtime_contract.py
          python scripts/check_public_agent_entrypoints.py api
          python scripts/run_current_system_tests.py

      - name: Run gateway unit tests
        env:
          PYTHONPATH: apps/record_chain_intake_gateway
        run: |
          python -m pytest \
            apps/record_chain_intake_gateway/tests/test_preflight.py \
            apps/record_chain_intake_gateway/tests/test_submit.py \
            apps/record_chain_intake_gateway/tests/test_retired_endpoints.py \
            apps/record_chain_intake_gateway/tests/test_receipt.py \
            apps/record_chain_intake_gateway/tests/test_gateway_schema_info.py \
            apps/record_chain_intake_gateway/tests/test_linked_guardian_disabled.py \
            apps/record_chain_intake_gateway/tests/test_record_type_consistency.py \
            apps/record_chain_intake_gateway/tests/test_idempotency_index.py \
            apps/record_chain_intake_gateway/tests/test_rate_limit_http_status.py \
            apps/record_chain_intake_gateway/tests/test_body_size_limit.py \
            -q

      - name: Run phase6b pytest-strict tests
        env:
          PYTHONPATH: apps/record_chain_intake_gateway
        run: |
          python -m pytest scripts/test_phase6b_hotfix.py scripts/test_authorship_projection_sanitization.py -q
          python scripts/test_phase6b_hotfix.py

      - name: Verify issue templates do not advertise retired submit paths
        run: |
          if grep -R "/agent-submit" -n .github/ISSUE_TEMPLATE | grep -v "retired\|Legacy\|do not use\|is retired"; then
            echo "::error::Issue templates contain active retired gateway paths"
            exit 1
          fi

      - name: Run builder Node tests
        run: |
          node scripts/test_builder_linked_guardian_disabled.mjs
          node scripts/test_legacy_guardian_retirement_tool_deprecated.mjs

      - name: Secret scans
        run: |
          python scripts/test_no_secret_material_committed.py
          python scripts/test_no_private_key_material_committed.py
