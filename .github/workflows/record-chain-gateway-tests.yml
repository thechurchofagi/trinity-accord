name: Record-Chain Gateway Tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gateway-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          show-progress: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: ".node-version"

      - name: Install dependencies
        run: python -m pip install -r requirements-ci.txt -r apps/record_chain_intake_gateway/requirements.txt

      - name: Validate public JSON
        run: python -m json.tool api/record-chain-submission-schema.v1.json >/tmp/record-chain-submission-schema.checked.json

      - name: Verify receipt contract
        run: python scripts/test_record_chain_receipt_contract.py

      - name: Verify submission schema/runtime contract
        run: python scripts/test_record_chain_submission_schema_runtime_contract.py

      - name: Verify public agent entrypoints
        run: python scripts/check_public_agent_entrypoints.py api

      - name: Verify archived public web contract
        run: python -m scripts.test_archive_public_web

      - name: Run full current system tests
        run: python scripts/run_current_system_tests.py

      - name: Run gateway unit tests
        id: gateway_unit_tests
        env:
          PYTHONPATH: apps/record_chain_intake_gateway
        shell: bash
        run: |
          set +e
          python -m pytest apps/record_chain_intake_gateway/tests -q > /tmp/gateway-unit-tests.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "::group::Gateway unit test failure tail"
            tail -n 200 /tmp/gateway-unit-tests.log
            echo "::endgroup::"
            exit "$status"
          fi
          tail -n 40 /tmp/gateway-unit-tests.log

      - name: Upload gateway unit test log
        if: ${{ always() && steps.gateway_unit_tests.outcome != 'skipped' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gateway-unit-test-log
          path: /tmp/gateway-unit-tests.log
          if-no-files-found: error
          retention-days: 3

      - name: Run top-level protocol and lifecycle tests
        run: python -m pytest tests -q

      - name: Run phase6b pytest-strict tests
        env:
          PYTHONPATH: apps/record_chain_intake_gateway
        run: |
          python -m pytest scripts/test_phase6b_hotfix.py scripts/test_authorship_projection_sanitization.py -q
          python scripts/test_phase6b_hotfix.py

      - name: Verify issue templates do not advertise retired submit paths
        run: |
          if grep -R "/agent-submit" -n .github/ISSUE_TEMPLATE | grep -v "retired\|Legacy\|do not use\|is retired"; then
            echo "::error::Issue templates contain active retired gateway paths"
            exit 1
          fi

      - name: Run builder Node tests
        run: |
          node scripts/test_builder_linked_guardian_disabled.mjs
          node scripts/test_legacy_guardian_retirement_tool_deprecated.mjs

      - name: Secret scans
        run: |
          python scripts/test_no_secret_material_committed.py
          python scripts/test_no_private_key_material_committed.py
