name: Record-Chain Gateway Tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gateway-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: ".node-version"

      - name: Install dependencies
        run: python -m pip install -r requirements-ci.txt -r apps/record_chain_intake_gateway/requirements.txt

      - name: Validate public JSON
        run: |
          python -m json.tool api/record-chain-submission-schema.v1.json >/tmp/record-chain-submission-schema.checked.json

      - name: Run source-level contract tests
        run: |
          python scripts/test_record_chain_receipt_contract.py
          python scripts/test_record_chain_submission_schema_runtime_contract.py
          python scripts/check_public_agent_entrypoints.py api
          python scripts/run_current_system_tests.py

      - name: Run gateway unit tests
        env:
          PYTHONPATH: apps/record_chain_intake_gateway
        run: python -m pytest apps/record_chain_intake_gateway/tests -q

      - name: Run phase6b pytest-strict tests
        env:
          PYTHONPATH: apps/record_chain_intake_gateway
        run: |
          python -m pytest scripts/test_phase6b_hotfix.py scripts/test_authorship_projection_sanitization.py -q
          python scripts/test_phase6b_hotfix.py

      - name: Verify issue templates do not advertise retired submit paths
        run: |
          if grep -R "/agent-submit" -n .github/ISSUE_TEMPLATE | grep -v "retired\|Legacy\|do not use\|is retired"; then
            echo "::error::Issue templates contain active retired gateway paths"
            exit 1
          fi

      - name: Run builder Node tests
        run: |
          node scripts/test_builder_linked_guardian_disabled.mjs
          node scripts/test_legacy_guardian_retirement_tool_deprecated.mjs

      - name: Secret scans
        run: |
          python scripts/test_no_secret_material_committed.py
          python scripts/test_no_private_key_material_committed.py

  audit-round3-apply:
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'agent/fix-system-audit-round3' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/fix-system-audit-round3
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Gate repeated application
        id: gate
        run: |
          if test -f scripts/test_system_audit_round3.py; then
            echo 'run=false' >> "$GITHUB_OUTPUT"
          else
            echo 'run=true' >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        if: steps.gate.outputs.run == 'true'
        with:
          python-version: '3.12'

      - name: Extract and apply audited repair
        if: steps.gate.outputs.run == 'true'
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import textwrap
          source = Path('.github/workflows/_audit-round3-apply.yml').read_text(encoding='utf-8')
          marker = "          python3 - <<'PY'\n"
          start = source.index(marker) + len(marker)
          end = source.index("\n          PY\n", start)
          Path('/tmp/apply_round3.py').write_text(textwrap.dedent(source[start:end]) + '\n', encoding='utf-8')
          PY
          python3 /tmp/apply_round3.py

      - name: Install validation dependencies
        if: steps.gate.outputs.run == 'true'
        run: python3 -m pip install -r requirements-ci.txt

      - name: Regenerate and validate audited outputs
        if: steps.gate.outputs.run == 'true'
        run: |
          set -euo pipefail
          python3 scripts/trinity_record_chain.py verify
          python3 scripts/update_public_generated_artifacts.py
          python3 scripts/generate_record_chain_status.py --check
          python3 scripts/normalize_record_chain_integrity_status.py --check
          python3 scripts/generate_public_home_status.py --check
          python3 scripts/patch_public_home_status_primary.py --check
          python3 scripts/check_public_home_status_contract.py
          python3 scripts/test_homepage_status_sync_contract.py
          python3 scripts/test_native_ots_upgrade_workflow_contract.py
          python3 scripts/test_system_audit_round3.py
          python3 scripts/generate_sitemap.py --check

      - name: Commit validated non-workflow repair
        if: steps.gate.outputs.run == 'true'
        run: |
          set -euo pipefail
          git config user.name 'trinity-system-audit-bot'
          git config user.email 'actions@github.com'
          git add \
            scripts/detect_archive_backlog.py \
            scripts/normalize_record_chain_integrity_status.py \
            scripts/restore_json_if_only_volatile_changes.py \
            scripts/test_homepage_status_sync_contract.py \
            scripts/test_native_ots_upgrade_workflow_contract.py \
            scripts/test_system_audit_round3.py \
            scripts/trinity_record_chain.py \
            scripts/update_public_generated_artifacts.py \
            api/record-chain-status.json \
            api/public-home-status.json \
            index.md
          git commit -m 'fix: close system audit data and generator gaps [audit-round3-applied]'
          git push origin HEAD:agent/fix-system-audit-round3
