name: Test Dispatch

on:
  # Only trigger via manual dispatch, not on push/PR
  workflow_dispatch:
    inputs:
      test_input:
        description: 'Test input'
        required: false
        type: string

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - run: echo "Test dispatch triggered with input: ${{ github.event.inputs.test_input }}"
