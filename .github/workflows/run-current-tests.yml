name: Run Current Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  current-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ".node-version"
      - run: python3 -m pip install -r requirements-ci.txt
      - name: Run isolated full public action lifecycle
        run: python3 scripts/test_full_public_action_lifecycle_e2e.py
      - name: Regenerate sitemap from current files
        run: python3 scripts/generate_sitemap.py
      - name: Run aggregate current system tests
        id: aggregate
        shell: bash
        run: |
          set +e
          python3 scripts/run_current_system_tests.py > aggregate-current-tests.log 2>&1
          status=$?
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload aggregate diagnostic
        if: steps.aggregate.outputs.status != '0'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: aggregate-current-tests-log
          path: aggregate-current-tests.log
          if-no-files-found: error
          retention-days: 3
      - name: Enforce aggregate result
        if: steps.aggregate.outputs.status != '0'
        shell: bash
        run: |
          tail -n 120 aggregate-current-tests.log
          exit 1
