name: Run Current Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  current-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          show-progress: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ".node-version"
      - run: python3 -m pip install -r requirements-ci.txt
      - name: Regenerate sitemap from current files
        run: python3 scripts/generate_sitemap.py
      - name: Run full current system tests
        shell: bash
        run: |
          set +e
          python3 scripts/run_current_system_tests.py > /tmp/current-system-tests.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "::group::Current system test failure tail"
            tail -n 160 /tmp/current-system-tests.log
            echo "::endgroup::"
            exit "$status"
          fi
          tail -n 40 /tmp/current-system-tests.log
