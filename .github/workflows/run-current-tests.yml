name: Run Current Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  current-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          show-progress: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ".node-version"
      - run: python3 -m pip install -r requirements-ci.txt
      - name: Verify sitemap has no committed drift
        run: python3 scripts/generate_sitemap.py --check
      - name: Run full current system tests
        id: current_system_tests
        continue-on-error: true
        shell: bash
        run: |
          python3 scripts/run_current_system_tests.py > /tmp/current-system-tests.log 2>&1
      - name: Upload current-system failure log
        if: steps.current_system_tests.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: current-system-test-log
          path: /tmp/current-system-tests.log
          if-no-files-found: error
      - name: Surface current-system failure
        if: steps.current_system_tests.outcome == 'failure'
        shell: bash
        run: |
          echo "::group::Current system test failure tail"
          tail -n 80 /tmp/current-system-tests.log
          echo "::endgroup::"
          exit 1
      - name: Show current-system success tail
        if: steps.current_system_tests.outcome == 'success'
        run: tail -n 40 /tmp/current-system-tests.log
