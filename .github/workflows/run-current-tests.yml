name: Run Current Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  current-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ".node-version"
      - run: python3 -m pip install -r requirements-ci.txt
      - name: Regenerate sitemap from current files
        run: python3 scripts/generate_sitemap.py
      - name: Capture full current system test output
        id: current
        shell: bash
        run: |
          set +e
          python3 scripts/run_current_system_tests.py > /tmp/current-tests.log 2>&1
          status=$?
          mkdir -p diagnostics
          tail -n 500 /tmp/current-tests.log > diagnostics/pr655-current-tests-tail.txt
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload PR655 current-test diagnostic
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pr655-current-tests-tail
          path: diagnostics/pr655-current-tests-tail.txt
          if-no-files-found: error
          retention-days: 1
      - name: Preserve current-test result
        if: always()
        shell: bash
        run: exit "${{ steps.current.outputs.status }}"
