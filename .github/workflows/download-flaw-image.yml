name: Download flaw-image-provenance.tar from Arweave

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install arbundles for ANS-104 extraction
        run: npm install -g arbundles

      - name: Download and extract from Arweave bundle
        run: |
          TXID="9klmArmByJNOGeHzfnrAhB6x6w7sKSYLS1zQNLL7GLs"
          echo "Downloading Arweave TxID: $TXID"
          curl -L --retry 3 --retry-delay 10 \
            "https://arweave.net/$TXID" \
            -o /tmp/arweave-raw.bin

          echo "Downloaded size: $(stat -c%s /tmp/arweave-raw.bin) bytes"
          echo "File type: $(file /tmp/arweave-raw.bin)"

          # Check if it's a ZIP/tar or ANS-104 bundle
          FILE_TYPE=$(file -b /tmp/arweave-raw.bin)

          if echo "$FILE_TYPE" | grep -qi "zip"; then
            echo "Detected ZIP archive, extracting flaw-image-provenance.tar..."
            unzip -l /tmp/arweave-raw.bin
            unzip -j /tmp/arweave-raw.bin "flaw-image-provenance.tar" -d /tmp/ 2>/dev/null || \
            unzip -j /tmp/arweave-raw.bin "*/flaw-image-provenance.tar" -d /tmp/ 2>/dev/null || \
            echo "Trying to extract any .tar file..."
            unzip -j /tmp/arweave-raw.bin "*.tar" -d /tmp/ 2>/dev/null
          elif echo "$FILE_TYPE" | grep -qi "tar"; then
            echo "Detected tar archive, copying directly..."
            cp /tmp/arweave-raw.bin /tmp/flaw-image-provenance.tar
          else
            echo "Attempting ANS-104 bundle extraction..."
            cd /tmp && node -e "
              const { Bundle } = require('arbundles');
              const fs = require('fs');
              (async () => {
                const data = fs.readFileSync('/tmp/arweave-raw.bin');
                const bundle = new Bundle(data);
                const items = bundle.items;
                console.log('Bundle items:', items.length);
                for (let i = 0; i < items.length; i++) {
                  const item = items[i];
                  const tags = item.tags ? item.tags.map(t => Buffer.from(t.name).toString() + '=' + Buffer.from(t.value).toString()) : [];
                  console.log('Item', i, 'size:', item.data?.length, 'tags:', tags.join(', '));
                  if (tags.some(t => t.includes('flaw') || t.includes('provenance'))) {
                    fs.writeFileSync('/tmp/flaw-image-provenance.tar', item.data);
                    console.log('Extracted flaw-image-provenance.tar!');
                  }
                }
              })();
            " 2>&1
          fi

      - name: Verify and deploy
        run: |
          if [ ! -f /tmp/flaw-image-provenance.tar ]; then
            echo "ERROR: Could not extract flaw-image-provenance.tar from bundle"
            echo "Listing all extracted files:"
            ls -la /tmp/*.tar /tmp/*.zip /tmp/arweave-raw.bin 2>/dev/null
            exit 1
          fi

          SIZE=$(stat -c%s /tmp/flaw-image-provenance.tar)
          HASH=$(sha256sum /tmp/flaw-image-provenance.tar | awk '{print $1}')
          echo "Extracted size: $SIZE bytes"
          echo "SHA-256: $HASH"

          mkdir -p archive/evidence
          cp /tmp/flaw-image-provenance.tar archive/evidence/flaw-image-provenance.tar
          echo "File deployed to archive/evidence/flaw-image-provenance.tar"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive/evidence/flaw-image-provenance.tar
          git commit -m "feat: add flaw-image-provenance.tar extracted from Arweave bundle"
          git push
