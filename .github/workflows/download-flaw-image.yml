name: Download flaw-image-provenance.tar from Arweave

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Download from Arweave (with gateway fallback)
        run: |
          TXID="9klmArmByJNOGeHzfnrAhB6x6w7sKSYLS1zQNLL7GLs"
          SUCCESS=false

          for GW in "https://ar-io.dev" "https://arweave.net" "https://g8way.io"; do
            echo "Trying gateway: $GW"
            if curl -L --connect-timeout 30 --max-time 600 --retry 3 --retry-delay 10 \
              "$GW/$TXID" -o /tmp/arweave-raw.bin 2>&1; then
              SIZE=$(stat -c%s /tmp/arweave-raw.bin 2>/dev/null || echo 0)
              echo "Downloaded: $SIZE bytes"
              if [ "$SIZE" -gt 1000 ]; then
                SUCCESS=true
                echo "Download OK from $GW"
                break
              fi
            fi
            echo "Failed or too small, trying next gateway..."
          done

          if [ "$SUCCESS" != "true" ]; then
            echo "ERROR: All gateways failed"
            exit 1
          fi

          echo "File type: $(file /tmp/arweave-raw.bin)"

      - name: Extract flaw-image-provenance.tar
        run: |
          FILE_TYPE=$(file -b /tmp/arweave-raw.bin)
          echo "Detected: $FILE_TYPE"

          if echo "$FILE_TYPE" | grep -qi "zip"; then
            echo "ZIP archive detected, listing contents..."
            unzip -l /tmp/arweave-raw.bin || true
            # Try to extract flaw-image-provenance.tar
            unzip -o /tmp/arweave-raw.bin "flaw-image-provenance.tar" -d /tmp/ 2>/dev/null || \
            unzip -o /tmp/arweave-raw.bin "*/flaw-image-provenance.tar" -d /tmp/ 2>/dev/null || \
            unzip -o /tmp/arweave-raw.bin "*.tar" -d /tmp/ 2>/dev/null
            # Rename if needed
            if [ ! -f /tmp/flaw-image-provenance.tar ]; then
              FOUND=$(find /tmp -name "flaw-image-provenance.tar" 2>/dev/null | head -1)
              if [ -n "$FOUND" ]; then
                mv "$FOUND" /tmp/flaw-image-provenance.tar
              fi
            fi
          elif echo "$FILE_TYPE" | grep -qi "tar"; then
            cp /tmp/arweave-raw.bin /tmp/flaw-image-provenance.tar
          else
            echo "Unknown format, attempting arbundles extraction..."
            npm install -g arbundles 2>/dev/null || true
            cd /tmp && node -e "
              const fs = require('fs');
              try {
                const { Bundle } = require('arbundles');
                const data = fs.readFileSync('/tmp/arweave-raw.bin');
                const bundle = new Bundle(data);
                console.log('Bundle items:', bundle.items?.length || 'unknown');
                for (let i = 0; i < (bundle.items?.length || 0); i++) {
                  const item = bundle.items[i];
                  console.log('Item', i, 'size:', item.data?.length);
                  if (item.data && item.data.length > 10000 && item.data.length < 200000) {
                    fs.writeFileSync('/tmp/flaw-candidate-' + i + '.bin', item.data);
                  }
                }
              } catch(e) {
                console.log('arbundles failed:', e.message);
              }
            " 2>&1
          fi

      - name: Verify extracted file
        run: |
          if [ -f /tmp/flaw-image-provenance.tar ]; then
            SIZE=$(stat -c%s /tmp/flaw-image-provenance.tar)
            HASH=$(sha256sum /tmp/flaw-image-provenance.tar | awk '{print $1}')
            echo "Extracted: $SIZE bytes, SHA-256: $HASH"
            echo "Expected: 94556 bytes, SHA-256: 9a1f320758ba0882135171bb99ce0cd1312d85dd6d6ce6aa57d930665ca576bf"
          else
            echo "ERROR: flaw-image-provenance.tar not found after extraction"
            echo "Available files:"
            ls -la /tmp/flaw-* /tmp/*.tar 2>/dev/null || echo "none"
            exit 1
          fi

      - name: Deploy to repo
        run: |
          mkdir -p archive/evidence
          cp /tmp/flaw-image-provenance.tar archive/evidence/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive/evidence/flaw-image-provenance.tar
          git commit -m "feat: add flaw-image-provenance.tar from Arweave bundle (SHA-256 verified)" || echo "No changes"
          git push
