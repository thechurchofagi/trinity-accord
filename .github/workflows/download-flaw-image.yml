name: Download flaw-image-provenance.tar from Arweave

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Download from Arweave
        run: |
          TXID="9klmArmByJNOGeHzfnrAhB6x6w7sKSYLS1zQNLL7GLs"
          for GW in "https://ar-io.dev" "https://arweave.net" "https://g8way.io"; do
            echo "Trying: $GW"
            if curl -L --connect-timeout 30 --max-time 600 --retry 3 --retry-delay 10 "$GW/$TXID" -o /tmp/arweave-raw.bin 2>&1; then
              SIZE=$(stat -c%s /tmp/arweave-raw.bin 2>/dev/null || echo 0)
              echo "Downloaded: $SIZE bytes from $GW"
              [ "$SIZE" -gt 1000 ] && break
            fi
          done
          echo "Type: $(file /tmp/arweave-raw.bin)"

      - name: List and extract from archive
        run: |
          FILE_TYPE=$(file -b /tmp/arweave-raw.bin)
          echo "=== File type: $FILE_TYPE ==="

          if echo "$FILE_TYPE" | grep -qi "zip"; then
            echo "=== ZIP contents ==="
            unzip -l /tmp/arweave-raw.bin 2>&1

            echo "=== Attempting extraction ==="
            # Try all possible paths
            unzip -o /tmp/arweave-raw.bin -d /tmp/zipout/ 2>&1
            echo "=== Extracted files ==="
            find /tmp/zipout -type f -ls 2>/dev/null

            # Look for any .tar file
            FOUND=$(find /tmp/zipout -name "*.tar" -o -name "*flaw*" -o -name "*provenance*" 2>/dev/null | head -1)
            if [ -n "$FOUND" ]; then
              echo "Found: $FOUND"
              cp "$FOUND" /tmp/flaw-image-provenance.tar
            fi
          elif echo "$FILE_TYPE" | grep -qi "tar"; then
            cp /tmp/arweave-raw.bin /tmp/flaw-image-provenance.tar
            echo "=== Tar contents ==="
            tar tf /tmp/flaw-image-provenance.tar | head -20
          fi

          if [ -f /tmp/flaw-image-provenance.tar ]; then
            echo "=== SUCCESS ==="
            ls -la /tmp/flaw-image-provenance.tar
            sha256sum /tmp/flaw-image-provenance.tar
          else
            echo "=== FAILURE: Could not extract ==="
            ls -la /tmp/zipout/ 2>/dev/null
            exit 1
          fi

      - name: Deploy to repo
        if: success()
        run: |
          mkdir -p archive/evidence
          cp /tmp/flaw-image-provenance.tar archive/evidence/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive/evidence/flaw-image-provenance.tar
          git commit -m "feat: add flaw-image-provenance.tar from Arweave" || echo "No changes"
          git push
