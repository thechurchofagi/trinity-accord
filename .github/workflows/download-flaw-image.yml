name: Download flaw-image-provenance.tar from Arweave

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download flaw-image-provenance.tar from Arweave
        run: |
          echo "Downloading from Arweave TxID: 9klmArmByJNOGeHzfnrAhB6x6w7sKSYLS1zQNLL7GLs"
          curl -L --retry 3 --retry-delay 10 \
            "https://arweave.net/9klmArmByJNOGeHzfnrAhB6x6w7sKSYLS1zQNLL7GLs" \
            -o archive/evidence/flaw-image-provenance.tar

      - name: Verify file
        run: |
          FILE="archive/evidence/flaw-image-provenance.tar"
          SIZE=$(stat -c%s "$FILE")
          HASH=$(sha256sum "$FILE" | awk '{print $1}')

          echo "Downloaded size: $SIZE bytes"
          echo "SHA-256: $HASH"

          EXPECTED_SIZE=94556
          EXPECTED_HASH="9a1f320758ba0882135171bb99ce0cd1312d85dd6d6ce6aa57d930665ca576bf"

          if [ "$SIZE" -ne "$EXPECTED_SIZE" ]; then
            echo "ERROR: Size mismatch! Expected $EXPECTED_SIZE, got $SIZE"
            exit 1
          fi

          if [ "$HASH" != "$EXPECTED_HASH" ]; then
            echo "ERROR: Hash mismatch! Expected $EXPECTED_HASH, got $HASH"
            exit 1
          fi

          echo "✅ Verification passed: size and SHA-256 match"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive/evidence/flaw-image-provenance.tar
          git commit -m "feat: add flaw-image-provenance.tar from Arweave (94KB, SHA-256 verified)"
          git push
