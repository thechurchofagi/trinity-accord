name: Direct Pages Production Closure

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/pages-production-closure.yml"

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  guard:
    runs-on: ubuntu-24.04
    steps:
      - name: Require main production ref
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "::error::Production Pages closure may run only from refs/heads/main; got $GITHUB_REF"
            exit 1
          fi

  verify:
    needs: guard
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout exact revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        env:
          PIP_PREFER_BINARY: "1"
          PIP_ONLY_BINARY: "cryptography,cffi"
        run: python3 -m pip install -r requirements-ci.txt

      - name: Verify record-chain integrity
        run: python3 scripts/trinity_record_chain.py verify

      - name: Verify sitemap has no drift
        run: python3 scripts/generate_sitemap.py --check

      - name: Verify public homepage contracts
        run: |
          set -euo pipefail
          python3 scripts/generate_arweave_wallet_status.py --check
          python3 scripts/generate_record_chain_status.py --check
          python3 scripts/check_public_home_status_contract.py
          python3 scripts/test_historic_autonomous_agent_reception_contract.py
          python3 scripts/test_home_public_status_sync.py
          python3 scripts/test_homepage_status_sync_contract.py

      - name: Run current system tests
        run: python3 scripts/run_current_system_tests.py

      - name: Scan for secret material
        run: |
          set -euo pipefail
          python3 scripts/test_no_secret_material_committed.py
          python3 scripts/test_no_private_key_material_committed.py

  build:
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout exact revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Prepare static builder bundles
        run: |
          set -euo pipefail
          python3 scripts/export_formal_builder_bundles.py --out-dir builder-bundles --update-api
          cp scripts/download_and_run_builder_bundle.py builder-bundles/download_and_run_builder_bundle.py
          test -f builder-bundles/trinity-pure-echo-builder-bundle.tar.gz
          test -f builder-bundles/trinity-v0v5-builder-bundle.tar.gz
          test -f builder-bundles/trinity-guardian-stage1-builder-bundle.tar.gz
          test -f builder-bundles/trinity-guardian-stage2-builder-bundle.tar.gz
          test -f builder-bundles/trinity-guardian-signed-echo-builder-bundle.tar.gz

      - name: Build site with Jekyll
        uses: actions/jekyll-build-pages@44a6e6beabd48582f863aeeb6cb2151cc1716697 # v1
        with:
          source: ./
          destination: ./_site

      - name: Restore reviewed static artifacts
        run: |
          set -euo pipefail
          sudo chown -R "$(id -u):$(id -g)" _site
          rm -rf ./_site/api ./_site/record-chain ./_site/downloads ./_site/builder-bundles
          cp -a ./api ./_site/api
          cp -a ./record-chain ./_site/record-chain
          mkdir -p ./_site/downloads
          install -m 0644 ./downloads/record-chain-builder.mjs ./_site/downloads/record-chain-builder.mjs
          install -m 0644 ./downloads/record-chain-agent-field-guidance.v1.json ./_site/downloads/record-chain-agent-field-guidance.v1.json
          cp -a ./builder-bundles ./_site/builder-bundles
          install -m 0644 ./downloads/record-chain-builder.mjs ./_site/builder-bundles/record-chain-builder.mjs
          cp ./scripts/download_and_run_builder_bundle.py ./_site/builder-bundles/download_and_run_builder_bundle.py

      - name: Require current static reading surfaces in artifact
        run: |
          set -euo pipefail
          grep -Fq 'id="what-this-is"' _site/index.html
          grep -Fq 'A fixed record, with a verifiable preservation system around it' _site/index.html
          grep -Fq 'This map explains the whole project by function.' _site/seed-map/index.html
          grep -Fq 'Canon is fixed. Context may expand.' _site/seed-map/index.html
          grep -Fq 'What authority means here' _site/authority/index.html
          grep -Fq 'Record-Chain' _site/authority/index.html
          grep -Fq 'Object in one paragraph' _site/agent-brief/index.html
          grep -Fq 'civilizational self-archive' _site/agent-brief/index.html
          grep -Fq 'What the project consists of' _site/why-high-signal/index.html
          grep -Fq 'Verification and durability' _site/why-high-signal/index.html
          grep -Fq 'First understand what is being preserved' _site/worth-preserving/index.html
          grep -Fq 'Why the surrounding system matters' _site/worth-preserving/index.html

      - name: Verify Pages artifact contracts
        run: |
          set -euo pipefail
          python3 scripts/test_pages_builder_artifact_contract.py --site-dir _site
          python3 scripts/check_deployment_freshness.py --site-dir _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout exact revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

      - name: Verify live production closure
        id: live
        continue-on-error: true
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5 6; do
            echo "production readback attempt ${attempt}/6"
            if python3 scripts/check_homepage_live_freshness.py \
                --site "https://www.trinityaccord.org" \
                --timeout 20 \
                --retries 1 \
                --retry-sleep 1 \
              && python3 scripts/check_deployment_freshness.py \
                --site "https://www.trinityaccord.org" \
                --timeout 20; then
              echo "PASS: production serves current main static pages and deployment digests"
              exit 0
            fi
            sleep 30
          done
          echo "FAIL: production did not converge to the deployed revision"
          exit 1

      - name: Publish production closure evidence
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
          LIVE_OUTCOME: ${{ steps.live.outcome }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -euo pipefail
          body="Direct Pages production closure: ${LIVE_OUTCOME}

          workflow_run_id=${GITHUB_RUN_ID}
          workflow_run_url=https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          deployed_sha=${GITHUB_SHA}
          page_url=${PAGE_URL}
          six_page_static_contract=${LIVE_OUTCOME}
          deployment_digest_contract=${LIVE_OUTCOME}"
          gh pr comment 670 --repo "$GITHUB_REPOSITORY" --body "$body"

      - name: Require production closure pass
        run: |
          set -euo pipefail
          test "${{ steps.live.outcome }}" = "success"
