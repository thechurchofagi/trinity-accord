name: Apply Deep Audit Round 6

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/deep-audit-round6-retired-contracts'
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: agent/deep-audit-round6-retired-contracts
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '24'
      - name: Install dependencies
        run: python -m pip install -r requirements-ci.txt -r apps/record_chain_intake_gateway/requirements.txt
      - name: Apply audited transformations
        run: python audit/apply_deep_audit_round6.py
      - name: Run focused and full Gateway regressions
        env:
          PYTHONPATH: apps/record_chain_intake_gateway:.
        run: |
          set -euo pipefail
          python -m py_compile apps/record_chain_intake_gateway/app.py scripts/trinity_record_builder.py
          python scripts/test_gateway_runtime_recovery_links.py
          python scripts/test_gateway_schema_shadow_parity.py
          python scripts/test_reserved_internal_builder_contract.py
          python scripts/test_record_chain_intake_gateway_contract.py
          python scripts/test_legacy_gateway_retired_contract.py
          python scripts/test_record_type_public_surface_contract.py
          python scripts/test_gateway_reserved_record_types_contract.py
          python -m pytest -q apps/record_chain_intake_gateway/tests
          node --check examples/github-app-backend/server.js
          python scripts/trinity_record_chain.py verify
      - name: Commit audited fixes
        run: |
          set -euo pipefail
          git config user.name 'trinity-deep-audit-bot'
          git config user.email 'actions@github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No changes to commit.'
            exit 0
          fi
          git commit -m 'Harden retired and shadow Gateway contracts'
          git push origin HEAD:agent/deep-audit-round6-retired-contracts
