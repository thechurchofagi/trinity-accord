name: Apply Deep Audit Round 3

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/fix-deep-audit-round3'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: agent/fix-deep-audit-round3
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: '.node-version'
      - name: Apply audited patch
        run: |
          set -euo pipefail
          base64 -d audit/deep-audit-round3.patch.gz.b64 | gzip -d > /tmp/deep-audit-round3.patch
          git apply --check /tmp/deep-audit-round3.patch
          git apply /tmp/deep-audit-round3.patch
          rm -f audit/deep-audit-round3.patch.gz.b64 .github/workflows/apply-deep-audit-round3.yml audit/APPLY.txt
      - name: Install test dependencies
        run: python -m pip install -r requirements-ci.txt -r apps/record_chain_intake_gateway/requirements.txt
      - name: Validate corrected invariants
        env:
          PYTHONPATH: apps/record_chain_intake_gateway:.
        run: |
          set -euo pipefail
          python -m py_compile scripts/trinity_record_chain.py apps/record_chain_intake_gateway/app.py apps/record_chain_intake_gateway/gateway/validation.py
          node --check downloads/record-chain-builder.mjs
          python scripts/test_deep_intake_append_transaction_invariants.py
          python -m pytest -q apps/record_chain_intake_gateway/tests/test_deep_transaction_recovery.py
          python scripts/test_record_chain_p0_transaction_and_finalizer_contract.py
          python scripts/test_record_chain_verifier_invariants.py
          python scripts/test_classification_update_final_binding.py
          python scripts/check_builder_receipt_boundary_sync.py
          python scripts/trinity_record_chain.py verify
      - name: Commit corrected source
        run: |
          set -euo pipefail
          git config user.name 'trinity-deep-audit-bot'
          git config user.email 'actions@github.com'
          git add -A
          git commit -m 'Harden intake and append transaction lifecycle'
          git push origin HEAD:agent/fix-deep-audit-round3
