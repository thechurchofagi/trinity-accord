name: Diagnose Deep Audit Round 3 Patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.head.ref == 'agent/fix-deep-audit-round3'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: agent/fix-deep-audit-round3
      - name: Capture patch identity and apply error
        run: |
          set +e
          mkdir -p audit
          {
            echo 'BASE_HEAD:'
            git rev-parse HEAD
            echo 'PATCH_TEXT_SHA256:'
            base64 -d audit/deep-audit-round3.patch.gz.b64 | gzip -d > /tmp/deep-audit-round3.patch
            sha256sum /tmp/deep-audit-round3.patch
            echo 'PATCH_FILES:'
            grep '^diff --git ' /tmp/deep-audit-round3.patch
            echo 'APPLY_CHECK:'
            git apply --check --verbose /tmp/deep-audit-round3.patch
            echo "APPLY_EXIT=$?"
          } > audit/patch-apply-diagnostic.log 2>&1
          cat audit/patch-apply-diagnostic.log
          rm -f .github/workflows/apply-deep-audit-round3.yml
          git config user.name 'trinity-deep-audit-bot'
          git config user.email 'actions@github.com'
          git add audit/patch-apply-diagnostic.log .github/workflows/apply-deep-audit-round3.yml
          git commit -m 'audit: record exact patch apply diagnostic'
          git push origin HEAD:agent/fix-deep-audit-round3
