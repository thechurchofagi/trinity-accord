name: Diagnose Post-609 Live Gateway

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  diagnose-gateway:
    if: ${{ github.event.pull_request.head.ref == 'agent/trigger-deploy-609' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/trigger-deploy-609
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Gate repeated diagnostics
        id: gate
        run: |
          if [[ -f _gateway_live_diagnostic.txt ]]; then
            echo 'run=false' >> "$GITHUB_OUTPUT"
          else
            echo 'run=true' >> "$GITHUB_OUTPUT"
          fi

      - name: Capture Gateway responses
        if: steps.gate.outputs.run == 'true'
        run: |
          set -euo pipefail
          gateway='https://trinity-record-chain-gateway.onrender.com'
          health_code="$(curl -sS --max-time 45 -o /tmp/health.json -w '%{http_code}' "$gateway/healthz" || true)"
          readiness_code="$(curl -sS --max-time 45 -o /tmp/readiness.json -w '%{http_code}' "$gateway/record-chain/readiness" || true)"
          duplicate_code="$(curl -sS --max-time 45 -o /tmp/duplicate.json -w '%{http_code}' \
            -X POST -H 'Content-Type: application/json' \
            --data-binary '{"record_type":"echo","x":1,"x":2}' \
            "$gateway/record-chain/preflight" || true)"
          nan_code="$(curl -sS --max-time 45 -o /tmp/nan.json -w '%{http_code}' \
            -X POST -H 'Content-Type: application/json' \
            --data-binary '{"record_type":"echo","x":NaN}' \
            "$gateway/record-chain/preflight" || true)"

          {
            echo "checked_at=$(date -u +%FT%TZ)"
            echo "health_http=$health_code"
            echo "health_json=$(jq -c . /tmp/health.json 2>/dev/null || cat /tmp/health.json)"
            echo "readiness_http=$readiness_code"
            echo "readiness_json=$(jq -c . /tmp/readiness.json 2>/dev/null || cat /tmp/readiness.json)"
            echo "duplicate_http=$duplicate_code"
            echo "duplicate_json=$(jq -c . /tmp/duplicate.json 2>/dev/null || cat /tmp/duplicate.json)"
            echo "nan_http=$nan_code"
            echo "nan_json=$(jq -c . /tmp/nan.json 2>/dev/null || cat /tmp/nan.json)"
          } > _gateway_live_diagnostic.txt
          cat _gateway_live_diagnostic.txt

      - name: Commit Gateway diagnostics
        if: steps.gate.outputs.run == 'true'
        run: |
          set -euo pipefail
          git config user.name 'trinity-gateway-diagnostic-bot'
          git config user.email 'actions@github.com'
          git add _gateway_live_diagnostic.txt
          git commit -m 'chore: capture live Gateway diagnostics'
          git push origin HEAD:agent/trigger-deploy-609
