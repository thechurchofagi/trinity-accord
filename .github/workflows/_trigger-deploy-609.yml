name: Diagnose Post-609 Pages Deployment

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  diagnose:
    if: ${{ github.event.pull_request.head.ref == 'agent/trigger-deploy-609' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/trigger-deploy-609
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip after diagnostics are committed
        id: gate
        run: |
          if [[ -f _live_deployment_diagnostic.txt ]]; then
            echo 'run=false' >> "$GITHUB_OUTPUT"
          else
            echo 'run=true' >> "$GITHUB_OUTPUT"
          fi

      - name: Capture live responses
        if: steps.gate.outputs.run == 'true'
        run: |
          set -euo pipefail
          token="$(date +%s)-$RANDOM"
          base='https://www.trinityaccord.org'
          mkdir -p /tmp/live

          fetch() {
            local name="$1"
            local path="$2"
            local code
            code="$(curl -sSL --max-time 30 -H 'Cache-Control: no-cache' -w '%{http_code}' "$base$path?freshness=$token" -o "/tmp/live/$name" || true)"
            printf '%s_http=%s\n' "$name" "$code"
            printf '%s_size=%s\n' "$name" "$(wc -c < "/tmp/live/$name" 2>/dev/null || echo 0)"
            printf '%s_sha256=%s\n' "$name" "$(sha256sum "/tmp/live/$name" 2>/dev/null | awk '{print $1}' || true)"
          }

          {
            echo "checked_at=$(date -u +%FT%TZ)"
            fetch ai.txt /ai.txt
            fetch bundles.json /api/record-chain-builder-bundles.v1.json
            fetch builder.mjs /downloads/record-chain-builder.mjs
            fetch status.json /api/record-chain-status.json
            echo "ai_version_v3=$(grep -Fq 'version: v3.0' /tmp/live/ai.txt && echo true || echo false)"
            echo "ai_current_preflight=$(grep -Fq '/record-chain/preflight' /tmp/live/ai.txt && echo true || echo false)"
            echo "ai_legacy_gateway=$(grep -Fq '/gateway/preflight' /tmp/live/ai.txt && echo true || echo false)"
            echo "ai_legacy_submit=$(grep -Fq '/agent-submit' /tmp/live/ai.txt && echo true || echo false)"
            echo "ai_head_begin"
            head -n 25 /tmp/live/ai.txt || true
            echo "ai_head_end"
            echo "manifest_builder_sha=$(jq -r '.canonical_builder.sha256 // empty' /tmp/live/bundles.json 2>/dev/null || true)"
            echo "manifest_builder_size=$(jq -r '.canonical_builder.size_bytes // empty' /tmp/live/bundles.json 2>/dev/null || true)"
            echo "manifest_classification_update=$(jq -r '(.canonical_builder.supports // []) | index("classification_update") != null' /tmp/live/bundles.json 2>/dev/null || true)"
            echo "status_latest_record=$(jq -r '.record_chain.latest_record_id // .pipeline_status.chain_head.latest_record_id // empty' /tmp/live/status.json 2>/dev/null || true)"
            echo "status_total_records=$(jq -r '.total_records // .record_chain.native_record_count // empty' /tmp/live/status.json 2>/dev/null || true)"
          } > _live_deployment_diagnostic.txt
          cat _live_deployment_diagnostic.txt

      - name: Commit diagnostics
        if: steps.gate.outputs.run == 'true'
        run: |
          set -euo pipefail
          git config user.name 'trinity-deployment-diagnostic-bot'
          git config user.email 'actions@github.com'
          git add _live_deployment_diagnostic.txt
          git commit -m 'chore: capture live deployment diagnostics'
          git push origin HEAD:agent/trigger-deploy-609
