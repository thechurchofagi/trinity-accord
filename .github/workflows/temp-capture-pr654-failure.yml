name: Temporary PR654 failure capture

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  capture:
    if: github.head_ref == 'agent/retire-fixed-stage-and-clarify-verification'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/retire-fixed-stage-and-clarify-verification
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
      - name: Install CI dependencies
        run: python3 -m pip install -r requirements-ci.txt
      - name: Capture full current-system output
        shell: bash
        run: |
          set +e
          mkdir -p diagnostics
          python3 scripts/run_current_system_tests.py > diagnostics/pr654-current-tests.log 2>&1
          rc=$?
          printf '\nEXIT_CODE=%s\n' "$rc" >> diagnostics/pr654-current-tests.log
          exit 0
      - name: Commit diagnostic and remove workflow
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/temp-capture-pr654-failure.yml
          git config user.name "trinity-accord-diagnostic-bot"
          git config user.email "actions@users.noreply.github.com"
          git add diagnostics/pr654-current-tests.log .github/workflows/temp-capture-pr654-failure.yml
          git commit -m "temp: capture PR654 current-system failure"
          git push origin HEAD:agent/retire-fixed-stage-and-clarify-verification
