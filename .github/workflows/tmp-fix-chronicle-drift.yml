name: Temporary Fix Chronicle Drift

on:
  push:
    branches:
      - fix/chronicle-generated-drift-20260719-v4
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  regenerate-and-validate:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/chronicle-generated-drift-20260719-v4
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: ".node-version"
          cache: "npm"

      - name: Install locked test dependencies
        run: |
          python3 -m pip install -r requirements-ci.txt
          npm ci

      - name: Regenerate Chronicle outputs
        run: |
          set -euo pipefail
          python3 scripts/generate_nft_chronicle_context.py
          python3 scripts/generate_chronicle_music_canonical.py

      - name: Make Chronicle drift a required current-system check
        run: |
          python3 - <<'PY'
          from pathlib import Path

          runner = Path("scripts/run_current_system_tests.py")
          text = runner.read_text(encoding="utf-8")
          marker = '    ok("sitemap up to date")\n'
          block = (
              '\n'
              '    # 1b0. Chronicle generated-artifact drift must be caught by required CI,\n'
              '    # not only by the scheduled/manual Deep Integrity matrix.\n'
              '    result = subprocess.run(\n'
              '        [sys.executable, "scripts/run_ci_group.py", "chronicle"],\n'
              '        cwd=ROOT,\n'
              '        capture_output=True,\n'
              '        text=True,\n'
              '    )\n'
              '    if result.returncode != 0:\n'
              '        fail(f"Chronicle generated-artifact drift detected:\\n{result.stdout}\\n{result.stderr}")\n'
              '    ok("Chronicle generated artifacts up to date")\n'
          )
          if "Chronicle generated artifacts up to date" not in text:
              if marker not in text:
                  raise SystemExit("runner insertion marker not found")
              text = text.replace(marker, marker + block, 1)
              runner.write_text(text, encoding="utf-8")

          test = Path("tests/test_chronicle_required_ci_coverage.py")
          test.write_text(
              '''from pathlib import Path\n\n\ndef test_required_current_ci_runs_chronicle_drift_group() -> None:\n    root = Path(__file__).resolve().parents[1]\n    runner = (root / "scripts/run_current_system_tests.py").read_text(encoding="utf-8")\n    assert '[sys.executable, "scripts/run_ci_group.py", "chronicle"]' in runner\n    workflow = (root / ".github/workflows/run-current-tests.yml").read_text(encoding="utf-8")\n    assert "python3 scripts/run_current_system_tests.py" in workflow\n''',
              encoding="utf-8",
          )
          PY

      - name: Create local validation checkpoint
        run: |
          set -euo pipefail
          git config user.name "trinity-regression-repair-bot"
          git config user.email "actions@github.com"
          git add \
            nft-text-descriptions/chronicle-full.md \
            nft-text-descriptions/chronicle-abridged.md \
            nft-text-descriptions/chronicle-ultra-brief.md \
            nft-text-descriptions/chronicle-agent-context.md \
            nft-text-descriptions/chronicle-index.json \
            nft-text-descriptions/chronicle-summary.json \
            nft-text-descriptions/chronicle-music-canonical.json \
            scripts/run_current_system_tests.py \
            tests/test_chronicle_required_ci_coverage.py
          git commit -m "Fix Chronicle generated-artifact drift"

      - name: Re-run Chronicle context generator
        run: python3 scripts/generate_nft_chronicle_context.py

      - name: Verify Chronicle context files are clean
        run: |
          git diff --exit-code -- \
            nft-text-descriptions/chronicle-full.md \
            nft-text-descriptions/chronicle-abridged.md \
            nft-text-descriptions/chronicle-ultra-brief.md \
            nft-text-descriptions/chronicle-agent-context.md \
            nft-text-descriptions/chronicle-index.json \
            nft-text-descriptions/chronicle-summary.json \
            api/agent-required-reading.json \
            api/agent-task-router.v1.json \
            api/context-load-map.json

      - name: Validate Chronicle context artifacts
        run: python3 scripts/test_nft_chronicle_context_artifacts.py

      - name: Re-run Chronicle music generator
        run: python3 scripts/generate_chronicle_music_canonical.py

      - name: Verify Chronicle music file is clean
        run: git diff --exit-code -- nft-text-descriptions/chronicle-music-canonical.json

      - name: Validate Chronicle site integration
        run: python3 scripts/test_chronicle_site_integration.py

      - name: Validate required-CI coverage guard
        run: python3 -m pytest tests/test_chronicle_required_ci_coverage.py -q

      - name: Validate complete current system
        run: python3 scripts/run_current_system_tests.py

      - name: Remove temporary workflow and publish repair
        run: |
          set -euo pipefail
          rm -f .github/workflows/tmp-fix-chronicle-drift.yml
          git add -A
          git commit --amend --no-edit
          git push origin HEAD:fix/chronicle-generated-drift-20260719-v4
