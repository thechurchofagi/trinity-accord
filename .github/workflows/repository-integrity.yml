name: Repository Integrity Check

on:
  push:
  pull_request:

concurrency:
  group: repository-integrity-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-24.04

    steps:
      # ── Toolchain / basic structure ──────────────────────────────────
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements-ci.txt

      - name: Record toolchain provenance
        run: |
          python3 scripts/toolchain_provenance.py > toolchain-provenance.json
          cat toolchain-provenance.json

      - name: Validate JSON
        run: |
          find . -name "*.json" -print0 | xargs -0 -n1 python3 -m json.tool > /dev/null

      - name: Run consistency checks
        run: python3 scripts/check_consistency.py

      # ── Core public / agent surface ─────────────────────────────────
      - name: Test homepage final v1.3 content
        run: bash scripts/test-homepage-v13-final.sh

      - name: Test agent-first homepage P0
        run: bash scripts/test-homepage-p0-agent-first.sh

      - name: Test worker deprecation P0.2
        run: python3 scripts/test-worker-deprecated-p02.py

      - name: Test P0.3 value framing
        run: python3 scripts/test-value-framing-p03.py

      - name: Test P0.3.1 terminology consistency
        run: python3 scripts/test-terminology-p031.py

      - name: Test llms layering P0.2
        run: python3 scripts/test-llms-layering-p02.py

      - name: Test civilizational JSON sync
        run: python3 scripts/test-civilizational-json-sync.py

      - name: Test v1.3 repair regressions
        run: python3 scripts/test-v13-repair-regressions.py

      - name: Test public prompt boundary
        run: python3 scripts/test_public_prompt_boundary.py

      - name: Test public surface consistency
        run: python3 scripts/test_public_surface_consistency.py

      - name: Test public API metadata completeness
        run: python3 scripts/test_public_api_metadata_completeness.py

      - name: Test sitemap agent entrypoints
        run: python3 scripts/test_sitemap_agent_entrypoints.py

      - name: Test P0 agent minimal context/router contract
        run: python3 scripts/test_agent_p0_router_contract.py

      # ── Echo / Gateway / authorship fast guards ─────────────────────
