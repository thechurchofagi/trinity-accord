name: Repository Integrity Check

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: repository-integrity-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  current-system-integrity:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      - name: Verify Builder receipt boundary fields are synchronized
        run: python3 scripts/check_builder_receipt_boundary_sync.py

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements-ci.txt

      - name: Verify agent-start docs text contract
        run: python3 scripts/test_agent_start_docs.py

      - name: Verify agent-start API contract
        run: python3 scripts/test_agent_start_api.py

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ".node-version"
          cache: "npm"

      - name: Verify Node dependency lockfile
        run: npm ci

      - name: Supply-chain action pinning
        run: python3 scripts/test_action_pinning.py

      - name: Supply-chain runner image pinning
        run: python3 scripts/test_runner_image_pinning.py

      - name: Supply-chain Python dependency pinning
        id: python_dependency_pinning
        continue-on-error: true
        run: |
          set +e
          python3 scripts/test_python_dependency_pinning.py > /tmp/python-dependency-pinning.log 2>&1
          code=$?
          cat /tmp/python-dependency-pinning.log
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Python dependency pinning diagnostics
        if: steps.python_dependency_pinning.outputs.exit_code != '0'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-dependency-pinning-diagnostics
          path: /tmp/python-dependency-pinning.log
          retention-days: 1

      - name: Fail Python dependency pinning
        if: steps.python_dependency_pinning.outputs.exit_code != '0'
        run: exit 1

      - name: Supply-chain Node dependency pinning
        run: python3 scripts/test_node_dependency_pinning.py

      - name: Supply-chain toolchain provenance
        run: python3 scripts/test_toolchain_provenance.py

      - name: Supply-chain write workflow provenance
        run: python3 scripts/test_write_workflow_toolchain_provenance.py

      - name: Supply-chain remote script guard
        run: python3 scripts/test_no_remote_script_execution.py

      - name: Supply-chain system tool recording
        run: python3 scripts/test_system_tool_version_recording.py

      - name: Verify gateway error recovery context
        run: node examples/github-app-backend/test-gateway-error-recovery-context.mjs

      - name: Validate JSON
        run: find . -name "*.json" -not -path "*/node_modules/*" -print0 | xargs -0 -n1 python3 -m json.tool > /dev/null

      - name: Verify record-chain
        run: python3 scripts/trinity_record_chain.py verify

      - name: Regenerate sitemap from current files
        run: python3 scripts/generate_sitemap.py

      - name: Run current system tests
        run: python3 scripts/run_current_system_tests.py

      - name: Verify sitemap has no drift
        run: python3 scripts/generate_sitemap.py --check

      - name: Verify public home status contracts
        run: |
          set -euo pipefail
          # Dynamic homepage generated-file drift is owned by homepage-status-sync.yml.
          # This workflow only checks stable contracts and non-volatile generated sources.
          python3 scripts/generate_arweave_wallet_status.py --check
          python3 scripts/generate_record_chain_status.py --check
          python3 scripts/check_public_home_status_contract.py
          python3 scripts/test_historic_autonomous_agent_reception_contract.py
          python3 scripts/test_home_public_status_sync.py
          python3 scripts/test_homepage_status_sync_contract.py

      - name: Scan for secret material (broad)
        run: python3 scripts/test_no_secret_material_committed.py

      - name: Check no private keys or tokens (focused PEM)
        run: python3 scripts/test_no_private_key_material_committed.py

      - name: Run P0 current fast gate
        run: python3 scripts/run_ci_group.py p0-current
