name: Repository Integrity Check

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: repository-integrity-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: read

jobs:
  p0-fast-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements-ci.txt

      - name: Validate JSON
        run: |
          find . -name "*.json" -print0 | xargs -0 -n1 python3 -m json.tool > /dev/null

      - name: Run P0 main function group
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/run_ci_group.py p0-main

      - name: Verify guardian registry page has no drift
        run: python3 scripts/generate_guardian_registry_page.py --check

      - name: Verify sitemap has no drift
        run: python3 scripts/generate_sitemap.py --check

      - name: Test workflow dispatch input safety
        run: python3 scripts/test_workflow_dispatch_input_safety.py

      - name: Test workflow dispatch write hardening
        run: python3 scripts/test_workflow_dispatch_write_hardening.py

      - name: Test CODEOWNERS sensitive path coverage
        run: python3 scripts/test_codeowners_sensitive_paths.py

      - name: Test write workflows actor gates
        run: python3 scripts/test_write_workflows_actor_gates.py

      - name: Test repository integrity is P0 fast gate
        run: python3 scripts/test_repository_integrity_is_p0_fast_gate.py

      - name: Test repository integrity has no duplicate step names
        run: python3 scripts/test_repository_integrity_no_duplicate_step_names.py

      - name: BLOCKER-1 V4 default archive kind regression
        run: python3 scripts/test_blocker1_v4_default_archive_kind.py

      - name: Test oath strictness consistency
        run: python3 scripts/test_oath_strictness_consistency.py

      - name: Test V0-V5 entrypoint consistency
        run: python3 scripts/test_v0_v5_entrypoint_consistency.py
