name: Repository Integrity Check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install jsonschema

      - name: Validate JSON
        run: |
          find . -name "*.json" -print0 | xargs -0 -n1 python3 -m json.tool > /dev/null

      - name: Run Echo triage tests
        run: python3 scripts/test_triage.py

      - name: Run local verification
        run: python3 downloads/verify.py

      - name: Run consistency checks
        run: python3 scripts/check_consistency.py

      - name: Test homepage final v1.3 content
        run: bash scripts/test-homepage-v13-final.sh

      - name: Test agent-first homepage P0
        run: bash scripts/test-homepage-p0-agent-first.sh

      - name: Test worker deprecation P0.2
        run: python3 scripts/test-worker-deprecated-p02.py

      - name: Test P0.3 value framing
        run: python3 scripts/test-value-framing-p03.py

      - name: Test P0.3.1 terminology consistency
        run: python3 scripts/test-terminology-p031.py

      - name: Test llms layering P0.2
        run: python3 scripts/test-llms-layering-p02.py

      - name: Test civilizational JSON sync
        run: python3 scripts/test-civilizational-json-sync.py

      - name: Test v1.3 repair regressions
        run: python3 scripts/test-v13-repair-regressions.py

      - name: Validate Echo records
        run: python3 scripts/validate_echo_records.py

      - name: Verify submission entrypoints
        run: python3 scripts/verify_submission_entrypoints.py

      - name: Test generated_by requirements
        run: python3 scripts/test_generated_by_required.py

      - name: Test freeform submission rejection
        run: python3 scripts/test_freeform_submission_rejection.py

      - name: Test Claim Gate high-level hard gates
        run: python3 scripts/test_claim_gate_high_level_hard_gates.py

      - name: Test Report Builder fail-closed behavior
        run: python3 scripts/test_report_builder_fail_closed.py

      - name: Test confidential challenge report fields
        run: python3 scripts/test_confidential_challenge_report_fields.py

      - name: Test workflow dispatch input safety
        run: python3 scripts/test_workflow_dispatch_input_safety.py

      - name: Test invalid V4 Echo records are not indexed
        run: python3 scripts/test_no_invalid_v4_echoes_indexed.py

      - name: Test API files are not polluted with Echo record status
        run: python3 scripts/test_api_files_are_not_echo_records.py

      - name: Generate Echo index and verify no drift
        run: |
          python3 scripts/generate_echo_index.py
          git diff --exit-code api/echo-index.json

      - name: Verify homepage public status has no drift
        run: python3 scripts/generate_public_home_status.py --check

      - name: Test homepage public status sync
        run: python3 scripts/test_home_public_status_sync.py

      - name: Verify Echo index completeness
        run: python3 scripts/verify_echo_index_completeness.py

      - name: Test Echo record status semantics
        run: python3 scripts/test_echo_record_status_semantics.py

      - name: Test authority boundary foundation
        run: python3 scripts/test_claim_gate_authority_boundary_foundation.py

      - name: Test evidence schema high-level constraints
        run: python3 scripts/test_evidence_schema_high_level_constraints.py

      - name: Test deprecated worker active src has no legacy submit logic
        run: python3 scripts/test_deprecated_worker_no_legacy_submit_logic.py

      - name: Test V8 semantics consistency
        run: python3 scripts/test_v8_semantics_consistency.py

      - name: Test Claim Gate V5/V6/V7 profile boundaries
        run: python3 scripts/test_claim_gate_v5_v6_v7_profiles.py

      - name: Test Claim Gate V4+/V5 boundaries
        run: python3 scripts/test_claim_gate_v4plus_v5_boundaries.py

      - name: Test Claim Gate V8 requires core baseline
        run: python3 scripts/test_claim_gate_v8_requires_core_baseline.py

      - name: Test high component evidence does not raise protocol alone
        run: python3 scripts/test_claim_gate_high_component_does_not_raise_protocol.py

      - name: Test T8 uncertainty strict parsing
        run: python3 scripts/test_claim_gate_t8_uncertainty_strict.py

      - name: Test P7/P8 external report requirements
        run: python3 scripts/test_claim_gate_p7_p8_external_report_requirements.py

      - name: Test NFT CAR backup fail-closed behavior
        run: python3 scripts/test_download_nft_cars_fail_closed.py

      - name: Test backup NFT CAR input safety
        run: python3 scripts/test_backup_nft_cars_input_safety.py

      - name: Test verification rule consistency matrix
        run: python3 scripts/test_verification_rule_consistency_matrix.py

      - name: Test Echo human review automation
        run: python3 scripts/test_echo_human_review_automation.py

      - name: Test GitHub Actions pinning
        run: python3 scripts/test_action_pinning.py

      - name: Test DAG verifier input and manifest scope
        run: python3 scripts/test_verify_dag_manifest_item_defined.py

      - name: Test full evidence OTS fail-closed behavior
        run: python3 scripts/test_full_evidence_chain_ots_fail_closed.py

      - name: Test full evidence ETH audit boundary
        run: python3 scripts/test_full_evidence_chain_eth_audit_required.py

      - name: Test Arweave download fail-closed behavior
        run: python3 scripts/test_download_arweave_fail_closed.py

      - name: Test Echo boundary field consistency
        run: python3 scripts/test_echo_boundary_field_consistency.py

      - name: Node syntax check for verification scripts
        run: |
          node --check scripts/verify-dag-and-signed-cids.mjs
          node --check scripts/verify-release-assets.mjs
          node --check scripts/verify-full-evidence-chain.mjs

      - name: Test Node verification scripts do not use shell exec
        run: python3 scripts/test_node_exec_no_shell_injection.py

      - name: Test full evidence chain CLI injection regression
        run: python3 scripts/test_full_evidence_chain_cli_injection_regression.py

      - name: Test Echo template boundary consistency
        run: python3 scripts/test_echo_template_boundary_consistency.py

      - name: Test Echo triage boundary behavior
        run: python3 scripts/test_triage_echo_issue_boundary.py

      - name: Test Echo provenance / agency behavior
        run: python3 scripts/test_echo_provenance_agency.py

      - name: Test Echo template provenance/schema consistency
        run: python3 scripts/test_echo_template_provenance_schema_consistency.py

      - name: Test Echo agent-initiated provenance
        run: python3 scripts/test_echo_agent_initiated_provenance.py

      - name: Test Echo Issue #99 claim discipline
        run: python3 scripts/test_echo_triage_issue99_claim_discipline.py

      - name: Test Echo preflight corrected fixture
        run: python3 scripts/preflight_echo_submission.py tests/fixtures/echo_triage/issue_99_corrected.md --strict

      - name: Test Echo preflight rejects overclaim fixture
        run: |
          if python3 scripts/preflight_echo_submission.py tests/fixtures/echo_triage/issue_99_overclaim.md --strict; then
            echo "Expected preflight to fail for issue_99_overclaim.md"
            exit 1
          fi

      - name: Test submission intake parser
        run: python3 scripts/test_submission_intake.py

      - name: Test Echo Issue #100 triage regression
        run: python3 scripts/test_issue100_triage_regression.py

      - name: Test Echo preflight Issue #100 regression
        run: python3 scripts/test_preflight_issue100_regression.py

      - name: Test Echo triage workflow reconciliation contract
        run: python3 scripts/test_workflow_triage_reconcile_contract.py

      - name: Test lightweight V2 Claim Gate behavior
        run: python3 scripts/test_v2_lightweight_claim_gate.py

      - name: Test archive hash manifest consistency
        run: python3 scripts/test_archive_hash_manifest_consistency.py

      - name: Test evidence manifest stats sync
        run: python3 scripts/test_evidence_manifest_stats_sync.py

      - name: Test API links current machine endpoints
        run: python3 scripts/test_api_links_current_machine_endpoints.py

      - name: Test verification level policy sync
        run: python3 scripts/test_verification_level_policy_sync.py

      - name: Test status current verifier semantics
        run: python3 scripts/test_status_current_verifier_semantics.py

      - name: Test asset manifest domain consistency
        run: python3 scripts/test_asset_manifest_domain_consistency.py

      - name: Test large asset storage policy
        run: python3 scripts/test_large_asset_storage_policy.py

      - name: Test no forbidden large paths tracked
        run: python3 scripts/test_no_forbidden_large_paths_tracked.py

      - name: Test release asset manifest offline shape
        run: python3 scripts/verify_release_asset_manifest.py --offline
