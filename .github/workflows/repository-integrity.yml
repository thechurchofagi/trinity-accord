      # ── Guardian / Chronicle fast guards ────────────────────────────
      - name: Detect changed paths
        id: changes
        shell: bash
        run: |
          set -uo pipefail
          CHRONICLE="true"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          if [[ -z "$BASE" || "$BASE" == "0000000000000000000000000000000000000000" ]]; then
            BASE="$(git rev-parse HEAD~1 2>/dev/null || echo "")"
          fi
          if [[ -n "$BASE" ]] && git diff --name-only "$BASE" "${{ github.sha }}" > changed-files.txt 2>/dev/null; then
            if ! grep -E '^(nft-text-descriptions/|scripts/generate_nft_chronicle_context.py|scripts/generate_chronicle_music_canonical.py|chronicle.*\.md|api/context-|api/context-packs/)' changed-files.txt >/dev/null 2>&1; then
              CHRONICLE="false"
            fi
          fi
          echo "chronicle=$CHRONICLE" >> "$GITHUB_OUTPUT"

      - name: Generate NFT chronicle context artifacts
