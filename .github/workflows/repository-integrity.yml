name: Repository Integrity Check

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: repository-integrity-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  current-system-integrity:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements-ci.txt

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ".node-version"
          cache: "npm"

      - name: Verify Node dependency lockfile
        run: npm ci

      - name: Validate JSON
        run: find . -name "*.json" -print0 | xargs -0 -n1 python3 -m json.tool > /dev/null

      - name: Verify record-chain
        run: python3 scripts/trinity_record_chain.py verify

      - name: Run current system tests
        run: python3 scripts/run_current_system_tests.py

      - name: Verify sitemap has no drift
        run: python3 scripts/generate_sitemap.py --check

      - name: Verify public home status has no drift
        run: python3 scripts/generate_public_home_status.py --check

      - name: Scan for secret material (broad)
        run: python3 scripts/test_no_secret_material_committed.py

      - name: Check no private keys or tokens (focused PEM)
        run: python3 scripts/test_no_private_key_material_committed.py

      - name: Run P0 current fast gate
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/run_ci_group.py p0-current 2>&1 | tee /tmp/p0-current.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "::group::P0 current failure tail"
            tail -n 200 /tmp/p0-current.log
            echo "::endgroup::"
          fi
          exit "$status"
