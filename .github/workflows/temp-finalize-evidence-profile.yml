name: Temporary Finalize Evidence Profile

on:
  pull_request:
    paths:
      - .github/workflows/temp-finalize-evidence-profile.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: agent/complete-legacy-ar-eth-mirror-audit
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: ".node-version"
      - run: python3 -m pip install -r requirements-ci.txt
      - name: Patch entrypoint and generate compact validation report
        shell: bash
        run: |
          set +e
          python3 - <<'PY'
          from pathlib import Path
          path = Path('agent-start.md')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              '## Legacy Context Depth (CC) and CRL compatibility',
              '## Legacy Context Depth (CC) and Context Readiness Level (CRL) compatibility'
          )
          text = text.replace(
              '- CC describes reading depth under the old inherited ladder.\n- The sufficiency boolean says whether the selected action can honestly be performed.',
              '- Context Depth (CC) describes reading depth under the old inherited ladder.\n- Context Readiness Level (CRL), expressed by the sufficiency declaration, says whether the selected action can honestly be performed.'
          )
          path.write_text(text, encoding='utf-8')
          PY

          report="finalize-evidence-profile-diagnostic.txt"
          : > "$report"
          python3 scripts/generate_sitemap.py >/tmp/sitemap.log 2>&1
          echo "=== SITEMAP EXIT $? ===" >> "$report"
          cat /tmp/sitemap.log >> "$report"

          python3 scripts/run_ci_group.py p0-current >/tmp/p0.log 2>&1
          echo "=== P0 EXIT $? ===" >> "$report"
          tail -n 220 /tmp/p0.log >> "$report"

          python3 -m pytest -q tests/test_evidence_relationship_profiles.py tests/test_legacy_pointer_coverage.py >/tmp/focused.log 2>&1
          echo "=== FOCUSED EXIT $? ===" >> "$report"
          cat /tmp/focused.log >> "$report"

          python3 scripts/run_current_system_tests.py >/tmp/current.log 2>&1
          echo "=== CURRENT EXIT $? ===" >> "$report"
          tail -n 160 /tmp/current.log >> "$report"

          echo "=== GIT STATUS ===" >> "$report"
          git status --short >> "$report"
          rm -f evidence-profile-ci-diagnostic.txt
      - name: Commit patched files and diagnostic report
        shell: bash
        run: |
          set -euo pipefail
          git add agent-start.md sitemap.xml finalize-evidence-profile-diagnostic.txt
          git add -u evidence-profile-ci-diagnostic.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: finalize evidence profiles and record validation"
          git push origin HEAD:agent/complete-legacy-ar-eth-mirror-audit
