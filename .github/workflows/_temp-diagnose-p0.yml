name: TEMP Repair Chronicle P0

on:
  pull_request:
    branches: [main]
    types: [synchronize]
    paths:
      - '.github/workflows/_temp-diagnose-p0.yml'

permissions:
  contents: write

jobs:
  repair:
    if: ${{ github.head_ref == 'agent/rebuild-nft-chronicle-editions' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout Chronicle branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: agent/rebuild-nft-chronicle-editions
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      - name: Install CI dependencies
        run: python3 -m pip install -r requirements-ci.txt

      - name: Regenerate routes and verify P0
        run: |
          set -euo pipefail
          python3 scripts/generate_nft_chronicle_context.py
          python3 scripts/test_public_api_source_digest_if_present.py
          python3 scripts/run_ci_group.py p0-current

      - name: Commit repaired generated metadata
        run: |
          set -euo pipefail
          rm -f p0-diagnostic.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A api/agent-task-router.v1.json p0-diagnostic.log
          if git diff --cached --quiet; then
            echo "No generated metadata drift"
            exit 0
          fi
          git commit -m "Refresh Chronicle router source digest"
          git push origin HEAD:agent/rebuild-nft-chronicle-editions
