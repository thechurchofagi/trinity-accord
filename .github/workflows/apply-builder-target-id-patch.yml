name: Apply Builder Target ID Patch

on:
  push:
    branches:
      - agent/audit-main-integrity-hardening

permissions:
  contents: write

jobs:
  apply:
    if: contains(github.event.head_commit.message, 'stage builder target-id runner')
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: agent/audit-main-integrity-hardening
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - name: Apply builder patch
        run: python3 scripts/apply_builder_target_id_patch.py
      - name: Rebuild builder manifest
        run: python3 scripts/rebuild_record_chain_builder_bundles.py
      - name: Run focused builder regressions
        run: |
          python3 scripts/test_builder_classification_target_id.py
          node downloads/test-record-chain-builder.mjs
          python3 scripts/rebuild_record_chain_builder_bundles.py
          git diff --exit-code api/record-chain-builder-bundles.v1.json
      - name: Remove one-time runner and push
        run: |
          set -euo pipefail
          rm -f scripts/apply_builder_target_id_patch.py
          rm -f .github/workflows/apply-builder-target-id-patch.yml
          git config user.name "trinity-audit-bot"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Align Builder classification target validation"
          git push origin HEAD:agent/audit-main-integrity-hardening
