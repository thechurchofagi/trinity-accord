name: Temporary Fetch Legacy ETH

on:
  push:
    branches:
      - agent/complete-legacy-ar-eth-mirror-audit
  pull_request:
    paths:
      - .github/workflows/temp-fetch-legacy-ar.yml
      - .github/temp-fetch-legacy-eth.py

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: agent/complete-legacy-ar-eth-mirror-audit
      - name: Fetch and verify legacy Ethereum calldata
        run: python3 .github/temp-fetch-legacy-eth.py
      - name: Commit retrieved calldata
        shell: bash
        run: |
          set -euo pipefail
          git add archive/legacy-pointers/eth-raw
          if git diff --cached --quiet; then
            echo "No calldata changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "archive: mirror legacy Ethereum non-NFT calldata"
          git push origin HEAD:agent/complete-legacy-ar-eth-mirror-audit
