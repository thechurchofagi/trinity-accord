name: Temporary Fetch Legacy AR

on:
  push:
    branches:
      - agent/complete-legacy-ar-eth-mirror-audit
  pull_request:
    paths:
      - .github/workflows/temp-fetch-legacy-ar.yml
      - .github/temp-fetch-legacy-ar.sh

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Fetch unresolved legacy Arweave payloads
        shell: bash
        run: bash .github/temp-fetch-legacy-ar.sh
