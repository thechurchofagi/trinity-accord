name: Archive backlog repair

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

concurrency:
  group: main-write-lock
  queue: max
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Authorize write workflow actor
        run: |
          set -euo pipefail
          actor="${GITHUB_ACTOR:-}"
          if [[ "$actor" != "thechurchofagi" && "$actor" != "github-actions[bot]" ]]; then
            echo "Unauthorized actor: $actor" >&2
            exit 1
          fi
          echo "Authorized actor: $actor"

      - name: Checkout current main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: main

      - name: Record toolchain provenance
        run: |
          python3 scripts/toolchain_provenance.py > "$RUNNER_TEMP/toolchain-provenance.json"
          cat "$RUNNER_TEMP/toolchain-provenance.json"

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: ".node-version"

      - name: Install CI dependencies
        run: python -m pip install -r requirements-ci.txt

      - name: Install OpenTimestamps client
        run: |
          set -euo pipefail
          python3 -m pip install -r requirements-ots.txt
          ots --help

      - name: Install Node dependencies
        run: npm ci

      - name: Prepare Arweave JWK if available
        id: jwk
        env:
          ARKEY_CONFIGURED: ${{ secrets.ARKEY || vars.ARKEY }}
          ARWEAVE_JWK_CONFIGURED: ${{ secrets.ARWEAVE_JWK || vars.ARWEAVE_JWK }}
        run: |
          set -euo pipefail
          ARWEAVE_JWK_JSON="${ARKEY_CONFIGURED:-${ARWEAVE_JWK_CONFIGURED:-}}"
          if [ -z "${ARWEAVE_JWK_JSON:-}" ]; then
            echo "has_jwk=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::add-mask::$ARWEAVE_JWK_JSON"
          mkdir -p /tmp/arweave-secrets
          printf '%s' "$ARWEAVE_JWK_JSON" > /tmp/arweave-secrets/wallet.jwk.json
          chmod 600 /tmp/arweave-secrets/wallet.jwk.json
          python3 - <<'PY'
          import json
          json.load(open("/tmp/arweave-secrets/wallet.jwk.json"))
          PY
          echo "ARWEAVE_JWK_PATH=/tmp/arweave-secrets/wallet.jwk.json" >> "$GITHUB_ENV"
          echo "has_jwk=true" >> "$GITHUB_OUTPUT"

      - name: Detect archive backlog
        run: python3 scripts/detect_archive_backlog.py --write --github-output

      - name: Repair one record-chain Arweave item
        env:
          ARKEY: ${{ secrets.ARKEY || vars.ARKEY }}
          ARWEAVE_JWK: ${{ secrets.ARWEAVE_JWK || vars.ARWEAVE_JWK }}
          ARWEAVE_JWK_PATH: ${{ env.ARWEAVE_JWK_PATH || secrets.ARWEAVE_JWK_PATH || vars.ARWEAVE_JWK_PATH }}
        run: >-
          python3 scripts/process_archive_backlog.py
          --kind record_chain_arweave
          --max-items 1
          --mode live

      - name: Repair up to two native OTS proof-bundle items
        env:
          ARKEY: ${{ secrets.ARKEY || vars.ARKEY }}
          ARWEAVE_JWK: ${{ secrets.ARWEAVE_JWK || vars.ARWEAVE_JWK }}
          ARWEAVE_JWK_PATH: ${{ env.ARWEAVE_JWK_PATH || secrets.ARWEAVE_JWK_PATH || vars.ARWEAVE_JWK_PATH }}
        run: >-
          python3 scripts/process_archive_backlog.py
          --kind native_ots_bundle
          --max-items 2
          --mode live
          --enable-paid-upload

      - name: Commit repaired backlog metadata to main
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          regenerate_and_stage() {
            python3 scripts/detect_archive_backlog.py --write
            python3 scripts/generate_arweave_wallet_status.py

            python3 scripts/restore_json_if_only_volatile_changes.py \
              --path api/record-chain-native-ots-latest.json \
              --path record-chain/ots/native-ots-backlog.json \
              --path api/record-chain-native-ots-backlog.json \
              --path api/arweave-wallet-status.json \
              --glob 'record-chain/ots/native-anchors/*.anchor.json' \
              --volatile-key generated_at \
              --volatile-key updated_at \
              --volatile-key checked_at \
              --volatile-key upgraded_at \
              --volatile-key verified_at

            git add \
              record-chain/arweave-backlog.json \
              api/record-chain-arweave-backlog.json \
              record-chain/arweave-archives/ \
              api/record-chain-arweave-index.json \
              record-chain/ots/native-ots-backlog.json \
              api/record-chain-native-ots-backlog.json \
              record-chain/ots/native-anchors/ \
              record-chain/ots/native-arweave-bundles/ \
              record-chain/ots/native-arweave-registry.json \
              api/record-chain-native-ots-arweave-registry.json \
              record-chain/arweave-wallet-ledger.json \
              api/arweave-wallet-status.json \
              record-chain/audit/

            while IFS= read -r path; do
              case "$path" in
                record-chain/records/*|record-chain/pending/*|record-chain/processed/*|record-chain/rejected/*|record-chain/chain-tip.json|archive/authority-*|authority/*|Bitcoin\ Originals/*)
                  echo "Forbidden write path: $path" >&2
                  return 1
                  ;;
              esac
            done < <(git diff --cached --name-only)
          }

          regenerate_and_stage
          if git diff --cached --quiet; then
            echo "No archive backlog changes to commit."
            exit 0
          fi

          git commit -m "archive: repair backlog and wallet status metadata"

          for attempt in 1 2 3; do
            git fetch origin main --prune
            git rebase origin/main

            # Main may have advanced while an OTS/Arweave operation was running.
            # Recompute derived backlog and wallet views against the rebased tree.
            regenerate_and_stage
            if ! git diff --cached --quiet; then
              git commit --amend --no-edit
            fi

            if git push origin HEAD:main; then
              exit 0
            fi

            printf 'Push failed on attempt %s; rebasing, regenerating, and retrying.\n' "${attempt}"
            sleep $((attempt * 5))
          done

          echo "::error::Failed to push archive backlog repair metadata after retries."
          exit 1
