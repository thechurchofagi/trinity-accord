name: Backup NFTs Individually

on:
  workflow_dispatch:
    inputs:
      contract:
        description: 'Contract address filter (empty = all)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (list only)'
        type: boolean
        default: false

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Backup NFTs individually
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.contract }}" ]; then
            ARGS="--contract ${{ inputs.contract }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          node scripts/backup-nft-individual.mjs $ARGS
