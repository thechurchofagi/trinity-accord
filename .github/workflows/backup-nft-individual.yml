name: Backup NFTs Individually

on:
  workflow_dispatch:
    inputs:
      contract:
        description: 'Contract address filter (empty = all)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (list only)'
        type: boolean
        default: false

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version: '22'

      - name: Backup NFTs individually
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_CONTRACT: ${{ inputs.contract }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail

          ARGS=()
          if [ -n "$INPUT_CONTRACT" ]; then
            [[ "$INPUT_CONTRACT" =~ ^0x[a-fA-F0-9]{40}$ ]] || { echo "Invalid contract address"; exit 1; }
            ARGS+=(--contract "$INPUT_CONTRACT")
          fi
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          node scripts/backup-nft-individual.mjs "${ARGS[@]}"
