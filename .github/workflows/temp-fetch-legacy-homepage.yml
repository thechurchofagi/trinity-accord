name: Temporary Fetch Legacy Homepage AR

on:
  push:
    branches:
      - agent/complete-legacy-ar-eth-mirror-audit
  pull_request:
    paths:
      - .github/workflows/temp-fetch-legacy-homepage.yml

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: agent/complete-legacy-ar-eth-mirror-audit
      - name: Fetch exact historical homepage Arweave payload
        shell: bash
        run: |
          set -euo pipefail
          txid="Z_mRWz1jst-KUr4pyOyofFDLwj0H5bDHtPVYaUEX3jQ"
          target="archive/legacy-pointers/raw/${txid}.raw"
          mkdir -p archive/legacy-pointers/raw
          tmp="$(mktemp)"
          for gateway in https://arweave.net https://ar-io.net https://g8way.io https://permagate.io; do
            echo "fetching $txid from $gateway"
            if curl --fail --silent --show-error --location --connect-timeout 20 --max-time 120 --retry 2 "$gateway/$txid" --output "$tmp"; then
              break
            fi
            : > "$tmp"
          done
          test -s "$tmp"
          test "$(stat -c '%s' "$tmp")" -le 2000000
          mv "$tmp" "$target"
          sha256sum archive/legacy-pointers/raw/*.raw > archive/legacy-pointers/raw/SHA256SUMS
          echo "homepage_size=$(stat -c '%s' "$target")"
          sha256sum "$target"
      - name: Commit retrieved homepage payload
        shell: bash
        run: |
          set -euo pipefail
          git add archive/legacy-pointers/raw
          if git diff --cached --quiet; then
            echo "No payload changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "archive: mirror exact legacy homepage AR payload"
          git push origin HEAD:agent/complete-legacy-ar-eth-mirror-audit
