name: Verify V3+ Signed Release Mirror

on:
  workflow_dispatch:
  push:
    paths:
      - "scripts/verify-signed-manifest-coverage.mjs"
      - "scripts/pull-authority-arweave-mirrors.mjs"
      - "scripts/verify-github-archive.sh"
      - "scripts/run-v3plus-signed-manifest-audit.sh"
      - "audit/v3plus-targets.json"
      - "RELEASE-LARGE-DATA-MANIFEST.json"
      - "archive/hash-manifest.json"
      - "archive/evidence/digest-manifest.json"
      - "archive/evidence/digest-manifest.csv"
      - "archive/authority-manifest/authority.jcs.json"
      - "archive/btc-signature/btc-signature.json"
      - "archive/eth-witness/eth-witness.json"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: python3 -m unittest tests/test_v3plus_signed_coverage_gate.py

      - name: Run signed release audit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ETH_RPC_URL: ${{ secrets.ETHEREUMMAINNET }}
          REPO: ${{ github.repository }}
        run: ./scripts/run-v3plus-signed-manifest-audit.sh

      - name: Upload audits
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v3plus-signed-release-audits
          path: |
            *AUDIT*.json
            ARWEAVE-GITHUB-MIRROR-COVERAGE.md
            RELEASE-LARGE-DATA-MANIFEST.json
            RELEASE-LARGE-DATA-MANIFEST.md
