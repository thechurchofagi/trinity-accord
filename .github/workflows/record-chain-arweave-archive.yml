name: Record Chain Arweave Archive
# Acceptable noise: scheduled daily + on anchor completion.
# No live upload until Arweave wallet is configured.
# Retained as-is; workflow_run + schedule is intentional.

on:
  workflow_run:
    workflows: ["Record Chain Anchor"]
    types: [completed]
  workflow_dispatch:
    inputs:
      upload_mode:
        description: "dry-run or live"
        required: false
        default: "dry-run"
  schedule:
    - cron: "43 2 * * *"

concurrency:
  group: record-chain-arweave-archive
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  archive:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      ARWEAVE_UPLOAD_MODE: ${{ github.event.inputs.upload_mode || 'dry-run' }}
      ARWEAVE_WALLET_JWK_B64: ${{ secrets.ARWEAVE_WALLET_JWK_B64 }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Arweave archive manifest
        run: python scripts/build_record_chain_arweave_archive.py --mode "${ARWEAVE_UPLOAD_MODE}"

      - name: Verify Arweave archive metadata
        run: python scripts/verify_record_chain_arweave_archive.py

      - name: Verify record chain
        run: python scripts/trinity_record_chain.py verify

      - name: Regenerate public homepage counters
        run: |
          python scripts/generate_public_home_status.py
          python scripts/generate_sitemap.py

      - name: Commit Arweave archive metadata
        run: |
          if ! git diff --quiet; then
            git config user.name "trinity-record-chain-bot"
            git config user.email "actions@github.com"
            git add record-chain/arweave-archives/ api/record-chain-arweave-index.json index.md api/public-home-status.json sitemap.xml
            git commit -m "archive: update record-chain Arweave archive metadata"
            git push
          fi
