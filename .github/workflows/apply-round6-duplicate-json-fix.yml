name: Apply Round 6 Duplicate JSON Fix

on:
  pull_request:
    branches: [main]
    paths:
      - "scripts/apply_round6_duplicate_json_fix.py"
      - ".github/workflows/apply-round6-duplicate-json-fix.yml"

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout audit branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: deep-audit-round6-ci-code-alignment
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Repair and validate strict JSON
        run: |
          python3 scripts/apply_round6_duplicate_json_fix.py
          python3 scripts/validate_json_strict.py
      - name: Remove one-shot files and commit
        run: |
          set -euo pipefail
          rm -f scripts/apply_round6_duplicate_json_fix.py
          rm -f .github/workflows/apply-round6-duplicate-json-fix.yml
          git config user.name "trinity-round6-audit-bot"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Fix duplicate metadata in retired Gateway workflow map"
          git push origin HEAD:deep-audit-round6-ci-code-alignment
