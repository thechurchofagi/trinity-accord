name: Legacy Phase 5 OTS Arweave Audit (Paid Upload Retired)

# Historical Phase 5 validation only. Paid uploads are permanently disabled.
# Current native Record-Chain Arweave archives use
# .github/workflows/record-chain-arweave-archive.yml.

on:
  workflow_dispatch:
    inputs:
      phase:
        description: "Historical validation phase"
        required: true
        default: "precheck"
        type: choice
        options:
          - precheck
          - dry-run-cost

permissions:
  contents: read

concurrency:
  group: legacy-phase5-ots-arweave-readonly
  queue: max
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      E2E_RUN_ID: "legacy-phase5-${{ inputs.phase }}-${{ github.run_id }}"
      PHASE5_RUNTIME_DIR: "record-chain/audit/phase5-runtime/legacy-phase5-${{ inputs.phase }}-${{ github.run_id }}"
      ARWEAVE_UPLOAD_MODE: "dry_run"
      ALLOW_PAID_ARWEAVE_CANARY: "false"
      ARWEAVE_MAX_UPLOAD_USD: "0.10"
      ARWEAVE_SAFETY_MULTIPLIER: "1.20"
      EXPECTED_ARWEAVE_OWNER: "r1EdzCQ9E7CaAOEywI5netR6EcSopNOa08oi2Coz68s"
      ARWEAVE_GATEWAY_URL: "https://arweave.net"
      ARWEAVE_READBACK_GATEWAYS: "https://arweave.net"
      ARWEAVE_READBACK_TIMEOUT_SECONDS: "900"
      ARWEAVE_READBACK_RETRY_SECONDS: "15"

    steps:
      - name: Checkout current main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main

      - name: Record toolchain provenance
        run: |
          python3 scripts/toolchain_provenance.py > "$RUNNER_TEMP/toolchain-provenance.json"
          cat "$RUNNER_TEMP/toolchain-provenance.json"

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ".node-version"

      - name: Install Node dependencies
        run: npm ci

      - name: Phase 5 historical precheck
        if: inputs.phase == 'precheck'
        run: |
          set -euo pipefail
          python3 scripts/run_phase5_ots_arweave_paid_upload.py \
            --run-id "$E2E_RUN_ID" \
            --log-dir "$PHASE5_RUNTIME_DIR" \
            --bundle-out "$PHASE5_RUNTIME_DIR/ots-proof-bundle.json" \
            --precheck-only

      - name: Phase 5 historical dry-run cost check
        if: inputs.phase == 'dry-run-cost'
        run: |
          set -euo pipefail
          python3 scripts/run_phase5_ots_arweave_paid_upload.py \
            --run-id "$E2E_RUN_ID" \
            --log-dir "$PHASE5_RUNTIME_DIR" \
            --bundle-out "$PHASE5_RUNTIME_DIR/ots-proof-bundle.json" \
            --dry-run-cost-only

      - name: Prove no tracked repository or paid-upload state changed
        if: always()
        run: |
          set -euo pipefail
          if [ -n "$(git status --porcelain --untracked-files=no)" ]; then
            echo "::error::Retired Phase 5 audit modified tracked repository state."
            git status --short
            exit 1
          fi
          echo "PASS: paid upload, wallet secret access, tracked writes, commits, and pushes are disabled."

      - name: Upload historical audit logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: legacy-phase5-audit-${{ github.run_id }}
          path: ${{ env.PHASE5_RUNTIME_DIR }}/
          if-no-files-found: ignore
          retention-days: 30
