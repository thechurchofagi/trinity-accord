name: Temporary Patch Evidence Relations

on:
  push:
    branches:
      - agent/complete-legacy-ar-eth-mirror-audit
  pull_request:
    paths:
      - .github/workflows/temp-patch-evidence-relations.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: agent/complete-legacy-ar-eth-mirror-audit
      - name: Patch claim registry with actual Shenzhen notarial evidence
        shell: bash
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path('api/claim-registry.json')
          data = json.loads(path.read_text(encoding='utf-8'))
          claim = next(c for c in data['claims'] if c['claim_id'] == 'notarized_evidence_is_not_formal_attestation')

          def add_unique(field, values):
              current = claim.setdefault(field, [])
              for value in values:
                  if value not in current:
                      current.append(value)

          add_unique('public_surfaces', [
              'EVIDENCE-RELATIONSHIP-GUIDE.md',
              'verification-materials.md',
              'evidence/notarial-certificate-2026-05-13/证据保全公证完整档案.md'
          ])
          add_unique('source_files', [
              'api/evidence-relationship-map.v1.json',
              'api/core-object-alpha-shenzhen-notary-2026-05-06.json',
              'evidence/notarial-certificate-2026-05-13/证据保全公证完整档案.md'
          ])
          add_unique('evidence_files', [
              'api/core-object-alpha-shenzhen-notary-2026-05-06.json',
              'evidence/notarial-certificate-2026-05-13/evidence-images-manifest.json',
              'evidence/notarial-certificate-2026-05-13/sealed-disc-custody-record.json'
          ])
          add_unique('digest_or_hash_binding', [
              'evidence/notarial-certificate-2026-05-13/evidence-images-manifest.json:per_asset_sha256',
              'api/core-object-alpha-shenzhen-notary-2026-05-06.json:arweave_manifest_txid',
              'api/core-object-alpha-shenzhen-notary-2026-05-06.json:ots_bitcoin_block_948161'
          ])
          claim['notes'] = (
              'Actual Shenzhen evidence-preservation materials are archived. The public record identifies '
              'Guangdong Shenzhen Notary Office, acceptance on 2026-05-06, certificate '
              '(2026)深证字第36024号 dated 2026-05-13, and a scope-limited observed preservation process. '
              'The described object references Bitcoin Inscription #89491681; this is not direct notarization '
              'of all three final Bitcoin Originals. Sealed-disc contents were not publicly read or compared.'
          )
          claim['traceability_status'] = 'complete'

          canonical = json.dumps(
              {k: v for k, v in data.items() if k != 'source_digest'},
              ensure_ascii=False,
              sort_keys=True,
              separators=(',', ':')
          )
          data['source_digest'] = hashlib.sha256(canonical.encode()).hexdigest()[:16]
          path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY
          python3 scripts/validate_claim_registry.py
          python3 scripts/test_claim_registry.py
      - name: Commit patched registry
        shell: bash
        run: |
          set -euo pipefail
          git add api/claim-registry.json
          if git diff --cached --quiet; then
            echo "No registry change"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "api: connect Shenzhen notarial evidence to claim registry"
          git push origin HEAD:agent/complete-legacy-ar-eth-mirror-audit
