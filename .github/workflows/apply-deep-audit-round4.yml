name: Apply Deep Audit Round 4

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/deep-audit-round4-evidence-integrity'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: agent/deep-audit-round4-evidence-integrity
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: python -m pip install -r requirements-ci.txt -r apps/record_chain_intake_gateway/requirements.txt
      - name: Apply remaining audited transformations
        run: |
          set -euo pipefail
          python audit/apply_round4_remaining.py
          rm audit/apply_round4_remaining.py
      - name: Syntax and focused regression checks
        env:
          PYTHONPATH: apps/record_chain_intake_gateway:.
        run: |
          set -euo pipefail
          python -m py_compile \
            apps/record_chain_intake_gateway/gateway/authorship.py \
            scripts/waiting_heartbeat_capsule_integrity.py \
            scripts/generate_waiting_heartbeat_status.py \
            scripts/build_waiting_heartbeat_arweave_capsule.py \
            scripts/test_waiting_heartbeat_summary_metrics.py
          python -m pytest -q apps/record_chain_intake_gateway/tests/test_authorship_proof.py
          python scripts/test_waiting_heartbeat_summary_metrics.py
          python scripts/generate_waiting_heartbeat_status.py
          python scripts/trinity_record_chain.py verify
          git restore record-chain/heartbeat/index.json api/waiting-heartbeat-status.json
      - name: Commit audited source changes
        run: |
          set -euo pipefail
          git config user.name 'trinity-deep-audit-bot'
          git config user.email 'actions@github.com'
          git add scripts/generate_waiting_heartbeat_status.py scripts/test_waiting_heartbeat_summary_metrics.py audit/apply_round4_remaining.py
          git commit -m 'Bind heartbeat status to verified capsule evidence'
          git push origin HEAD:agent/deep-audit-round4-evidence-integrity
