name: Temporary PR655 verification router migration

on:
  push:
    branches:
      - agent/verification-model-cleanup

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/verification-model-cleanup
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Migrate verification routes and E2E contract
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          router_path = Path('api/agent-task-router.v1.json')
          router = json.loads(router_path.read_text(encoding='utf-8'))
          routes = router['routes']

          routes['verify_public_digital']['read'] = [
              '/api/agent-first-contact.json',
              '/api/verification-materials.json',
              '/api/verification-procedures.v1.json',
              '/api/verification-claim-model.v1.json',
              '/api/evidence-relationship-map.v1.json',
              '/api/verification-profiles.v1.json',
              '/api/context-action-profiles.v1.json',
              '/api/corrections-index.json'
          ]
          routes['verify_public_digital']['allowed_output'] = 'bounded_current_verification_report_only_if_fresh_actions_performed'
          routes['verify_public_digital']['profile_rule'] = 'Choose the weakest supported digital_profile and report physical_observation and external_witness separately.'

          routes.pop('verify_v0_v5_agent_declared', None)
          routes.pop('verify_v6_plus_strict_evidence', None)
          routes['verify_current_model'] = {
              'route_id': 'record_chain_current_multidimensional_verification',
              'read': [
                  '/api/agent-first-contact.json',
                  '/api/agent-required-reading.json',
                  '/api/context-action-profiles.v1.json',
                  '/api/verification-procedures.v1.json',
                  '/api/verification-profiles.v1.json',
                  '/api/verification-claim-model.v1.json',
                  '/api/evidence-relationship-map.v1.json',
                  '/api/record-chain-intake-gateway.v1.json',
                  '/api/record-chain-submission-schema.v1.json',
                  '/downloads/record-chain-agent-field-guidance.v1.json',
                  '/downloads/record-chain-builder.mjs'
              ],
              'current_submission_method': 'Record-Chain Intake Gateway',
              'builder': '/downloads/record-chain-builder.mjs',
              'builder_command': 'node record-chain-builder.mjs verification --verification-level V0..V5 --digital-profile <profile> --relationships-checked <relationships> --physical-observation <value> --external-witness <value> --coverage-scope <scope> --limitations <limits> --claims-not-made <claims> --corrections-or-supersession-checked true|false --what-was-checked <items> --verification-claim <claim> --fresh-actions <actions>',
              'requires_current_dimensions': [
                  'digital_profile',
                  'relationships_checked',
                  'physical_observation',
                  'external_witness',
                  'coverage_scope',
                  'limitations',
                  'claims_not_made',
                  'corrections_or_supersession_checked'
              ],
              'legacy_builder_values': ['V0', 'V1', 'V2', 'V3', 'V4', 'V5'],
              'historical_only_labels': ['V4+', 'V6', 'V7', 'V8'],
              'requires_explicit_checked_items_claim_and_fresh_actions': True,
              'requires_weakest_supported_profile': True,
              'contract': '/api/record-chain-intake-gateway.v1.json',
              'must_follow_post_submit_readback': True,
              'preflight_endpoint': 'https://trinity-record-chain-gateway.onrender.com/record-chain/preflight',
              'submit_endpoint': 'https://trinity-record-chain-gateway.onrender.com/record-chain/submit',
              'receipt_is_intake_only': True
          }
          routes['physical_or_strict_evidence_verification'] = {
              'delegate_to': '/api/agent-first-contact.json',
              'status': 'current',
              'rule': 'Do not request V6, V7, or V8 as new levels. Use physical_observation and external_witness independently from digital_profile.',
              'read': [
                  '/api/verification-procedures.v1.json',
                  '/api/verification-claim-model.v1.json',
                  '/api/evidence-input-schema.v1.json',
                  '/api/claim-gate-rules.json'
              ],
              'pipeline_when_machine_evaluated_evidence_is_required': [
                  'fresh_evidence_input',
                  'strict_claim_gate',
                  'generated_report_if_allowed',
                  'validator'
              ],
              'if_pipeline_not_completed': 'report only the actually performed current dimensions and limitations; do not claim strict machine-evaluated evidence',
              'public_submission_legacy_value_rule': 'Use one V0-V5 Builder compatibility value; V4+, V6, V7, and V8 are forbidden for new public submissions.'
          }
          router['current_verification_model'] = {
              'procedures': '/api/verification-procedures.v1.json',
              'profiles': '/api/verification-profiles.v1.json',
              'claim_model': '/api/verification-claim-model.v1.json',
              'relationships': '/api/evidence-relationship-map.v1.json'
          }
          router_path.write_text(json.dumps(router, indent=2, ensure_ascii=False) + '\n', encoding='utf-8')

          test_path = Path('scripts/test_agent_e2e_journey_matrix.py')
          text = test_path.read_text(encoding='utf-8')
          old1 = '''    # Historical V6+ routes may remain discoverable only as compatibility guidance.\n    router = json.loads((ROOT / "api/agent-task-router.v1.json").read_text(encoding="utf-8"))\n    assert router["routes"]["verify_v6_plus_strict_evidence"]["if_pipeline_not_completed"] == "do_not_claim_v6_plus"'''
          new1 = '''    router = json.loads((ROOT / "api/agent-task-router.v1.json").read_text(encoding="utf-8"))\n    assert "verify_v6_plus_strict_evidence" not in router["routes"]\n    physical = router["routes"]["physical_or_strict_evidence_verification"]\n    assert physical["status"] == "current"\n    assert "V6, V7, or V8" in physical["rule"]\n    assert "V0-V5" in physical["public_submission_legacy_value_rule"]'''
          if old1 not in text:
              raise SystemExit('old physical route test anchor not found')
          text = text.replace(old1, new1, 1)

          old2 = '''    router = json.loads((ROOT / "api/agent-task-router.v1.json").read_text(encoding="utf-8"))\n    v0 = router["routes"]["verify_v0_v5_agent_declared"]\n    assert v0["builder"] == "/downloads/record-chain-builder.mjs"\n    assert "build_agent_declared_archive_payload.py" not in json.dumps(v0)\n    assert "#verify_v0_v5_agent_declared" not in json.dumps(v0)\n    assert "verification" in v0["builder_command"]\n    assert v0["preflight_endpoint"].endswith("/record-chain/preflight")\n    assert v0["submit_endpoint"].endswith("/record-chain/submit")'''
          new2 = '''    router = json.loads((ROOT / "api/agent-task-router.v1.json").read_text(encoding="utf-8"))\n    assert "verify_v0_v5_agent_declared" not in router["routes"]\n    current = router["routes"]["verify_current_model"]\n    assert current["builder"] == "/downloads/record-chain-builder.mjs"\n    assert current["legacy_builder_values"] == ["V0", "V1", "V2", "V3", "V4", "V5"]\n    assert current["historical_only_labels"] == ["V4+", "V6", "V7", "V8"]\n    assert "/api/verification-procedures.v1.json" in current["read"]\n    assert "--digital-profile" in current["builder_command"]\n    assert "--physical-observation" in current["builder_command"]\n    assert current["preflight_endpoint"].endswith("/record-chain/preflight")\n    assert current["submit_endpoint"].endswith("/record-chain/submit")\n    assert current["receipt_is_intake_only"] is True'''
          if old2 not in text:
              raise SystemExit('old current route test anchor not found')
          text = text.replace(old2, new2, 1)
          test_path.write_text(text, encoding='utf-8')
          PY
          python3 -m json.tool api/agent-task-router.v1.json >/dev/null
          python3 scripts/test_agent_e2e_journey_matrix.py
          rm -f .github/workflows/temp-pr655-router-migration.yml
      - name: Commit permanent router migration
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "trinity-accord-verification-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "verification: migrate task router to current dimensions"
          git push origin HEAD:agent/verification-model-cleanup

# Trigger commit after workflow creation.
