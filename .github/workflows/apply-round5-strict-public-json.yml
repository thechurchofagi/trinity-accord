name: Apply Round 5 Strict Public JSON

on:
  push:
    branches:
      - deep-audit-round5-systemic-resilience

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout audit branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: deep-audit-round5-systemic-resilience
          fetch-depth: 0

      - name: Apply strict parser patch
        run: python3 scripts/apply_round5_strict_public_json.py

      - name: Install focused dependencies
        run: python3 -m pip install -q pytest

      - name: Run focused tests
        run: python3 -m pytest tests/test_live_deployment_contract.py -q --tb=short

      - name: Remove one-shot files
        run: |
          rm -f scripts/apply_round5_strict_public_json.py
          rm -f .github/workflows/apply-round5-strict-public-json.yml

      - name: Commit validated patch
        run: |
          set -euo pipefail
          git config user.name "trinity-round5-audit-bot"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Reject ambiguous public machine JSON"
          git push origin HEAD:deep-audit-round5-systemic-resilience
