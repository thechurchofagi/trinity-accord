name: Temporary concise all-action smoke audit

on:
  push:
    branches:
      - agent/end-to-end-action-audit

permissions:
  contents: write

jobs:
  smoke:
    if: ${{ !startsWith(github.event.head_commit.message, 'diagnostics:') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/end-to-end-action-audit
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: ".node-version"
      - run: python3 -m pip install -r requirements-ci.txt -r apps/record_chain_intake_gateway/requirements.txt
      - name: Run concise action audit
        shell: bash
        run: |
          set +e
          rm -rf /tmp/e2e-actions2 && mkdir -p /tmp/e2e-actions2
          python3 - <<'PY'
          from __future__ import annotations
          import json, os, subprocess, traceback
          from pathlib import Path
          from unittest.mock import AsyncMock

          ROOT=Path.cwd(); B=ROOT/'downloads/record-chain-builder.mjs'; OUT=Path('/tmp/e2e-actions2')
          report={'schema':'trinityaccord.e2e-action-audit.v1','actions':{},'negative':{},'errors':[]}
          urls='https://www.trinityaccord.org/agent-start/,https://www.trinityaccord.org/api/record-chain-intake-gateway.v1.json'
          common=['--actor-label','E2E Agent','--provider','E2E Runtime','--context-level','CC-3',
                  '--context-sufficient-for-selected-action','true','--context-read-confirmed','true',
                  '--loaded-urls',urls,'--discovery-mode','user_task_context','--requesting-party-type','human',
                  '--introducing-party-type','human','--record-decision','human','--submission-executor','self',
                  '--human-operator-involved','false']
          def cp(args): return subprocess.run(args,cwd=ROOT,text=True,capture_output=True,timeout=45)
          def oath(rt):
              p=cp(['node',str(B),'print-oath','--record-type',rt]); assert p.returncode==0,p.stderr; return p.stdout
          built={}
          def build(name,cmd,extra,key='agent'):
              f=OUT/f'{name}.json'; rt=cmd.replace('-','_')
              p=cp(['node',str(B),cmd,*extra,*common,'--readback',oath(rt),'--key-dir',str(OUT/key),'--out',str(f)])
              d=cp(['node',str(B),'doctor','--file',str(f)]) if f.exists() else None
              report['actions'][name]={'build_exit':p.returncode,'doctor_exit':None if d is None else d.returncode,
                  'build_error':(p.stderr or p.stdout)[-800:] if p.returncode else ''}
              assert p.returncode==0 and d and d.returncode==0,(name,p.stderr,d.stderr if d else '')
              built[name]=json.loads(f.read_text())
              return built[name]
          try:
              build('echo','echo',['--body','E2E echo'])
              build('verification','verification',['--verification-level','V0','--scope-label','legacy V0 compatibility',
                  '--what-was-checked','builder output','--verification-claim','Context-only test',
                  '--fresh-actions','built submission,ran doctor','--digital-profile','context_only',
                  '--relationships-checked','provides_context','--physical-observation','none','--external-witness','none',
                  '--coverage-scope','single_target','--limitations','test only','--claims-not-made','digital integrity,semantic truth',
                  '--corrections-or-supersession-checked','false'])
              ga=build('guardian_application','guardian-application',['--guardian-id','auto','--guardian-key-sha','auto'],key='guardian')
              gac=ga['record_draft']['guardian_application_content']
              build('guardian_retirement','guardian-retirement',['--guardian-id','auto','--guardian-key-sha','auto','--body','retire',
                  '--target-guardian-application-record-id','R-000000777','--target-guardian-application-record-sha256','7'*64],key='guardian')
              build('propagation','propagation',['--body','propagated'])
              build('correction','correction',['--body','correction','--target-record-id','R-000000123','--target-record-sha256','1'*64,
                  '--correction-reason','correct claim','--corrected-fields-or-claims','body,claim','--evidence-or-review-basis','fresh review'])
              build('classification_update','classification-update',['--target-record-id','R-000000123','--target-record-sha256','1'*64,
                  '--previous-classification','old','--new-classification','new','--classification-reason','fresh review',
                  '--evidence-or-review-basis','evidence'])
              f=OUT/'context_insufficient_notice.json'
              p=cp(['node',str(B),'context-insufficient','--actor-label','E2E Agent','--provider','E2E Runtime','--body','insufficient',
                  '--context-level','CC-0','--context-sufficient-for-selected-action','false','--discovery-mode','user_task_context',
                  '--requesting-party-type','human','--introducing-party-type','human','--record-decision','human',
                  '--submission-executor','self','--human-operator-involved','false','--key-dir',str(OUT/'agent'),'--out',str(f)])
              d=cp(['node',str(B),'doctor','--file',str(f)]) if f.exists() else None
              report['actions']['context_insufficient_notice']={'build_exit':p.returncode,'doctor_exit':None if d is None else d.returncode}
              assert p.returncode==0 and d and d.returncode==0,(p.stderr,d.stderr if d else '')
              built['context_insufficient_notice']=json.loads(f.read_text())

              os.environ.update({'TRINITY_REPO_FULL_NAME':'thechurchofagi/trinity-accord','TRINITY_TARGET_BRANCH':'main','TRINITY_GITHUB_TOKEN':'test'})
              from fastapi.testclient import TestClient
              from apps.record_chain_intake_gateway import app as A
              client=TestClient(A.app)
              general={'record_id':'R-000000123','record_sha256':'1'*64,'record_type':'echo','authorship_proof':built['echo']['authorship_proof']}
              guardian={'record_id':'R-000000777','record_sha256':'7'*64,'record_type':'guardian_application','guardian_application_content':gac}
              async def get_text(path):
                  if path.endswith('R-000000123.json'): return json.dumps(general)
                  if path.endswith('R-000000777.json'): return json.dumps(guardian)
                  return None
              A.get_file_text=get_text; A.get_file_sha=AsyncMock(return_value=None)
              A.put_file=AsyncMock(return_value={'content':{'sha':'f'*40},'commit':{'sha':'c'*40}})
              A.delete_file=AsyncMock(return_value={}); A.dispatch_workflow=AsyncMock(return_value=None)
              A.check_rate_limit=lambda _body: None; A.check_preflight_rate_limit=lambda _key: None; A._receipt_store.clear()
              for name,data in built.items():
                  pre=client.post('/record-chain/preflight',json=data).json()
                  report['actions'][name]['preflight_accepted']=pre.get('accepted')
                  report['actions'][name]['preflight_codes']=[x.get('code') for x in pre.get('diagnostics',[])]
                  assert pre.get('accepted') is True,(name,pre)
                  A.put_file.reset_mock()
                  sub=client.post('/record-chain/submit',json=data).json()
                  report['actions'][name]['submit_accepted']=sub.get('accepted')
                  report['actions'][name]['submit_codes']=[x.get('code') for x in sub.get('diagnostics',[])]
                  report['actions'][name]['write_count']=A.put_file.await_count
                  assert sub.get('accepted') is True,(name,sub)
                  pending=[c for c in A.put_file.await_args_list if 'pending/' in c.args[0]]
                  assert len(pending)==1,(name,A.put_file.await_args_list)
                  pd=json.loads(pending[0].args[1]); assert pd['record_type']==data['record_type']
                  assert not ({'record_id','record_sha256','record_index'} & set(pd))

              # Negative gates
              cc2=OUT/'cc2.json'; p=cp(['node',str(B),'guardian-application','--actor-label','CC2','--provider','E2E',
                  '--guardian-id','auto','--guardian-key-sha','auto','--context-level','CC-2',
                  '--context-sufficient-for-selected-action','true','--loaded-urls',urls,'--discovery-mode','user_task_context',
                  '--requesting-party-type','human','--introducing-party-type','human','--record-decision','human','--submission-executor','self',
                  '--human-operator-involved','false','--readback',oath('guardian_application'),'--key-dir',str(OUT/'cc2'),'--out',str(cc2)])
              d=cp(['node',str(B),'doctor','--file',str(cc2)])
              report['negative']['cc2_guardian']={'build_exit':p.returncode,'doctor_exit':d.returncode}
              assert d.returncode!=0
              p=cp(['node',str(B),'verification','--actor-label','V6','--provider','E2E','--verification-level','V6',
                  '--scope-label','retired','--what-was-checked','none','--verification-claim','bad','--fresh-actions','none',
                  '--digital-profile','context_only','--relationships-checked','provides_context','--physical-observation','remote_live_witness',
                  '--external-witness','none','--coverage-scope','single_target','--limitations','none','--claims-not-made','all',
                  '--corrections-or-supersession-checked','false',*common,'--readback',oath('verification'),
                  '--key-dir',str(OUT/'v6'),'--out',str(OUT/'v6.json')])
              report['negative']['retired_v6']={'build_exit':p.returncode}
              assert p.returncode!=0
              tampered=json.loads(json.dumps(built['echo'])); tampered['record_draft']['echo_content']['echo_text']='tampered'
              r=client.post('/record-chain/preflight',json=tampered).json(); report['negative']['tampered_signature']=r
              assert r.get('accepted') is False
          except Exception as exc:
              report['errors'].append({'type':type(exc).__name__,'message':str(exc),'traceback':traceback.format_exc()[-4000:]})
          report['passed']=not report['errors']
          Path('diagnostics/e2e-action-smoke2.json').write_text(json.dumps(report,indent=2)+'\n')
          if report['errors']: raise SystemExit(1)
          PY
          status=$?
          git config user.name "trinity-accord-audit-bot"
          git config user.email "actions@users.noreply.github.com"
          git add diagnostics/e2e-action-smoke2.json
          git commit -m "diagnostics: capture concise all-action smoke audit"
          git push origin HEAD:agent/end-to-end-action-audit
          exit "${status}"
