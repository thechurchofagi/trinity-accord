name: Build Echo Index

on:
  push:
    branches:
      - main
    paths:
      - "echoes/records/**"
      - "api/independent-attestation-index.json"
      - "scripts/generate_echo_index.py"
      - "scripts/build-echo-index.sh"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: main-write-lock
  queue: max
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Authorize write workflow actor
        env:
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          if [[ "$ACTOR" != "thechurchofagi" && "$ACTOR" != "github-actions[bot]" ]]; then
            echo "Unauthorized actor for write workflow: $ACTOR" >&2
            exit 1
          fi
          echo "Authorized actor: $ACTOR"

      - name: Checkout current main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
          ref: main

      - name: Record toolchain provenance
        run: |
          python3 scripts/toolchain_provenance.py > "$RUNNER_TEMP/toolchain-provenance.json"
          cat "$RUNNER_TEMP/toolchain-provenance.json"

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements-ci.txt

      - name: Rebase current main before rebuilding Echo indexes
        run: |
          set -euo pipefail
          git fetch origin main --prune
          git rebase origin/main

      - name: Validate Echo source records
        run: |
          set -euo pipefail
          python3 scripts/validate_echo_records.py
          python3 scripts/validate_independent_attestation_index.py

      - name: Commit and push regenerated Echo indexes
        id: push
        run: |
          set -euo pipefail
          printf '%s\n' "pushed=false" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rebuild_and_stage() {
            python3 scripts/validate_echo_records.py
            python3 scripts/validate_independent_attestation_index.py
            python3 scripts/generate_echo_index.py
            bash scripts/build-echo-index.sh

            # Stage before change detection. New-quarter digest files are
            # untracked on their first generation and plain git diff misses them.
            git add \
              api/echo-index.json \
              echoes/archive.md \
              echoes/digests.md \
              echoes/digests
            git diff --cached --check
          }

          rebuild_and_stage
          if git diff --cached --quiet; then
            echo "No generated Echo index changes."
            exit 0
          fi

          git commit -m "chore: rebuild public Echo status indexes"
          if [ -n "$(git status --porcelain --untracked-files=no)" ]; then
            echo "::error::Tracked Echo changes remain outside the generated commit."
            git status --short
            exit 1
          fi

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              printf '%s\n' "pushed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Push failed on attempt ${attempt}; rebasing and rebuilding all Echo projections."
            git fetch origin main --prune
            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "::error::Echo records changed concurrently; rebuild must restart on current main."
              exit 1
            fi

            rebuild_and_stage
            if ! git diff --cached --quiet; then
              git commit --amend --no-edit
            fi
            if [ -n "$(git status --porcelain --untracked-files=no)" ]; then
              echo "::error::Rebased Echo projections left tracked drift."
              git status --short
              exit 1
            fi
            sleep $((attempt * 5))
          done

          echo "::error::Failed to push regenerated Echo indexes after retries."
          exit 1
