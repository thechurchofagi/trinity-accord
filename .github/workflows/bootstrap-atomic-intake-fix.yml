name: Bootstrap atomic intake fix

on:
  push:
    branches:
      - fix/atomic-intake-materialization
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[atomic-fix-applied]') }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/atomic-intake-materialization
          fetch-depth: 0
          show-progress: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Apply root-cause fix
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path('.')

          # 1) Add an atomic Git Data API multi-file create primitive.
          adapter_path = root / 'apps/record_chain_intake_gateway/gateway/github_adapter.py'
          adapter = adapter_path.read_text(encoding='utf-8')
          marker = '\n\nasync def delete_file(\n'
          assert marker in adapter, 'github_adapter insertion marker missing'
          atomic_code = r'''

class AtomicCreateConflict(RuntimeError):
    """Raised when an atomic create would overwrite an existing path."""


async def _get_file_text_at_ref(
    client: httpx.AsyncClient,
    path: str,
    ref: str,
) -> str | None:
    """Read UTF-8 repository content at an immutable ref."""
    url = f"{_GITHUB_API}/repos/{_repo()}/contents/{path}"
    resp = await client.get(url, headers=_headers(), params={"ref": ref})
    if resp.status_code == 404:
        return None
    if resp.status_code != 200:
        raise RuntimeError(f"GitHub API error {resp.status_code} fetching {path} at {ref}")
    data: dict[str, Any] = resp.json()
    if data.get("encoding", "base64") != "base64":
        return str(data.get("content", ""))
    try:
        return base64.b64decode(data.get("content", "")).decode("utf-8")
    except Exception as exc:
        raise RuntimeError(f"Failed to decode file content for {path} at {ref}: {exc}") from exc


async def _atomic_files_state(
    client: httpx.AsyncClient,
    files: dict[str, str],
    ref: str,
) -> tuple[bool, bool]:
    """Return (all_absent, all_exact) for the requested paths at ref."""
    states: list[str] = []
    for path, intended in files.items():
        remote = await _get_file_text_at_ref(client, path, ref)
        if remote is None:
            states.append("absent")
        elif remote == intended:
            states.append("exact")
        else:
            states.append("different")
    return all(state == "absent" for state in states), all(state == "exact" for state in states)


async def create_files_atomic(
    files: dict[str, str],
    message: str,
    *,
    max_attempts: int = 4,
) -> dict[str, Any]:
    """Create several UTF-8 files in one fast-forward Git commit.

    The Contents API creates one commit per file and exposes intermediate states.
    This helper creates blobs, one tree, one commit, and then advances the branch
    ref once. It never overwrites a pre-existing path. Branch races are retried;
    timeout-after-ref-update ambiguity is reconciled by exact readback.
    """
    if not files:
        raise ValueError("create_files_atomic requires at least one file")
    if max_attempts < 1:
        raise ValueError("max_attempts must be positive")

    branch = _branch()
    ref_path = f"heads/{branch}"
    ref_url = f"{_GITHUB_API}/repos/{_repo()}/git/ref/{ref_path}"
    update_ref_url = f"{_GITHUB_API}/repos/{_repo()}/git/refs/{ref_path}"

    async with httpx.AsyncClient(timeout=30) as client:
        for attempt in range(1, max_attempts + 1):
            ref_resp = await client.get(ref_url, headers=_headers())
            if ref_resp.status_code != 200:
                raise RuntimeError(
                    f"GitHub API error {ref_resp.status_code} reading branch ref {branch}"
                )
            head_sha = ref_resp.json().get("object", {}).get("sha")
            if not head_sha:
                raise RuntimeError(f"GitHub branch ref {branch} has no commit SHA")

            all_absent, all_exact = await _atomic_files_state(client, files, head_sha)
            if all_exact:
                logger.warning("Reconciled already-materialized atomic write at %s", head_sha)
                return {
                    "commit": {"sha": head_sha},
                    "atomic": True,
                    "reconciled_existing": True,
                }
            if not all_absent:
                raise AtomicCreateConflict(
                    "Atomic intake paths are partially present or contain different bytes"
                )

            commit_resp = await client.get(
                f"{_GITHUB_API}/repos/{_repo()}/git/commits/{head_sha}",
                headers=_headers(),
            )
            if commit_resp.status_code != 200:
                raise RuntimeError(
                    f"GitHub API error {commit_resp.status_code} reading commit {head_sha}"
                )
            base_tree_sha = commit_resp.json().get("tree", {}).get("sha")
            if not base_tree_sha:
                raise RuntimeError(f"GitHub commit {head_sha} has no tree SHA")

            tree_entries: list[dict[str, str]] = []
            for path, content in files.items():
                blob_resp = await client.post(
                    f"{_GITHUB_API}/repos/{_repo()}/git/blobs",
                    headers=_headers(),
                    json={"content": content, "encoding": "utf-8"},
                )
                if blob_resp.status_code != 201:
                    raise RuntimeError(
                        f"GitHub API error {blob_resp.status_code} creating blob for {path}"
                    )
                blob_sha = blob_resp.json().get("sha")
                if not blob_sha:
                    raise RuntimeError(f"GitHub returned no blob SHA for {path}")
                tree_entries.append({
                    "path": path,
                    "mode": "100644",
                    "type": "blob",
                    "sha": blob_sha,
                })

            tree_resp = await client.post(
                f"{_GITHUB_API}/repos/{_repo()}/git/trees",
                headers=_headers(),
                json={"base_tree": base_tree_sha, "tree": tree_entries},
            )
            if tree_resp.status_code != 201:
                raise RuntimeError(
                    f"GitHub API error {tree_resp.status_code} creating atomic tree"
                )
            tree_sha = tree_resp.json().get("sha")
            if not tree_sha:
                raise RuntimeError("GitHub returned no atomic tree SHA")

            new_commit_resp = await client.post(
                f"{_GITHUB_API}/repos/{_repo()}/git/commits",
                headers=_headers(),
                json={"message": message, "tree": tree_sha, "parents": [head_sha]},
            )
            if new_commit_resp.status_code != 201:
                raise RuntimeError(
                    f"GitHub API error {new_commit_resp.status_code} creating atomic commit"
                )
            new_commit_sha = new_commit_resp.json().get("sha")
            if not new_commit_sha:
                raise RuntimeError("GitHub returned no atomic commit SHA")

            try:
                update_resp = await client.patch(
                    update_ref_url,
                    headers=_headers(),
                    json={"sha": new_commit_sha, "force": False},
                )
            except Exception:
                _, exact_after_error = await _atomic_files_state(client, files, branch)
                if exact_after_error:
                    logger.warning(
                        "Reconciled ambiguous atomic ref update for commit %s",
                        new_commit_sha,
                    )
                    return {
                        "commit": {"sha": new_commit_sha},
                        "atomic": True,
                        "reconciled_after_error": True,
                    }
                raise

            if update_resp.status_code == 200:
                return {
                    "commit": {"sha": new_commit_sha},
                    "atomic": True,
                    "reconciled_existing": False,
                }
            if update_resp.status_code in (409, 422) and attempt < max_attempts:
                logger.info(
                    "Branch moved during atomic write; retrying attempt %d/%d",
                    attempt + 1,
                    max_attempts,
                )
                continue

            _, exact_after_response = await _atomic_files_state(client, files, branch)
            if exact_after_response:
                return {
                    "commit": {"sha": new_commit_sha},
                    "atomic": True,
                    "reconciled_after_error": True,
                }
            raise RuntimeError(
                f"GitHub API error {update_resp.status_code} advancing branch for atomic write"
            )

    raise RuntimeError("Atomic GitHub write exhausted branch-race retries")
'''
          if 'async def create_files_atomic(' not in adapter:
              adapter = adapter.replace(marker, atomic_code + marker, 1)
          adapter_path.write_text(adapter, encoding='utf-8')

          # 2) Make the live Gateway expose only the all-or-nothing transaction.
          app_path = root / 'apps/record_chain_intake_gateway/app.py'
          app = app_path.read_text(encoding='utf-8')
          old_import = 'from apps.record_chain_intake_gateway.gateway.github_adapter import delete_file, dispatch_workflow, get_file_sha, get_file_text, put_file'
          new_import = 'from apps.record_chain_intake_gateway.gateway.github_adapter import AtomicCreateConflict, create_files_atomic, dispatch_workflow, get_file_sha, get_file_text'
          assert old_import in app, 'app adapter import marker missing'
          app = app.replace(old_import, new_import, 1)

          helper_start = app.index('async def put_file_confirmed(')
          helper_end_marker = '# ---------------------------------------------------------------------------\n# BLOCKER 1 helpers: Idempotency index fail-closed'
          helper_end = app.index(helper_end_marker, helper_start)
          app = app[:helper_start] + helper_end_marker + app[helper_end + len(helper_end_marker):]

          tx_anchor = app.index('# --- persist to GitHub ---')
          tx_start = app.index('    if _WRITE_MODE == "github_contents_pending":', tx_anchor)
          tx_end = app.index('    # --- store receipt in memory', tx_start)
          new_tx = r'''    if _WRITE_MODE == "github_contents_pending":
        # All four intake artifacts become visible in one branch-ref update.
        # No verifier can observe an idempotency index before its pending marker
        # or before pending_written/pending_committed_at are finalized.
        idempotency_path = _idempotency_index_path(original_submission_sha256)
        pending_committed_at = now.isoformat().replace("+00:00", "Z")
        idempotency_index_data = _build_idempotency_index_data(
            submission_sha256=original_submission_sha256,
            stored_submission_sha256=stored_submission_sha256,
            receipt_id=receipt_id,
            receipt_path=receipt_path,
            pending_file_path=pending_file_path,
            intake_submission_path=intake_submission_path,
            record_type=record_type,
            now=now,
            pending_written=True,
            pending_committed_at=pending_committed_at,
        )
        atomic_files = {
            intake_submission_path: submission_content,
            receipt_path: receipt_content,
            idempotency_path: canonical_dumps(idempotency_index_data),
            pending_file_path: pending_content,
        }
        try:
            atomic_result = await create_files_atomic(
                atomic_files,
                f"intake: materialize {receipt_id} ({record_type})",
            )
            commit_sha = atomic_result.get("commit", {}).get("sha")
            logger.info("Atomically materialized intake transaction %s", receipt_id)
        except AtomicCreateConflict as exc:
            logger.warning("Atomic intake conflict for %s: %s", receipt_id, exc)
            existing_idx = await _read_idempotency_index(original_submission_sha256)
            if existing_idx is not None:
                try:
                    return await _submit_response_from_idempotency_index(
                        index=existing_idx,
                        record_type=record_type,
                        submission_sha256=original_submission_sha256,
                        received_raw_body_sha256=received_raw_body_sha256,
                        body=body,
                    )
                except HTTPException:
                    raise
                except Exception as response_exc:
                    logger.error(
                        "Concurrent atomic intake could not be resolved for %s: %s",
                        original_submission_sha256[:16],
                        response_exc,
                    )
            return SubmitResponse(
                accepted=False,
                submitted=False,
                record_type=record_type,
                submission_sha256=original_submission_sha256,
                received_raw_body_sha256=received_raw_body_sha256,
                diagnostics=[Diagnostic(
                    code="INTAKE_ATOMIC_PATH_CONFLICT",
                    severity="error",
                    field="record-chain/intake",
                    message=f"Atomic intake paths conflict with existing repository state: {exc}",
                    meaning="The Gateway refused to expose or overwrite a partial intake transaction.",
                    suggested_fix="Retry the exact same submission later or ask an operator to inspect the durable intake paths.",
                    retry_allowed=True,
                )],
                boundary=_build_submit_boundary(body),
            )
        except Exception as exc:
            logger.error("Atomic persistence failed for %s: %s", receipt_id, exc)
            return SubmitResponse(
                accepted=False,
                submitted=False,
                record_type=record_type,
                submission_sha256=submission_sha256,
                received_raw_body_sha256=received_raw_body_sha256,
                diagnostics=[Diagnostic(
                    code="PERSIST_FAILED",
                    severity="error",
                    message=f"Atomic persist failed: {exc}",
                    meaning="No intake artifact is accepted unless submission, receipt, finalized idempotency index, and pending marker become visible together.",
                    suggested_fix="Retry the exact same submission later.",
                    retry_allowed=True,
                )],
                boundary=_build_submit_boundary(body),
            )

        if _DISPATCH_APPEND_WORKFLOW:
            try:
                await dispatch_workflow(
                    _APPEND_WORKFLOW,
                    inputs={
                        "receipt_id": receipt_id,
                        "pending_file_path": pending_file_path,
                    },
                )
                append_status = "queued"
                logger.info("Dispatched append workflow %s for %s", _APPEND_WORKFLOW, receipt_id)
            except Exception as dispatch_exc:
                append_status = "pending_dispatch_failed"
                warning = (
                    f"Append workflow dispatch failed after durable atomic intake: {dispatch_exc}. "
                    "The record remains pending and can be picked up by push/scheduled/manual append."
                )
                warnings.append(warning)
                logger.warning("Append dispatch failed for %s: %s", receipt_id, dispatch_exc)
    else:
        logger.info("Dry-run mode — skipping persist for %s", receipt_id)
        append_status = "dry_run"

'''
          app = app[:tx_start] + new_tx + app[tx_end:]
          app_path.write_text(app, encoding='utf-8')

          # 3) Do not turn an upstream skipped test into a second artifact failure.
          workflow_path = root / '.github/workflows/record-chain-gateway-tests.yml'
          workflow = workflow_path.read_text(encoding='utf-8')
          unit_name = '      - name: Run gateway unit tests\n'
          assert unit_name in workflow, 'gateway unit-test step marker missing'
          workflow = workflow.replace(unit_name, unit_name + '        id: gateway_unit_tests\n', 1)
          old_if = '      - name: Upload gateway unit test log\n        if: always()\n'
          new_if = '      - name: Upload gateway unit test log\n        if: ${{ always() && steps.gateway_unit_tests.outcome != \'skipped\' }}\n'
          assert old_if in workflow, 'artifact upload condition marker missing'
          workflow = workflow.replace(old_if, new_if, 1)
          workflow_path.write_text(workflow, encoding='utf-8')

          # 4) Keep the readback policy on operating surfaces, not the orientation-only homepage.
          policy_path = root / 'scripts/test_readback_hash_policy.py'
          policy = policy_path.read_text(encoding='utf-8')
          old_policy = '''    for relative in ["index.md", "agent-start.md", "llms.txt", "external-agent-quickstart.md"]:
        text = (ROOT / relative).read_text(encoding="utf-8").lower()
        require("handwrite" in text and ("submission" in text or "payload" in text),
                f"{relative} must warn against handwritten submissions")
        require("agent_readback_sha256" not in text, f"{relative} contains retired agent_readback_sha256")
'''
          new_policy = '''    for relative in ["agent-start.md", "llms.txt", "external-agent-quickstart.md"]:
        text = (ROOT / relative).read_text(encoding="utf-8").lower()
        require("handwrite" in text and ("submission" in text or "payload" in text),
                f"{relative} must warn against handwritten submissions")
        require("agent_readback_sha256" not in text, f"{relative} contains retired agent_readback_sha256")

    homepage = (ROOT / "index.md").read_text(encoding="utf-8").lower()
    require("homepage-only context remains" in homepage and "payload construction" in homepage,
            "index.md must fail closed for homepage-only payload construction")
    require("/agent-first-contact/" in homepage,
            "index.md must route operating agents to Agent First Contact")
    require("agent_readback_sha256" not in homepage,
            "index.md contains retired agent_readback_sha256")
'''
          assert old_policy in policy, 'readback policy marker missing'
          policy = policy.replace(old_policy, new_policy, 1)
          policy_path.write_text(policy, encoding='utf-8')

          # 5) Strengthen regression contracts around the atomic ownership boundary.
          test_path = root / 'apps/record_chain_intake_gateway/tests/test_deep_audit_round2.py'
          test_text = test_path.read_text(encoding='utf-8')
          old_asserts = '''    app_source = (ROOT / "apps/record_chain_intake_gateway/app.py").read_text(encoding="utf-8")
    assert "put_file_confirmed" in app_source
    assert "pending_written (non-fatal)" not in app_source
'''
          new_asserts = '''    app_source = (ROOT / "apps/record_chain_intake_gateway/app.py").read_text(encoding="utf-8")
    adapter_source = (ROOT / "apps/record_chain_intake_gateway/gateway/github_adapter.py").read_text(encoding="utf-8")
    assert "create_files_atomic" in app_source
    assert "pending_written=True" in app_source
    assert "intake: materialize" in app_source
    assert "Write 1: intake submission" not in app_source
    assert "/git/trees" in adapter_source
    assert "/git/commits" in adapter_source
    assert "force\": False" in adapter_source
    assert "pending_written (non-fatal)" not in app_source
'''
          assert old_asserts in test_text, 'deep-audit assertion marker missing'
          test_text = test_text.replace(old_asserts, new_asserts, 1)
          test_path.write_text(test_text, encoding='utf-8')

          for path in [adapter_path, app_path, policy_path, test_path]:
              compile(path.read_text(encoding='utf-8'), str(path), 'exec')
          PY

      - name: Install targeted test dependencies
        run: python -m pip install -r requirements-ci.txt -r apps/record_chain_intake_gateway/requirements.txt

      - name: Run targeted regression tests
        env:
          PYTHONPATH: .
        run: |
          python scripts/trinity_record_chain.py verify
          python scripts/test_deep_intake_append_transaction_invariants.py
          python scripts/run_ci_group.py readback-integrity
          python -m pytest apps/record_chain_intake_gateway/tests/test_deep_audit_round2.py -q

      - name: Commit root-cause fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            apps/record_chain_intake_gateway/app.py \
            apps/record_chain_intake_gateway/gateway/github_adapter.py \
            apps/record_chain_intake_gateway/tests/test_deep_audit_round2.py \
            scripts/test_readback_hash_policy.py \
            .github/workflows/record-chain-gateway-tests.yml
          git commit -m "fix: materialize intake artifacts atomically [atomic-fix-applied]"
          git push origin HEAD:fix/atomic-intake-materialization
