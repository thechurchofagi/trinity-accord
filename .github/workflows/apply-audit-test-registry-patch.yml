name: Apply Audit Test Registry Patch

on:
  push:
    branches:
      - agent/audit-main-integrity-hardening

permissions:
  contents: write

jobs:
  apply:
    if: contains(github.event.head_commit.message, 'stage audit registry runner')
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: agent/audit-main-integrity-hardening
      - run: python3 scripts/apply_audit_test_registry_patch.py
      - run: |
          set -euo pipefail
          rm -f scripts/apply_audit_test_registry_patch.py
          rm -f .github/workflows/apply-audit-test-registry-patch.yml
          git config user.name "trinity-audit-bot"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Register audit integrity regressions"
          git push origin HEAD:agent/audit-main-integrity-hardening
