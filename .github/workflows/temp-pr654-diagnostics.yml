name: Temporary PR654 diagnostic tail

on:
  push:
    branches:
      - agent/retire-fixed-stage-and-clarify-verification
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    if: github.event_name != 'pull_request' || github.head_ref == 'agent/retire-fixed-stage-and-clarify-verification'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: ".node-version"
      - run: python3 -m pip install -r requirements-ci.txt
      - name: Capture current-system failure tail
        shell: bash
        run: |
          set +e
          python3 scripts/generate_sitemap.py
          python3 scripts/run_current_system_tests.py > /tmp/pr654-current-tests.log 2>&1
          status=$?
          echo "===== PR654 CURRENT TEST OUTPUT TAIL ====="
          tail -n 260 /tmp/pr654-current-tests.log
          echo "===== EXIT STATUS: ${status} ====="
          exit "${status}"
