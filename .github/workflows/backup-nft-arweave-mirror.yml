name: NFT Arweave Mirror (backup only)

on:
  workflow_dispatch:
    inputs:
      contract:
        description: "Contract address filter (dry-run only; empty = all 175)"
        required: false
        default: ""
      dry_run:
        description: "Dry run (list only, no release write)"
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: release-nft-arweave-mirror
  cancel-in-progress: false

env:
  INPUT_CONTRACT: ${{ inputs.contract }}
  INPUT_DRY_RUN: ${{ inputs.dry_run }}

jobs:
  mirror:
    if: ${{ github.ref == 'refs/heads/main' && (github.actor == 'thechurchofagi' || github.actor == 'github-actions[bot]') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - name: Checkout current main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
          ref: main

      - name: Record toolchain provenance
        run: |
          python3 scripts/toolchain_provenance.py > "$RUNNER_TEMP/toolchain-provenance.json"
          cat "$RUNNER_TEMP/toolchain-provenance.json"

      - name: Authorize release writer and derive snapshot scope
        env:
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          if [[ "$ACTOR" != "thechurchofagi" && "$ACTOR" != "github-actions[bot]" ]]; then
            echo "Unauthorized release writer: $ACTOR" >&2
            exit 1
          fi

          if [ -n "$INPUT_CONTRACT" ]; then
            [[ "$INPUT_CONTRACT" =~ ^0x[a-fA-F0-9]{40}$ ]] || {
              echo "Invalid contract address: $INPUT_CONTRACT" >&2
              exit 1
            }
            if [ "$INPUT_DRY_RUN" != "true" ]; then
              echo "::error::Contract-filtered live mirror runs are disabled because they previously targeted and deleted assets from the full 175-NFT release."
              exit 1
            fi
          fi

          source_commit="$(git rev-parse HEAD)"
          release_tag="nft-arweave-mirror-175-v1-${source_commit:0:12}"
          {
            echo "RELEASE_TAG=$release_tag"
            echo "SOURCE_COMMIT=$source_commit"
          } >> "$GITHUB_ENV"
          echo "Snapshot release tag: $release_tag"

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version-file: ".node-version"

      - name: Run Arweave to GitHub Release mirror
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          args=()
          if [ -n "$INPUT_CONTRACT" ]; then
            args+=(--contract "$INPUT_CONTRACT")
          fi
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            args+=(--dry-run)
          fi
          node scripts/backup-nft-arweave-mirror.mjs "${args[@]}"
