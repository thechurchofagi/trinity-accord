name: Deep Audit Source Snapshot

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  snapshot:
    if: github.event.pull_request.head.ref == 'agent/deep-audit-20260712'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Build tracked-source snapshot
        run: |
          set -euo pipefail
          mkdir -p audit
          git ls-files -z | tar --null --files-from=- -czf audit/deep-audit-source.tar.gz
          size="$(stat -c '%s' audit/deep-audit-source.tar.gz)"
          echo "snapshot_size_bytes=${size}"
          test "${size}" -lt 90000000

      - name: Publish snapshot and remove one-time workflow
        run: |
          set -euo pipefail
          git config user.name 'trinity-deep-audit-bot'
          git config user.email 'actions@github.com'
          rm -f .github/workflows/deep-audit-source-snapshot.yml
          git add audit/deep-audit-source.tar.gz .github/workflows/deep-audit-source-snapshot.yml
          git commit -m 'audit: publish tracked source snapshot'
          git push origin HEAD:${{ github.head_ref }}
