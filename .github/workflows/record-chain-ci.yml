name: Record Chain CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-record-chain:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Install CI dependencies
        run: python -m pip install -r requirements-ci.txt
      - name: Verify record-chain integrity
        run: python scripts/trinity_record_chain.py verify
      - name: Regenerate public homepage status
        run: |
          python scripts/generate_public_home_status.py
          python scripts/patch_public_home_status_primary.py
      - name: Verify generated homepage files are canonical
        run: python scripts/patch_public_home_status_primary.py --check
      - name: Verify public homepage counter contract
        run: python scripts/check_public_home_status_contract.py
      - name: Show generated homepage diff
        if: failure()
        run: git diff -- index.md api/public-home-status.json
