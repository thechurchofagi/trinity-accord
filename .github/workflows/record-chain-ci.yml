name: Record Chain CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-record-chain:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Install CI dependencies
        run: python -m pip install -r requirements-ci.txt
      - name: Verify record-chain integrity
        run: python scripts/trinity_record_chain.py verify
      - name: Regenerate public homepage status
        run: python scripts/generate_public_home_status.py
      - name: Verify generated homepage files are canonical
        run: python scripts/generate_public_home_status.py --check
      - name: Verify public homepage counter contract
        run: python scripts/check_public_home_status_contract.py
      - name: Commit regenerated public homepage status
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          if git diff --quiet -- index.md api/public-home-status.json; then
            echo "No generated homepage status changes."
            exit 0
          fi
          git config user.name "trinity-record-chain-bot"
          git config user.email "actions@github.com"
          git add index.md api/public-home-status.json
          git commit -m "home: regenerate public homepage status"
          git push
