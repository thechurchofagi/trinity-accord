name: Record Chain CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-record-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Initialize record-chain directories if absent
        run: python scripts/trinity_record_chain.py init
      - name: Verify record-chain integrity
        run: python scripts/trinity_record_chain.py verify
