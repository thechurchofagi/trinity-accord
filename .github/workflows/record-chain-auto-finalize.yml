name: Record Chain Auto Finalize

on:
  workflow_dispatch:
    inputs:
      max_records:
        required: false
        default: "10"
      mode:
        required: true
        default: "dry-run"
        type: choice
        options: [dry-run, live]
      confirm:
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: main-write-lock
  queue: max
  cancel-in-progress: false

env:
  INPUT_CONFIRM: ${{ inputs.confirm }}
  INPUT_MAX_RECORDS: ${{ inputs.max_records }}
  INPUT_MODE: ${{ inputs.mode }}

jobs:
  finalize:
    runs-on: ubuntu-24.04
    steps:
      - name: Authorize write workflow actor
        env:
          ACTOR: ${{ github.actor }}
          ALLOWED_ACTORS: ${{ format('{0},github-actions[bot]', vars.GUARDIAN_REGISTRY_WORKFLOW_ACTORS || 'thechurchofagi') }}
        run: |
          set -euo pipefail
          if echo ",${ALLOWED_ACTORS}," | grep -qF ",${ACTOR},"; then
            echo "Authorized write workflow actor: ${ACTOR}"
          else
            echo "Unauthorized actor: ${ACTOR}" >&2
            exit 1
          fi

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Record toolchain provenance
        run: |
          python3 scripts/toolchain_provenance.py > toolchain-provenance.json
          cat toolchain-provenance.json

      - name: Rebase current main before finalization
        run: |
          set -euo pipefail
          git fetch origin main --prune
          git rebase origin/main

      - name: Guard live mode
        if: inputs.mode == 'live'
        run: |
          set -euo pipefail
          test "$INPUT_CONFIRM" = "I_UNDERSTAND_THIS_FINALIZES_ACCEPTED_RECORD_CHAIN_SUBMISSIONS"

      - name: Auto finalize
        run: |
          set -euo pipefail
          python3 scripts/auto_finalize_accepted_submissions.py \
            --max-records "$INPUT_MAX_RECORDS" \
            --source-run-id "auto-finalize-${{ github.run_id }}" \
            --mode "$INPUT_MODE" \
            | tee /tmp/auto-finalize-summary.json

      - name: Verify after finalize
        run: |
          set -euo pipefail
          python3 scripts/trinity_record_chain.py verify
          python3 scripts/verify_record_chain_integrity.py \
            --ledger record-chain/hash-chain/main.chain.jsonl \
            --head api/record-chain-head.json \
            --chain-id trinity-record-chain-main \
            --verify-payload-files \
            --base-dir .

      - name: Commit finalization outputs
        if: inputs.mode == 'live'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A \
                  record-chain/pending \
                  record-chain/processed \
                  record-chain/rejected \
                  record-chain/records \
                  record-chain/hash-chain/main.chain.jsonl \
                  record-chain/chain-tip.json \
                  record-chain/indexes \
                  api/record-chain-head.json \
                  api/record-chain-index.all.json \
                  api/record-chain-index.manifest.json \
                  api/record-chain-index.*.json
          git diff --cached --check

          if git diff --cached --quiet; then
            echo "No finalization changes."
            exit 0
          fi

          git commit -m "record-chain: auto-finalize accepted submissions"
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Finalization left unstaged or untracked repository changes."
            git status --short
            exit 1
          fi

          verify_rebased_transaction() {
            python3 scripts/trinity_record_chain.py verify
            python3 scripts/verify_record_chain_integrity.py \
              --ledger record-chain/hash-chain/main.chain.jsonl \
              --head api/record-chain-head.json \
              --chain-id trinity-record-chain-main \
              --verify-payload-files \
              --base-dir .
          }

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi

            printf 'Push failed on attempt %s; rebasing and re-verifying without rerunning finalization.\n' "${attempt}"
            git fetch origin main --prune
            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "::error::Record Chain changed concurrently; accepted submissions must be finalized again from current main."
              exit 1
            fi
            verify_rebased_transaction
            if [ -n "$(git status --porcelain)" ]; then
              echo "::error::Verification changed the rebased finalization transaction."
              git status --short
              exit 1
            fi
            sleep $((attempt * 5))
          done

          echo "::error::Failed to push auto-finalize updates after retries."
          exit 1
