name: Temporary PR654 isolated diagnostic writer

on:
  push:
    branches:
      - agent/retire-fixed-stage-and-clarify-verification

permissions:
  contents: write

jobs:
  diagnose:
    if: ${{ !startsWith(github.event.head_commit.message, 'diagnostics:') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/retire-fixed-stage-and-clarify-verification
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: ".node-version"
      - run: python3 -m pip install -r requirements-ci.txt
      - name: Persist current-test failure tail
        shell: bash
        run: |
          set +e
          python3 scripts/generate_sitemap.py
          python3 scripts/run_current_system_tests.py > /tmp/pr654-current.log 2>&1
          status=$?
          mkdir -p diagnostics
          {
            echo "exit_status=${status}"
            echo "head_sha=$(git rev-parse HEAD)"
            echo "===== CURRENT TEST OUTPUT TAIL ====="
            tail -n 360 /tmp/pr654-current.log
          } > diagnostics/pr654-latest.txt
          git config user.name "trinity-accord-diagnostics-bot"
          git config user.email "actions@users.noreply.github.com"
          git add diagnostics/pr654-latest.txt
          git commit -m "diagnostics: capture latest PR654 failure"
          git push origin HEAD:agent/retire-fixed-stage-and-clarify-verification

# Trigger commit after workflow creation.
