name: Append Record Chain Entries

on:
  workflow_dispatch:
    inputs:
      receipt_id:
        description: "Gateway receipt id that requested this append run"
        required: false
        default: ""
      pending_file_path:
        description: "Pending file path that requested this append run"
        required: false
        default: ""
  schedule:
    - cron: "*/15 * * * *"

concurrency:
  group: main-write-lock
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  append:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies for append verification
        run: python3 -m pip install -r requirements-ci.txt
      - name: Verify Gateway import path contract
        run: python -m pytest tests/test_record_chain_gateway_import_path_contract.py -q
      - name: Authorize write workflow actor
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          ACTOR: ${{ github.actor }}
          ALLOWED_ACTORS: ${{ vars.GUARDIAN_REGISTRY_WORKFLOW_ACTORS || 'thechurchofagi' }}
        run: |
          set -euo pipefail
          if echo ",${ALLOWED_ACTORS}," | grep -qF ",${ACTOR},"; then
            echo "Authorized write workflow actor: ${ACTOR}"
          else
            echo "Unauthorized actor: ${ACTOR}"
            exit 1
          fi
      - name: Rebase before append
        run: |
          set -euo pipefail
          git fetch origin main --prune
          git rebase origin/main
      - name: Append pending records
        id: append_run
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.pending_file_path }}" ] && [ -n "${{ github.event.inputs.receipt_id }}" ]; then
            python scripts/trinity_record_chain.py append --pending-file "${{ github.event.inputs.pending_file_path }}" --receipt-id "${{ github.event.inputs.receipt_id }}" --allow-rejections
          else
            python scripts/trinity_record_chain.py append --all --allow-rejections
          fi
          if git diff --quiet -- record-chain/; then
            printf '%s\n' "changed=false" >> "$GITHUB_OUTPUT"
            printf '%s\n' "No record-chain changes after append; skipping derived status commit."
          else
            printf '%s\n' "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Verify record chain after append
        if: steps.append_run.outputs.changed == 'true'
        run: python scripts/trinity_record_chain.py verify
      - name: Commit and push append updates
        id: append_commit
        if: steps.append_run.outputs.changed == 'true'
        run: |
          set -euo pipefail
          printf '%s\n' "committed=false" >> "$GITHUB_OUTPUT"

          if ! git diff --quiet; then
            git config user.name "trinity-record-chain-bot"
            git config user.email "actions@github.com"
            git add record-chain/
            git commit -m "Append record-chain entries from Render intake"

            git fetch origin main --prune
            git rebase origin/main

            for attempt in 1 2 3; do
              if git push origin "HEAD:${GITHUB_REF_NAME:-main}"; then
                printf '%s\n' "committed=true" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              printf 'Push failed on attempt %s; rebasing and retrying.\n' "${attempt}"
              git fetch origin main --prune
              git rebase origin/main
              sleep $((attempt * 5))
            done

            printf '%s\n' "::error::Failed to push append updates after retries."
            exit 1
          fi

      - name: Dispatch native OTS anchor workflow
        if: steps.append_commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          printf '%s\n' "Dispatching Record Chain Head OTS Anchor on main"
          gh workflow run record-chain-head-ots-anchor.yml --repo "$GITHUB_REPOSITORY" --ref main
