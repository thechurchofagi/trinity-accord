name: Build Source Digest Fix Artifact

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Recompute API source digests
        run: |
          python3 - <<'PY'
          import json
          import sys
          from pathlib import Path

          sys.path.insert(0, str(Path('scripts').resolve()))
          from public_metadata_utils import canonical_json_digest

          changed = []
          for path in sorted(Path('api').rglob('*.json')):
              try:
                  data = json.loads(path.read_text(encoding='utf-8'))
              except Exception:
                  continue
              if not isinstance(data, dict) or 'source_digest' not in data:
                  continue
              expected = canonical_json_digest(path, ignored_fields={'source_digest'})[:16]
              if str(data['source_digest']) == expected:
                  continue
              data['source_digest'] = expected
              path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
              changed.append(str(path))
          Path('changed-source-digest-files.txt').write_text('\n'.join(changed) + '\n', encoding='utf-8')
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: source-digest-fix
          path: |
            api
            changed-source-digest-files.txt
