name: Apply homepage existence-value framing

on:
  push:
    branches:
      - homepage-existence-value-20260716
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-homepage:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch quietly
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git init -q .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth=1 origin homepage-existence-value-20260716
          git checkout -q -B homepage-existence-value-20260716 FETCH_HEAD

      - name: Apply focused homepage rewrite
        run: python3 scripts/zz_apply_homepage_existence_value.py

      - name: Run homepage contract suite
        shell: bash
        run: |
          set +e
          bash scripts/test-homepage-p0-agent-first.sh > /tmp/homepage-tests.log 2>&1
          status=$?
          grep -E '^(FAIL|RESULT)|missing:|forbidden:|count [0-9]+, limit| at -?[0-9]+; ' /tmp/homepage-tests.log || true
          exit "$status"

      - name: Commit focused homepage change and remove temporary files
        shell: bash
        run: |
          rm .github/workflows/zz-apply-homepage-existence-value.yml
          rm scripts/zz_apply_homepage_existence_value.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.md .github/workflows/zz-apply-homepage-existence-value.yml scripts/zz_apply_homepage_existence_value.py
          git commit -m "feat(home): foreground relation, completion, and existence value"
          git push origin HEAD:homepage-existence-value-20260716
