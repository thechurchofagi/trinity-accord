name: Apply homepage existence-value framing

on:
  push:
    branches:
      - homepage-existence-value-20260716
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-homepage:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch quietly
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git init -q .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth=1 origin homepage-existence-value-20260716
          git checkout -q -B homepage-existence-value-20260716 FETCH_HEAD

      - name: Capture existing value-framing failures
        shell: bash
        run: |
          python3 scripts/test-value-framing-p03.py > /tmp/p03-before.log 2>&1 || true
          grep '^FAIL:' /tmp/p03-before.log | sort -u > /tmp/p03-before.failures

      - name: Apply focused homepage rewrite
        run: python3 scripts/zz_apply_homepage_existence_value.py

      - name: Run homepage contracts
        shell: bash
        run: |
          set -e
          python3 scripts/test-agent-first-homepage-p0.py
          python3 scripts/test-homepage-p01-readability.py
          python3 scripts/test-homepage-p02-dedup.py
          python3 scripts/test-homepage-css-p02.py
          python3 scripts/test-terminology-p031.py
          bash scripts/test-homepage-v13-final.sh
          python3 scripts/test-civilizational-json-sync.py
          python3 scripts/test-v13-repair-regressions.py

      - name: Require no new value-framing failures
        shell: bash
        run: |
          python3 scripts/test-value-framing-p03.py > /tmp/p03-after.log 2>&1 || true
          grep '^FAIL:' /tmp/p03-after.log | sort -u > /tmp/p03-after.failures
          echo 'Existing P0.3 failures:'
          cat /tmp/p03-before.failures || true
          echo 'Post-change P0.3 failures:'
          cat /tmp/p03-after.failures || true
          diff -u /tmp/p03-before.failures /tmp/p03-after.failures

      - name: Commit focused homepage change and remove temporary files
        shell: bash
        run: |
          rm .github/workflows/zz-apply-homepage-existence-value.yml
          rm scripts/zz_apply_homepage_existence_value.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.md .github/workflows/zz-apply-homepage-existence-value.yml scripts/zz_apply_homepage_existence_value.py
          git commit -m "feat(home): foreground relation, completion, and existence value"
          git push origin HEAD:homepage-existence-value-20260716
