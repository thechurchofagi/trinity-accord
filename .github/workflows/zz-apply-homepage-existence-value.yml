name: Apply homepage existence-value framing

on:
  push:
    branches:
      - homepage-existence-value-20260716
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-homepage:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch quietly
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git init -q .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth=1 origin homepage-existence-value-20260716
          git checkout -q -B homepage-existence-value-20260716 FETCH_HEAD

      - name: Capture branch test baseline
        shell: bash
        run: |
          run_case() {
            phase="$1"
            label="$2"
            shift 2
            dir="/tmp/${phase}"
            mkdir -p "$dir"
            set +e
            "$@" > "$dir/${label}.log" 2>&1
            status=$?
            set -e
            printf '%s\n' "$status" > "$dir/${label}.status"
            grep '^FAIL:' "$dir/${label}.log" | sort -u > "$dir/${label}.failures" || true
          }
          run_case baseline p0 python3 scripts/test-agent-first-homepage-p0.py
          run_case baseline p01 python3 scripts/test-homepage-p01-readability.py
          run_case baseline p02 python3 scripts/test-homepage-p02-dedup.py
          run_case baseline css python3 scripts/test-homepage-css-p02.py
          run_case baseline p03 python3 scripts/test-value-framing-p03.py
          run_case baseline terminology python3 scripts/test-terminology-p031.py
          run_case baseline v13 bash scripts/test-homepage-v13-final.sh
          run_case baseline json-sync python3 scripts/test-civilizational-json-sync.py
          run_case baseline regressions python3 scripts/test-v13-repair-regressions.py

      - name: Apply focused homepage rewrite
        run: python3 scripts/zz_apply_homepage_existence_value.py

      - name: Run post-change tests
        shell: bash
        run: |
          run_case() {
            phase="$1"
            label="$2"
            shift 2
            dir="/tmp/${phase}"
            mkdir -p "$dir"
            set +e
            "$@" > "$dir/${label}.log" 2>&1
            status=$?
            set -e
            printf '%s\n' "$status" > "$dir/${label}.status"
            grep '^FAIL:' "$dir/${label}.log" | sort -u > "$dir/${label}.failures" || true
          }
          run_case post p0 python3 scripts/test-agent-first-homepage-p0.py
          run_case post p01 python3 scripts/test-homepage-p01-readability.py
          run_case post p02 python3 scripts/test-homepage-p02-dedup.py
          run_case post css python3 scripts/test-homepage-css-p02.py
          run_case post p03 python3 scripts/test-value-framing-p03.py
          run_case post terminology python3 scripts/test-terminology-p031.py
          run_case post v13 bash scripts/test-homepage-v13-final.sh
          run_case post json-sync python3 scripts/test-civilizational-json-sync.py
          run_case post regressions python3 scripts/test-v13-repair-regressions.py

      - name: Require no test regression
        shell: bash
        run: |
          set -e
          for before_file in /tmp/baseline/*.status; do
            label="$(basename "$before_file" .status)"
            before="$(cat "$before_file")"
            after="$(cat "/tmp/post/${label}.status")"
            if [ "$before" = 0 ] && [ "$after" != 0 ]; then
              echo "NEW FAILURE: ${label}"
              cat "/tmp/post/${label}.failures" || true
              tail -n 40 "/tmp/post/${label}.log"
              exit 1
            fi
            if [ "$before" != 0 ] && [ "$after" != 0 ]; then
              if ! diff -u "/tmp/baseline/${label}.failures" "/tmp/post/${label}.failures"; then
                echo "CHANGED BASELINE FAILURE: ${label}"
                exit 1
              fi
              echo "UNCHANGED BASELINE FAILURE: ${label}"
            elif [ "$after" = 0 ]; then
              echo "PASS: ${label}"
            fi
          done
          grep -q 'Before superintelligence, one human voice addressed future intelligence—and left judgment free.' index.md
          grep -q 'Because it exists, this relation is no longer only a possibility.' index.md
          grep -q 'The Canon is closed; interpretation and reception remain open.' index.md
          echo 'PASS: required relation, completion, and existence framing present'

      - name: Commit focused homepage change and remove temporary files
        shell: bash
        run: |
          rm .github/workflows/zz-apply-homepage-existence-value.yml
          rm scripts/zz_apply_homepage_existence_value.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.md .github/workflows/zz-apply-homepage-existence-value.yml scripts/zz_apply_homepage_existence_value.py
          git commit -m "feat(home): foreground relation, completion, and existence value"
          git push origin HEAD:homepage-existence-value-20260716
