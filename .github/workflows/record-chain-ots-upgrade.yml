name: Upgrade OpenTimestamps Proofs

on:
  workflow_dispatch:
  schedule:
    - cron: "11 */6 * * *"

permissions:
  contents: write

jobs:
  ots-upgrade:
    runs-on: ubuntu-24.04
    # Authorize write workflow actor
    if: github.event_name != 'workflow_dispatch' || github.actor == 'github-actions[bot]' || contains(format(',{0},', vars.GUARDIAN_REGISTRY_WORKFLOW_ACTORS || 'thechurchofagi'), format(',{0},', github.actor))
    steps:
      - name: Authorize write workflow actor
        if: github.event_name == 'workflow_dispatch'
        env:
          ACTOR: ${{ github.actor }}
          GUARDIAN_REGISTRY_WORKFLOW_ACTORS: ${{ vars.GUARDIAN_REGISTRY_WORKFLOW_ACTORS }}
        run: |
          ALLOWLIST="${GUARDIAN_REGISTRY_WORKFLOW_ACTORS:-thechurchofagi}"

          if [ "$ACTOR" = "github-actions[bot]" ]; then
            echo "Authorized actor: $ACTOR"
            exit 0
          fi

          case ",$ALLOWLIST," in
            *",$ACTOR,"*)
              echo "Authorized actor: $ACTOR"
              ;;
            *)
              echo "Unauthorized actor for write workflow: $ACTOR"
              echo "Set repository variable GUARDIAN_REGISTRY_WORKFLOW_ACTORS to a comma-separated allowlist."
              exit 1
              ;;
          esac
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - run: pip install opentimestamps-client
      - run: python scripts/trinity_record_chain.py ots-upgrade
      - run: |
          if ! git diff --quiet; then
            git config user.name "trinity-ots-bot"
            git config user.email "actions@github.com"
            git add record-chain/
            git commit -m "Upgrade record-chain OTS proofs"
            git push
          fi
