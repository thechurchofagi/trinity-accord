name: Arweave wallet status update

on:
  workflow_dispatch:
    inputs:
      balance_ar:
        description: "Last known AR wallet balance"
        required: true
        type: string
      wallet_address_sha256:
        description: "SHA256 of public AR wallet address"
        required: false
        type: string
      low_balance_threshold_ar:
        description: "Low balance threshold in AR"
        required: false
        default: "0.25"
        type: string

permissions:
  contents: write

concurrency:
  group: main-write-lock
  queue: max
  cancel-in-progress: false

env:
  INPUT_BALANCE_AR: ${{ inputs.balance_ar }}
  INPUT_LOW_BALANCE_THRESHOLD_AR: ${{ inputs.low_balance_threshold_ar }}
  INPUT_WALLET_ADDRESS_SHA256: ${{ inputs.wallet_address_sha256 }}

jobs:
  update-wallet-status:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Authorize write workflow actor
        env:
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          if [[ "$ACTOR" != "thechurchofagi" && "$ACTOR" != "github-actions[bot]" ]]; then
            echo "Unauthorized actor: $ACTOR" >&2
            exit 1
          fi
          echo "Authorized actor: $ACTOR"

      - name: Checkout current main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: main

      - name: Record toolchain provenance
        run: |
          python3 scripts/toolchain_provenance.py > "$RUNNER_TEMP/toolchain-provenance.json"
          cat "$RUNNER_TEMP/toolchain-provenance.json"

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Rebase current main before updating balance
        run: |
          set -euo pipefail
          git fetch origin main --prune
          git rebase origin/main

      - name: Update wallet balance snapshot
        run: |
          set -euo pipefail
          args=(
            python3 scripts/update_arweave_wallet_ledger.py set-balance
            --balance-ar "$INPUT_BALANCE_AR"
            --low-balance-threshold-ar "$INPUT_LOW_BALANCE_THRESHOLD_AR"
          )
          if [ -n "$INPUT_WALLET_ADDRESS_SHA256" ]; then
            args+=(--wallet-address-sha256 "$INPUT_WALLET_ADDRESS_SHA256")
          fi
          "${args[@]}"

      - name: Commit wallet status update to main
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          regenerate_and_stage() {
            python3 scripts/generate_arweave_wallet_status.py
            python3 scripts/generate_arweave_wallet_status.py --check
            git add \
              record-chain/arweave-wallet-ledger.json \
              api/arweave-wallet-status.json
            git diff --cached --check
          }

          regenerate_and_stage
          if git diff --cached --quiet; then
            echo "No wallet status changes to commit."
            exit 0
          fi

          git commit -m "ops: update arweave wallet status"
          if [ -n "$(git status --porcelain --untracked-files=no)" ]; then
            echo "::error::Tracked wallet status changes remain after commit."
            git status --short
            exit 1
          fi

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi

            echo "Push failed on attempt ${attempt}; rebasing and regenerating wallet status."
            git fetch origin main --prune
            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "::error::Wallet ledger changed concurrently; refusing to guess the correct balance merge."
              exit 1
            fi

            regenerate_and_stage
            if ! git diff --cached --quiet; then
              git commit --amend --no-edit
            fi
            sleep $((attempt * 5))
          done

          echo "::error::Failed to push wallet status update after retries."
          exit 1
