name: Temporary PR655 finalize tests and sitemap

on:
  push:
    branches:
      - agent/verification-model-cleanup

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/verification-model-cleanup
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Add procedure regression test to current suite
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('scripts/run_current_system_tests.py')
          text = path.read_text(encoding='utf-8')
          anchor = '        "tests/test_interpretation_and_verification_migration.py",\n        "scripts/test_builder_multidimensional_verification.py",'
          replacement = '        "tests/test_interpretation_and_verification_migration.py",\n        "tests/test_verification_procedure_model.py",\n        "scripts/test_builder_multidimensional_verification.py",'
          if replacement not in text:
              if anchor not in text:
                  raise SystemExit('current-test insertion anchor not found')
              text = text.replace(anchor, replacement, 1)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Regenerate sitemap
        run: python3 scripts/generate_sitemap.py
      - name: Remove temporary workflow
        run: rm -f .github/workflows/temp-pr655-finalize-tests-sitemap.yml
      - name: Commit permanent finalization
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "trinity-accord-verification-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "test: enforce verification procedures and refresh sitemap"
          git push origin HEAD:agent/verification-model-cleanup
