name: Apply Workflow Dispatch Input Hardening

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/harden-workflow-dispatch-inputs'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: agent/harden-workflow-dispatch-inputs
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Install CI dependencies
        run: python -m pip install -r requirements-ci.txt
      - name: Apply systematic workflow hardening
        run: |
          set -euo pipefail
          python audit/harden_workflow_dispatch_inputs.py
          rm -f audit/harden_workflow_dispatch_inputs.py
          rm -f .github/workflows/apply-workflow-input-hardening.yml
      - name: Validate workflow YAML and shell-input gate
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import yaml
          for path in Path('.github/workflows').glob('*.y*ml'):
              yaml.safe_load(path.read_text(encoding='utf-8'))
          print('PASS: workflow YAML parses')
          PY
          python scripts/test_workflow_dispatch_input_safety.py
      - name: Validate existing workflow security contracts
        run: |
          set -euo pipefail
          python scripts/test_action_pinning.py
          python scripts/test_runner_image_pinning.py
          python scripts/test_workflow_action_pinning_contract.py
          python scripts/test_no_remote_script_execution.py
          python scripts/test_record_chain_write_path_guard_contract.py
          python scripts/test_render_manual_deploy_contract.py
          python scripts/test_operator_secret_names_contract.py
          python scripts/test_arweave_live_readiness_contract.py
          python scripts/test_p0_main_required_commands.py
      - name: Commit hardened workflows
        run: |
          set -euo pipefail
          git config user.name 'trinity-security-audit-bot'
          git config user.email 'actions@github.com'
          git add -A
          git commit -m 'Harden workflow dispatch inputs against shell injection'
          git push origin HEAD:agent/harden-workflow-dispatch-inputs
