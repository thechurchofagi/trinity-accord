name: Temporary PR655 P0 diagnostic

on:
  push:
    branches:
      - agent/verification-model-cleanup

permissions:
  contents: write

jobs:
  diagnose:
    if: ${{ !startsWith(github.event.head_commit.message, 'diagnostics:') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/verification-model-cleanup
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: ".node-version"
      - run: python3 -m pip install -r requirements-ci.txt
      - name: Persist P0 tail
        shell: bash
        run: |
          set +e
          python3 scripts/run_ci_group.py p0-current > /tmp/pr655-p0.log 2>&1
          status=$?
          mkdir -p diagnostics
          {
            echo "exit_status=${status}"
            echo "head_sha=$(git rev-parse HEAD)"
            echo "===== P0 OUTPUT TAIL ====="
            tail -n 760 /tmp/pr655-p0.log
          } > diagnostics/pr655-p0-latest.txt
          git config user.name "trinity-accord-diagnostics-bot"
          git config user.email "actions@users.noreply.github.com"
          git add diagnostics/pr655-p0-latest.txt
          git commit -m "diagnostics: capture next PR655 P0 failure"
          git push origin HEAD:agent/verification-model-cleanup

# Trigger commit after workflow creation.
