name: Pre-Scale E2E Orchestrator

on:
  workflow_dispatch:
    inputs:
      mode:
        required: true
        default: dry-run
        type: choice
        options: [dry-run, live]
      max_records:
        required: false
        default: "3"
      from_height_exclusive:
        required: false
        default: ""
      confirm:
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: pre-scale-e2e-orchestrator
  cancel-in-progress: false

jobs:
  orchestrate:
    runs-on: ubuntu-24.04
    env:
      ARKEY: ${{ secrets.ARKEY }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Install deps
        run: |
          pip install opentimestamps-client
          npm ci || npm install

      - name: Guard live mode
        if: inputs.mode == 'live'
        run: |
          test "${{ inputs.confirm }}" = "I_UNDERSTAND_THIS_RUNS_PRE_SCALE_E2E_AUTOMATION"
          test -n "$ARKEY"

      - name: Capture head before
        id: before
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
import json
h=json.load(open("api/record-chain-head.json"))
print("height=" + str(h["height"]))
print("head=" + h["head_entry_hash"])
PY

      - name: Auto finalize accepted submissions
        run: |
          python3 scripts/auto_finalize_accepted_submissions.py \
            --max-records "${{ inputs.max_records }}" \
            --source-run-id "pre-scale-e2e-${{ github.run_id }}" \
            --mode "${{ inputs.mode }}" \
            | tee /tmp/auto-finalize-summary.json

      - name: Verify chain after finalization
        run: |
          python3 scripts/trinity_record_chain.py verify
          python3 scripts/verify_record_chain_integrity.py \
            --ledger record-chain/hash-chain/main.chain.jsonl \
            --head api/record-chain-head.json \
            --chain-id trinity-record-chain-main \
            --verify-payload-files \
            --base-dir .

      - name: Build data bundle
        id: data_bundle
        run: |
          BEFORE="${{ inputs.from_height_exclusive }}"
          if [ -z "$BEFORE" ]; then BEFORE="${{ steps.before.outputs.height }}"; fi
          AFTER=$(python3 - <<'PY'
import json
print(json.load(open("api/record-chain-head.json"))["height"])
PY
)
          if [ "$BEFORE" = "$AFTER" ]; then
            python3 scripts/build_record_chain_data_arweave_bundle.py \
              --mode snapshot \
              --height "$AFTER" | tee /tmp/data-build.json
          else
            python3 scripts/build_record_chain_data_arweave_bundle.py \
              --mode delta \
              --from-height-exclusive "$BEFORE" \
              --to-height-inclusive "$AFTER" | tee /tmp/data-build.json
          fi
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
import json
obj=json.load(open("/tmp/data-build.json"))
print("bundle_file=" + obj["bundle_file"])
PY

      - name: Upload data bundle live
        if: inputs.mode == 'live'
        run: |
          mkdir -p /tmp/arweave-data
          printf '%s' "$ARKEY" > /tmp/arweave-data/wallet.jwk.json
          chmod 600 /tmp/arweave-data/wallet.jwk.json
          export ARWEAVE_JWK_PATH=/tmp/arweave-data/wallet.jwk.json
          node scripts/arweave_upload_payload.mjs \
            --payload "${{ steps.data_bundle.outputs.bundle_file }}" \
            --out /tmp/data-arweave-upload-result.json
          python3 scripts/update_record_chain_data_arweave_registry.py \
            --bundle-file "${{ steps.data_bundle.outputs.bundle_file }}" \
            --upload-result-json /tmp/data-arweave-upload-result.json \
            --mode live

      - name: Update data registry dry-run
        if: inputs.mode != 'live'
        run: |
          python3 scripts/update_record_chain_data_arweave_registry.py \
            --bundle-file "${{ steps.data_bundle.outputs.bundle_file }}" \
            --mode dry-run

      - name: Verify data registry
        run: |
          python3 scripts/verify_record_chain_data_arweave_registry.py \
            --registry record-chain/arweave-data-registry.json \
            --verify-local-bundles

      - name: Stamp current head if needed
        run: |
          python3 - <<'PY'
import json
import subprocess
import sys
from pathlib import Path
head=json.load(open("api/record-chain-head.json"))
ots_path=Path("api/record-chain-ots-latest.json")
ots=json.load(open(ots_path)) if ots_path.exists() else {}
matched=ots.get("height")==head.get("height") and ots.get("head_entry_hash")==head.get("head_entry_hash")
if matched:
    print("OTS latest already matches current head.")
else:
    subprocess.check_call([
        sys.executable,
        "scripts/ots_anchor_record_chain_head.py",
        "--mode", "stamp",
        "--verify-ledger",
        "--base-dir", ".",
        "--overwrite",
    ])
PY

      - name: Upload OTS bundle live via Phase 5 script
        if: inputs.mode == 'live'
        run: |
          mkdir -p /tmp/arweave-ots
          printf '%s' "$ARKEY" > /tmp/arweave-ots/wallet.jwk.json
          chmod 600 /tmp/arweave-ots/wallet.jwk.json
          python3 scripts/run_phase5_ots_arweave_paid_upload.py \
            --jwk-path /tmp/arweave-ots/wallet.jwk.json \
            --confirm-paid-upload I_UNDERSTAND_THIS_UPLOADS_THE_OTS_PROOF_BUNDLE_TO_ARWEAVE

      - name: Verify OTS registry if live
        if: inputs.mode == 'live'
        run: |
          python3 scripts/verify_ots_arweave_registry.py \
            --registry record-chain/ots/arweave-registry.json \
            --verify-local-bundles

      - name: Final tests
        run: |
          python3 scripts/verify_record_chain_integrity.py \
            --ledger record-chain/hash-chain/main.chain.jsonl \
            --head api/record-chain-head.json \
            --chain-id trinity-record-chain-main \
            --verify-payload-files \
            --base-dir .
          python3 scripts/run_current_system_tests.py

      - name: Commit orchestrated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add record-chain api
          if git diff --cached --quiet; then
            echo "No orchestrator changes."
          else
            git commit -m "automation: pre-scale e2e archive and anchor"
            git push
          fi
