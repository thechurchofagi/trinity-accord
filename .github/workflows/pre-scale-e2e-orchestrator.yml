name: Pre-Scale E2E Orchestrator

on:
  workflow_dispatch:
    inputs:
      mode:
        required: true
        default: dry-run
        type: string
      max_records:
        required: false
        default: "3"
        type: string
      from_height_exclusive:
        required: false
        default: ""
        type: string
      confirm:
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  orchestrate:
    runs-on: ubuntu-24.04
    steps:
      - run: echo "test dispatch with string inputs"
