name: Backup NFTs Individually v2

on:
  workflow_dispatch:
    inputs:
      contract:
        description: 'Contract address filter (empty = all)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (list only)'
        type: boolean
        default: false

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Backup NFTs individually v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONTRACT: ${{ inputs.contract }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          ARGS=()
          if [ -n "$CONTRACT" ]; then
            if [[ ! "$CONTRACT" =~ ^0x[a-fA-F0-9]{40}$ ]]; then
              echo "Invalid contract address: $CONTRACT"
              exit 1
            fi
            ARGS+=(--contract "$CONTRACT")
          fi
          if [ "$DRY_RUN" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          node scripts/backup-nft-individual-v2.mjs "${ARGS[@]}"
