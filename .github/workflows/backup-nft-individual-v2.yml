name: NFT Individual Backup v2 Read-Only Audit

on:
  workflow_dispatch:
    inputs:
      contract:
        description: "Contract address filter for v2 selection preview"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  audit:
    if: ${{ github.ref == 'refs/heads/main' && (github.actor == 'thechurchofagi' || github.actor == 'github-actions[bot]') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout current main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: main

      - name: Record toolchain provenance
        run: |
          python3 scripts/toolchain_provenance.py > "$RUNNER_TEMP/toolchain-provenance.json"
          cat "$RUNNER_TEMP/toolchain-provenance.json"

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version-file: ".node-version"

      - name: Inspect v2 selection without publishing
        env:
          INPUT_CONTRACT: ${{ inputs.contract }}
        run: |
          set -euo pipefail
          args=(--dry-run)
          if [ -n "$INPUT_CONTRACT" ]; then
            [[ "$INPUT_CONTRACT" =~ ^0x[a-fA-F0-9]{40}$ ]] || {
              echo "Invalid contract address: $INPUT_CONTRACT" >&2
              exit 1
            }
            args+=(--contract "$INPUT_CONTRACT")
          fi
          echo "v2 publishing is disabled until every cached/downloaded CAR is hash-and-size verified and incomplete runs fail closed."
          node scripts/backup-nft-individual-v2.mjs "${args[@]}"
