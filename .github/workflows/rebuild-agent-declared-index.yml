name: Rebuild Agent-Declared Verification Index

on:
  issues:
    types: [closed]
  workflow_dispatch:
    inputs:
      include_test:
        description: 'Include test records'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  issues: read
  actions: write

concurrency:
  group: main-write-lock
  queue: max
  cancel-in-progress: false

jobs:
  rebuild-index:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Authorize write workflow actor
        env:
          ACTOR: ${{ github.actor }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [[ "$ACTOR" == "thechurchofagi" || "$ACTOR" == "github-actions[bot]" ]]; then
            echo "Authorized actor: $ACTOR"
          elif [[ "$ACTOR" == "trinity-accord-agent-issue-gateway[bot]" && "$EVENT_NAME" == "issues" ]]; then
            echo "Authorized Gateway bot issue event: $ACTOR"
          else
            echo "Unauthorized actor for write workflow: $ACTOR" >&2
            exit 1
          fi

      - name: Validate issue event
        id: gate
        if: github.event_name == 'issues'
        env:
          ACTION: ${{ github.event.action }}
        run: |
          set -euo pipefail
          if [ "$ACTION" = "closed" ]; then
            echo "Issue closed — rebuilding index."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported issue action: $ACTION — skipping rebuild."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout current main
        if: ${{ github.event_name == 'workflow_dispatch' || steps.gate.outputs.should_run == 'true' }}
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Python
        if: ${{ github.event_name == 'workflow_dispatch' || steps.gate.outputs.should_run == 'true' }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Record toolchain provenance
        if: ${{ github.event_name == 'workflow_dispatch' || steps.gate.outputs.should_run == 'true' }}
        run: |
          python3 scripts/toolchain_provenance.py > "$RUNNER_TEMP/toolchain-provenance.json"
          cat "$RUNNER_TEMP/toolchain-provenance.json"

      - name: Verify gh CLI
        if: ${{ github.event_name == 'workflow_dispatch' || steps.gate.outputs.should_run == 'true' }}
        run: |
          set -euo pipefail
          command -v gh >/dev/null
          gh --version

      - name: Rebase current main before index generation
        if: ${{ github.event_name == 'workflow_dispatch' || steps.gate.outputs.should_run == 'true' }}
        run: |
          set -euo pipefail
          git fetch origin main --prune
          git rebase origin/main

      - name: Rebuild, commit, and push index
        id: push
        if: ${{ github.event_name == 'workflow_dispatch' || steps.gate.outputs.should_run == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          INCLUDE_TEST: ${{ inputs.include_test }}
        run: |
          set -euo pipefail
          printf '%s\n' "pushed=false" >> "$GITHUB_OUTPUT"

          args=(
            python3 scripts/build_agent_declared_verification_index_from_issues.py
            --repo "$GITHUB_REPOSITORY"
          )
          if [ "${INCLUDE_TEST:-false}" = "true" ]; then
            args+=(--include-test)
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          rebuild_and_stage() {
            "${args[@]}"
            git add api/agent-declared-verification-index.json
            git diff --cached --check
          }

          rebuild_and_stage
          if git diff --cached --quiet; then
            echo "Agent-declared verification index is already current."
            exit 0
          fi

          git commit -m "chore: rebuild agent-declared verification index from Issues [skip ci]"
          if [ -n "$(git status --porcelain --untracked-files=no)" ]; then
            echo "::error::Tracked index changes remain outside the commit."
            git status --short
            exit 1
          fi

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              printf '%s\n' "pushed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Push failed on attempt ${attempt}; rebasing and rebuilding the issue-derived index."
            git fetch origin main --prune
            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "::error::Index source or projection changed concurrently; rebuild must restart."
              exit 1
            fi

            rebuild_and_stage
            if ! git diff --cached --quiet; then
              git commit --amend --no-edit
            fi
            if [ -n "$(git status --porcelain --untracked-files=no)" ]; then
              echo "::error::Rebased issue index left tracked drift."
              git status --short
              exit 1
            fi
            sleep $((attempt * 5))
          done

          echo "::error::Failed to push agent-declared verification index after retries."
          exit 1

      - name: Trigger Deploy Pages
        if: steps.push.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "Dispatching Deploy Pages on main."
          gh workflow run deploy-pages.yml --repo "$GITHUB_REPOSITORY" --ref main
