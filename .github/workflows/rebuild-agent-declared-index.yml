name: Rebuild Agent-Declared Verification Index

on:
  # Trigger when an issue is closed (completed or not)
  issues:
    types: [closed]
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      include_test:
        description: 'Include test records'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  issues: read

jobs:
  rebuild-index:
    runs-on: ubuntu-24.04
    steps:
      - name: Record toolchain provenance
        run: |
          python3 scripts/toolchain_provenance.py > toolchain-provenance.json
          cat toolchain-provenance.json

      - name: Authorize write workflow actor
        env:
          ACTOR: ${{ github.actor }}
          EVENT_NAME: ${{ github.event_name }}
          SENDER: ${{ github.event.sender.login }}
        run: |
          set -euo pipefail
          case "$ACTOR" in
            thechurchofagi|github-actions[bot])
              echo "Authorized actor: $ACTOR"
              ;;
            trinity-accord-agent-issue-gateway\[bot\])
              if [ "$EVENT_NAME" = "issues" ]; then
                echo "Authorized Gateway bot issue event: $ACTOR"
              else
                echo "Gateway bot is only authorized for issues events, got: $EVENT_NAME"
                exit 1
              fi
              ;;
            *)
              echo "Unauthorized actor for write workflow: $ACTOR"
              exit 1
              ;;
          esac
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            case "$SENDER" in
              thechurchofagi|github-actions[bot])
                echo "Authorized repository_dispatch sender: $SENDER"
                ;;
              *)
                echo "Unauthorized repository_dispatch sender: $SENDER"
                exit 1
                ;;
            esac
          fi

      - name: Validate issue event
        if: github.event_name == 'issues'
        env:
          ACTION: ${{ github.event.action }}
        run: |
          set -euo pipefail
          if [ "$ACTION" != "closed" ]; then
            echo "Only closed issue events may rebuild the agent-declared index."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install gh CLI
        run: |
          (type -p wget >/dev/null || (apt update && apt-get install wget -y)) \
          && mkdir -p -m 755 /etc/apt/keyrings \
          && wget -qO- https://cli.github.com/packages/githubcli-archive-keyring.gpg | tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null \
          && chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg \
          && echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
          && apt update \
          && apt install gh -y

      - name: Authenticate gh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh auth setup-git

      - name: Rebuild index from Issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INCLUDE_TEST: ${{ inputs.include_test }}
        run: |
          EXTRA_ARGS=""
          if [ "$INCLUDE_TEST" = "true" ]; then
            EXTRA_ARGS="--include-test"
          fi
          python3 scripts/build_agent_declared_verification_index_from_issues.py \
            --repo "${{ github.repository }}" \
            $EXTRA_ARGS

      - name: Regenerate homepage status
        run: python3 scripts/generate_public_home_status.py

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet api/agent-declared-verification-index.json api/public-home-status.json index.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add api/agent-declared-verification-index.json api/public-home-status.json index.md
          git commit -m "chore: rebuild agent-declared verification index from Issues [skip ci]"
          git push
