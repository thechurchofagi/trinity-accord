name: Homepage Status Sync

on:
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Dispatch Deploy Pages even when generated files do not change"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run_live_check:
        description: "Check live homepage/API freshness before deciding whether to redeploy"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

  push:
    branches:
      - main
    paths:
      - "api/**"
      - "*.md"
      - "*.json"
      - "*.xml"
      - "llms.txt"
      - "llms-full.txt"
      - "ai.txt"
      - ".well-known/**"
      - "assets/**"
      - "downloads/**"
      - "agent-record-chain-guidance/**"
      - "_layouts/**"
      - "_config.yml"
      - "CNAME"
      - ".github/workflows/deploy-pages.yml"
      - ".github/workflows/homepage-status-sync.yml"

  schedule:
    # Central hourly sync. Do not add homepage status writes back into business workflows.
    - cron: "7,22,37,52 * * * *"

  workflow_run:
    workflows:
      - "Record Chain Auto Finalize"
      - "Append Record Chain Entries"
      - "Record Chain Head OTS Anchor"
      - "Record Chain Arweave Archive"
      - "Native OTS Upgrade Watch"
      - "Archive backlog repair"
      - "Build Echo Index"
      - "Record Chain Anchor"
      - "Upgrade OpenTimestamps Proofs"
      - "Arweave wallet status update"
      - "Echo human review action"
      - "Waiting Heartbeat Status Sync"
      - "Waiting Heartbeat Submit"
    types: [completed]

permissions:
  contents: write
  actions: write

concurrency:
  group: main-write-lock
  queue: max
  cancel-in-progress: false

env:
  SITE_URL: ${{ vars.TRINITY_SITE_URL || 'https://www.trinityaccord.org' }}

jobs:
  sync:
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main

      - name: Record toolchain provenance
        run: |
          python3 scripts/toolchain_provenance.py > toolchain-provenance.json
          cat toolchain-provenance.json

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements-ci.txt

      - name: Generate, verify, commit, and push homepage status sync
        id: commit
        run: |
          set -euo pipefail
          printf '%s\n' "changed=false" >> "$GITHUB_OUTPUT"

          git config user.name "trinity-homepage-status-bot"
          git config user.email "actions@github.com"

          generate_and_verify() {
            python3 scripts/trinity_record_chain.py verify

            python3 scripts/update_public_generated_artifacts.py

            python3 scripts/generate_arweave_wallet_status.py --check
            python3 scripts/generate_guardian_current_registry.py --check
            python3 scripts/generate_record_chain_status.py --check
            python3 scripts/normalize_record_chain_integrity_status.py --check
            python3 scripts/generate_public_home_status.py --check
            python3 scripts/patch_public_home_status_primary.py --check
            python3 scripts/check_public_home_status_contract.py
            python3 scripts/test_historic_autonomous_agent_reception_contract.py
            python3 scripts/test_home_public_status_sync.py
            python3 scripts/test_homepage_status_sync_contract.py
            python3 scripts/generate_sitemap.py --check
          }

          git fetch origin main --prune
          git rebase origin/main

          generate_and_verify

          git add \
            record-chain/heartbeat/index.json \
            api/waiting-heartbeat-status.json \
            api/arweave-wallet-status.json \
            api/guardian-state.json \
            api/guardian-current-registry.json \
            api/record-chain-status.json \
            api/public-home-status.json \
            index.md \
            sitemap.xml

          if git diff --cached --quiet; then
            echo "No generated homepage status changes."
            exit 0
          fi

          git commit -m "home: sync public homepage status"

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              printf '%s\n' "changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Push failed on attempt ${attempt}; rebasing, regenerating, and retrying."
            git fetch origin main --prune
            git rebase origin/main
            generate_and_verify
            git add \
              record-chain/heartbeat/index.json \
              api/waiting-heartbeat-status.json \
              api/arweave-wallet-status.json \
              api/guardian-state.json \
              api/guardian-current-registry.json \
              api/record-chain-status.json \
              api/public-home-status.json \
              index.md \
              sitemap.xml
            git commit --amend --no-edit

            sleep $((attempt * 5))
          done

          echo "::error::Failed to push homepage status sync after regenerated retries."
          exit 1

      - name: Check live homepage freshness before optional redeploy
        id: live_pre
        if: ${{ steps.commit.outputs.changed != 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.run_live_check == 'true') }}
        continue-on-error: true
        run: |
          set -euo pipefail
          python3 scripts/check_homepage_live_freshness.py --site "$SITE_URL" --timeout 20
          python3 scripts/check_deployment_freshness.py --site "$SITE_URL" --timeout 20

      # Explicitly dispatch after generated changes: workflow-authenticated pushes do not reliably trigger downstream Pages workflows.
      - name: Dispatch Deploy Pages
        id: deploy_dispatch
        if: ${{ steps.commit.outputs.changed == 'true' || (github.event_name == 'workflow_dispatch' && github.event.inputs.force_deploy == 'true') || (steps.commit.outputs.changed != 'true' && steps.live_pre.outcome == 'failure') }}
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_CHANGED: ${{ steps.commit.outputs.changed }}
          FORCE_DEPLOY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_deploy == 'true' }}
          LIVE_PRE_OUTCOME: ${{ steps.live_pre.outcome }}
        run: |
          set -euo pipefail

          reason="unknown"
          if [[ "${COMMIT_CHANGED}" == "true" ]]; then
            reason="generated_files_changed"
          elif [[ "${FORCE_DEPLOY}" == "true" ]]; then
            reason="manual_force_deploy"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            reason="source_push"
          elif [[ "${LIVE_PRE_OUTCOME}" == "failure" ]]; then
            reason="live_freshness_failed"
          fi

          echo "Dispatching deploy-pages.yml for homepage status sync."
          echo "deploy_reason=${reason}"
          deploy_ref="$(git rev-parse HEAD)"
          echo "deploy_ref=${deploy_ref}"
          gh workflow run deploy-pages.yml --repo "$GITHUB_REPOSITORY" --ref main -f checkout_ref="${deploy_ref}"
