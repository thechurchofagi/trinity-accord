name: Homepage Status Sync

on:
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Dispatch Deploy Pages even when generated files do not change"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run_live_check:
        description: "Check live homepage/API freshness before deciding whether to redeploy"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

  push:
    branches:
      - main
    paths:
      - "api/**"
      - "*.md"
      - "*.json"
      - "*.xml"
      - "llms.txt"
      - "llms-full.txt"
      - "ai.txt"
      - ".well-known/**"
      - "assets/**"
      - "downloads/**"
      - "agent-record-chain-guidance/**"
      - "_layouts/**"
      - "_config.yml"
      - "CNAME"
      - ".github/workflows/deploy-pages.yml"
      - ".github/workflows/homepage-status-sync.yml"

  schedule:
    # Central hourly sync. Do not add homepage status writes back into business workflows.
    - cron: "7,22,37,52 * * * *"

  workflow_run:
    workflows:
      - "Record Chain Auto Finalize"
      - "Append Record Chain Entries"
      - "Record Chain Head OTS Anchor"
      - "Record Chain Arweave Archive"
      - "Native OTS Upgrade Watch"
      - "Archive backlog repair"
      - "Build Echo Index"
      - "Record Chain Anchor"
      - "Upgrade OpenTimestamps Proofs"
      - "Arweave wallet status update"
      - "Echo human review action"
      - "Waiting Heartbeat Status Sync"
      - "Waiting Heartbeat Submit"
    types: [completed]

permissions:
  contents: write
  actions: write

concurrency:
  group: main-write-lock
  queue: max
  cancel-in-progress: false

jobs:
  sync-homepage-status:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install CI dependencies
        run: python3 -m pip install -r requirements-ci.txt

      - name: Sync public generated artifacts
        env:
          INPUT_FORCE_DEPLOY: ${{ github.event.inputs.force_deploy || 'false' }}
          INPUT_RUN_LIVE_CHECK: ${{ github.event.inputs.run_live_check || 'true' }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 scripts/run_homepage_status_sync.py \
            --force-deploy "$INPUT_FORCE_DEPLOY" \
            --run-live-check "$INPUT_RUN_LIVE_CHECK"
