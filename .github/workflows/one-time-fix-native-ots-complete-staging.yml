name: One-time fix Native OTS complete staging

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-time-fix-native-ots-complete-staging.yml

permissions:
  contents: write
  actions: write

concurrency:
  group: native-ots-staging-hotfix
  cancel-in-progress: false

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout current main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Rebase before patch
        run: |
          set -euo pipefail
          git fetch origin main --prune
          git rebase origin/main

      - name: Patch complete Native OTS generated-state staging
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          workflow_path = Path('.github/workflows/native-ots-upgrade-watch.yml')
          workflow = workflow_path.read_text(encoding='utf-8')

          volatile_old = (
              '              --path api/record-chain-native-ots-backlog.json \\\n'
              '              --path api/arweave-wallet-status.json \\\n'
          )
          volatile_new = (
              '              --path api/record-chain-native-ots-backlog.json \\\n'
              '              --path record-chain/arweave-backlog.json \\\n'
              '              --path api/record-chain-arweave-backlog.json \\\n'
              '              --path api/arweave-wallet-status.json \\\n'
          )
          count = workflow.count(volatile_old)
          if count != 2:
              raise SystemExit(f'expected two volatile restore blocks, found {count}')
          workflow = workflow.replace(volatile_old, volatile_new)

          tracked_old = (
              '              record-chain/ots/native-ots-backlog.json \\\n'
              '              record-chain/arweave-wallet-ledger.json \\\n'
          )
          tracked_new = (
              '              record-chain/ots/native-ots-backlog.json \\\n'
              '              record-chain/arweave-backlog.json \\\n'
              '              record-chain/arweave-wallet-ledger.json \\\n'
          )
          if workflow.count(tracked_old) != 1:
              raise SystemExit('record-chain backlog staging insertion point changed')
          workflow = workflow.replace(tracked_old, tracked_new, 1)

          api_old = (
              '              api/arweave-wallet-status.json \\\n'
              '              api/record-chain-native-ots-arweave-registry.json \\\n'
          )
          api_new = (
              '              api/arweave-wallet-status.json \\\n'
              '              api/record-chain-arweave-backlog.json \\\n'
              '              api/record-chain-native-ots-arweave-registry.json \\\n'
          )
          if workflow.count(api_old) != 1:
              raise SystemExit('API backlog staging insertion point changed')
          workflow = workflow.replace(api_old, api_new, 1)
          workflow_path.write_text(workflow, encoding='utf-8')

          test_path = Path('scripts/test_native_ots_upgrade_workflow_contract.py')
          test = test_path.read_text(encoding='utf-8')
          markers_old = (
              '        "record-chain/ots/native-ots-backlog.json",\n'
              '        "api/record-chain-native-ots-backlog.json",\n'
              '        "record-chain/audit/native-ots/",\n'
          )
          markers_new = (
              '        "record-chain/ots/native-ots-backlog.json",\n'
              '        "api/record-chain-native-ots-backlog.json",\n'
              '        "record-chain/arweave-backlog.json",\n'
              '        "api/record-chain-arweave-backlog.json",\n'
              '        "record-chain/audit/native-ots/",\n'
          )
          if test.count(markers_old) != 1:
              raise SystemExit('workflow marker insertion point changed')
          test = test.replace(markers_old, markers_new, 1)

          contract_old = (
              '    for marker in workflow_markers:\n'
              '        require(workflow, marker, "workflow")\n\n'
              '    for marker in [\n'
          )
          contract_new = (
              '    for marker in workflow_markers:\n'
              '        require(workflow, marker, "workflow")\n\n'
              '    stage_start = workflow.index("            git add \\\\\\n", workflow.index("reconcile_and_stage()"))\n'
              '    stage_end = workflow.index("\\n\\n            while IFS=", stage_start)\n'
              '    stage_block = workflow[stage_start:stage_end]\n'
              '    for marker in [\n'
              '        "record-chain/ots/native-ots-backlog.json",\n'
              '        "api/record-chain-native-ots-backlog.json",\n'
              '        "record-chain/arweave-backlog.json",\n'
              '        "api/record-chain-arweave-backlog.json",\n'
              '    ]:\n'
              '        require(stage_block, marker, "complete generated backlog staging")\n\n'
              '    for marker in [\n'
          )
          if test.count(contract_old) != 1:
              raise SystemExit('stage-block contract insertion point changed')
          test = test.replace(contract_old, contract_new, 1)
          test_path.write_text(test, encoding='utf-8')
          PY

      - name: Run focused regression tests
        run: |
          set -euo pipefail
          python3 -m py_compile \
            scripts/reconcile_native_ots_generated_state.py \
            scripts/test_native_ots_upgrade_workflow_contract.py
          python3 scripts/test_native_ots_transaction_behavior.py
          python3 scripts/test_native_ots_upgrade_workflow_contract.py

      - name: Commit and dispatch verify-only run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "trinity-native-ots-repair-bot"
          git config user.email "actions@github.com"
          rm .github/workflows/one-time-fix-native-ots-complete-staging.yml
          git add \
            .github/workflows/native-ots-upgrade-watch.yml \
            scripts/test_native_ots_upgrade_workflow_contract.py \
            .github/workflows/one-time-fix-native-ots-complete-staging.yml
          git diff --cached --check
          git commit -m "Fix Native OTS complete backlog staging"

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              gh workflow run native-ots-upgrade-watch.yml \
                --repo "$GITHUB_REPOSITORY" \
                --ref main \
                -f mode=verify_only
              exit 0
            fi
            git fetch origin main --prune
            if ! git rebase origin/main; then
              git rebase --abort || true
              exit 1
            fi
            sleep $((attempt * 5))
          done
          exit 1
