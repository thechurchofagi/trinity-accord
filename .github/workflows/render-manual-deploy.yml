name: Render Redeploy Verification Report

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: read

jobs:
  report:
    if: github.head_ref == 'ops/render-redeploy-20260712'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          show-progress: false
      - name: Report latest Render deploy and live runtime
        env:
          RENDER: ${{ secrets.RENDER }}
        run: python scripts/render_redeploy_report_once.py
