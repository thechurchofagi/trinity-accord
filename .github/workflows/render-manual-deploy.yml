name: Render Redeploy Verification Report

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: read

jobs:
  report:
    if: github.head_ref == 'ops/render-redeploy-20260712'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Report latest Render deploy and live runtime
        env:
          RENDER: ${{ secrets.RENDER }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          token = os.environ['RENDER'].strip()
          api = 'https://api.render.com/v1'

          def api_json(path):
              req = urllib.request.Request(
                  api + path,
                  headers={'Authorization': f'Bearer {token}', 'Accept': 'application/json'},
              )
              with urllib.request.urlopen(req, timeout=60) as response:
                  return json.loads(response.read().decode('utf-8'))

          services = api_json('/services?limit=100')
          service = None
          for item in services if isinstance(services, list) else []:
              candidate = item.get('service') if isinstance(item, dict) else None
              if isinstance(candidate, dict) and candidate.get('name') == 'trinity-record-chain-gateway':
                  service = candidate
                  break
          if not service:
              raise SystemExit('trinity-record-chain-gateway not found')
          service_id = service.get('id')
          deploy_data = api_json(f'/services/{service_id}/deploys?limit=10')
          raw_items = deploy_data if isinstance(deploy_data, list) else deploy_data.get('deploys', [])
          deploys = []
          for item in raw_items[:5]:
              deploy = item.get('deploy', item) if isinstance(item, dict) else {}
              deploys.append({
                  key: deploy.get(key)
                  for key in (
                      'id', 'status', 'createdAt', 'updatedAt', 'finishedAt',
                      'commit', 'commitId', 'trigger', 'clearCache'
                  )
                  if deploy.get(key) is not None
              })

          def public_json(url, *, post=False):
              req = urllib.request.Request(
                  url,
                  data=b'{}' if post else None,
                  headers={'Content-Type': 'application/json'} if post else {},
                  method='POST' if post else 'GET',
              )
              try:
                  with urllib.request.urlopen(req, timeout=60) as response:
                      return response.status, json.loads(response.read().decode('utf-8'))
              except urllib.error.HTTPError as exc:
                  return exc.code, json.loads(exc.read().decode('utf-8'))

          preflight_status, preflight = public_json(
              'https://trinity-record-chain-gateway.onrender.com/record-chain/preflight',
              post=True,
          )
          health_status, health = public_json(
              'https://trinity-record-chain-gateway.onrender.com/healthz'
          )
          readiness_status, readiness = public_json(
              'https://trinity-record-chain-gateway.onrender.com/record-chain/readiness'
          )
          report = {
              'service': {
                  key: service.get(key)
                  for key in ('id', 'name', 'type', 'updatedAt', 'suspended')
                  if service.get(key) is not None
              },
              'latest_deploys': deploys,
              'live': {
                  'preflight_http_status': preflight_status,
                  'gateway_runtime': preflight.get('gateway_runtime'),
                  'health_http_status': health_status,
                  'health': health,
                  'readiness_http_status': readiness_status,
                  'readiness': readiness,
              },
              'pr_base_sha': os.environ.get('PR_BASE_SHA'),
              'pr_head_sha': os.environ.get('PR_HEAD_SHA'),
          }
          print('RENDER_REDEPLOY_REPORT ' + json.dumps(report, ensure_ascii=False, sort_keys=True))
          if not (
              health_status == 200
              and health.get('ok') is True
              and readiness_status == 200
              and readiness.get('ok') is True
              and readiness.get('submit_ready') is True
              and deploys
          ):
              raise SystemExit('live Render verification report is not healthy')
          PY
