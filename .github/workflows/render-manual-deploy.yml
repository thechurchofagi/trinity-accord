name: Render Manual Deploy

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Render service name"
        required: true
        default: "trinity-record-chain-gateway"
      deploy:
        description: "Actually trigger deploy"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      emergency_allow_legacy_retired_gateway:
        description: "Emergency only: allow retired legacy trinity-agent-issue-gateway deploy"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      legacy_emergency_confirm:
        description: "Type RETIRED-LEGACY-EMERGENCY to allow legacy deploy"
        required: false

permissions:
  contents: read

env:
  INPUT_SERVICE: ${{ github.event.inputs.service }}
  INPUT_DEPLOY: ${{ github.event.inputs.deploy }}
  INPUT_ALLOW_LEGACY: ${{ github.event.inputs.emergency_allow_legacy_retired_gateway }}
  INPUT_LEGACY_CONFIRM: ${{ github.event.inputs.legacy_emergency_confirm }}

jobs:
  deploy:
    # A workflow_dispatch run uses the workflow definition from the selected ref.
    # Production secrets and deployment must therefore be accepted only for main.
    if: ${{ github.ref == 'refs/heads/main' && (github.actor == 'thechurchofagi' || github.actor == 'github-actions[bot]') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout current main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: main

      - name: Authorize production deployment actor and ref
        env:
          ACTOR: ${{ github.actor }}
          REF_NAME: ${{ github.ref }}
        run: |
          set -euo pipefail
          test "$REF_NAME" = "refs/heads/main"
          if [[ "$ACTOR" != "thechurchofagi" && "$ACTOR" != "github-actions[bot]" ]]; then
            echo "Unauthorized Render deployment actor: $ACTOR" >&2
            exit 1
          fi
          echo "Authorized Render deployment actor: $ACTOR on $REF_NAME"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Render manual deploy
        env:
          RENDER: ${{ secrets.RENDER }}
        run: |
          set -euo pipefail
          args=(--service "$INPUT_SERVICE")
          if [ "$INPUT_DEPLOY" = "true" ]; then
            args+=(--deploy)
          fi
          if [ "$INPUT_ALLOW_LEGACY" = "true" ] && \
             [ "$INPUT_LEGACY_CONFIRM" = "RETIRED-LEGACY-EMERGENCY" ]; then
            args+=(--allow-legacy)
          fi
          python scripts/render_manual_deploy.py "${args[@]}"
