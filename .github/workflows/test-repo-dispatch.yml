name: Test Repository Dispatch

on:
  repository_dispatch:
    types: [test_dispatch]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "✅ repository_dispatch triggered successfully!"
          echo "event_type: ${{ github.event.action }}"
          echo "payload: ${{ toJson(github.event.client_payload) }}"
