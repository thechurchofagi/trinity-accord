name: Apply Machine Entry Alignment Audit

on:
  push:
    branches:
      - machine-entry-alignment-audit
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    defaults:
      run:
        working-directory: repo
    steps:
      - name: Checkout audit branch
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone -q --depth=1 --branch machine-entry-alignment-audit \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo

      - name: Apply audited alignment changes
        run: |
          python3 scripts/apply_machine_entry_builder_alignment.py
          python3 scripts/apply_machine_entry_first_contact.py
          python3 scripts/apply_machine_entry_agent_start_doc.py
          python3 scripts/apply_quickstart_scope_fix.py
          python3 scripts/apply_quickstart_verification_flags.py
          python3 scripts/apply_quickstart_context_minimums.py
          python3 scripts/apply_machine_discovery_text_alignment.py
          python3 scripts/apply_llms_full_drift_fixes.py
          python3 scripts/apply_machine_contract_alignment.py
          python3 scripts/apply_machine_reading_router_alignment.py
          python3 scripts/apply_machine_discovery_alignment.py

      - name: Install test dependencies
        run: python3 -m pip install -q -r requirements-ci.txt

      - name: Run focused alignment tests
        env:
          PYTHONPATH: apps/record_chain_intake_gateway
        run: |
          python3 -m pytest \
            tests/test_machine_entry_runtime_alignment.py \
            tests/test_machine_entry_discovery_alignment.py \
            apps/record_chain_intake_gateway/tests/test_submit.py \
            apps/record_chain_intake_gateway/tests/test_receipt.py \
            -q --tb=short

      - name: Run Builder command smoke checks
        run: |
          node downloads/record-chain-builder.mjs help >/tmp/builder-help.txt
          grep -q -- "--digital-profile" /tmp/builder-help.txt
          grep -q -- "--corrections-or-supersession-checked" /tmp/builder-help.txt
          node downloads/record-chain-builder.mjs context-insufficient \
            --actor-label "Alignment Test" \
            --provider "CI" \
            --key-dir /tmp/trinity-alignment-key \
            --out /tmp/context-insufficient.json >/tmp/context-insufficient.log 2>&1 && exit 1 || true
          grep -q -- "--body or --body-file" /tmp/context-insufficient.log

      - name: Run complete current-system suite
        run: python3 scripts/run_current_system_tests.py

      - name: Remove one-shot audit machinery
        run: |
          rm scripts/apply_machine_entry_builder_alignment.py
          rm scripts/apply_machine_entry_docs_core.py
          rm scripts/apply_machine_entry_first_contact.py
          rm scripts/apply_machine_entry_agent_start_doc.py
          rm scripts/apply_quickstart_scope_fix.py
          rm scripts/apply_quickstart_verification_flags.py
          rm scripts/apply_quickstart_context_minimums.py
          rm scripts/apply_machine_discovery_text_alignment.py
          rm scripts/apply_llms_full_drift_fixes.py
          rm scripts/apply_machine_contract_alignment.py
          rm scripts/apply_machine_reading_router_alignment.py
          rm scripts/apply_machine_discovery_alignment.py
          rm .github/workflows/apply-machine-entry-alignment-audit.yml

      - name: Commit validated alignment
        run: |
          set -euo pipefail
          git config user.name "trinity-machine-alignment-bot"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Align machine entry documents with current runtime"
          git push origin HEAD:machine-entry-alignment-audit
