name: Temporary PR654 finalize context map

on:
  push:
    branches:
      - agent/retire-fixed-stage-and-clarify-verification

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/retire-fixed-stage-and-clarify-verification
          fetch-depth: 0
          persist-credentials: true
      - name: Finalize current context-load-map semantics
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path('api/context-load-map.json')
          data = json.loads(path.read_text(encoding='utf-8'))

          cc3 = data['cc_level_loads']['CC-3']
          cc3['must_load'] = [
              'CC-2 loads (legacy compatibility)',
              '/api/context-action-profiles.v1.json',
              '/api/interpretation-model-policy.v1.json',
              '/agent-brief/',
              'exact task-relevant sources',
              '/api/corrections-index.json',
          ]
          cc3['conditional_loads'] = {
              'corrections_index': 'Load when discussing a later record, report, correction, retirement, or supersession status.',
              'chronicle': 'Load Chronicle sources only when the claim depends on Chronicle, history, music, creative work, family witness, or human-witness context.',
              'legacy_archive': 'Load legacy archive sources only when the claim depends on archived provenance or historical website material.',
              'physical_evidence': 'Load physical-anchor, evidence, or notarial sources only when the claim depends on those dimensions.',
          }

          data['cc_action_requirements'].update({
              'verification_claim': 'CC-3 compatibility for public submission plus the verification action profile and multidimensional verification_claim_model.',
              'technical_verification_check': 'Verification action profile plus exact target sources and performed operations; CC-2 compatibility may be declared for a narrow private check.',
              'public_verification_submission': 'CC-3 compatibility plus actual loaded sources, performed actions, and the multidimensional verification_claim_model.',
          })

          for key, condition in {
              'vision-layer.json': 'CC-3 only when the task depends on the vision layer.',
              'physical-anchor-context.json': 'CC-3 only when the task depends on physical-anchor or physical-evidence context.',
              'legacy-archive-index.json': 'CC-3 only when the task depends on archived provenance or historical website material.',
              'nft-chronicle-context.json': 'CC-3 only when the task depends on Chronicle, history, music, creative work, family witness, or human-witness context.',
          }.items():
              item = data['context_packs_inventory'][key]
              item['required_for'] = [value for value in item.get('required_for', []) if value != 'CC-3']
              item['conditional_for'] = [condition]

          data['must_load_summary'] = [
              '/api/agent-minimal-context.v1.json',
              '/api/agent-first-contact.json',
              '/api/authority.json',
              '/api/agent-output-policy.v1.json',
              '/api/context-action-profiles.v1.json',
              '/api/interpretation-model-policy.v1.json',
              '/agent-brief/',
          ]
          data['must_load_summary_scope'] = (
              'Base discovery, authority, action-selection, and interpretation-policy sources only. '
              'Add exact task-relevant sources and conditional Chronicle, legacy, evidence, correction, or physical materials as required by the selected claim.'
          )

          data['verification_context_rule'] = {
              'private_technical_check': 'Use the verification action profile, exact target sources, and performed operations. CC-2 is a compatibility declaration, not proof of sufficiency.',
              'public_verification_submission': 'Use CC-3 compatibility plus actual loaded sources, multidimensional verification claims, limitations, and claims not made.',
              'legacy_v_role': 'V0-V5 remain Builder compatibility metadata only.',
              'retired_v4_plus_v6_v8': 'V4+, V6, V7, and V8 are historical-only for new submissions; use digital_profile, physical_observation, and external_witness instead.',
          }

          data['current_model_precedence'] = {
              'context': '/api/context-action-profiles.v1.json',
              'interpretation': '/api/interpretation-model-policy.v1.json',
              'verification': '/api/verification-claim-model.v1.json',
              'rule': 'Actual sources and performed actions control sufficiency. Legacy CC, CRL, and V labels do not import retired stage or verification ladders.',
          }

          path.write_text(json.dumps(data, indent=2, ensure_ascii=False) + '\n', encoding='utf-8')
          PY
          rm -f .github/workflows/temp-pr654-context-map-finalize.yml
      - name: Commit permanent context-map fix
        shell: bash
        run: |
          git config user.name "trinity-accord-migration-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "model: finalize action-based context load map"
          git push origin HEAD:agent/retire-fixed-stage-and-clarify-verification
