name: Temporary Capture Evidence P0

on:
  pull_request:
    paths:
      - .github/workflows/temp-capture-evidence-p0.yml

permissions:
  contents: write

jobs:
  capture:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: agent/complete-legacy-ar-eth-mirror-audit
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - run: python3 -m pip install -r requirements-ci.txt
      - name: Apply pending migration metadata patches
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          index_path = Path("archive/legacy-pointers/index.json")
          index = json.loads(index_path.read_text(encoding="utf-8"))
          columns = index["arweave_columns"]
          for row in index["arweave"]:
              if row[columns.index("txid")] == "RgjVJnALSbbYP4Vzz-FBX0Tie9inSvuA2PBgjPAT2ng":
                  row[columns.index("sha256")] = "e19018f1c71da8307ef20e8e8e5c12834f854d60a6aae60e35d2d8c71a333a81"
          index_path.write_text(json.dumps(index, ensure_ascii=False, separators=(",", ":")) + "\n", encoding="utf-8")

          path = Path("agent-start.md")
          text = path.read_text(encoding="utf-8")
          text = text.replace("## Legacy Context Depth (CC) and CRL compatibility", "## Legacy Context Depth (CC) and Context Readiness Level (CRL) compatibility")
          text = text.replace("- CC describes reading depth under the old inherited ladder.\n- The sufficiency boolean says whether the selected action can honestly be performed.", "- Context Depth (CC) describes reading depth under the old inherited ladder.\n- Context Readiness Level (CRL), expressed by the sufficiency declaration, says whether the selected action can honestly be performed.")
          path.write_text(text, encoding="utf-8")

          for name in [
              "api/verification-levels.json",
              "api/context-depth-levels.json",
              "api/context-load-map.json",
              "api/claim-registry.json",
          ]:
              path = Path(name)
              data = json.loads(path.read_text(encoding="utf-8"))
              if "source_digest" not in data:
                  continue
              canonical = json.dumps(
                  {k: v for k, v in data.items() if k != "source_digest"},
                  ensure_ascii=False,
                  sort_keys=True,
                  separators=(",", ":"),
              )
              data["source_digest"] = hashlib.sha256(canonical.encode("utf-8")).hexdigest()[:16]
              path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY
          python3 scripts/generate_sitemap.py
      - name: Capture complete P0 output
        shell: bash
        run: |
          set +e
          python3 scripts/run_ci_group.py p0-current > evidence-p0-final-diagnostic.txt 2>&1
          code=$?
          printf '\nexit_code=%s\n' "$code" >> evidence-p0-final-diagnostic.txt
          exit 0
      - name: Commit diagnostic
        shell: bash
        run: |
          set -euo pipefail
          git add evidence-p0-final-diagnostic.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "ci: capture final evidence P0 diagnostic"
          git push origin HEAD:agent/complete-legacy-ar-eth-mirror-audit
