name: Waiting Heartbeat Submit

on:
  schedule:
    - cron: "17 3 * * *"
    - cron: "17 5,7,9 * * *"
  workflow_dispatch:

concurrency:
  group: main-write-lock
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  submit:
    if: ${{ github.event_name == 'workflow_dispatch' || vars.WAITING_HEARTBEAT_ENABLED == 'true' }}
    runs-on: ubuntu-24.04
    env:
      WAITING_HEARTBEAT_ENABLED: ${{ vars.WAITING_HEARTBEAT_ENABLED || 'false' }}
      WAITING_HEARTBEAT_GATEWAY_BASE_URL: ${{ vars.WAITING_HEARTBEAT_GATEWAY_BASE_URL || 'https://trinity-record-chain-gateway.onrender.com' }}
      WAITING_HEARTBEAT_AUTHORSHIP_PRIVATE_KEY_PEM: ${{ secrets.WAITING_HEARTBEAT_AUTHORSHIP_PRIVATE_KEY_PEM }}
      WAITING_HEARTBEAT_AUTHORSHIP_PUBLIC_KEY_PEM: ${{ secrets.WAITING_HEARTBEAT_AUTHORSHIP_PUBLIC_KEY_PEM }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Record toolchain provenance
        run: |
          python3 scripts/toolchain_provenance.py > toolchain-provenance.json
          cat toolchain-provenance.json

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: ".node-version"

      - name: Install dependencies
        run: |
          python3 -m pip install -r requirements-ci.txt
          npm ci

      - name: Rebase
        run: |
          set -euo pipefail
          git fetch origin main --prune
          git rebase origin/main

      - name: Submit waiting heartbeat
        id: submit_heartbeat
        run: python3 scripts/submit_waiting_heartbeat.py

      # Public mirrors are intentionally not generated before append. The centralized
      # homepage/status sync owns these paths after final record + OTS coverage exists:
      # api/waiting-heartbeat-status.json, api/public-home-status.json, index.md, sitemap.xml.
      - name: Commit attempt metadata
        run: |
          set -euo pipefail
          git config user.name "trinity-waiting-heartbeat-bot"
          git config user.email "actions@github.com"
          git add record-chain/heartbeat
          if git diff --cached --quiet; then
            echo "No waiting heartbeat changes."
            exit 0
          fi
          git commit -m "heartbeat: submit waiting heartbeat"
          for attempt in 1 2 3; do
            if git push origin "HEAD:${GITHUB_REF_NAME:-main}"; then
              exit 0
            fi
            git fetch origin main --prune
            git rebase origin/main
          done
          exit 1

      - name: Dispatch append
        if: steps.submit_heartbeat.outputs.heartbeat_existing_final != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RECEIPT_ID: ${{ steps.submit_heartbeat.outputs.receipt_id }}
          PENDING_FILE_PATH: ${{ steps.submit_heartbeat.outputs.pending_file_path }}
        run: |
          set -euo pipefail
          if [ -n "$RECEIPT_ID" ] && [ -n "$PENDING_FILE_PATH" ]; then
            gh workflow run record-chain-append.yml --repo "$GITHUB_REPOSITORY" --ref main -f receipt_id="$RECEIPT_ID" -f pending_file_path="$PENDING_FILE_PATH"
          else
            gh workflow run record-chain-append.yml --repo "$GITHUB_REPOSITORY" --ref main
          fi
