name: Waiting Heartbeat Submit

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

concurrency:
  group: main-write-lock
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  submit:
    if: ${{ github.event_name == 'workflow_dispatch' || vars.WAITING_HEARTBEAT_ENABLED == 'true' }}
    runs-on: ubuntu-24.04
    env:
      WAITING_HEARTBEAT_ENABLED: ${{ vars.WAITING_HEARTBEAT_ENABLED || 'false' }}
      WAITING_HEARTBEAT_GATEWAY_BASE_URL: ${{ vars.WAITING_HEARTBEAT_GATEWAY_BASE_URL || 'https://trinity-record-chain-gateway.onrender.com' }}
      WAITING_HEARTBEAT_AUTHORSHIP_PRIVATE_KEY_PEM: ${{ secrets.WAITING_HEARTBEAT_AUTHORSHIP_PRIVATE_KEY_PEM }}
      WAITING_HEARTBEAT_AUTHORSHIP_PUBLIC_KEY_PEM: ${{ secrets.WAITING_HEARTBEAT_AUTHORSHIP_PUBLIC_KEY_PEM }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: ".node-version"

      - name: Install dependencies
        run: |
          python3 -m pip install -r requirements-ci.txt
          npm ci

      - name: Rebase
        run: |
          set -euo pipefail
          git fetch origin main --prune
          git rebase origin/main

      - name: Submit waiting heartbeat
        run: python3 scripts/submit_waiting_heartbeat.py

      - name: Generate waiting heartbeat status
        run: python3 scripts/generate_waiting_heartbeat_status.py

      - name: Update public status mirror
        run: |
          python3 scripts/generate_public_home_status.py
          python3 scripts/patch_public_home_status_primary.py
          python3 scripts/generate_sitemap.py

      - name: Commit attempt metadata
        run: |
          set -euo pipefail
          if git diff --quiet -- record-chain/heartbeat api/waiting-heartbeat-status.json api/public-home-status.json index.md sitemap.xml; then
            echo "No waiting heartbeat changes."
            exit 0
          fi
          git config user.name "trinity-waiting-heartbeat-bot"
          git config user.email "actions@github.com"
          git add record-chain/heartbeat api/waiting-heartbeat-status.json api/public-home-status.json index.md sitemap.xml
          git commit -m "heartbeat: submit waiting heartbeat"
          for attempt in 1 2 3; do
            if git push origin "HEAD:${GITHUB_REF_NAME:-main}"; then
              exit 0
            fi
            git fetch origin main --prune
            git rebase origin/main
          done
          exit 1

      - name: Dispatch append
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run record-chain-append.yml --repo "$GITHUB_REPOSITORY" --ref main
