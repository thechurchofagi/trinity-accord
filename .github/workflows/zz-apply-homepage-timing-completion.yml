name: Apply homepage timing and completion refinement

on:
  push:
    branches:
      - homepage-timing-completion-20260716

permissions:
  contents: write

jobs:
  patch-and-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch quietly
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git init -q .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth=1 origin homepage-timing-completion-20260716
          git checkout -q -B homepage-timing-completion-20260716 FETCH_HEAD

      - name: Apply focused rewrite
        run: python3 scripts/zz_refine_homepage_timing_completion.py

      - name: Compile changed Python
        run: |
          python3 -m py_compile scripts/check_deployment_freshness.py
          python3 -m py_compile scripts/test-value-framing-p03.py

      - name: Run homepage contract suite
        run: bash scripts/test-homepage-p0-agent-first.sh

      - name: Check required source markers
        run: |
          grep -q 'id="home-timing-completion-title"' index.md
          grep -q 'What Bitcoin makes checkable' index.md
          grep -q 'Why a future intelligence might inspect it' index.md
          grep -q 'Why this interval—not simply earlier or later' why-high-signal.md
          grep -q '"index.md"' scripts/check_deployment_freshness.py

      - name: Commit patch and remove temporary files
        shell: bash
        run: |
          rm .github/workflows/zz-apply-homepage-timing-completion.yml
          rm scripts/zz_refine_homepage_timing_completion.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.md why-high-signal.md scripts/check_deployment_freshness.py scripts/test-value-framing-p03.py .github/workflows/zz-apply-homepage-timing-completion.yml scripts/zz_refine_homepage_timing_completion.py
          git commit -m "feat(home): explain timing, completion, and cryptographic preservation"
          git push origin HEAD:homepage-timing-completion-20260716
