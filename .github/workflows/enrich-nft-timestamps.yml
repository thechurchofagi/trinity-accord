name: Enrich NFT Mint Timestamps

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch ETH mint timestamps via eth_getLogs and sort
        run: |
          python3 << 'PYEOF'
          import json, time, datetime, urllib.request, urllib.error

          # --- Config ---
          RPC_URL = "https://eth.llamarpc.com"
          ZERO_ADDR = "0x0000000000000000000000000000000000000000"
          TRANSFER_TOPIC = "0xddf252ad1be2c89b69c2b068fc378daa952ba7f163c4a11628f55a4df523b3ef"
          MAX_BLOCK_RANGE = 2000  # conservative for free RPC
          RETRY_LIMIT = 5
          RETRY_DELAY = 2

          # --- Load data ---
          with open("token_index.json") as f:
              token_index = json.load(f)

          contracts = list(token_index.keys())
          print(f"Contracts to process: {len(contracts)}")

          def rpc_call(method, params, retries=RETRY_LIMIT):
              """JSON-RPC call with retry"""
              payload = json.dumps({
                  "jsonrpc": "2.0", "id": 1,
                  "method": method, "params": params
              }).encode()
              req = urllib.request.Request(
                  RPC_URL,
                  data=payload,
                  headers={"Content-Type": "application/json"},
                  method="POST"
              )
              for attempt in range(retries):
                  try:
                      with urllib.request.urlopen(req, timeout=30) as resp:
                          data = json.loads(resp.read())
                      if "error" in data:
                          err = data["error"]
                          print(f"    RPC error: {err}")
                          if "limit" in str(err).lower() or "too many" in str(err).lower():
                              time.sleep(RETRY_DELAY * (2 ** attempt))
                              continue
                          return None
                      return data.get("result")
                  except Exception as e:
                      print(f"    Attempt {attempt+1} failed: {e}")
                      time.sleep(RETRY_DELAY * (2 ** attempt))
              return None

          def get_latest_block():
              result = rpc_call("eth_blockNumber", [])
              return int(result, 16) if result else None

          def get_contract_creation_block(contract):
              """Binary search for approximate creation block (quick heuristic)"""
              latest = get_latest_block()
              if not latest:
                  return 0
              # For efficiency, start from a known early block for these contracts
              # These are ERC-721 contracts deployed relatively recently
              # Use a reasonable start block (Ethereum mainnet)
              return max(0, latest - 10_000_000)  # ~last ~2 years

          def get_transfer_events(contract, from_block, to_block):
              """Get Transfer events for a contract in a block range"""
              # Topic[0] = Transfer event signature
              # Topic[1] = from (padded), we want from=0x0 for mints
              # Topic[2] = to (padded)
              logs = rpc_call("eth_getLogs", [{
                  "address": contract.lower(),
                  "topics": [TRANSFER_TOPIC],
                  "fromBlock": hex(from_block),
                  "toBlock": hex(to_block)
              }])
              return logs or []

          def get_block_timestamp(block_num):
              """Get timestamp for a block"""
              block = rpc_call("eth_getBlockByNumber", [hex(block_num), False])
              if block and "timestamp" in block:
                  return int(block["timestamp"], 16)
              return None

          # --- Process each contract ---
          mint_map = {}  # (contract_lower, token_id_str) -> {block, timestamp, datetime}
          block_timestamp_cache = {}

          for contract in contracts:
              tokens = token_index[contract]
              token_ids = set(tokens.keys()) if isinstance(tokens, dict) else set(str(t) for t in tokens)
              contract_lower = contract.lower()
              print(f"\n{'='*60}")
              print(f"Contract: {contract}")
              print(f"Token count: {len(token_ids)}")

              latest = get_latest_block()
              if not latest:
                  print("  ERROR: Could not get latest block")
                  continue

              # Start from a reasonable block range
              start_block = max(0, latest - 10_000_000)
              current_block = start_block
              total_logs = 0
              mint_count = 0

              while current_block <= latest:
                  end_block = min(current_block + MAX_BLOCK_RANGE, latest)
                  logs = get_transfer_events(contract, current_block, end_block)

                  if logs:
                      total_logs += len(logs)
                      for log_entry in logs:
                          topics = log_entry.get("topics", [])
                          if len(topics) < 3:
                              continue

                          from_addr = "0x" + topics[1][-40:]
                          to_addr = "0x" + topics[2][-40:]
                          token_id_hex = log_entry.get("data", "0x")
                          if token_id_hex == "0x" or token_id_hex == "0x0":
                              token_id_str = "0"
                          else:
                              token_id_str = str(int(token_id_hex, 16))

                          # Only care about mints (from == zero address)
                          if from_addr.lower() != ZERO_ADDR:
                              continue

                          if token_id_str not in token_ids:
                              continue

                          block_num = int(log_entry["blockNumber"], 16)
                          tx_hash = log_entry.get("transactionHash", "")

                          # Get timestamp
                          if block_num not in block_timestamp_cache:
                              ts = get_block_timestamp(block_num)
                              block_timestamp_cache[block_num] = ts
                              time.sleep(0.1)  # rate limit
                          else:
                              ts = block_timestamp_cache[block_num]

                          key = (contract_lower, token_id_str)
                          if key not in mint_map or block_num < mint_map[key]["block"]:
                              mint_map[key] = {
                                  "block": block_num,
                                  "timestamp": ts,
                                  "datetime": datetime.datetime.utcfromtimestamp(ts).strftime("%Y-%m-%dT%H:%M:%SZ") if ts else None,
                                  "tx": tx_hash
                              }
                              mint_count += 1

                  # Progress report every 10 ranges
                  if (current_block - start_block) // MAX_BLOCK_RANGE % 10 == 0:
                      pct = (current_block - start_block) / max(1, latest - start_block) * 100
                      print(f"  Block {current_block:,} -> {end_block:,} ({pct:.1f}%) | logs: {total_logs} | mints found: {mint_count}")

                  current_block = end_block + 1
                  time.sleep(0.15)  # rate limit for free RPC

              matched = sum(1 for tid in token_ids if (contract_lower, tid) in mint_map)
              print(f"  DONE: {total_logs} transfer logs, {mint_count} mints, {matched}/{len(token_ids)} tokens matched")

          # --- Build output ---
          print(f"\n{'='*60}")
          print(f"Total mint timestamps found: {len(mint_map)}")

          entries = []
          for contract in contracts:
              tokens = token_index[contract]
              token_ids = list(tokens.keys()) if isinstance(tokens, dict) else list(str(t) for t in tokens)
              contract_lower = contract.lower()
              for tid in token_ids:
                  info = mint_map.get((contract_lower, tid), {})
                  entries.append({
                      "contract": contract,
                      "token_id": tid,
                      "block": info.get("block"),
                      "timestamp": info.get("timestamp"),
                      "datetime": info.get("datetime")
                  })

          entries.sort(key=lambda x: x["timestamp"] or 9999999999)

          # Save timestamps
          with open("nft-text-descriptions/eth-mint-timestamps.json", "w") as f:
              json.dump(entries, f, indent=2, ensure_ascii=False)

          # Update index.json
          with open("nft-text-descriptions/index.json") as f:
              index = json.load(f)

          ts_map = {(e["contract"].lower(), e["token_id"]): e for e in entries}
          for item in index:
              key = (item["contract"].lower(), item["token_id"])
              if key in ts_map:
                  item["block"] = ts_map[key]["block"]
                  item["timestamp"] = ts_map[key]["timestamp"]
                  item["datetime"] = ts_map[key]["datetime"]

          index.sort(key=lambda x: x.get("timestamp") or 9999999999)

          with open("nft-text-descriptions/index.json", "w") as f:
              json.dump(index, f, indent=2, ensure_ascii=False)

          # --- Summary ---
          with_ts = sum(1 for e in entries if e["timestamp"])
          print(f"\n=== SUMMARY ===")
          print(f"Total entries: {len(entries)}")
          print(f"With timestamps: {with_ts}")
          print(f"Without timestamps: {len(entries) - with_ts}")

          if with_ts > 0:
              dated = [e for e in entries if e["datetime"]]
              print(f"\nFirst 5 (earliest):")
              for e in dated[:5]:
                  print(f"  {e['datetime']} | block {e['block']} | ...{e['token_id'][-8:]}")
              print(f"\nLast 5 (latest):")
              for e in dated[-5:]:
                  print(f"  {e['datetime']} | block {e['block']} | ...{e['token_id'][-8:]}")

          if with_ts == 0:
              print("\n⚠️  WARNING: No timestamps found! Check RPC endpoint and contract addresses.")
              exit(1)
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nft-text-descriptions/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "feat: enrich NFT descriptions with ETH mint timestamps and sort chronologically"
          git push
