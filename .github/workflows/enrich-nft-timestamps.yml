name: Enrich NFT Mint Timestamps

on:
  workflow_dispatch:
    inputs:
      start_block:
        description: "ETH start block for log scan"
        required: false
        default: "18000000"
      end_block:
        description: "ETH end block or latest"
        required: false
        default: "latest"
      chunk:
        description: "eth_getLogs block chunk size"
        required: false
        default: "50000"
      commit_changes:
        description: "Commit generated timestamp files"
        required: false
        default: "true"

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Record toolchain provenance
        run: |
          python3 scripts/toolchain_provenance.py > toolchain-provenance.json
          cat toolchain-provenance.json

      - name: Authorize write workflow actor
        env:
          ACTOR: ${{ github.actor }}
          EVENT_NAME: ${{ github.event_name }}
          SENDER: ${{ github.event.sender.login }}
        run: |
          set -euo pipefail
          case "$ACTOR" in
            thechurchofagi|github-actions[bot])
              echo "Authorized actor: $ACTOR"
              ;;
            *)
              echo "Unauthorized actor for write workflow: $ACTOR"
              exit 1
              ;;
          esac

      - name: Create progress branch
        env:
          PROGRESS_BRANCH: enrich-progress-${{ github.run_id }}
        run: |
          git checkout -b "$PROGRESS_BRANCH" 2>/dev/null || true
          git fetch origin main --prune
          git rebase origin/main
          if ! git push origin "$PROGRESS_BRANCH" 2>/dev/null; then
            echo "::warning::Could not push progress branch $PROGRESS_BRANCH"
          fi
          git checkout main

      - name: Enrich NFT mint timestamps
        env:
          ETH_RPC_URLS: ${{ secrets.ETH_RPC_URLS }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROGRESS_BRANCH: enrich-progress-${{ github.run_id }}
        run: |
          python3 scripts/enrich_nft_timestamps.py \
            --start-block "${{ github.event.inputs.start_block }}" \
            --end-block "${{ github.event.inputs.end_block }}" \
            --chunk "${{ github.event.inputs.chunk }}"

      - name: Upload timestamp diagnostics
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nft-timestamp-enrichment
          path: |
            nft-text-descriptions/eth-mint-timestamps.json
            nft-text-descriptions/missing-timestamps.json
            nft-text-descriptions/timestamp-enrichment-report.json
            nft-text-descriptions/index.json
            nft-text-descriptions/enrichment-progress.log

      - name: Commit and push
        if: ${{ github.event.inputs.commit_changes == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nft-text-descriptions/eth-mint-timestamps.json \
                  nft-text-descriptions/missing-timestamps.json \
                  nft-text-descriptions/timestamp-enrichment-report.json \
                  nft-text-descriptions/index.json \
                  nft-text-descriptions/enrichment-progress.log
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "feat: enrich NFT descriptions with ETH mint timestamps"
          git push

      - name: Cleanup progress branch
        if: always()
        env:
          PROGRESS_BRANCH: enrich-progress-${{ github.run_id }}
        run: |
          if ! git push origin --delete "$PROGRESS_BRANCH" 2>/dev/null; then
            echo "::warning::Could not delete progress branch $PROGRESS_BRANCH (non-critical)"
          fi
