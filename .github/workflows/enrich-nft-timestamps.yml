name: Enrich NFT Mint Timestamps

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests

      - name: Fetch ETH mint timestamps via Etherscan and sort
        run: |
          python3 << 'PYEOF'
          import json, time, datetime
          import requests

          session = requests.Session()
          session.headers.update({"User-Agent": "trinity-accord-bot/1.0"})

          ETHERSCAN_API = "https://api.etherscan.io/api"

          with open("token_index.json") as f:
              token_index = json.load(f)

          contracts = list(token_index.keys())

          def etherscan_get(params, retries=5):
              """Query Etherscan API with retry/backoff"""
              for attempt in range(retries):
                  try:
                      resp = session.get(ETHERSCAN_API, params=params, timeout=30)
                      data = resp.json()
                      if data.get("status") == "1" or data.get("result"):
                          return data
                      elif data.get("message") == "NOTOK":
                          msg = data.get("result", "")
                          if "rate limit" in str(msg).lower():
                              time.sleep(2 ** (attempt + 1))
                              continue
                      return data
                  except Exception as e:
                      print(f"  Retry {attempt+1}: {e}")
                      time.sleep(2 ** attempt)
              return None

          # Step 1: For each contract, get token transfers via Etherscan tokentx API
          # This returns all transfers with timestamps directly
          mint_map = {}  # (contract, token_id) -> {block, timestamp, datetime}

          for contract in contracts:
              tokens = token_index[contract]
              token_ids = set(tokens.keys()) if isinstance(tokens, dict) else set(tokens)
              print(f"\nQuerying {contract} ({len(token_ids)} tokens)...")

              page = 1
              all_txs = []
              while True:
                  result = etherscan_get({
                      "module": "account",
                      "action": "tokentx",
                      "contractaddress": contract,
                      "startblock": 0,
                      "endblock": 99999999,
                      "page": page,
                      "offset": 10000,
                      "sort": "asc"
                  })

                  if not result or result.get("status") != "1":
                      print(f"  Page {page}: no more results or error")
                      break

                  txs = result.get("result", [])
                  if not txs:
                      break

                  all_txs.extend(txs)
                  print(f"  Page {page}: {len(txs)} transfers (total: {len(all_txs)})")

                  if len(txs) < 10000:
                      break
                  page += 1
                  time.sleep(0.25)  # Etherscan rate limit: 5 req/sec

              print(f"  Total transfers: {len(all_txs)}")

              # Find earliest transfer for each token (mint = first appearance)
              for tx in all_txs:
                  tid = tx.get("tokenID", "")
                  if tid in token_ids:
                      block = int(tx.get("blockNumber", 0))
                      ts = int(tx.get("timeStamp", 0))
                      key = (contract, tid)
                      if key not in mint_map or block < mint_map[key]["block"]:
                          mint_map[key] = {
                              "block": block,
                              "timestamp": ts,
                              "datetime": datetime.datetime.utcfromtimestamp(ts).strftime("%Y-%m-%dT%H:%M:%SZ") if ts else None
                          }

              matched = sum(1 for tid in token_ids if (contract, tid) in mint_map)
              print(f"  Matched {matched}/{len(token_ids)} tokens")
              time.sleep(0.5)

          print(f"\n=== Found timestamps for {len(mint_map)} tokens ===")

          # Step 2: Build sorted entries
          entries = []
          for contract in contracts:
              tokens = token_index[contract]
              token_ids = list(tokens.keys()) if isinstance(tokens, dict) else list(tokens)
              for tid in token_ids:
                  info = mint_map.get((contract, tid), {})
                  entries.append({
                      "contract": contract,
                      "token_id": tid,
                      "block": info.get("block"),
                      "timestamp": info.get("timestamp"),
                      "datetime": info.get("datetime")
                  })

          entries.sort(key=lambda x: x["timestamp"] or 9999999999)

          # Save timestamps
          with open("nft-text-descriptions/eth-mint-timestamps.json", "w") as f:
              json.dump(entries, f, indent=2, ensure_ascii=False)

          # Re-sort index.json
          with open("nft-text-descriptions/index.json") as f:
              index = json.load(f)

          ts_map = {(e["contract"], e["token_id"]): e for e in entries}
          for item in index:
              key = (item["contract"], item["token_id"])
              if key in ts_map:
                  item["block"] = ts_map[key]["block"]
                  item["timestamp"] = ts_map[key]["timestamp"]
                  item["datetime"] = ts_map[key]["datetime"]

          index.sort(key=lambda x: x.get("timestamp") or 9999999999)

          with open("nft-text-descriptions/index.json", "w") as f:
              json.dump(index, f, indent=2, ensure_ascii=False)

          with_ts = sum(1 for e in entries if e["timestamp"])
          print(f"\n=== DONE ===")
          print(f"Total: {len(entries)}, with timestamps: {with_ts}, without: {len(entries)-with_ts}")
          print(f"\nFirst 5 (earliest):")
          for e in entries[:5]:
              print(f"  {e['datetime']} | ...{e['token_id'][-8:]}")
          print(f"\nLast 5 (latest):")
          for e in entries[-5:]:
              print(f"  {e['datetime']} | ...{e['token_id'][-8:]}")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nft-text-descriptions/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "feat: enrich NFT descriptions with ETH mint timestamps and sort chronologically"
          git push
