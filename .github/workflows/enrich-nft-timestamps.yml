name: Enrich NFT Mint Timestamps

on:
  workflow_dispatch:
    inputs:
      start_block:
        description: "ETH start block for log scan"
        required: false
        default: "18000000"
      end_block:
        description: "ETH end block or latest"
        required: false
        default: "latest"
      chunk:
        description: "eth_getLogs block chunk size"
        required: false
        default: "50000"
      commit_changes:
        description: "Commit generated timestamp files"
        required: false
        default: "true"

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Enrich NFT mint timestamps
        env:
          ETH_RPC_URLS: ${{ secrets.ETH_RPC_URLS }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROGRESS_BRANCH: enrich-progress-${{ github.run_id }}
        run: |
          # Create progress branch
          git checkout -b "$PROGRESS_BRANCH" 2>/dev/null || true

          # Start background progress committer (every 60s)
          (
            while true; do
              sleep 60
              if [ -f nft-text-descriptions/enrichment-progress.log ]; then
                git add nft-text-descriptions/enrichment-progress.log 2>/dev/null
                git commit -m "progress update" --allow-empty 2>/dev/null || true
                git push origin "$PROGRESS_BRANCH" 2>/dev/null || true
              fi
            done
          ) &
          PROGRESS_PID=$!

          python3 scripts/enrich_nft_timestamps.py \
            --start-block "${{ github.event.inputs.start_block }}" \
            --end-block "${{ github.event.inputs.end_block }}" \
            --chunk "${{ github.event.inputs.chunk }}"

          kill $PROGRESS_PID 2>/dev/null || true

          # Switch back to main for commit step
          git checkout main

      - name: Upload timestamp diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: nft-timestamp-enrichment
          path: |
            nft-text-descriptions/eth-mint-timestamps.json
            nft-text-descriptions/missing-timestamps.json
            nft-text-descriptions/timestamp-enrichment-report.json
            nft-text-descriptions/index.json
            nft-text-descriptions/enrichment-progress.log

      - name: Commit and push
        if: ${{ github.event.inputs.commit_changes == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nft-text-descriptions/eth-mint-timestamps.json \
                  nft-text-descriptions/missing-timestamps.json \
                  nft-text-descriptions/timestamp-enrichment-report.json \
                  nft-text-descriptions/index.json \
                  nft-text-descriptions/enrichment-progress.log
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "feat: enrich NFT descriptions with ETH mint timestamps"
          git push

      - name: Cleanup progress branch
        if: always()
        env:
          PROGRESS_BRANCH: enrich-progress-${{ github.run_id }}
        run: |
          git push origin --delete "$PROGRESS_BRANCH" 2>/dev/null || true
