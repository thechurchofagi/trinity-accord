name: Enrich NFT Mint Timestamps

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch ETH mint timestamps and sort
        env:
          ETH_RPC_URL: ${{ secrets.ETHEREUMMAINNET }}
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, time, os, datetime

          # Use multiple RPC endpoints with fallback
          PRIMARY = os.environ.get("ETH_RPC_URL", "")
          FALLBACKS = [
              "https://ethereum-rpc.publicnode.com",
              "https://1rpc.io/eth",
              "https://cloudflare-eth.com",
          ]
          RPCS = [r for r in [PRIMARY] + FALLBACKS if r]
          rpc_idx = 0

          TRANSFER_TOPIC0 = "0xddf252ad1be2c89b69c2b068fc378daa952ba7f163c4a11628f55a4df523b3ef"

          with open("token_index.json") as f:
              token_index = json.load(f)

          contracts = list(token_index.keys())

          def rpc_call(method, params, retries=6):
              global rpc_idx
              for attempt in range(retries):
                  rpc = RPCS[rpc_idx % len(RPCS)]
                  try:
                      payload = json.dumps({"jsonrpc":"2.0","method":method,"params":params,"id":1}).encode()
                      req = urllib.request.Request(rpc, data=payload, headers={"Content-Type":"application/json"})
                      resp = urllib.request.urlopen(req, timeout=30)
                      data = json.loads(resp.read())
                      if "error" in data:
                          raise Exception(data["error"].get("message", data["error"]))
                      return data
                  except urllib.error.HTTPError as e:
                      if e.code == 429:
                          rpc_idx += 1  # rotate to next RPC
                          wait = min(2 ** attempt, 30)
                          print(f"  429 on {rpc.split('/')[2][:30]}, rotating RPC, wait {wait}s")
                          time.sleep(wait)
                      else:
                          raise
                  except Exception as e:
                      wait = min(2 ** attempt, 30)
                      print(f"  Error: {e}, retry {attempt+1}, wait {wait}s")
                      time.sleep(wait)
              raise Exception(f"All RPCs failed after {retries} retries")

          # Get latest block
          latest = rpc_call("eth_blockNumber", [])
          block_num = int(latest["result"], 16)
          print(f"Latest block: {block_num}")

          # For each contract, query ALL Transfer events and find earliest per token
          mint_map = {}  # (contract, token_id) -> earliest_block

          for contract in contracts:
              tokens = token_index[contract]
              token_ids = set(tokens.keys()) if isinstance(tokens, dict) else set(tokens)
              print(f"\nQuerying {contract} ({len(token_ids)} tokens)...")

              all_logs = []
              start_block = 18000000
              chunk = 50000

              for from_b in range(start_block, block_num + 1, chunk):
                  to_b = min(from_b + chunk - 1, block_num)
                  try:
                      result = rpc_call("eth_getLogs", [{
                          "fromBlock": hex(from_b),
                          "toBlock": hex(to_b),
                          "address": contract,
                          "topics": [TRANSFER_TOPIC0]
                      }])
                      logs = result.get("result", [])
                      if logs:
                          all_logs.extend(logs)
                          print(f"  Blocks {from_b}-{to_b}: {len(logs)} transfers")
                  except Exception as e:
                      print(f"  Blocks {from_b}-{to_b}: FAILED - {e}")
                  time.sleep(0.5)  # gentle rate limit

              print(f"  Total Transfer events: {len(all_logs)}")

              for log in all_logs:
                  topics = log.get("topics", [])
                  if len(topics) >= 4:
                      token_id = str(int(topics[3], 16))
                      if token_id in token_ids:
                          block = int(log["blockNumber"], 16)
                          key = (contract, token_id)
                          if key not in mint_map or block < mint_map[key]:
                              mint_map[key] = block

              matched = sum(1 for tid in token_ids if (contract, tid) in mint_map)
              print(f"  Matched {matched}/{len(token_ids)} tokens to first Transfer block")
              time.sleep(1)

          print(f"\n=== Found mint blocks for {len(mint_map)} tokens ===")

          # Get timestamps for unique blocks in batches
          blocks_needed = sorted(set(mint_map.values()))
          print(f"Need timestamps for {len(blocks_needed)} unique blocks")

          block_ts = {}
          for i, block in enumerate(blocks_needed):
              try:
                  result = rpc_call("eth_getBlockByNumber", [hex(block), False])
                  ts = int(result["result"]["timestamp"], 16)
                  block_ts[block] = ts
              except Exception as e:
                  print(f"  Block {block}: error - {e}")
              if i % 50 == 0 and i > 0:
                  print(f"  {i}/{len(blocks_needed)} blocks done...")
                  time.sleep(0.5)

          print(f"Got {len(block_ts)} block timestamps")

          # Build sorted output
          entries = []
          for contract in contracts:
              tokens = token_index[contract]
              token_ids = list(tokens.keys()) if isinstance(tokens, dict) else list(tokens)
              for tid in token_ids:
                  block = mint_map.get((contract, tid))
                  ts = block_ts.get(block) if block else None
                  entries.append({
                      "contract": contract,
                      "token_id": tid,
                      "block": block,
                      "timestamp": ts,
                      "datetime": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime(ts)) if ts else None
                  })

          entries.sort(key=lambda x: x["timestamp"] or 9999999999)

          with open("nft-text-descriptions/eth-mint-timestamps.json", "w") as f:
              json.dump(entries, f, indent=2, ensure_ascii=False)

          # Re-sort index.json
          with open("nft-text-descriptions/index.json") as f:
              index = json.load(f)

          ts_map = {(e["contract"], e["token_id"]): e for e in entries}
          for item in index:
              key = (item["contract"], item["token_id"])
              if key in ts_map:
                  item["block"] = ts_map[key]["block"]
                  item["timestamp"] = ts_map[key]["timestamp"]
                  item["datetime"] = ts_map[key]["datetime"]

          index.sort(key=lambda x: x.get("timestamp") or 9999999999)

          with open("nft-text-descriptions/index.json", "w") as f:
              json.dump(index, f, indent=2, ensure_ascii=False)

          with_ts = sum(1 for e in entries if e['timestamp'])
          print(f"\n=== DONE ===")
          print(f"Total: {len(entries)}, with timestamps: {with_ts}, without: {len(entries)-with_ts}")
          print(f"\nFirst 5 (earliest):")
          for e in entries[:5]:
              print(f"  {e['datetime']} | ...{e['token_id'][-8:]}")
          print(f"\nLast 5 (latest):")
          for e in entries[-5:]:
              print(f"  {e['datetime']} | ...{e['token_id'][-8:]}")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nft-text-descriptions/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "feat: enrich NFT descriptions with ETH mint timestamps and sort chronologically"
          git push
