name: Sync homepage refinement with main

on:
  push:
    branches:
      - homepage-timing-completion-20260716

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout and merge latest main
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git init -q .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q origin main homepage-timing-completion-20260716
          git checkout -q -B homepage-timing-completion-20260716 origin/homepage-timing-completion-20260716
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git merge --no-edit origin/main
          rm .github/workflows/zz-sync-homepage-pr-main.yml
          git add .github/workflows/zz-sync-homepage-pr-main.yml
          git commit -m "chore: remove temporary main-sync workflow"
          git push origin HEAD:homepage-timing-completion-20260716
