name: Apply Round 6 Node Runtime Alignment

on:
  pull_request:
    branches: [main]
    paths:
      - "scripts/apply_round6_node_runtime_alignment.py"
      - ".github/workflows/apply-round6-node-runtime-alignment.yml"

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout audit branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: deep-audit-round6-ci-code-alignment
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Install validation dependencies
        run: python3 -m pip install -r requirements-ci.txt
      - name: Align and validate Node runtime declarations
        id: align
        continue-on-error: true
        run: |
          set -o pipefail
          {
            python3 scripts/apply_round6_node_runtime_alignment.py
            python3 scripts/test_node_dependency_pinning.py
            python3 scripts/test_action_pinning.py
            python3 scripts/test_workflows_do_not_reference_missing_scripts.py
          } 2>&1 | tee /tmp/node-runtime-alignment.log
      - name: Upload alignment diagnostics
        if: steps.align.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: node-runtime-alignment-log
          path: /tmp/node-runtime-alignment.log
          if-no-files-found: error
          retention-days: 3
      - name: Surface alignment failure
        if: steps.align.outcome == 'failure'
        run: |
          cat /tmp/node-runtime-alignment.log
          exit 1
      - name: Remove one-shot files and commit
        id: commit
        if: steps.align.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          {
            set -euo pipefail
            rm -f scripts/apply_round6_node_runtime_alignment.py
            rm -f .github/workflows/apply-round6-node-runtime-alignment.yml
            git config user.name "trinity-round6-audit-bot"
            git config user.email "actions@github.com"
            git status --short
            git add -A
            git commit -m "Align all workflow Node runtimes with .node-version"
            git push origin HEAD:deep-audit-round6-ci-code-alignment
          } 2>&1 | tee /tmp/node-runtime-commit.log
      - name: Upload commit diagnostics
        if: steps.commit.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: node-runtime-commit-log
          path: /tmp/node-runtime-commit.log
          if-no-files-found: error
          retention-days: 3
      - name: Surface commit failure
        if: steps.commit.outcome == 'failure'
        run: |
          cat /tmp/node-runtime-commit.log
          exit 1
