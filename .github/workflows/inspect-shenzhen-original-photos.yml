name: Inspect Shenzhen Original Photos

on:
  push:
    branches:
      - agent/replace-physical-anchor-original
    paths:
      - .github/workflows/inspect-shenzhen-original-photos.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/inspect-shenzhen-original-photos.yml

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Install Pillow
        run: python -m pip install --disable-pip-version-check pillow
      - name: Download and compare original Cunzhengtong photos
        run: |
          python - <<'PY'
          import hashlib, io, json, math, re, urllib.request
          from pathlib import Path
          from PIL import Image, ImageDraw, ImageOps, ImageFilter, ImageStat

          INDEX = 'https://arweave.net/7jx4hMydXh7jXv-3WdAgFJDriZeT4e1IPfAJB_zMYT4'
          out = Path('photo-candidates')
          originals = out / 'originals'
          originals.mkdir(parents=True, exist_ok=True)

          def fetch(url):
              req = urllib.request.Request(url, headers={'User-Agent': 'trinity-accord-original-photo-inspector/1.0'})
              with urllib.request.urlopen(req, timeout=180) as r:
                  return r.read()

          index = json.loads(fetch(INDEX).decode('utf-8'))
          rows = []
          for row in index.get('files', []):
              name = Path(row['path']).name
              if re.fullmatch(r'20260506_\d+\.jpg', name, flags=re.I):
                  rows.append(row)
          rows.sort(key=lambda r: Path(r['path']).name)
          if len(rows) != 12:
              raise SystemExit(f'Expected 12 original exterior photos, found {len(rows)}: {[r["path"] for r in rows]}')

          records = []
          thumbs = []
          for i, row in enumerate(rows, 1):
              data = fetch(row['url'])
              digest = hashlib.sha256(data).hexdigest()
              if digest != row['sha256']:
                  raise SystemExit(f'SHA-256 mismatch for {row["path"]}')
              name = Path(row['path']).name
              dest = originals / name
              dest.write_bytes(data)
              im = ImageOps.exif_transpose(Image.open(io.BytesIO(data))).convert('RGB')
              edges = im.convert('L').resize((600, max(1, round(im.height * 600 / im.width)))).filter(ImageFilter.FIND_EDGES)
              sharpness = round(sum(ImageStat.Stat(edges).var) / len(ImageStat.Stat(edges).var), 2)
              record = {
                  'number': i,
                  'path': row['path'],
                  'filename': name,
                  'url': row['url'],
                  'txid': row['txid'],
                  'sha256': digest,
                  'size_bytes': len(data),
                  'width': im.width,
                  'height': im.height,
                  'sharpness_edge_variance': sharpness,
              }
              records.append(record)

              canvas = Image.new('RGB', (360, 330), 'white')
              thumb = im.copy()
              thumb.thumbnail((340, 260), Image.Resampling.LANCZOS)
              x = (360 - thumb.width) // 2
              y = 8 + (260 - thumb.height) // 2
              canvas.paste(thumb, (x, y))
              draw = ImageDraw.Draw(canvas)
              draw.rectangle((0, 276, 359, 329), fill='white')
              draw.text((10, 280), f'{i:02d}  {name}', fill='black')
              draw.text((10, 299), f'{im.width}x{im.height}  sharp={sharpness}', fill='black')
              thumbs.append(canvas)

          cols = 3
          rows_n = math.ceil(len(thumbs) / cols)
          sheet = Image.new('RGB', (cols * 360, rows_n * 330), '#dddddd')
          for idx, thumb in enumerate(thumbs):
              sheet.paste(thumb, ((idx % cols) * 360, (idx // cols) * 330))
          sheet.save(out / 'contact-sheet.jpg', quality=90, optimize=True)
          (out / 'candidates.json').write_text(json.dumps(records, indent=2, ensure_ascii=False), encoding='utf-8')
          (out / 'README.txt').write_text(
              'These are the 12 original 2026-05-06 Cunzhengtong exterior photographs, downloaded from the verified Shenzhen Arweave archive and checked against its SHA-256 index.\n',
              encoding='utf-8'
          )
          print(json.dumps(records, indent=2, ensure_ascii=False))
          PY
      - name: Upload original-photo candidates
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: shenzhen-original-photo-candidates
          path: photo-candidates/
          retention-days: 1
          if-no-files-found: error
