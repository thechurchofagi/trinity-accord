name: Stage Selected Shenzhen Original Photo

on:
  push:
    branches:
      - agent/replace-physical-anchor-original
    paths:
      - .github/workflows/inspect-shenzhen-original-photos.yml

permissions:
  contents: write

jobs:
  stage-original:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: agent/replace-physical-anchor-original
      - name: Download and verify selected original photo
        run: |
          python - <<'PY'
          import hashlib
          import urllib.request
          from pathlib import Path

          url = 'https://arweave.net/ZudeLGBHWdpNyPRSvWyguXFB3LHmTW-JXadjRf_kWas'
          expected = '40eddec02dce4958d28aff94496923983e870346ce98c1cb16181012545475b6'
          target = Path('assets/img/core-object-alpha-shenzhen-notary-original.jpg')
          target.parent.mkdir(parents=True, exist_ok=True)
          req = urllib.request.Request(url, headers={'User-Agent': 'trinity-accord-original-photo-stager/1.0'})
          with urllib.request.urlopen(req, timeout=180) as response:
              data = response.read()
          actual = hashlib.sha256(data).hexdigest()
          if actual != expected:
              raise SystemExit(f'SHA-256 mismatch: expected {expected}, got {actual}')
          target.write_bytes(data)
          print(f'Wrote {target} ({len(data)} bytes), SHA-256 {actual}')
          PY
      - name: Commit verified original photo to feature branch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/img/core-object-alpha-shenzhen-notary-original.jpg
          git commit -m 'Add original Shenzhen notarial exterior photo [skip ci]'
          git push origin HEAD:agent/replace-physical-anchor-original
