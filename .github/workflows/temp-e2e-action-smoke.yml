name: Temporary all-action smoke audit

on:
  push:
    branches:
      - agent/end-to-end-action-audit

permissions:
  contents: write

jobs:
  smoke:
    if: ${{ !startsWith(github.event.head_commit.message, 'diagnostics:') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/end-to-end-action-audit
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: ".node-version"
      - run: python3 -m pip install -r requirements-ci.txt -r apps/record_chain_intake_gateway/requirements.txt
      - name: Build and exercise every action
        shell: bash
        run: |
          set +e
          mkdir -p diagnostics /tmp/e2e-actions /tmp/e2e-actions/agent-key /tmp/e2e-actions/guardian-key
          python3 - <<'PY' > diagnostics/e2e-action-smoke.txt 2>&1
          from __future__ import annotations
          import asyncio
          import json
          import os
          import subprocess
          from pathlib import Path
          from unittest.mock import AsyncMock

          ROOT = Path.cwd()
          BUILDER = ROOT / 'downloads' / 'record-chain-builder.mjs'
          OUT = Path('/tmp/e2e-actions')
          common_urls = 'https://www.trinityaccord.org/agent-start/,https://www.trinityaccord.org/api/record-chain-intake-gateway.v1.json'
          common = [
              '--actor-label','E2E Audit Agent','--provider','E2E Audit Runtime',
              '--context-level','CC-3','--context-sufficient-for-selected-action','true',
              '--context-read-confirmed','true','--loaded-urls',common_urls,
              '--discovery-mode','user_task_context','--requesting-party-type','human',
              '--introducing-party-type','human','--record-decision','human',
              '--submission-executor','self','--human-operator-involved','false',
          ]

          def run(args, expect=0):
              p = subprocess.run(args, cwd=ROOT, text=True, capture_output=True)
              print('$', ' '.join(map(str,args)))
              print('exit=',p.returncode)
              if p.stdout: print(p.stdout)
              if p.stderr: print(p.stderr)
              if p.returncode != expect:
                  raise AssertionError(f'expected exit {expect}, got {p.returncode}: {args}')
              return p

          def oath(record_type):
              return run(['node',str(BUILDER),'print-oath','--record-type',record_type]).stdout

          built = {}
          def build(name, command, extra, key='agent-key', formal=True):
              path = OUT / f'{name}.json'
              args = ['node',str(BUILDER),command,*extra]
              if formal:
                  record_type = command.replace('-','_')
                  args += [*common,'--readback',oath(record_type)]
              args += ['--key-dir',str(OUT/key),'--out',str(path)]
              run(args)
              run(['node',str(BUILDER),'doctor','--file',str(path)])
              data=json.loads(path.read_text())
              built[name]=data
              print('BUILT',name,data['record_type'],data['record_draft'].get('context_readiness'))
              return data

          build('echo','echo',['--body','E2E echo'])
          build('verification','verification',[
              '--verification-level','V0','--scope-label','legacy V0 compatibility',
              '--what-was-checked','builder output','--verification-claim','Context-only E2E fixture',
              '--fresh-actions','built submission,ran doctor','--digital-profile','context_only',
              '--relationships-checked','provides_context','--physical-observation','none',
              '--external-witness','none','--coverage-scope','single_target',
              '--limitations','test fixture only','--claims-not-made','digital integrity,semantic truth',
              '--corrections-or-supersession-checked','false'])
          app=build('guardian_application','guardian-application',[
              '--guardian-id','auto','--guardian-key-sha','auto'],key='guardian-key')
          ga=app['record_draft']['guardian_application_content']
          build('guardian_retirement','guardian-retirement',[
              '--guardian-id','auto','--guardian-key-sha','auto','--body','Voluntary E2E retirement',
              '--target-guardian-application-record-id','R-000000777',
              '--target-guardian-application-record-sha256','7'*64],key='guardian-key')
          build('propagation','propagation',['--body','E2E propagation'])
          build('correction','correction',[
              '--body','E2E correction','--target-record-id','R-000000123',
              '--target-record-sha256','1'*64,'--correction-reason','Correct test claim',
              '--corrected-fields-or-claims','body,claim','--evidence-or-review-basis','E2E fresh review'])
          build('classification_update','classification-update',[
              '--target-record-id','R-000000123','--target-record-sha256','1'*64,
              '--previous-classification','old','--new-classification','new',
              '--classification-reason','E2E review','--evidence-or-review-basis','E2E evidence'])
          cin_path=OUT/'context_insufficient_notice.json'
          run(['node',str(BUILDER),'context-insufficient','--actor-label','E2E Audit Agent',
               '--provider','E2E Audit Runtime','--body','Insufficient context for stronger action',
               '--context-level','CC-0','--context-sufficient-for-selected-action','false',
               '--discovery-mode','user_task_context','--requesting-party-type','human',
               '--introducing-party-type','human','--record-decision','human',
               '--submission-executor','self','--human-operator-involved','false',
               '--key-dir',str(OUT/'agent-key'),'--out',str(cin_path)])
          run(['node',str(BUILDER),'doctor','--file',str(cin_path)])
          built['context_insufficient_notice']=json.loads(cin_path.read_text())

          # Legacy CC-2 Guardian application must fail local doctor or Gateway preflight.
          cc2=OUT/'guardian-cc2.json'
          run(['node',str(BUILDER),'guardian-application','--actor-label','CC2 Guardian',
               '--provider','E2E','--guardian-id','auto','--guardian-key-sha','auto',
               '--context-level','CC-2','--context-sufficient-for-selected-action','true',
               '--loaded-urls',common_urls,'--discovery-mode','user_task_context',
               '--requesting-party-type','human','--introducing-party-type','human',
               '--record-decision','human','--submission-executor','self',
               '--human-operator-involved','false','--readback',oath('guardian_application'),
               '--key-dir',str(OUT/'cc2-key'),'--out',str(cc2)])
          cc2_doctor=subprocess.run(['node',str(BUILDER),'doctor','--file',str(cc2)],cwd=ROOT,text=True,capture_output=True)
          print('CC2_GUARDIAN_DOCTOR_EXIT',cc2_doctor.returncode)
          print(cc2_doctor.stdout,cc2_doctor.stderr)

          # Retired V6 must fail at Builder.
          v6=subprocess.run(['node',str(BUILDER),'verification','--actor-label','Bad V6','--provider','E2E',
              '--verification-level','V6','--scope-label','retired','--what-was-checked','none',
              '--verification-claim','bad','--fresh-actions','none','--digital-profile','context_only',
              '--relationships-checked','provides_context','--physical-observation','remote_live_witness',
              '--external-witness','none','--coverage-scope','single_target','--limitations','none',
              '--claims-not-made','all','--corrections-or-supersession-checked','false',*common,
              '--readback',oath('verification'),'--key-dir',str(OUT/'bad-v6'),'--out',str(OUT/'bad-v6.json')],
              cwd=ROOT,text=True,capture_output=True)
          print('RETIRED_V6_BUILDER_EXIT',v6.returncode)
          print(v6.stdout,v6.stderr)
          assert v6.returncode != 0

          os.environ.update({
              'TRINITY_REPO_FULL_NAME':'thechurchofagi/trinity-accord',
              'TRINITY_TARGET_BRANCH':'main','TRINITY_GITHUB_TOKEN':'test-token',
          })
          from fastapi.testclient import TestClient
          from apps.record_chain_intake_gateway import app as app_module
          client=TestClient(app_module.app)
          target_general={'record_id':'R-000000123','record_sha256':'1'*64,'record_type':'echo',
                          'authorship_proof':built['echo']['authorship_proof']}
          target_guardian={'record_id':'R-000000777','record_sha256':'7'*64,
              'record_type':'guardian_application','guardian_application_content':ga}
          async def get_text(path):
              if path.endswith('R-000000123.json'): return json.dumps(target_general)
              if path.endswith('R-000000777.json'): return json.dumps(target_guardian)
              return None
          app_module.get_file_text=get_text
          app_module.get_file_sha=AsyncMock(return_value=None)
          app_module.put_file=AsyncMock(return_value={'content':{'sha':'f'*40},'commit':{'sha':'c'*40}})
          app_module.delete_file=AsyncMock(return_value={})
          app_module.dispatch_workflow=AsyncMock(return_value=None)
          app_module.check_rate_limit=lambda body: None
          app_module.check_preflight_rate_limit=lambda key: None
          app_module._receipt_store.clear()

          for name,data in built.items():
              pre=client.post('/record-chain/preflight',json=data)
              print('PREFLIGHT',name,pre.status_code,pre.json())
              assert pre.status_code==200 and pre.json()['accepted'] is True, name
              app_module.put_file.reset_mock()
              sub=client.post('/record-chain/submit',json=data)
              print('SUBMIT',name,sub.status_code,sub.json())
              assert sub.status_code==200 and sub.json()['accepted'] is True, name
              pending=[c for c in app_module.put_file.await_args_list if 'pending/' in c.args[0]]
              assert len(pending)==1, (name,app_module.put_file.await_args_list)
              payload=json.loads(pending[0].args[1])
              assert payload['record_type']==data['record_type']
              assert not ({'record_id','record_sha256','record_index'} & payload.keys())

          # CC-2 Guardian must be rejected by at least one gate.
          cc2_data=json.loads(cc2.read_text())
          cc2_pre=client.post('/record-chain/preflight',json=cc2_data)
          print('CC2_GUARDIAN_PREFLIGHT',cc2_pre.json())
          assert cc2_doctor.returncode != 0 or cc2_pre.json()['accepted'] is False

          # Tampering after signature must fail.
          tampered=json.loads(json.dumps(built['echo']))
          tampered['record_draft']['echo_content']['echo_text']='tampered'
          bad=client.post('/record-chain/preflight',json=tampered).json()
          print('TAMPERED_SIGNATURE',bad)
          assert bad['accepted'] is False

          # Wrong correction target hash must fail before persistence.
          wrong=json.loads(json.dumps(built['correction']))
          wrong['record_draft']['correction_content']['target_record_sha256']='2'*64
          # Re-signing is intentionally omitted; signature failure is also safe fail-closed.
          wrong_result=client.post('/record-chain/preflight',json=wrong).json()
          print('WRONG_TARGET_HASH',wrong_result)
          assert wrong_result['accepted'] is False

          print('ALL_ACTION_SMOKE_PASSED')
          PY
          status=$?
          echo "PYTHON_EXIT=${status}" >> diagnostics/e2e-action-smoke.txt
          git config user.name "trinity-accord-audit-bot"
          git config user.email "actions@users.noreply.github.com"
          git add diagnostics/e2e-action-smoke.txt
          git commit -m "diagnostics: capture all-action smoke audit"
          git push origin HEAD:agent/end-to-end-action-audit
