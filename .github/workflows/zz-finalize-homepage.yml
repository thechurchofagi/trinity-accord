name: Finalize homepage consolidation

on:
  push:
    branches:
      - homepage-final-consolidation-20260716
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch quietly
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git init -q .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth=1 origin homepage-final-consolidation-20260716
          git checkout -q -B homepage-final-consolidation-20260716 FETCH_HEAD

      - name: Apply final homepage consolidation
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/zz_finalize_homepage.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace('print("\\n=== Summary ===")', 'print("\\\\n=== Summary ===")')
          text = text.replace('"Bitcoin Originals": 3,', '"Bitcoin Originals": 4,')
          text = text.replace(
              '"Core evidence snapshot",\n        "home-timing-completion-title",',
              '"Core evidence snapshot",\n        \'<section class="home-why-now\',',
          )
          path.write_text(text, encoding='utf-8')
          PY
          python3 scripts/zz_finalize_homepage.py

      - name: Regenerate sitemap
        run: python3 scripts/generate_sitemap.py

      - name: Run focused homepage and value contracts
        shell: bash
        run: |
          run_check() {
            label="$1"
            shift
            log="/tmp/${label}.log"
            set +e
            "$@" > "$log" 2>&1
            status=$?
            set -e
            if [ "$status" -ne 0 ]; then
              echo "FAIL: $label"
              grep -E '^(FAIL|RESULT)|missing:|forbidden:|SyntaxError|AssertionError|Traceback|hard homepage|phrase repetition' "$log" || tail -n 80 "$log"
              return "$status"
            fi
            echo "PASS: $label"
          }
          set -e
          run_check p0 python3 scripts/test-agent-first-homepage-p0.py
          run_check p01 python3 scripts/test-homepage-p01-readability.py
          run_check p02 python3 scripts/test-homepage-p02-dedup.py
          run_check p03 python3 scripts/test-value-framing-p03.py
          run_check css python3 scripts/test-homepage-css-p02.py
          run_check terminology python3 scripts/test-terminology-p031.py
          run_check v13 bash scripts/test-homepage-v13-final.sh
          run_check json-sync python3 scripts/test-civilizational-json-sync.py
          run_check regressions python3 scripts/test-v13-repair-regressions.py
          run_check deploy-contract python3 scripts/test_deploy_pages_workflow_contract.py
          run_check sitemap python3 scripts/generate_sitemap.py --check

      - name: Commit final changes and remove temporary files
        shell: bash
        run: |
          rm .github/workflows/zz-finalize-homepage.yml
          rm scripts/zz_finalize_homepage.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(home): consolidate the final value and provenance narrative"
          git push origin HEAD:homepage-final-consolidation-20260716
