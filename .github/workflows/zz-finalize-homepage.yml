name: Finalize homepage consolidation

on:
  push:
    branches:
      - homepage-final-consolidation-20260716
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch quietly
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git init -q .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth=1 origin homepage-final-consolidation-20260716
          git checkout -q -B homepage-final-consolidation-20260716 FETCH_HEAD

      - name: Apply final homepage consolidation
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/zz_finalize_homepage.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace('print("\\n=== Summary ===")', 'print("\\\\n=== Summary ===")')
          text = text.replace('"Bitcoin Originals": 3,', '"Bitcoin Originals": 4,')
          text = text.replace(
              '"Core evidence snapshot",\n        "home-timing-completion-title",',
              '"Core evidence snapshot",\n        \'<section class="home-why-now\',',
          )
          path.write_text(text, encoding='utf-8')
          PY
          python3 scripts/zz_finalize_homepage.py
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/test-value-framing-p03.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              'require_contains(index, "existed no later than their confirmed blocks", "homepage states bounded timestamp claim")',
              'require_contains(index, "existed no later than the relevant confirmed block", "homepage states bounded timestamp claim")',
          )
          text = text.replace(
              'boundary_count = all_text.count("if another completed public object")',
              'boundary_count = all_text.count("if another completed public object") + all_text.count("if a comparable completed public object exists")',
          )
          text = text.replace(
              'check(boundary_count >= 2, "peer-comparison boundary appears across pages", f"count {boundary_count}")',
              'check(boundary_count >= 1, "peer-comparison boundary remains on deep research pages", f"count {boundary_count}")',
          )
          path.write_text(text, encoding='utf-8')
          PY

      - name: Regenerate sitemap
        run: python3 scripts/generate_sitemap.py

      - name: Run focused homepage and value contracts
        run: bash scripts/zz_run_final_checks.sh

      - name: Commit final changes and remove temporary files
        shell: bash
        run: |
          rm .github/workflows/zz-finalize-homepage.yml
          rm scripts/zz_finalize_homepage.py
          rm scripts/zz_run_final_checks.sh
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(home): consolidate the final value and provenance narrative"
          git push origin HEAD:homepage-final-consolidation-20260716
