name: Repository Full Integrity Check

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

concurrency:
  group: repository-full-integrity-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  static-integrity:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements-ci.txt

      - name: Record toolchain provenance
        run: python3 scripts/toolchain_provenance.py

      - name: Reject missing workflow and CI-group executables
        run: python3 scripts/test_workflows_do_not_reference_missing_scripts.py

      - name: Verify workflow permissions and retired writers
        run: python3 scripts/test_workflow_permissions.py

      - name: Validate JSON
        run: find . -name "*.json" -not -path "*/node_modules/*" -print0 | xargs -0 -n1 python3 -m json.tool > /dev/null

      - name: Compile all Python sources
        run: find . -name "*.py" -not -path "*/node_modules/*" -print0 | xargs -0 python3 -m py_compile

      - name: Verify current record chain
        run: python3 scripts/trinity_record_chain.py verify

  grouped-integrity:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        group:
          - p0-current
          - guardian
          - claim-gate
          - echo-archive
          - supply-chain
          - trust-root
          - chronicle
          - readback-integrity
          - agent-start-docs
          - verification-index
          - fast-regression
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: |
          python3 -m pip install -r requirements-ci.txt
          npm ci

      - name: Run current CI group
        run: python3 scripts/run_ci_group.py ${{ matrix.group }}
        env:
          GH_TOKEN: ${{ github.token }}

  pages-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - name: Build the production Pages site
        uses: actions/jekyll-build-pages@44a6e6beabd48582f863aeeb6cb2151cc1716697 # v1
        with:
          source: ./
          destination: ./_site
      - name: Verify homepage output
        run: test -s _site/index.html
