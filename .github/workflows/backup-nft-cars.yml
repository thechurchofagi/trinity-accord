name: Backup NFT CARs to Release

on:
  workflow_dispatch:
    inputs:
      concurrency:
        description: 'Parallel download count'
        default: '10'
        required: false
      dry_run:
        description: 'Dry run (list only, no download)'
        type: boolean
        default: false
  repository_dispatch:
    types: [backup-nft-cars]

jobs:
  download-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version: '22'

      - name: Validate inputs
        env:
          CONCURRENCY: ${{ inputs.concurrency || '10' }}
        run: |
          set -euo pipefail
          [[ "$CONCURRENCY" =~ ^[0-9]+$ ]] || { echo "Invalid concurrency"; exit 1; }
          [ "$CONCURRENCY" -ge 1 ] && [ "$CONCURRENCY" -le 25 ] || { echo "Concurrency out of range"; exit 1; }

      - name: Download NFT CARs and upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONCURRENCY: ${{ inputs.concurrency || '10' }}
          DRY_RUN: ${{ inputs.dry_run == 'true' && '1' || '' }}
          RELEASE_TAG: nft-backup-v1
        run: |
          node scripts/download-nft-cars.mjs
