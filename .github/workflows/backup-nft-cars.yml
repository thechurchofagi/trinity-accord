name: Backup NFT CARs to Release

on:
  workflow_dispatch:
    inputs:
      concurrency:
        description: "Parallel download count"
        default: "10"
        required: false
      dry_run:
        description: "Dry run (list only, no download)"
        type: boolean
        default: true
  repository_dispatch:
    types: [backup-nft-cars]

permissions:
  contents: write

concurrency:
  group: release-nft-cars
  cancel-in-progress: false

env:
  INPUT_CONCURRENCY: ${{ inputs.concurrency || '10' }}
  INPUT_DRY_RUN: ${{ inputs.dry_run }}

jobs:
  download-and-release:
    if: ${{ (github.event_name == 'repository_dispatch' || github.ref == 'refs/heads/main') && (github.actor == 'thechurchofagi' || github.actor == 'github-actions[bot]') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout current main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
          ref: main

      - name: Record toolchain provenance
        run: |
          python3 scripts/toolchain_provenance.py > "$RUNNER_TEMP/toolchain-provenance.json"
          cat "$RUNNER_TEMP/toolchain-provenance.json"

      - name: Authorize dispatch
        env:
          ACTOR: ${{ github.actor }}
          EVENT_NAME: ${{ github.event_name }}
          SENDER: ${{ github.event.sender.login }}
        run: |
          set -euo pipefail
          if [[ "$ACTOR" != "thechurchofagi" && "$ACTOR" != "github-actions[bot]" ]]; then
            echo "Unauthorized actor: $ACTOR" >&2
            exit 1
          fi
          if [ "$EVENT_NAME" = "repository_dispatch" ] && [[ "$SENDER" != "thechurchofagi" && "$SENDER" != "github-actions[bot]" ]]; then
            echo "Unauthorized repository_dispatch sender: $SENDER" >&2
            exit 1
          fi

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version-file: ".node-version"

      - name: Validate inputs
        run: |
          set -euo pipefail
          [[ "$INPUT_CONCURRENCY" =~ ^[0-9]+$ ]] || {
            echo "Invalid concurrency: $INPUT_CONCURRENCY" >&2
            exit 1
          }
          [ "$INPUT_CONCURRENCY" -ge 1 ] && [ "$INPUT_CONCURRENCY" -le 25 ] || {
            echo "Concurrency out of range: $INPUT_CONCURRENCY" >&2
            exit 1
          }

      - name: Download verified NFT CARs and upload to release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CONCURRENCY: ${{ inputs.concurrency || '10' }}
          DRY_RUN: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true') && '1' || '' }}
          RELEASE_TAG: nft-backup-v1
        run: |
          set -euo pipefail
          node scripts/download-nft-cars.mjs
