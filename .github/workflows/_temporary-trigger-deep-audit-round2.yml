name: Temporary Trigger Deep Audit Round 2

on:
  push:
    branches: [main]
    paths:
      - '.github/repair-trigger-round2'

permissions:
  contents: write

jobs:
  trigger:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Touch registered repair workflow
        run: |
          set -euo pipefail
          printf '\n# registered-trigger: %s\n' "$GITHUB_RUN_ID" >> .github/workflows/_temporary-deep-audit-round2-fix.yml
          git config user.name 'trinity-audit-repair-bot'
          git config user.email 'actions@github.com'
          git add .github/workflows/_temporary-deep-audit-round2-fix.yml
          git commit -m 'chore: trigger one-time deep audit repair'
          git push origin HEAD:main
