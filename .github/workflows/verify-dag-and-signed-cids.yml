name: Verify DAG and Signed CIDs (175 NFTs)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to verify'
        required: false
        default: 'nft-arweave-mirror-175-v1'
      eth_audit_file:
        description: 'Path to ONCHAIN-READ-AUDIT.json (optional)'
        required: false
        default: ''
      concurrency:
        description: 'DAG verify concurrency'
        required: false
        default: '8'
      eth_rpc_url:
        description: 'ETH RPC URL for witness verification'
        required: false
        default: 'https://eth.llamarpc.com'
      btc_api_base:
        description: 'Bitcoin API base URL'
        required: false
        default: 'https://mempool.space/api'

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run full verification (4 chains)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          DAG_VERIFY_CONCURRENCY: ${{ inputs.concurrency }}
          ETH_RPC_URL: ${{ inputs.eth_rpc_url }}
          BTC_API_BASE: ${{ inputs.btc_api_base }}
        run: |
          set -euo pipefail
          ARGS="--release-tag ${{ inputs.release_tag }} --concurrency ${{ inputs.concurrency }}"
          if [ -n "${{ inputs.eth_audit_file }}" ]; then
            ARGS="$ARGS --eth-audit-file ${{ inputs.eth_audit_file }}"
          fi
          node scripts/verify-dag-and-signed-cids.mjs $ARGS

      - name: Upload DAG-CID-AUDIT.json
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dag-cid-audit
          path: DAG-CID-AUDIT.json

      - name: Upload ETH-WITNESS-AUDIT.json
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eth-witness-audit
          path: ETH-WITNESS-AUDIT.json

      - name: Upload BITCOIN-TIME-ANCHOR-AUDIT.json
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bitcoin-time-anchor-audit
          path: BITCOIN-TIME-ANCHOR-AUDIT.json
