          python3 scripts/test_gateway_runtime_recovery_links.py
      - name: Confirm runtime and schema files were not modified
        shell: bash
        run: |
          set -euo pipefail
          changed="$(git diff --name-only origin/main...HEAD)"
          forbidden='^(downloads/record-chain-builder\.mjs|apps/record_chain_intake_gateway/|render\.yaml|Dockerfile|api/record-chain-submission-schema\.v1\.json|downloads/record-chain-agent-field-guidance\.v1\.json)$'
          if printf '%s\n' "$changed" | grep -E "$forbidden"; then
            echo "Unexpected Builder/Render/Gateway runtime or schema modification detected" >&2
            exit 1
          fi
      - name: Commit migrated entrypoints
        shell: bash
