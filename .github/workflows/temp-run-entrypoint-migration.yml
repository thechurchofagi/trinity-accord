name: Temporary Run Entrypoint Migration

on:
  pull_request:
    paths:
      - .github/workflows/temp-run-entrypoint-migration.yml

permissions:
  contents: write

jobs:
  run-migration:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: agent/complete-legacy-ar-eth-mirror-audit
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: ".node-version"
      - name: Install dependencies
        run: python3 -m pip install -r requirements-ci.txt
      - name: Record toolchain provenance
        run: python3 scripts/toolchain_provenance.py > /tmp/entrypoint-migration-toolchain.json
      - name: Extract and execute the reviewed migration script
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/temp-migrate-evidence-entrypoints.yml').read_text(encoding='utf-8')
          marker = "          python3 - <<'PY'\n"
          start = source.index(marker) + len(marker)
          end = source.index("\n          PY", start)
          raw_lines = source[start:end].splitlines()
          script = "\n".join(
              line[10:] if line.startswith("          ") else line
              for line in raw_lines
          ) + "\n"
          Path('/tmp/migrate-evidence-entrypoints.py').write_text(script, encoding='utf-8')
          PY
          python3 /tmp/migrate-evidence-entrypoints.py
          python3 scripts/generate_sitemap.py
      - name: Validate evidence models and JSON
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pytest -q tests/test_evidence_relationship_profiles.py tests/test_legacy_pointer_coverage.py
          for file in \
            .well-known/trinity-accord.json \
            .well-known/agent.json \
            api/links.json \
            api/agent-minimal-context.v1.json \
            api/agent-first-contact.json \
            api/agent-start.v2.json \
            api/agent-required-reading.json \
            api/agent-task-router.v1.json \
            api/verification-materials.json \
            api/verification-quick-map.json; do
            python3 -m json.tool "$file" >/dev/null
          done
      - name: Validate P0 and full current system
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/run_ci_group.py p0-current
          python3 scripts/run_current_system_tests.py
      - name: Validate Builder compatibility
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/check_builder_receipt_boundary_sync.py
          python3 scripts/test_builder_oath_readback_canonical_output.py
          python3 scripts/test_builder_help_urls_resolve.py
          python3 scripts/test_mission_public_route_parity.py
          node downloads/record-chain-builder.mjs --help >/tmp/record-chain-builder-help.txt
          test -s /tmp/record-chain-builder-help.txt
      - name: Validate Render and Gateway compatibility
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/test_render_deploy_boundary_contract.py
          python3 scripts/test_gateway_schema_shadow_parity.py
          python3 scripts/test_record_chain_intake_gateway_contract.py
          python3 scripts/test_gateway_runtime_recovery_links.py
      - name: Confirm runtime and schema files were not modified
        shell: bash
        run: |
          set -euo pipefail
          changed="$(git diff --name-only origin/main...HEAD)"
          forbidden='^(downloads/record-chain-builder\.mjs|apps/record_chain_intake_gateway/|render\.yaml|Dockerfile|api/record-chain-submission-schema\.v1\.json|downloads/record-chain-agent-field-guidance\.v1\.json)$'
          if printf '%s\n' "$changed" | grep -E "$forbidden"; then
            echo "Unexpected Builder/Render/Gateway runtime or schema modification detected" >&2
            exit 1
          fi
      - name: Commit permanent migration and remove temporary workflows
        shell: bash
        run: |
          set -euo pipefail
          git rm \
            .github/workflows/temp-migrate-evidence-entrypoints.yml \
            .github/workflows/temp-run-entrypoint-migration.yml
          git add \
            EVIDENCE-RELATIONSHIP-GUIDE.md \
            EVIDENCE-MODEL-MIGRATION-AUDIT.md \
            .well-known/trinity-accord.json \
            .well-known/agent.json \
            api/links.json \
            api/agent-minimal-context.v1.json \
            api/agent-first-contact.json \
            api/agent-start.v2.json \
            api/agent-required-reading.json \
            api/agent-task-router.v1.json \
            api/verification-materials.json \
            api/verification-quick-map.json \
            agent-first-contact.md \
            agent-verify.md \
            index.md \
            llms-full.txt \
            external-agent-quickstart.md \
            sitemap.xml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: migrate active evidence and context entrypoints"
          git push origin HEAD:agent/complete-legacy-ar-eth-mirror-audit
