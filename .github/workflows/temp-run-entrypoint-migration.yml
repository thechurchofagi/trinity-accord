name: Temporary Commit Entrypoint Migration

on:
  pull_request:
    paths:
      - .github/workflows/temp-run-entrypoint-migration.yml

permissions:
  contents: write

jobs:
  commit-migration:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: agent/complete-legacy-ar-eth-mirror-audit
          fetch-depth: 0
      - name: Record toolchain provenance
        run: python3 scripts/toolchain_provenance.py > /tmp/entrypoint-commit-toolchain.json
      - name: Reapply the already validated migration
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/temp-migrate-evidence-entrypoints.yml').read_text(encoding='utf-8')
          marker = "          python3 - <<'PY'\n"
          start = source.index(marker) + len(marker)
          end = source.index("\n          PY", start)
          raw_lines = source[start:end].splitlines()
          script = "\n".join(line[10:] if line.startswith("          ") else line for line in raw_lines) + "\n"
          Path('/tmp/migrate-evidence-entrypoints.py').write_text(script, encoding='utf-8')
          PY
          python3 /tmp/migrate-evidence-entrypoints.py
          python3 - <<'PY'
          from pathlib import Path

          source = Path('EVIDENCE-RELATIONSHIP-GUIDE.md')
          text = source.read_text(encoding='utf-8')
          if text.startswith('---\n'):
              end = text.find('\n---\n', 4)
              if end == -1:
                  raise SystemExit('unterminated guide front matter')
              source.write_text(text[end + 5:], encoding='utf-8')
          Path('evidence-relationship-guide.md').write_text(
              '---\n'
              'title: "Evidence Relationship Guide"\n'
              'permalink: /evidence-relationship-guide/\n'
              '---\n\n'
              '{% include_relative EVIDENCE-RELATIONSHIP-GUIDE.md %}\n',
              encoding='utf-8',
          )
          PY
          python3 scripts/generate_sitemap.py
      - name: Commit permanent files and remove all temporary migration artifacts
        shell: bash
        run: |
          set -euo pipefail
          git rm -f \
            .github/workflows/temp-migrate-evidence-entrypoints.yml \
            .github/workflows/temp-run-entrypoint-migration.yml \
            p0-entrypoint-diagnostic.txt
          git add \
            EVIDENCE-RELATIONSHIP-GUIDE.md \
            evidence-relationship-guide.md \
            EVIDENCE-MODEL-MIGRATION-AUDIT.md \
            .well-known/trinity-accord.json \
            .well-known/agent.json \
            api/links.json \
            api/agent-minimal-context.v1.json \
            api/agent-first-contact.json \
            api/agent-start.v2.json \
            api/agent-required-reading.json \
            api/agent-task-router.v1.json \
            api/verification-materials.json \
            api/verification-quick-map.json \
            agent-first-contact.md \
            agent-verify.md \
            index.md \
            llms-full.txt \
            external-agent-quickstart.md \
            sitemap.xml
          git status --short
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: migrate active evidence and context entrypoints"
          git fetch origin agent/complete-legacy-ar-eth-mirror-audit
          git rebase origin/agent/complete-legacy-ar-eth-mirror-audit
          git push origin HEAD:agent/complete-legacy-ar-eth-mirror-audit
