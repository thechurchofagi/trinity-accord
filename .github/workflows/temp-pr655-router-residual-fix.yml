name: Temporary PR655 router residual cleanup

on:
  push:
    branches:
      - agent/verification-model-cleanup

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/verification-model-cleanup
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: ".node-version"
      - run: python3 -m pip install -r requirements-ci.txt
      - name: Remove residual legacy verification route names
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path('api/agent-task-router.v1.json')
          data = json.loads(path.read_text(encoding='utf-8'))

          zero = data['zero_clone_builder_routes']
          old = zero.pop('record_chain_v0_v5_agent_declared_verification', None)
          zero['record_chain_current_verification'] = {
              'bundle': '/downloads/record-chain-builder.mjs',
              'requires_full_repo_clone': False,
              'requires_builder': True,
              'ordinary_external_agent_verification': True,
              'builder_command': 'verification',
              'current_route': 'verify_current_model',
              'legacy_builder_values': ['V0', 'V1', 'V2', 'V3', 'V4', 'V5'],
              '_status': 'current_record_chain_builder_route'
          }
          if old and old.get('bundle') != '/downloads/record-chain-builder.mjs':
              raise SystemExit('unexpected old verification bundle')

          data['verification_echo_redirect']['replacement_decision'] = {
              'current_verification_record': 'verify_current_model',
              'physical_or_strict_evidence': 'physical_or_strict_evidence_verification'
          }
          data['preferred_models']['verification_procedures'] = '/api/verification-procedures.v1.json'
          data['preferred_models']['verification_claim_model'] = '/api/verification-claim-model.v1.json'
          data['legacy_model_boundary'] = (
              'CC/CRL/V labels in historical records remain preserved. New agents must not infer a fixed Chronicle stage model, '
              'treat V4+/V6/V7/V8 as current verification levels, or use physical observation or external witness to raise digital_profile automatically.'
          )
          data.pop('source_digest', None)
          canonical = json.dumps(data, sort_keys=True, separators=(',', ':'), ensure_ascii=False).encode('utf-8')
          data['source_digest'] = hashlib.sha256(canonical).hexdigest()[:16]
          path.write_text(json.dumps(data, indent=2, ensure_ascii=False) + '\n', encoding='utf-8')

          test_path = Path('scripts/test_agent_p0_router_contract.py')
          text = test_path.read_text(encoding='utf-8')
          anchor = '    require("verify_v6_plus_strict_evidence" not in routes, "old V6+ route retired")\n'
          addition = anchor + '''    serialized_router = json.dumps(router, sort_keys=True)\n    require("record_chain_v0_v5_agent_declared_verification" not in serialized_router, "old zero-clone V0-V5 route name retired")\n    require("v6_plus_strict_evidence" not in serialized_router, "old V6+ replacement name retired")\n    require(router["verification_echo_redirect"]["replacement_decision"]["current_verification_record"] == "verify_current_model", "verification Echo redirect uses current verification route")\n'''
          if 'old zero-clone V0-V5 route name retired' not in text:
              if anchor not in text:
                  raise SystemExit('P0 residual assertion anchor not found')
              text = text.replace(anchor, addition, 1)
          test_path.write_text(text, encoding='utf-8')
          PY
          python3 -m json.tool api/agent-task-router.v1.json >/dev/null
          python3 scripts/test_agent_p0_router_contract.py
          python3 scripts/test_public_api_source_digest_if_present.py
          python3 scripts/test_agent_e2e_journey_matrix.py
          rm -f .github/workflows/temp-pr655-p0-diagnostic.yml
          rm -f diagnostics/pr655-p0-latest.txt
          rm -f .github/workflows/temp-pr655-router-residual-fix.yml
      - name: Commit permanent residual cleanup
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "trinity-accord-verification-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "verification: remove residual legacy router names"
          git push origin HEAD:agent/verification-model-cleanup
