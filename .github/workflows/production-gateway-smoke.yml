name: Production Gateway Smoke Test

on:
  workflow_dispatch:
    inputs:
      gateway_base_url:
        description: "Gateway base URL, e.g. https://your-service.onrender.com"
        required: true
        type: string
      require_readiness:
        description: "Fail if /readiness is not HTTP 200"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: production-gateway-smoke-${{ github.workflow }}-${{ inputs.gateway_base_url }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements-ci.txt

      - name: Replay Gateway fixtures against production preflight
        run: |
          EXTRA=""
          if [ "${{ inputs.require_readiness }}" = "true" ]; then
            EXTRA="--require-readiness"
          fi
          python3 scripts/replay_gateway_fixtures.py \
            --base-url "${{ inputs.gateway_base_url }}" \
            $EXTRA
