name: Temporary full public lifecycle E2E

on:
  push:
    branches:
      - agent/end-to-end-action-audit
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  lifecycle:
    if: >-
      (github.event_name == 'push' || github.head_ref == 'agent/end-to-end-action-audit') &&
      !startsWith(github.event.head_commit.message || '', 'diagnostics: full lifecycle E2E')
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/end-to-end-action-audit
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: ".node-version"
      - run: python3 -m pip install -r requirements-ci.txt
      - name: Run isolated lifecycle simulation
        shell: bash
        run: |
          set +e
          python3 scripts/test_full_public_action_lifecycle_e2e.py > /tmp/full-lifecycle-e2e.log 2>&1
          status=$?
          cat /tmp/full-lifecycle-e2e.log
          if [ "$status" -ne 0 ]; then
            mkdir -p diagnostics
            {
              echo "exit_status=$status"
              echo "head=$(git rev-parse HEAD)"
              echo "===== FULL LIFECYCLE E2E OUTPUT ====="
              tail -n 600 /tmp/full-lifecycle-e2e.log
            } > diagnostics/full-lifecycle-e2e-error.txt
            git config user.name "trinity-accord-audit-bot"
            git config user.email "actions@users.noreply.github.com"
            git add diagnostics/full-lifecycle-e2e-error.txt
            git commit -m "diagnostics: full lifecycle E2E failure"
            git push origin HEAD:agent/end-to-end-action-audit
            exit 0
          fi
