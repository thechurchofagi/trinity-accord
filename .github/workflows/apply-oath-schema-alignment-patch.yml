name: Apply Oath Schema Alignment Patch

on:
  push:
    branches:
      - agent/audit-main-integrity-hardening

permissions:
  contents: write

jobs:
  apply:
    if: contains(github.event.head_commit.message, 'stage oath schema alignment runner')
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: agent/audit-main-integrity-hardening
      - name: Apply exact persistence/schema patch
        run: |
          set -euo pipefail
          python3 scripts/apply_oath_schema_alignment_patch.py
          python3 -m json.tool api/record-chain-submission-schema.v1.json >/dev/null
          python3 -m py_compile apps/record_chain_intake_gateway/app.py scripts/test_public_submission_schema_alignment.py
      - name: Remove one-time patch files and push
        run: |
          set -euo pipefail
          rm -f scripts/apply_oath_schema_alignment_patch.py
          rm -f .github/workflows/apply-oath-schema-alignment-patch.yml
          git config user.name "trinity-audit-bot"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Redact transient oath readback and align public schema"
          git push origin HEAD:agent/audit-main-integrity-hardening
