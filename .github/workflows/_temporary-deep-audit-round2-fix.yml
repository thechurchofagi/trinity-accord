name: Temporary Deep Audit Round 2 Repair

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/_temporary-deep-audit-round2-fix.yml'

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/fix-deep-audit-round2
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'

      - name: Apply audited repairs
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import json
          import re

          ROOT = Path.cwd()

          def read(path):
              return (ROOT / path).read_text(encoding='utf-8')

          def write(path, text):
              (ROOT / path).write_text(text, encoding='utf-8')

          def replace_once(path, old, new):
              text = read(path)
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one occurrence, found {count}: {old[:120]!r}')
              write(path, text.replace(old, new, 1))

          def regex_once(path, pattern, repl):
              text = read(path)
              new, count = re.subn(pattern, repl, text, count=1, flags=re.M | re.S)
              if count != 1:
                  raise SystemExit(f'{path}: regex expected one occurrence, found {count}: {pattern}')
              write(path, new)

          canonical = 'apps/record_chain_intake_gateway/gateway/canonical.py'
          replace_once(
              canonical,
              'from typing import Any\n\n\n',
              '''from typing import Any\n\n\ndef _reject_non_finite_constant(value: str) -> None:\n    raise ValueError(f"Non-finite JSON number is forbidden: {value}")\n\n\ndef _reject_duplicate_object_pairs(pairs: list[tuple[str, Any]]) -> dict[str, Any]:\n    result: dict[str, Any] = {}\n    for key, value in pairs:\n        if key in result:\n            raise ValueError(f"Duplicate JSON object key is forbidden: {key}")\n        result[key] = value\n    return result\n\n\ndef parse_json_strict(data: str | bytes | bytearray) -> Any:\n    """Parse standards-compliant JSON and reject duplicate keys and NaN/Infinity."""\n    return json.loads(\n        data,\n        parse_constant=_reject_non_finite_constant,\n        object_pairs_hook=_reject_duplicate_object_pairs,\n    )\n\n\n'''
          )
          replace_once(
              canonical,
              'return json.dumps(obj, sort_keys=True, separators=(",", ":"), ensure_ascii=False)',
              'return json.dumps(obj, sort_keys=True, separators=(",", ":"), ensure_ascii=False, allow_nan=False)'
          )

          adapter = 'apps/record_chain_intake_gateway/gateway/github_adapter.py'
          marker = '\n\nasync def delete_file(\n'
          adapter_text = read(adapter)
          if marker not in adapter_text:
              raise SystemExit('github_adapter delete_file marker not found')
          confirmed = '''\n\nasync def put_file_confirmed(\n    path: str,\n    content: str,\n    message: str,\n    sha: str | None = None,\n) -> dict[str, Any]:\n    """Write a file and reconcile timeout-after-commit ambiguity.\n\n    A failed HTTP response does not prove GitHub rejected the commit. Before\n    reporting failure or rolling anything back, read the remote path and accept\n    the operation only when the exact intended bytes are already durable.\n    """\n    try:\n        return await put_file(path, content, message, sha=sha)\n    except Exception:\n        remote_text = await get_file_text(path)\n        if remote_text != content:\n            raise\n        remote_sha = await get_file_sha(path)\n        if not remote_sha:\n            raise RuntimeError(f"GitHub write for {path} appears durable but has no readable blob SHA")\n        logger.warning("Reconciled ambiguous GitHub write for %s after transport/API error", path)\n        return {\n            "content": {"sha": remote_sha},\n            "commit": {"sha": None},\n            "reconciled_after_error": True,\n        }\n'''
          write(adapter, adapter_text.replace(marker, confirmed + marker, 1))

          rate = 'apps/record_chain_intake_gateway/gateway/rate_limit.py'
          replace_once(
              rate,
              'PARTICIPANT_LIMIT_PER_HOUR = 10\n_WINDOW_SECONDS = 3600\n',
              'PARTICIPANT_LIMIT_PER_HOUR = 10\n_WINDOW_SECONDS = 3600\nPREFLIGHT_GLOBAL_LIMIT_PER_MINUTE = 600\nPREFLIGHT_CLIENT_LIMIT_PER_MINUTE = 120\n_PREFLIGHT_WINDOW_SECONDS = 60\n'
          )
          replace_once(
              rate,
              '_participant_timestamps: dict[str, list[float]] = {}\n_state_lock = threading.Lock()\n',
              '_participant_timestamps: dict[str, list[float]] = {}\n_preflight_global_timestamps: list[float] = []\n_preflight_client_timestamps: dict[str, list[float]] = {}\n_state_lock = threading.Lock()\n'
          )
          preflight_limiter = '''\n\ndef check_preflight_rate_limit(client_key: str) -> dict[str, Any] | None:\n    """Protect the public preflight route and downstream GitHub lookups."""\n    key = client_key.strip() or "unknown"\n    now = time.time()\n    cutoff = now - _PREFLIGHT_WINDOW_SECONDS\n    with _state_lock:\n        global _preflight_global_timestamps\n        _preflight_global_timestamps = [t for t in _preflight_global_timestamps if t >= cutoff]\n        client_entries = [t for t in _preflight_client_timestamps.get(key, []) if t >= cutoff]\n        _preflight_client_timestamps[key] = client_entries\n\n        if len(_preflight_global_timestamps) >= PREFLIGHT_GLOBAL_LIMIT_PER_MINUTE:\n            return _build_preflight_rate_limit_response(\n                "global", PREFLIGHT_GLOBAL_LIMIT_PER_MINUTE, _preflight_global_timestamps, now\n            )\n        if len(client_entries) >= PREFLIGHT_CLIENT_LIMIT_PER_MINUTE:\n            return _build_preflight_rate_limit_response(\n                "client", PREFLIGHT_CLIENT_LIMIT_PER_MINUTE, client_entries, now\n            )\n\n        _preflight_global_timestamps.append(now)\n        client_entries.append(now)\n        return None\n\n\ndef _build_preflight_rate_limit_response(\n    limit_type: str, limit: int, entries: list[float], now: float\n) -> dict[str, Any]:\n    retry_after = max(int(entries[0] + _PREFLIGHT_WINDOW_SECONDS - now), 1) if entries else 1\n    return {\n        "accepted": False,\n        "preflight": True,\n        "diagnostics": [{\n            "code": "PREFLIGHT_RATE_LIMIT_EXCEEDED",\n            "severity": "error",\n            "field": "preflight",\n            "message": f"Preflight {limit_type} limit of {limit} requests per minute reached.",\n            "meaning": "The validation endpoint is temporarily rate limited to protect public availability and dependent repository lookups.",\n            "suggested_fix": f"Wait {retry_after} seconds before retrying preflight.",\n            "help_url": "https://www.trinityaccord.org/api/gateway-rate-limit-policy.v1.json",\n            "retry_allowed": True,\n        }],\n        "retry_after_seconds": retry_after,\n        "rate_limit": {\n            "limit_type": f"preflight_{limit_type}",\n            "limit": limit,\n            "window_seconds": _PREFLIGHT_WINDOW_SECONDS,\n        },\n    }\n'''
          replace_once(rate, '\n\ndef reset() -> None:\n', preflight_limiter + '\n\ndef reset() -> None:\n')
          replace_once(
              rate,
              '    global _global_timestamps\n    with _state_lock:\n        _global_timestamps = []\n        _participant_timestamps.clear()\n',
              '    global _global_timestamps, _preflight_global_timestamps\n    with _state_lock:\n        _global_timestamps = []\n        _participant_timestamps.clear()\n        _preflight_global_timestamps = []\n        _preflight_client_timestamps.clear()\n'
          )

          app = 'apps/record_chain_intake_gateway/gateway/app.py'
          replace_once(
              app,
              'from apps.record_chain_intake_gateway.gateway.canonical import canonical_dumps, sha256_canonical_json',
              'from apps.record_chain_intake_gateway.gateway.canonical import canonical_dumps, parse_json_strict, sha256_canonical_json'
          )
          replace_once(
              app,
              'from apps.record_chain_intake_gateway.gateway.github_adapter import delete_file, dispatch_workflow, get_file_sha, get_file_text, put_file',
              'from apps.record_chain_intake_gateway.gateway.github_adapter import delete_file, dispatch_workflow, get_file_sha, get_file_text, put_file_confirmed'
          )
          replace_once(
              app,
              'from apps.record_chain_intake_gateway.gateway.rate_limit import check_rate_limit',
              'from apps.record_chain_intake_gateway.gateway.rate_limit import check_preflight_rate_limit, check_rate_limit'
          )
          text = read(app).replace('await put_file(', 'await put_file_confirmed(')
          if text == read(app):
              raise SystemExit('app.py: no put_file calls replaced')
          write(app, text)
          text = read(app)
          if text.count('body = json.loads(raw_body)') != 2:
              raise SystemExit('app.py: expected two request json.loads calls')
          text = text.replace('body = json.loads(raw_body)', 'body = parse_json_strict(raw_body)')
          text = text.replace('except json.JSONDecodeError as exc:', 'except (json.JSONDecodeError, ValueError) as exc:')
          write(app, text)

          replace_once(
              app,
              'async def preflight(request: Request) -> PreflightResponse | JSONResponse:\n    # Part G: streaming body-size limit\n',
              '''async def preflight(request: Request) -> PreflightResponse | JSONResponse:\n    client_key = request.client.host if request.client else "unknown"\n    preflight_limit = check_preflight_rate_limit(client_key)\n    if preflight_limit is not None:\n        preflight_limit["boundary"] = _build_preflight_boundary({})\n        preflight_limit["gateway_runtime"] = _build_gateway_runtime()\n        preflight_limit["gateway_schema"] = _GATEWAY_SCHEMA\n        return JSONResponse(status_code=429, content=preflight_limit)\n\n    # Part G: streaming body-size limit\n'''
          )

          replace_once(
              app,
              '    # Check if all diagnostics are retryable\n    all_retryable = all(d.retry_allowed for d in diagnostics if d.severity == "error")\n',
              '''    permanent_errors = [\n        d for d in diagnostics if d.severity == "error" and not d.retry_allowed\n    ]\n    if permanent_errors:\n        codes_summary = ", ".join(sorted({d.code for d in permanent_errors}))\n        return AgentRecovery(\n            should_retry=False,\n            recommended_next_step=(\n                f"Do not automatically retry this unchanged submission. Permanent error(s): {codes_summary}. "\n                "Follow each diagnostic's suggested_fix; obtain the required original key or human review when applicable."\n            ),\n            helper_url=f"{_GATEWAY_BASE_URL}/docs/validation-errors" if _GATEWAY_BASE_URL else None,\n            human_readable_helper_url="Trinity Accord Validation Error Reference",\n            requires_human_attention=True,\n        )\n\n    # Check if all diagnostics are retryable\n    all_retryable = all(d.retry_allowed for d in diagnostics if d.severity == "error")\n'''
          )

          idemp_pattern = r'''            except Exception as idemp_exc:\n.*?\n            # Write 4: pending file \(create only\) — LAST\.'''
          idemp_repl = '''            except Exception as idemp_exc:\n                logger.warning(\n                    "Idempotency index write failed for %s: %s",\n                    original_submission_sha256[:16],\n                    idemp_exc,\n                )\n\n                existing_idx: dict[str, Any] | None = None\n                try:\n                    existing_idx = await _read_idempotency_index(original_submission_sha256)\n                except Exception as read_exc:\n                    logger.warning(\n                        "Could not read existing idempotency index for %s after write failure: %s",\n                        original_submission_sha256[:16],\n                        read_exc,\n                    )\n\n                if existing_idx is not None:\n                    exact_same_transaction = all((\n                        existing_idx.get("submission_sha256") == original_submission_sha256,\n                        existing_idx.get("stored_submission_sha256") == stored_submission_sha256,\n                        existing_idx.get("receipt_id") == receipt_id,\n                        existing_idx.get("receipt_path") == receipt_path,\n                        existing_idx.get("pending_file_path") == pending_file_path,\n                        existing_idx.get("intake_submission_path") == intake_submission_path,\n                    ))\n                    if exact_same_transaction:\n                        if existing_idx.get("pending_written") is True:\n                            return await _submit_response_from_idempotency_index(\n                                index=existing_idx,\n                                record_type=record_type,\n                                submission_sha256=original_submission_sha256,\n                                received_raw_body_sha256=received_raw_body_sha256,\n                                body=body,\n                            )\n                        existing_sha = await get_file_sha(idempotency_path)\n                        if not existing_sha:\n                            raise RuntimeError("Matching idempotency index exists but its blob SHA is unreadable")\n                        result_idx = {"content": {"sha": existing_sha}, "commit": {"sha": None}}\n                        logger.info("Recovered matching idempotency index %s after ambiguous write", idempotency_path)\n                    else:\n                        await _best_effort_delete_created_files(created_files_for_rollback, receipt_id)\n                        try:\n                            return await _submit_response_from_idempotency_index(\n                                index=existing_idx,\n                                record_type=record_type,\n                                submission_sha256=original_submission_sha256,\n                                received_raw_body_sha256=received_raw_body_sha256,\n                                body=body,\n                            )\n                        except HTTPException:\n                            raise\n                        except Exception as response_exc:\n                            logger.error(\n                                "Concurrent idempotency state could not be converted into response for %s: %s",\n                                original_submission_sha256[:16],\n                                response_exc,\n                            )\n                            return SubmitResponse(\n                                accepted=False,\n                                submitted=False,\n                                record_type=record_type,\n                                submission_sha256=original_submission_sha256,\n                                received_raw_body_sha256=received_raw_body_sha256,\n                                diagnostics=[Diagnostic(\n                                    code="IDEMPOTENCY_INDEX_CONFLICT",\n                                    severity="error",\n                                    field="record-chain/intake/by-submission-sha256",\n                                    message="A different durable transaction already owns this submission hash.",\n                                    meaning="The gateway refused to overwrite or roll back another intake transaction.",\n                                    suggested_fix="Retry the exact same submission later or ask an operator to inspect the durable index.",\n                                    retry_allowed=True,\n                                )],\n                                boundary=_build_submit_boundary(body),\n                            )\n                else:\n                    await _best_effort_delete_created_files(created_files_for_rollback, receipt_id)\n                    return SubmitResponse(\n                        accepted=False,\n                        submitted=False,\n                        record_type=record_type,\n                        submission_sha256=original_submission_sha256,\n                        received_raw_body_sha256=received_raw_body_sha256,\n                        diagnostics=[Diagnostic(\n                            code="IDEMPOTENCY_INDEX_PERSIST_FAILED",\n                            severity="error",\n                            field="record-chain/intake/by-submission-sha256",\n                            message=f"Persisted intake artifacts were rolled back because idempotency index creation failed: {idemp_exc}",\n                            meaning="The gateway must not accept an intake without its global duplicate-submission index.",\n                            suggested_fix="Retry the same submission later; if the original request succeeded concurrently, the gateway will return the existing receipt.",\n                            retry_allowed=True,\n                        )],\n                        boundary=_build_submit_boundary(body),\n                    )\n\n            # Write 4: pending file (create only) — LAST.'''
          regex_once(app, idemp_pattern, idemp_repl)

          replace_once(
              app,
              '            except Exception:\n                logger.warning("Failed to update idempotency index with pending_written (non-fatal)")\n',
              '''            except Exception as finalize_exc:\n                raise RuntimeError(\n                    "Pending file was written but the idempotency index could not be finalized"\n                ) from finalize_exc\n'''
          )
          replace_once(
              app,
              '        except Exception as exc:\n            logger.error("Failed to persist %s: %s", receipt_id, exc)\n',
              '        except HTTPException:\n            raise\n        except Exception as exc:\n            logger.error("Failed to persist %s: %s", receipt_id, exc)\n'
          )

          waiting = 'scripts/generate_waiting_heartbeat_status.py'
          replace_once(
              waiting,
              '    INDEX_PATH.parent.mkdir(parents=True, exist_ok=True)\n    STATUS_PATH.parent.mkdir(parents=True, exist_ok=True)\n    INDEX_PATH.write_text(dump_json(index), encoding="utf-8")\n    STATUS_PATH.write_text(dump_json(status), encoding="utf-8")\n',
              '''    old_status = read_json(STATUS_PATH, {})\n    old_index = read_json(INDEX_PATH, {})\n    status_semantic = {k: v for k, v in status.items() if k != "generated_at"}\n    old_status_semantic = {k: v for k, v in old_status.items() if k != "generated_at"}\n    index_semantic = {k: v for k, v in index.items() if k != "generated_at"}\n    old_index_semantic = {k: v for k, v in old_index.items() if k != "generated_at"}\n    if status_semantic == old_status_semantic and index_semantic == old_index_semantic:\n        stable_generated_at = old_status.get("generated_at") or old_index.get("generated_at")\n        if stable_generated_at:\n            status["generated_at"] = stable_generated_at\n            index["generated_at"] = stable_generated_at\n\n    INDEX_PATH.parent.mkdir(parents=True, exist_ok=True)\n    STATUS_PATH.parent.mkdir(parents=True, exist_ok=True)\n    INDEX_PATH.write_text(dump_json(index), encoding="utf-8")\n    STATUS_PATH.write_text(dump_json(status), encoding="utf-8")\n'''
          )

          guidance = 'agent-record-chain-guidance/index.html'
          replace_once(
              guidance,
              '<p>Key fields: <code>record_type</code>, <code>actor_label</code>, <code>provider</code>, <code>title</code>, <code>body</code>, <code>context_level</code>, <code>discovery_mode</code>, <code>requesting_party_type</code>, <code>record_decision</code>, <code>submission_executor</code>, <code>human_operator_involved</code>.</p>',
              '<p>Key Builder inputs include <code>--body</code>, <code>--context-level</code>, <code>--discovery-mode</code>, <code>--requesting-party-type</code>, <code>--record-decision</code>, <code>--submission-executor</code>, and <code>--human-operator-involved</code>. The Builder maps these inputs into the current v2 record blocks; do not handwrite the retired draft field <code>context_level</code>.</p>'
          )
          replace_once(
              guidance,
              '  <li><code>--oath</code>: the stewardship oath text</li>',
              '  <li><code>--guardian-stewardship-oath</code>: optional stewardship oath override; omit it to use the canonical Builder default</li>'
          )

          policy_path = ROOT / 'api/gateway-rate-limit-policy.v1.json'
          policy = json.loads(policy_path.read_text(encoding='utf-8'))
          policy['purpose'] = 'Trust-first rate limits for public Record-Chain Intake Gateway submit and preflight routes. Single-process in-memory; not durable across restarts; not multi-instance safe.'
          policy['preflight_policy'] = {
              'global_request_limit_per_minute': 600,
              'client_request_limit_per_minute': 120,
              'applies_before_expensive_target_repository_lookups': True,
              'response_http_status': 429,
              'diagnostic_code': 'PREFLIGHT_RATE_LIMIT_EXCEEDED',
          }
          policy_path.write_text(json.dumps(policy, indent=2, ensure_ascii=False, allow_nan=False) + '\n', encoding='utf-8')

          waiting_workflow = '.github/workflows/waiting-heartbeat-status-sync.yml'
          regex_once(waiting_workflow, r'^on:\n.*?(?=^permissions:)', 'on:\n  workflow_dispatch:\n\n')

          deploy = '.github/workflows/deploy-pages.yml'
          regex_once(deploy, r'^  push:\n.*?(?=^permissions:)', '')

          home = '.github/workflows/homepage-status-sync.yml'
          replace_once(
              home,
              '\n  schedule:\n',
              '''\n  push:\n    branches:\n      - main\n    paths:\n      - "api/**"\n      - "*.md"\n      - "*.json"\n      - "*.xml"\n      - "llms.txt"\n      - "llms-full.txt"\n      - "ai.txt"\n      - ".well-known/**"\n      - "assets/**"\n      - "downloads/**"\n      - "agent-record-chain-guidance/**"\n      - "_layouts/**"\n      - "_config.yml"\n      - "CNAME"\n      - ".github/workflows/deploy-pages.yml"\n      - ".github/workflows/homepage-status-sync.yml"\n\n  schedule:\n'''
          )
          replace_once(
              home,
              '      - "Waiting Heartbeat Status Sync"\n',
              '      - "Waiting Heartbeat Status Sync"\n      - "Waiting Heartbeat Submit"\n'
          )
          retry_old = '''            echo "Push failed on attempt ${attempt}; rebasing and retrying."\n            git fetch origin main --prune\n            git rebase origin/main\n\n            sleep $((attempt * 5))\n'''
          retry_new = '''            echo "Push failed on attempt ${attempt}; rebasing, regenerating, and retrying."\n            git fetch origin main --prune\n            git rebase origin/main\n            generate_and_verify\n            git add \\\n              record-chain/heartbeat/index.json \\\n              api/waiting-heartbeat-status.json \\\n              api/arweave-wallet-status.json \\\n              api/guardian-state.json \\\n              api/guardian-current-registry.json \\\n              api/record-chain-status.json \\\n              api/public-home-status.json \\\n              index.md \\\n              sitemap.xml\n            git commit --amend --no-edit\n\n            sleep $((attempt * 5))\n'''
          replace_once(home, retry_old, retry_new)
          replace_once(
              home,
              "if: ${{ steps.commit.outputs.changed == 'true' || (github.event_name == 'workflow_dispatch' && github.event.inputs.force_deploy == 'true') || steps.live_pre.outcome == 'failure' }}",
              "if: ${{ steps.commit.outputs.changed == 'true' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.force_deploy == 'true') || steps.live_pre.outcome == 'failure' }}"
          )
          replace_once(
              home,
              '''          elif [[ "${FORCE_DEPLOY}" == "true" ]]; then\n            reason="manual_force_deploy"\n          elif [[ "${LIVE_PRE_OUTCOME}" == "failure" ]]; then\n''',
              '''          elif [[ "${FORCE_DEPLOY}" == "true" ]]; then\n            reason="manual_force_deploy"\n          elif [[ "${{ github.event_name }}" == "push" ]]; then\n            reason="source_push"\n          elif [[ "${LIVE_PRE_OUTCOME}" == "failure" ]]; then\n'''
          )
          replace_once(
              home,
              '          python3 scripts/check_homepage_live_freshness.py --site "$SITE_URL" --timeout 20\n',
              '          python3 scripts/check_homepage_live_freshness.py --site "$SITE_URL" --timeout 20\n          python3 scripts/check_deployment_freshness.py --site "$SITE_URL" --timeout 20\n'
          )
          replace_once(
              home,
              '          python3 scripts/check_homepage_live_freshness.py --site "$SITE_URL" --timeout 20 --retries 3 --retry-sleep 60\n',
              '          python3 scripts/check_homepage_live_freshness.py --site "$SITE_URL" --timeout 20 --retries 3 --retry-sleep 60\n          python3 scripts/check_deployment_freshness.py --site "$SITE_URL" --timeout 20\n'
          )
          home_text = read(home)
          final_step = '''\n\n      - name: Final live deployment contract check\n        if: ${{ steps.deploy_dispatch.outcome == 'success' }}\n        run: |\n          set -euo pipefail\n          if [[ "${{ steps.post_freshness.outcome }}" == "failure" ]]; then\n            echo "Waiting for the retry deployment to finish."\n            sleep 120\n          fi\n          python3 scripts/check_homepage_live_freshness.py --site "$SITE_URL" --timeout 20 --retries 3 --retry-sleep 30\n          python3 scripts/check_deployment_freshness.py --site "$SITE_URL" --timeout 20\n'''
          if 'Final live deployment contract check' in home_text:
              raise SystemExit('homepage workflow already contains final live check')
          write(home, home_text.rstrip() + final_step + '\n')

          test_file = ROOT / 'apps/record_chain_intake_gateway/tests/test_deep_audit_round2.py'
          test_file.write_text(r'''from __future__ import annotations

import json
from pathlib import Path

import pytest

from apps.record_chain_intake_gateway.gateway import github_adapter
from apps.record_chain_intake_gateway.gateway.app import _build_agent_recovery
from apps.record_chain_intake_gateway.gateway.canonical import canonical_dumps, parse_json_strict
from apps.record_chain_intake_gateway.gateway.models import Diagnostic

ROOT = Path(__file__).resolve().parents[3]


def test_strict_json_rejects_non_finite_numbers_and_duplicate_keys() -> None:
    with pytest.raises(ValueError):
        parse_json_strict(b'{"x": NaN}')
    with pytest.raises(ValueError):
        parse_json_strict(b'{"x": 1, "x": 2}')
    with pytest.raises(ValueError):
        canonical_dumps({"x": float("inf")})


def test_non_retryable_diagnostic_stops_automatic_retry() -> None:
    recovery = _build_agent_recovery([
        Diagnostic(
            code="GUARDIAN_RETIREMENT_TARGET_KEY_MISMATCH",
            severity="error",
            message="wrong key",
            retry_allowed=False,
        )
    ])
    assert recovery.should_retry is False
    assert recovery.requires_human_attention is True


@pytest.mark.asyncio
async def test_confirmed_write_reconciles_timeout_after_commit(monkeypatch: pytest.MonkeyPatch) -> None:
    async def ambiguous_put(*args, **kwargs):
        raise TimeoutError("response lost after commit")

    async def remote_text(path: str):
        return "exact-content"

    async def remote_sha(path: str):
        return "blob-sha"

    monkeypatch.setattr(github_adapter, "put_file", ambiguous_put)
    monkeypatch.setattr(github_adapter, "get_file_text", remote_text)
    monkeypatch.setattr(github_adapter, "get_file_sha", remote_sha)

    result = await github_adapter.put_file_confirmed("x.json", "exact-content", "write")
    assert result["content"]["sha"] == "blob-sha"
    assert result["reconciled_after_error"] is True


@pytest.mark.asyncio
async def test_confirmed_write_rejects_mismatched_remote_content(monkeypatch: pytest.MonkeyPatch) -> None:
    async def failed_put(*args, **kwargs):
        raise TimeoutError("ambiguous")

    async def remote_text(path: str):
        return "different-content"

    monkeypatch.setattr(github_adapter, "put_file", failed_put)
    monkeypatch.setattr(github_adapter, "get_file_text", remote_text)

    with pytest.raises(TimeoutError):
        await github_adapter.put_file_confirmed("x.json", "intended-content", "write")


def test_public_guidance_and_workflow_contracts_are_current() -> None:
    guidance = (ROOT / "agent-record-chain-guidance/index.html").read_text(encoding="utf-8")
    assert "--guardian-stewardship-oath" in guidance
    assert "<li><code>--oath</code>" not in guidance
    assert "do not handwrite the retired draft field <code>context_level</code>" in guidance

    waiting = (ROOT / ".github/workflows/waiting-heartbeat-status-sync.yml").read_text(encoding="utf-8")
