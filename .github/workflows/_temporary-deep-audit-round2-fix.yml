    assert "Final live deployment contract check" in homepage
    assert "Waiting Heartbeat Submit" in homepage

    app_source = (ROOT / "apps/record_chain_intake_gateway/gateway/app.py").read_text(encoding="utf-8")
    assert "put_file_confirmed" in app_source
    assert "pending_written (non-fatal)" not in app_source
