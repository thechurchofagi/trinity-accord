name: Temporary Finalize Evidence Model

on:
  pull_request:
    paths:
      - .github/workflows/temp-finalize-evidence-model.yml

permissions:
  contents: write

jobs:
  finalize:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: agent/complete-legacy-ar-eth-mirror-audit
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: ".node-version"
      - name: Install dependencies
        run: python3 -m pip install -r requirements-ci.txt
      - name: Record toolchain provenance
        run: python3 scripts/toolchain_provenance.py > /tmp/evidence-model-toolchain-provenance.json
      - name: Apply verified corrections and regenerate metadata
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          from pathlib import Path

          index_path = Path("archive/legacy-pointers/index.json")
          index = json.loads(index_path.read_text(encoding="utf-8"))
          columns = index["arweave_columns"]
          txid_i = columns.index("txid")
          sha_i = columns.index("sha256")
          note_i = columns.index("note")
          target_txid = "RgjVJnALSbbYP4Vzz-FBX0Tie9inSvuA2PBgjPAT2ng"
          target_sha = "e19018f1c71da8307ef20e8e8e5c12834f854d60a6aae60e35d2d8c71a333a81"
          for row in index["arweave"]:
              if row[txid_i] == target_txid:
                  row[sha_i] = target_sha
                  row[note_i] = (
                      "Registry transcription corrected to the SHA-256 recorded by the legacy homepage "
                      "for both the Arweave text and Ethereum calldata; repository byte check matches."
                  )
                  break
          else:
              raise SystemExit("Guardian Principles v1.1 AR row not found")
          index_path.write_text(
              json.dumps(index, ensure_ascii=False, separators=(",", ":")) + "\n",
              encoding="utf-8",
          )

          agent_start = Path("agent-start.md")
          text = agent_start.read_text(encoding="utf-8")
          text = text.replace(
              "## Legacy Context Depth (CC) and CRL compatibility",
              "## Legacy Context Depth (CC) and Context Readiness Level (CRL) compatibility",
          )
          text = text.replace(
              "- CC describes reading depth under the old inherited ladder.\n- The sufficiency boolean says whether the selected action can honestly be performed.",
              "- Context Depth (CC) describes reading depth under the old inherited ladder.\n- Context Readiness Level (CRL), expressed by the sufficiency declaration, says whether the selected action can honestly be performed.",
          )
          agent_start.write_text(text, encoding="utf-8")

          candidates = [
              Path("api/verification-levels.json"),
              Path("api/context-depth-levels.json"),
              Path("api/context-load-map.json"),
              Path("api/claim-registry.json"),
          ]
          for path in candidates:
              data = json.loads(path.read_text(encoding="utf-8"))
              if "source_digest" not in data:
                  continue
              canonical = json.dumps(
                  {key: value for key, value in data.items() if key != "source_digest"},
                  ensure_ascii=False,
                  sort_keys=True,
                  separators=(",", ":"),
              )
              data["source_digest"] = hashlib.sha256(canonical.encode("utf-8")).hexdigest()[:16]
              path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY
          python3 scripts/generate_sitemap.py
      - name: Generate full-site migration audit
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from __future__ import annotations

          from pathlib import Path
          import re

          root = Path(".")
          output = Path("EVIDENCE-MODEL-MIGRATION-AUDIT.md")
          extensions = {".md", ".json", ".txt", ".html"}
          excluded_roots = {
              ".git", "node_modules", "vendor", "archive/legacy-pointers/raw",
              "archive/legacy-pointers/eth-raw"
          }
          historical_prefixes = (
              "archive/", "nft-text-descriptions/", "evidence/", "record-chain/",
          )
          patterns = {
              "legacy_verification_api": re.compile(r"verification-levels\.json|V0.?V8|Verification OS", re.I),
              "legacy_context_api": re.compile(r"context-depth-levels\.json|context-load-map\.json|CC-[0-5]|Context Readiness|\bCRL\b", re.I),
              "preferred_verification": re.compile(r"verification-profiles\.v1\.json|evidence-relationship-map\.v1\.json", re.I),
              "preferred_context": re.compile(r"context-action-profiles\.v1\.json", re.I),
          }

          active_hits = []
          historical_hits = []
          flagged = set()
          scanned = 0

          for path in sorted(root.rglob("*")):
              if not path.is_file() or path.suffix.lower() not in extensions:
                  continue
              rel = path.as_posix().removeprefix("./")
              if rel == output.as_posix() or rel.startswith(".github/workflows/temp-"):
                  continue
              if any(rel == prefix or rel.startswith(prefix + "/") for prefix in excluded_roots):
                  continue
              try:
                  text = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue
              scanned += 1
              has_old_verification = bool(patterns["legacy_verification_api"].search(text))
              has_old_context = bool(patterns["legacy_context_api"].search(text))
              has_new_verification = bool(patterns["preferred_verification"].search(text))
              has_new_context = bool(patterns["preferred_context"].search(text))
              is_historical = rel.startswith(historical_prefixes)
              destination = historical_hits if is_historical else active_hits

              for line_no, line in enumerate(text.splitlines(), start=1):
                  matched = [name for name, pattern in patterns.items() if pattern.search(line)]
                  if matched:
                      destination.append((rel, line_no, ", ".join(matched), line.strip()[:220]))

              if not is_historical:
                  if has_old_verification and not has_new_verification:
                      flagged.add((rel, "legacy verification references without preferred evidence/profile reference"))
                  if has_old_context and not has_new_context:
                      flagged.add((rel, "legacy context references without preferred action-profile reference"))

          lines = [
              "# Evidence Model Migration Audit",
              "",
              "> Non-amending repository migration audit. Bitcoin Originals remain final.",
              "",
              "## Summary",
              "",
              f"- Text/JSON/HTML files scanned: **{scanned}**",
              f"- Active-surface reference hits: **{len(active_hits)}**",
              f"- Historical/archive reference hits: **{len(historical_hits)}**",
              f"- Active files requiring manual review: **{len(flagged)}**",
              "",
              "The purpose of this audit is not to delete historical V0-V8 or CC/CRL records. It identifies active public surfaces that must either point to the preferred descriptive profiles or explicitly state that the numeric systems are compatibility metadata.",
              "",
              "## Active files requiring manual review",
              "",
          ]
          if flagged:
              for rel, reason in sorted(flagged):
                  lines.append(f"- `{rel}` — {reason}")
          else:
              lines.append("- None detected by the migration rules.")

          lines.extend(["", "## Active-surface matches", ""])
          for rel, line_no, kinds, snippet in active_hits:
              lines.append(f"- `{rel}:{line_no}` [{kinds}] — `{snippet}`")

          lines.extend(["", "## Historical/archive matches", ""])
          for rel, line_no, kinds, snippet in historical_hits:
              lines.append(f"- `{rel}:{line_no}` [{kinds}] — `{snippet}`")

          lines.extend([
              "",
              "## Migration decision",
              "",
              "- New reports lead with descriptive digital profiles.",
              "- Physical observation and external witness remain separate dimensions.",
              "- V0-V8, CC-0 through CC-5, and CRL remain compatibility fields for archived records and the current Builder schema.",
              "- Builder and Render/Gateway contracts must remain unchanged until a separately versioned schema migration is implemented.",
              "",
          ])
          output.write_text("\n".join(lines), encoding="utf-8")
          PY
      - name: Validate evidence and mirror models
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pytest -q \
            tests/test_evidence_relationship_profiles.py \
            tests/test_legacy_pointer_coverage.py
      - name: Validate P0 current gate
        run: python3 scripts/run_ci_group.py p0-current
      - name: Validate full current system
        run: python3 scripts/run_current_system_tests.py
      - name: Validate Builder compatibility
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/check_builder_receipt_boundary_sync.py
          python3 scripts/test_builder_oath_readback_canonical_output.py
          python3 scripts/test_builder_help_urls_resolve.py
          python3 scripts/test_mission_public_route_parity.py
          node downloads/record-chain-builder.mjs --help >/tmp/record-chain-builder-help.txt
          test -s /tmp/record-chain-builder-help.txt
      - name: Validate Render and Gateway compatibility
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/test_render_deploy_boundary_contract.py
          python3 scripts/test_gateway_schema_shadow_parity.py
          python3 scripts/test_record_chain_intake_gateway_contract.py
          python3 scripts/test_gateway_runtime_recovery_links.py
      - name: Confirm runtime source files were not modified
        shell: bash
        run: |
          set -euo pipefail
          changed="$(git diff --name-only origin/main...HEAD)"
          forbidden='^(downloads/record-chain-builder\.mjs|gateway/|render\.yaml|Dockerfile|requirements\.txt)$'
          if printf '%s\n' "$changed" | grep -E "$forbidden"; then
            echo "Unexpected Builder/Render runtime source modification detected" >&2
            exit 1
          fi
      - name: Commit finalized model and audit
        shell: bash
        run: |
          set -euo pipefail
          git add \
            archive/legacy-pointers/index.json \
            agent-start.md \
            api/verification-levels.json \
            api/context-depth-levels.json \
            api/context-load-map.json \
            api/claim-registry.json \
            sitemap.xml \
            EVIDENCE-MODEL-MIGRATION-AUDIT.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: finalize evidence model migration audit"
          git push origin HEAD:agent/complete-legacy-ar-eth-mirror-audit
