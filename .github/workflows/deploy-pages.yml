name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - run: python3 -m pip install -r requirements-ci.txt
      - name: Verify record-chain integrity
        run: python3 scripts/trinity_record_chain.py verify
      - name: Verify sitemap has no drift
        run: python3 scripts/generate_sitemap.py --check
      - name: Verify public home status has no drift
        run: |
          python3 scripts/generate_public_home_status.py
          python3 scripts/patch_public_home_status_primary.py
          python3 scripts/patch_public_home_status_primary.py --check
      - name: Run current system tests
        run: python3 scripts/run_current_system_tests.py
      - name: Scan for secret material (broad)
        run: python3 scripts/test_no_secret_material_committed.py
      - name: Check no private keys or tokens (focused PEM)
        run: python3 scripts/test_no_private_key_material_committed.py

  build:
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Build site with Jekyll
        uses: actions/jekyll-build-pages@44a6e6beabd48582f863aeeb6cb2151cc1716697 # v1
        with:
          source: ./
          destination: ./_site

      - name: Restore committed static API, builder, and bundles
        run: |
          set -euo pipefail

          # Publish the reviewed committed artifacts exactly as they exist on main.
          # Do not generate deployment-only API/status/builder data here.
          sudo chown -R "$(id -u):$(id -g)" _site
          rm -rf ./_site/api ./_site/downloads ./_site/builder-bundles
          cp -a ./api ./_site/api
          mkdir -p ./_site/downloads
          install -m 0644 ./downloads/record-chain-builder.mjs ./_site/downloads/record-chain-builder.mjs
          cp -a ./builder-bundles ./_site/builder-bundles
          cp scripts/download_and_run_builder_bundle.py ./_site/builder-bundles/download_and_run_builder_bundle.py

          cmp ./api/public-home-status.json ./_site/api/public-home-status.json
          cmp ./api/record-chain-builder-bundles.v1.json ./_site/api/record-chain-builder-bundles.v1.json
          cmp ./downloads/record-chain-builder.mjs ./_site/downloads/record-chain-builder.mjs

      - name: Verify built agent discovery artifacts
        run: |
          set -euo pipefail

          test -f _site/CNAME
          grep -qx 'www.trinityaccord.org' _site/CNAME

          test -f _site/llms.txt
          test -f _site/ai.txt
          test -f _site/api/links.json
          test -f _site/.well-known/trinity-accord.json
          test -f _site/api/agent-first-contact.json
          test -f _site/api/agent-start.v2.json
          test -f _site/api/record-chain-intake-gateway.v1.json
          test -f _site/api/record-chain-submission-schema.v1.json
          test -f _site/api/record-chain-field-helper.v1.json
          test -f _site/api/record-chain-oath-policy.v1.json
          test -f _site/downloads/record-chain-builder.mjs
          test -f _site/builder-bundles/record-chain-builder.mjs
          test -f _site/builder-bundles/download_and_run_builder_bundle.py

          grep -q '"/api/agent-first-contact.json"' _site/api/links.json
          grep -q '"agent_first_contact"' _site/.well-known/trinity-accord.json
          grep -q 'version: v3.0' _site/llms.txt
          grep -q 'version: v3.0' _site/ai.txt
          grep -q '/record-chain/preflight' _site/llms.txt
          grep -q '/record-chain/submit' _site/llms.txt
          grep -q '/downloads/record-chain-builder.mjs' _site/llms.txt
          ! grep -q '/agent-submit\|/gateway/preflight\|/api/agent-start.v1.json\|/api/gateway-builder-route-map.v1.json\|/api/gateway-workflows.v1.json' _site/llms.txt
          ! grep -q '/agent-submit\|/gateway/preflight\|/api/agent-start.v1.json\|/api/gateway-builder-route-map.v1.json\|/api/gateway-workflows.v1.json' _site/ai.txt

      - name: Verify Pages builder artifact contract
        run: python3 scripts/test_pages_builder_artifact_contract.py --site-dir _site

      - name: Verify deployment freshness surface in Pages artifact
        run: python3 scripts/check_deployment_freshness.py --site-dir _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

      - name: Verify deployment URL
        run: |
          set -euo pipefail
          echo "deployment page_url=${{ steps.deployment.outputs.page_url }}"

      - name: Smoke live public discovery contract
        run: |
          set -euo pipefail

          for i in 1 2 3 4 5 6; do
            echo "Live discovery smoke attempt ${i}/6..."
            if python3 scripts/smoke_live_discovery_contract.py \
                --site "https://www.trinityaccord.org" \
                --strict-digest; then
              exit 0
            fi

            echo "Live discovery smoke failed on attempt ${i}; retrying after 30s..."
            sleep 30
          done

          echo "Final live discovery smoke attempt..."
          python3 scripts/smoke_live_discovery_contract.py \
            --site "https://www.trinityaccord.org" \
            --strict-digest

      - name: Verify live deployment freshness surface
        run: python3 scripts/check_deployment_freshness.py --site "https://www.trinityaccord.org"
