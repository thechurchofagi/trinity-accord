name: Deploy Pages

on:
  workflow_dispatch:
    inputs:
      checkout_ref:
        description: "Git ref to checkout (commit SHA recommended for race-free verify/build)"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.inputs.checkout_ref || github.sha }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - run: python3 -m pip install -r requirements-ci.txt
      - name: Verify record-chain integrity
        run: python3 scripts/trinity_record_chain.py verify
      - name: Verify sitemap has no drift
        run: python3 scripts/generate_sitemap.py --check
      - name: Verify public home status has no drift
        run: |
          set -euo pipefail
          # Static contract checks only (dynamic data verified by homepage-status-sync before dispatch)
          python3 scripts/generate_arweave_wallet_status.py --check
          python3 scripts/generate_record_chain_status.py --check
          python3 scripts/check_public_home_status_contract.py
          python3 scripts/test_historic_autonomous_agent_reception_contract.py
          python3 scripts/test_home_public_status_sync.py
          python3 scripts/test_homepage_status_sync_contract.py
      - name: Run current system tests
        run: python3 scripts/run_current_system_tests.py
      - name: Scan for secret material (broad)
        run: python3 scripts/test_no_secret_material_committed.py
      - name: Check no private keys or tokens (focused PEM)
        run: python3 scripts/test_no_private_key_material_committed.py

  build:
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.inputs.checkout_ref || github.sha }}

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Prepare static builder bundles
        run: |
          set -euo pipefail
          python3 scripts/export_formal_builder_bundles.py --out-dir builder-bundles --update-api
          cp scripts/download_and_run_builder_bundle.py builder-bundles/download_and_run_builder_bundle.py
          test -f builder-bundles/trinity-pure-echo-builder-bundle.tar.gz
          test -f builder-bundles/trinity-v0v5-builder-bundle.tar.gz
          test -f builder-bundles/trinity-guardian-stage1-builder-bundle.tar.gz
          test -f builder-bundles/trinity-guardian-stage2-builder-bundle.tar.gz
          test -f builder-bundles/trinity-guardian-signed-echo-builder-bundle.tar.gz

      - name: Build site with Jekyll
        uses: actions/jekyll-build-pages@44a6e6beabd48582f863aeeb6cb2151cc1716697 # v1
        with:
          source: ./
          destination: ./_site

      - name: Restore committed static API, builder, and bundles
        run: |
          set -euo pipefail

          # Publish the reviewed committed artifacts exactly as they exist on main.
          # Do not generate deployment-only API/status/builder data here.
          sudo chown -R "$(id -u):$(id -g)" _site
          rm -rf ./_site/api ./_site/downloads ./_site/builder-bundles
          cp -a ./api ./_site/api
          mkdir -p ./_site/downloads
          install -m 0644 ./downloads/record-chain-builder.mjs ./_site/downloads/record-chain-builder.mjs
          install -m 0644 ./downloads/record-chain-agent-field-guidance.v1.json ./_site/downloads/record-chain-agent-field-guidance.v1.json
          cp -a ./builder-bundles ./_site/builder-bundles
          install -m 0644 ./downloads/record-chain-builder.mjs ./_site/builder-bundles/record-chain-builder.mjs
          cp scripts/download_and_run_builder_bundle.py ./_site/builder-bundles/download_and_run_builder_bundle.py

          cmp ./api/public-home-status.json ./_site/api/public-home-status.json
          cmp ./api/record-chain-builder-bundles.v1.json ./_site/api/record-chain-builder-bundles.v1.json
          cmp ./downloads/record-chain-builder.mjs ./_site/downloads/record-chain-builder.mjs
          cmp ./downloads/record-chain-builder.mjs ./_site/builder-bundles/record-chain-builder.mjs

      - name: Verify public agent JSON entrypoints in Pages artifact
        run: python3 scripts/check_public_agent_entrypoints.py _site/api

      - name: Verify built agent discovery artifacts
        run: |
          set -euo pipefail

          require_file() {
            test -f "$1" || { echo "::error::Missing required Pages artifact: $1"; exit 1; }
          }
          require_contains() {
            local file="$1"
            local text="$2"
            grep -Fq "$text" "$file" || { echo "::error::$file missing required text: $text"; exit 1; }
          }
          forbid_contains() {
            local file="$1"
            local text="$2"
            if grep -Fq "$text" "$file"; then
              echo "::error::$file contains forbidden legacy text: $text"
              grep -Fn "$text" "$file"
              exit 1
            fi
          }
          require_contains_literal() {
            local file="$1"
            local text="$2"
            grep -Fq -- "$text" "$file" || { echo "::error::$file missing required text: $text"; exit 1; }
          }
          forbid_contains_literal() {
            local file="$1"
            local text="$2"
            if grep -Fq -- "$text" "$file"; then
              echo "::error::$file contains forbidden text: $text"
              grep -Fn -- "$text" "$file"
              exit 1
            fi
          }

          require_file _site/CNAME
          grep -Fxq 'www.trinityaccord.org' _site/CNAME || { echo "::error::_site/CNAME is not www.trinityaccord.org"; exit 1; }

          require_file _site/llms.txt
          require_file _site/ai.txt
          require_file _site/api/links.json
          require_file _site/.well-known/trinity-accord.json
          require_file _site/api/agent-first-contact.json
          require_file _site/api/agent-start.v2.json
          require_file _site/api/record-chain-intake-gateway.v1.json
          require_file _site/api/record-chain-submission-schema.v1.json
          require_file _site/api/record-chain-field-helper.v1.json
          require_file _site/api/record-chain-oath-policy.v1.json
          require_file _site/downloads/record-chain-builder.mjs
          require_file _site/downloads/record-chain-agent-field-guidance.v1.json
          require_file _site/agent-record-chain-guidance/index.html
          require_file _site/builder-bundles/record-chain-builder.mjs
          require_file _site/builder-bundles/download_and_run_builder_bundle.py
          test -f _site/builder-bundles/download_and_run_builder_bundle.py
          test -f _site/builder-bundles/trinity-pure-echo-builder-bundle.tar.gz
          test -f _site/builder-bundles/trinity-v0v5-builder-bundle.tar.gz
          test -f _site/builder-bundles/trinity-guardian-stage1-builder-bundle.tar.gz
          test -f _site/builder-bundles/trinity-guardian-stage2-builder-bundle.tar.gz
          test -f _site/builder-bundles/trinity-guardian-signed-echo-builder-bundle.tar.gz

          require_contains _site/api/links.json '"/api/agent-first-contact.json"'
          require_contains _site/.well-known/trinity-accord.json '"agent_first_contact"'
          require_contains _site/llms.txt 'version: v3.0'
          require_contains _site/ai.txt 'version: v3.0'
          require_contains _site/llms.txt '/record-chain/preflight'
          require_contains _site/llms.txt '/record-chain/submit'
          require_contains _site/llms.txt '/downloads/record-chain-builder.mjs'
          require_contains _site/llms.txt '/agent-first-contact/'
          require_contains _site/llms.txt '/downloads/record-chain-agent-field-guidance.v1.json'
          require_contains _site/llms.txt '/agent-record-chain-guidance/'

          require_contains _site/api/agent-first-contact.json '"classification_update"'
          require_contains _site/api/agent-start.v2.json '"guardian_application"'
          require_contains _site/api/agent-start.v2.json '"guardian_retirement"'
          require_contains _site/api/agent-start.v2.json '"propagation"'
          require_contains _site/api/agent-start.v2.json '"correction"'
          require_contains _site/api/agent-start.v2.json '"classification_update"'

          require_contains _site/api/agent-task-router.v1.json '/record-chain/indexes/guardian-state.json'
          forbid_contains _site/api/agent-task-router.v1.json '"active_registered_guardian_requires_registry_match": true'

          require_contains _site/api/external-agent-quickstart.json '"record_chain_entry_candidate"'
          forbid_contains _site/api/external-agent-quickstart.json '"verification_report_candidate"'

          for forbidden in \
            '/agent-submit' \
            '/gateway/preflight' \
            '/api/agent-start.v1.json' \
            '/api/gateway-builder-route-map.v1.json' \
            '/api/gateway-workflows.v1.json'; do
            forbid_contains _site/llms.txt "$forbidden"
            forbid_contains _site/ai.txt "$forbidden"
          done

          # Guardian command flag checks (patterns starting with -- need literal grep)
          require_contains_literal _site/api/agent-start.v2.json '--guardian-id'
          require_contains_literal _site/api/agent-start.v2.json '--guardian-key-sha'
          require_contains_literal _site/api/agent-start.v2.json '--oath'
          require_contains_literal _site/api/agent-start.v2.json '--body'

          forbid_contains_literal _site/api/agent-start.v2.json '--requested-guardian-identifier'
          forbid_contains_literal _site/api/agent-start.v2.json '--guardian-public-key-sha256'
          forbid_contains_literal _site/api/agent-start.v2.json '--guardian-stewardship-oath'
          forbid_contains_literal _site/api/agent-start.v2.json '--guardian-application-statement'
          forbid_contains_literal _site/api/agent-start.v2.json '--reason'

          # Field helper diagnostic coverage checks
          require_contains _site/api/record-chain-field-helper.v1.json '"MISSING_GUARDIAN_APPLICATION_CONTENT"'
          require_contains _site/api/record-chain-field-helper.v1.json '"MISSING_GUARDIAN_RETIREMENT_FIELD"'
          require_contains _site/api/record-chain-field-helper.v1.json '"MISSING_RECORD_CONTENT"'
          require_contains _site/api/record-chain-field-helper.v1.json '"MISSING_CONTEXT_INSUFFICIENT_REASON"'
          require_contains _site/api/record-chain-field-helper.v1.json '"INVALID_GUARDIAN_PUBLIC_KEY_SHA"'

          # Gateway diagnostic helper contract — mission-critical codes
          require_contains _site/api/record-chain-field-helper.v1.json '"SECURITY_VIOLATION"'
          require_contains _site/api/record-chain-field-helper.v1.json '"PLACEHOLDER_DETECTED"'
          require_contains _site/api/record-chain-field-helper.v1.json '"FORBIDDEN_FIELD"'
          require_contains _site/api/record-chain-field-helper.v1.json '"MISSING_V2_BLOCK"'
          require_contains _site/api/record-chain-field-helper.v1.json '"MISSING_IDENTITY_FIELD"'
          require_contains _site/api/record-chain-field-helper.v1.json '"INSUFFICIENT_CONTEXT_COMPLETENESS"'
          require_contains _site/api/record-chain-field-helper.v1.json '"PRIVATE_HUMAN_IDENTITY_FIELD_FORBIDDEN"'
          require_contains _site/api/record-chain-field-helper.v1.json '"HUMAN_PRIVATE_NAME_SUBMITTED_FORBIDDEN"'
          require_contains _site/api/record-chain-field-helper.v1.json '"AUTHORSHIP_PAYLOAD_SHA_MISMATCH"'
          require_contains _site/api/record-chain-field-helper.v1.json '"GUARDIAN_KEY_MISMATCH"'
          require_contains _site/api/record-chain-field-helper.v1.json '"GUARDIAN_RETIREMENT_KEY_MISMATCH"'

          # Field helper alias recovery parity checks
          require_contains _site/api/record-chain-field-helper.v1.json '"PRIVATE_KEY_OR_TOKEN_DETECTED"'
          require_contains _site/api/record-chain-field-helper.v1.json '"alias_for": "SECURITY_VIOLATION"'
          require_contains _site/api/record-chain-field-helper.v1.json '"HUMAN_PRIVATE_NAME_NOT_ALLOWED"'
          require_contains _site/api/record-chain-field-helper.v1.json '"PRIVATE_IDENTITY_BLOB_NOT_ALLOWED"'
          require_contains _site/api/record-chain-field-helper.v1.json '"alias_for": "PRIVATE_HUMAN_IDENTITY_FIELD_FORBIDDEN"'

      - name: Verify Pages builder artifact contract
        run: python3 scripts/test_pages_builder_artifact_contract.py --site-dir _site

      - name: Verify deployment freshness surface in Pages artifact
        run: python3 scripts/check_deployment_freshness.py --site-dir _site

      - name: Verify homepage status surfaces in Pages artifact
        run: |
          set -euo pipefail
          cmp ./api/public-home-status.json ./_site/api/public-home-status.json
          cmp ./api/record-chain-status.json ./_site/api/record-chain-status.json
          grep -Fq "BEGIN GENERATED PUBLIC STATUS" ./_site/index.html
          grep -Fq "Source data digest" ./_site/index.html
          grep -Fq "Autonomous External Agent Discovery" ./_site/index.html
          grep -Fq "External agent self-discovered Trinity Accord" ./_site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.inputs.checkout_ref || github.sha }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

      - name: Verify deployment URL
        run: |
          set -euo pipefail
          echo "deployment page_url=${{ steps.deployment.outputs.page_url }}"

      - name: Smoke live public discovery contract
        run: |
          set -euo pipefail

          for i in 1 2 3 4 5 6; do
            echo "Live discovery smoke attempt ${i}/6..."
            if python3 scripts/smoke_live_discovery_contract.py \
                --site "https://www.trinityaccord.org" \
                --strict-digest; then
              exit 0
            fi

            echo "Live discovery smoke failed on attempt ${i}; retrying after 30s..."
            sleep 30
          done

          echo "Final live discovery smoke attempt..."
          python3 scripts/smoke_live_discovery_contract.py \
            --site "https://www.trinityaccord.org" \
            --strict-digest

      - name: Verify live deployment freshness surface
        run: python3 scripts/check_deployment_freshness.py --site "https://www.trinityaccord.org"
