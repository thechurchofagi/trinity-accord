name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Verify built agent discovery artifacts
        run: |
          set -euo pipefail

          test -f _site/api/links.json
          test -f _site/.well-known/trinity-accord.json
          test -f _site/api/agent-first-contact.json
          test -f _site/api/gateway-workflows.v1.json
          test -f _site/api/agent-submit-gateway.json
          test -f _site/api/gateway-builder-route-map.v1.json

          grep -q '"/api/agent-first-contact.json"' _site/api/links.json
          grep -q '"/api/gateway-workflows.v1.json"' _site/api/links.json
          grep -q '"/api/agent-submit-gateway.json"' _site/api/links.json
          grep -q '"/api/gateway-builder-route-map.v1.json"' _site/api/links.json
          grep -q '"/gateway-workflows"' _site/api/links.json
          grep -q '"/guardian-alliance"' _site/api/links.json
          grep -q '"/guardian-join"' _site/api/links.json
          grep -q '"/guardian-routes"' _site/api/links.json

          grep -q '"agent_first_contact"' _site/.well-known/trinity-accord.json
          grep -q '"gateway_workflows"' _site/.well-known/trinity-accord.json
          grep -q '"gateway_workflows_json"' _site/.well-known/trinity-accord.json
          grep -q '"agent_submit_gateway"' _site/.well-known/trinity-accord.json
          grep -q '"gateway_builder_route_map"' _site/.well-known/trinity-accord.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Smoke live public discovery contract
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5; do
            if python3 scripts/smoke_live_discovery_contract.py \
              --site "https://www.trinityaccord.org" \
              --strict-digest; then
              exit 0
            fi
            echo "Live discovery smoke failed on attempt ${i}; retrying after 30s..."
            sleep 30
          done
          python3 scripts/smoke_live_discovery_contract.py \
            --site "https://www.trinityaccord.org" \
            --strict-digest
