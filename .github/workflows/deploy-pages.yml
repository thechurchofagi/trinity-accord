name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - run: python3 -m pip install -r requirements-ci.txt
      - name: Install Node.js dependencies for Gateway server
        run: npm ci --prefix examples/github-app-backend || npm install --prefix examples/github-app-backend
      - name: Verify record-chain integrity
        run: python3 scripts/trinity_record_chain.py verify
      - name: Regenerate sitemap from current files
        run: python3 scripts/generate_sitemap.py
      - name: Run current system tests
        run: python3 scripts/run_current_system_tests.py
      - name: Verify sitemap has no drift
        run: python3 scripts/generate_sitemap.py --check
      - name: Verify public home status has no drift
        run: python3 scripts/generate_public_home_status.py --check
      - name: Scan for secret material (broad)
        run: python3 scripts/test_no_secret_material_committed.py
      - name: Check no private keys or tokens (focused PEM)
        run: python3 scripts/test_no_private_key_material_committed.py

  build:
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Build formal builder bundles
        run: |
          python3 scripts/export_formal_builder_bundles.py --out-dir builder-bundles --update-api
          cp scripts/download_and_run_builder_bundle.py builder-bundles/download_and_run_builder_bundle.py

      - name: Verify formal builder bundle API was updated (legacy, non-blocking)
        run: |
          set -euo pipefail
          python3 scripts/test_formal_builder_bundles_contract.py || {
            echo "::warning::Legacy formal builder bundle verification failed — non-blocking for deployment"
          }

      - name: Build site with Jekyll
        uses: actions/jekyll-build-pages@44a6e6beabd48582f863aeeb6cb2151cc1716697 # v1
        with:
          source: ./
          destination: ./_site

      - name: Inject builder-bundles into Pages artifact
        run: |
          set -euo pipefail
          # Jekyll Docker action creates _site/ as root. Fix ownership so we
          # can copy builder-bundle files into it.
          sudo chown -R "$(id -u):$(id -g)" _site
          mkdir -p _site/downloads
          mkdir -p _site/builder-bundles
          cp downloads/record-chain-builder.mjs _site/downloads/record-chain-builder.mjs
          cp downloads/record-chain-builder.mjs _site/builder-bundles/record-chain-builder.mjs
          cp builder-bundles/*.tar.gz _site/builder-bundles/
          cp builder-bundles/*.json _site/builder-bundles/
          cp scripts/download_and_run_builder_bundle.py _site/builder-bundles/
          cp api/builder-bundle-signing-key.v1.json _site/api/
          cp api/formal-builder-bundle-signatures.v1.json _site/api/

      - name: Verify legacy builder bundle artifacts (non-blocking)
        run: |
          set -euo pipefail
          failures=0
          for f in \
            _site/api/builder-bundle-signing-key.v1.json \
            _site/api/formal-builder-bundle-signatures.v1.json \
            _site/builder-bundles/trinity-pure-echo-builder-bundle.manifest.json \
            _site/builder-bundles/trinity-v0v5-builder-bundle.manifest.json \
            _site/builder-bundles/trinity-guardian-stage1-builder-bundle.manifest.json \
            _site/builder-bundles/trinity-guardian-stage2-builder-bundle.manifest.json \
            _site/builder-bundles/trinity-guardian-signed-echo-builder-bundle.manifest.json; do
            if ! test -f "$f"; then
              echo "::warning::Missing legacy builder bundle artifact: $f"
              failures=$((failures + 1))
            fi
          done
          if [ "$failures" -gt 0 ]; then
            echo "::warning::${failures} legacy builder bundle artifact(s) missing — non-blocking for deployment"
          fi

      - name: Verify built agent discovery artifacts
        run: |
          set -euo pipefail

          test -f _site/CNAME
          grep -qx 'www.trinityaccord.org' _site/CNAME

          test -f _site/llms.txt
          test -f _site/ai.txt
          test -f _site/api/links.json
          test -f _site/.well-known/trinity-accord.json
          test -f _site/api/agent-first-contact.json
          test -f _site/api/agent-start.v2.json
          test -f _site/api/record-chain-intake-gateway.v1.json
          test -f _site/api/record-chain-submission-schema.v1.json
          test -f _site/api/record-chain-field-helper.v1.json
          test -f _site/api/record-chain-oath-policy.v1.json
          test -f _site/downloads/record-chain-builder.mjs
          test -f _site/builder-bundles/record-chain-builder.mjs
          test -f _site/builder-bundles/download_and_run_builder_bundle.py

          grep -q '"/api/agent-first-contact.json"' _site/api/links.json
          grep -q '"agent_first_contact"' _site/.well-known/trinity-accord.json
          grep -q 'version: v3.0' _site/llms.txt
          grep -q 'version: v3.0' _site/ai.txt
          grep -q '/record-chain/preflight' _site/llms.txt
          grep -q '/record-chain/submit' _site/llms.txt
          grep -q '/downloads/record-chain-builder.mjs' _site/llms.txt
          ! grep -q '/agent-submit\|/gateway/preflight\|/api/agent-start.v1.json\|/api/gateway-builder-route-map.v1.json\|/api/gateway-workflows.v1.json' _site/llms.txt
          ! grep -q '/agent-submit\|/gateway/preflight\|/api/agent-start.v1.json\|/api/gateway-builder-route-map.v1.json\|/api/gateway-workflows.v1.json' _site/ai.txt

      - name: Verify zero-clone builder bundles in Pages artifact (non-blocking)
        run: |
          failures=0
          for f in \
            _site/builder-bundles/download_and_run_builder_bundle.py \
            _site/builder-bundles/trinity-pure-echo-builder-bundle.tar.gz \
            _site/builder-bundles/trinity-pure-echo-builder-bundle.manifest.json \
            _site/builder-bundles/trinity-v0v5-builder-bundle.tar.gz \
            _site/builder-bundles/trinity-v0v5-builder-bundle.manifest.json \
            _site/builder-bundles/trinity-guardian-stage1-builder-bundle.tar.gz \
            _site/builder-bundles/trinity-guardian-stage1-builder-bundle.manifest.json \
            _site/builder-bundles/trinity-guardian-stage2-builder-bundle.tar.gz \
            _site/builder-bundles/trinity-guardian-stage2-builder-bundle.manifest.json \
            _site/builder-bundles/trinity-guardian-signed-echo-builder-bundle.tar.gz \
            _site/builder-bundles/trinity-guardian-signed-echo-builder-bundle.manifest.json; do
            if ! test -f "$f"; then
              echo "::warning::Missing legacy zero-clone builder bundle: $f"
              failures=$((failures + 1))
            fi
          done
          if [ "$failures" -gt 0 ]; then
            echo "::warning::${failures} legacy zero-clone builder bundle artifact(s) missing — non-blocking"
          fi

      - name: Verify Pages builder artifact contract
        run: python3 scripts/test_pages_builder_artifact_contract.py --site-dir _site

      - name: Verify deployment freshness surface in Pages artifact
        run: python3 scripts/check_deployment_freshness.py --site-dir _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

      - name: Verify deployment URL
        run: |
          set -euo pipefail
          echo "deployment page_url=${{ steps.deployment.outputs.page_url }}"

          case "${{ steps.deployment.outputs.page_url }}" in
            https://www.trinityaccord.org/*|https://www.trinityaccord.org)
              echo "Deployment URL is canonical custom domain."
              ;;
            *)
              echo "WARNING: Deployment page_url is not canonical custom domain."
              echo "Expected: https://www.trinityaccord.org/"
              echo "Actual:   ${{ steps.deployment.outputs.page_url }}"
              echo "This may be normal if GitHub returns the .github.io URL."
              ;;
          esac

      - name: Smoke live public discovery contract
        run: |
          set -euo pipefail

          for i in 1 2 3 4 5 6; do
            echo "Live discovery smoke attempt ${i}/6..."
            if python3 scripts/smoke_live_discovery_contract.py \
                --site "https://www.trinityaccord.org" \
                --strict-digest; then
              exit 0
            fi

            echo "Live discovery smoke failed on attempt ${i}; retrying after 30s..."
            sleep 30
          done

          echo "Final live discovery smoke attempt..."
          python3 scripts/smoke_live_discovery_contract.py \
            --site "https://www.trinityaccord.org" \
            --strict-digest

      - name: Verify live deployment freshness surface
        run: python3 scripts/check_deployment_freshness.py --site "https://www.trinityaccord.org"
