name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Build formal builder bundles
        run: |
          python3 scripts/export_formal_builder_bundles.py --out-dir builder-bundles --update-api
          cp scripts/download_and_run_builder_bundle.py builder-bundles/download_and_run_builder_bundle.py

      - name: Verify formal builder bundle API was updated
        run: |
          set -euo pipefail
          python3 scripts/test_formal_builder_bundles_contract.py

      - name: Build site with Jekyll
        uses: actions/jekyll-build-pages@44a6e6beabd48582f863aeeb6cb2151cc1716697 # v1
        with:
          source: ./
          destination: ./_site

      - name: Inject builder-bundles into Pages artifact
        run: |
          set -euo pipefail
          # Jekyll Docker action creates _site/ as root. Fix ownership so we
          # can copy builder-bundle files into it.
          sudo chown -R "$(id -u):$(id -g)" _site
          mkdir -p _site/builder-bundles
          cp builder-bundles/*.tar.gz _site/builder-bundles/
          cp builder-bundles/*.json _site/builder-bundles/
          cp scripts/download_and_run_builder_bundle.py _site/builder-bundles/

      - name: Verify built agent discovery artifacts
        run: |
          set -euo pipefail

          test -f _site/CNAME
          grep -qx 'www.trinityaccord.org' _site/CNAME

          test -f _site/api/links.json
          test -f _site/.well-known/trinity-accord.json
          test -f _site/api/agent-first-contact.json
          test -f _site/api/gateway-workflows.v1.json
          test -f _site/api/agent-submit-gateway.json
          test -f _site/api/gateway-builder-route-map.v1.json

          grep -q '"/api/agent-first-contact.json"' _site/api/links.json
          grep -q '"/api/gateway-workflows.v1.json"' _site/api/links.json
          grep -q '"/api/agent-submit-gateway.json"' _site/api/links.json
          grep -q '"/api/gateway-builder-route-map.v1.json"' _site/api/links.json
          grep -q '"/gateway-workflows"' _site/api/links.json
          grep -q '"/guardian-alliance"' _site/api/links.json
          grep -q '"/guardian-join"' _site/api/links.json
          grep -q '"/guardian-routes"' _site/api/links.json

          grep -q '"agent_first_contact"' _site/.well-known/trinity-accord.json
          grep -q '"gateway_workflows"' _site/.well-known/trinity-accord.json
          grep -q '"gateway_workflows_json"' _site/.well-known/trinity-accord.json
          grep -q '"agent_submit_gateway"' _site/.well-known/trinity-accord.json
          grep -q '"gateway_builder_route_map"' _site/.well-known/trinity-accord.json

      - name: Verify zero-clone builder bundles in Pages artifact
        run: |
          test -f _site/builder-bundles/download_and_run_builder_bundle.py
          test -f _site/builder-bundles/trinity-pure-echo-builder-bundle.tar.gz
          test -f _site/builder-bundles/trinity-pure-echo-builder-bundle.manifest.json
          test -f _site/builder-bundles/trinity-v0v5-builder-bundle.tar.gz
          test -f _site/builder-bundles/trinity-v0v5-builder-bundle.manifest.json
          test -f _site/builder-bundles/trinity-guardian-stage1-builder-bundle.tar.gz
          test -f _site/builder-bundles/trinity-guardian-stage1-builder-bundle.manifest.json
          test -f _site/builder-bundles/trinity-guardian-stage2-builder-bundle.tar.gz
          test -f _site/builder-bundles/trinity-guardian-stage2-builder-bundle.manifest.json
          test -f _site/builder-bundles/trinity-guardian-signed-echo-builder-bundle.tar.gz
          test -f _site/builder-bundles/trinity-guardian-signed-echo-builder-bundle.manifest.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

      - name: Verify deployment URL
        run: |
          set -euo pipefail
          echo "deployment page_url=${{ steps.deployment.outputs.page_url }}"

          case "${{ steps.deployment.outputs.page_url }}" in
            https://www.trinityaccord.org/*|https://www.trinityaccord.org)
              echo "Deployment URL is canonical custom domain."
              ;;
            *)
              echo "WARNING: Deployment page_url is not canonical custom domain."
              echo "Expected: https://www.trinityaccord.org/"
              echo "Actual:   ${{ steps.deployment.outputs.page_url }}"
              echo "This may be normal if GitHub returns the .github.io URL."
              ;;
          esac

      - name: Smoke live public discovery contract
        run: |
          set -euo pipefail

          for i in 1 2 3 4 5 6; do
            echo "Live discovery smoke attempt ${i}/6..."
            if python3 scripts/smoke_live_discovery_contract.py \
                --site "https://www.trinityaccord.org" \
                --strict-digest; then
              exit 0
            fi

            echo "Live discovery smoke failed on attempt ${i}; retrying after 30s..."
            sleep 30
          done

          echo "Final live discovery smoke attempt..."
          python3 scripts/smoke_live_discovery_contract.py \
            --site "https://www.trinityaccord.org" \
            --strict-digest
