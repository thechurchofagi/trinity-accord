name: Deploy Pages

on:
  workflow_dispatch:
    inputs:
      checkout_ref:
        description: "Git ref to publish; it must resolve to the current main revision"
        required: false
        default: ""
        type: string
  push:
    branches:
      - main
    paths:
      - "api/**"
      - "*.md"
      - "*.json"
      - "*.xml"
      - "llms.txt"
      - "llms-full.txt"
      - "ai.txt"
      - "CNAME"
      - ".well-known/**"
      - "_layouts/**"
      - "_includes/**"
      - "assets/**"
      - "agent-record-chain-guidance/**"
      - "bitcoin-inscription-mirrors/**"
      - "builder-bundles/**"
      - "context-ready/**"
      - "docs/**"
      - "downloads/**"
      - "echoes/**"
      - "evidence/**"
      - "first-contact/**"
      - "gateway-workflows/**"
      - "identity/**"
      - "nft-text-descriptions/**"
      - "propagate/**"
      - "record-chain-field-helper/**"
      - "record-chain/index.md"
      - "sitemap.xml"
      - "scripts/**"
      - "tests/test_live_deployment_contract.py"
      - "tests/test_round5_systemic_resilience.py"
      - "_config.yml"
      - ".github/workflows/deploy-pages.yml"
      - ".github/workflows/homepage-status-sync.yml"
      - ".github/workflows/waiting-heartbeat-status-sync.yml"
      - ".github/workflows/homepage-deployment-receipt.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    outputs:
      source_sha: ${{ steps.source.outputs.source_sha }}
      requested_ref: ${{ steps.source.outputs.requested_ref }}
    steps:
      - name: Checkout requested source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.inputs.checkout_ref || github.sha }}
          fetch-depth: 1

      - name: Resolve immutable current-main source revision
        id: source
        env:
          REQUESTED_REF: ${{ github.event.inputs.checkout_ref || github.sha }}
        run: |
          set -euo pipefail
          source_sha="$(git rev-parse HEAD)"
          git cat-file -e "${source_sha}^{commit}"
          git fetch --no-tags --prune --depth=1 origin +refs/heads/main:refs/remotes/origin/main
          main_sha="$(git rev-parse refs/remotes/origin/main)"
          if [[ "${source_sha}" != "${main_sha}" ]]; then
            echo "::error::Refusing to publish ${source_sha}; current main is ${main_sha}."
            exit 1
          fi
          printf 'source_sha=%s\n' "${source_sha}" >> "$GITHUB_OUTPUT"
          printf 'requested_ref=%s\n' "${REQUESTED_REF}" >> "$GITHUB_OUTPUT"
          echo "requested_ref=${REQUESTED_REF}"
          echo "immutable_source_sha=${source_sha}"
          echo "current_main_sha=${main_sha}"

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ".node-version"

      - name: Install verification dependencies
        env:
          PIP_PREFER_BINARY: "1"
          PIP_ONLY_BINARY: "cryptography,cffi"
        run: python3 -m pip install -r requirements-ci.txt

      - name: Verify public source state
        run: |
          set -euo pipefail
          python3 scripts/trinity_record_chain.py verify
          python3 scripts/generate_sitemap.py --check
          python3 scripts/generate_arweave_wallet_status.py --check
          python3 scripts/generate_record_chain_status.py --check
          python3 scripts/check_public_home_status_contract.py
          python3 scripts/test_historic_autonomous_agent_reception_contract.py
          python3 scripts/test_home_public_status_sync.py
          python3 scripts/test_homepage_status_sync_contract.py
          python3 scripts/verify_retired_builder_bundle_archive.py
          python3 scripts/run_current_system_tests.py
          python3 scripts/test_no_secret_material_committed.py
          python3 scripts/test_no_private_key_material_committed.py

  build:
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    outputs:
      source_sha: ${{ needs.verify.outputs.source_sha }}
      requested_ref: ${{ needs.verify.outputs.requested_ref }}
    steps:
      - name: Checkout immutable verified source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.verify.outputs.source_sha }}

      - name: Confirm immutable verify/build handoff
        run: test "$(git rev-parse HEAD)" = "${{ needs.verify.outputs.source_sha }}"

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Build site with Jekyll
        uses: actions/jekyll-build-pages@44a6e6beabd48582f863aeeb6cb2151cc1716697 # v1
        with:
          source: ./
          destination: ./_site

      - name: Restore reviewed committed machine artifacts
        run: |
          set -euo pipefail
          sudo chown -R "$(id -u):$(id -g)" _site

          rendered_downloads="$(mktemp -d)"
          if test -d _site/downloads; then
            cp -a _site/downloads/. "$rendered_downloads/"
          fi

          rm -rf _site/api _site/downloads _site/builder-bundles
          cp -a api _site/api
          mkdir -p _site/record-chain _site/downloads
          cp -a record-chain/. _site/record-chain/
          cp -a "$rendered_downloads/." _site/downloads/
          rm -rf "$rendered_downloads"
          cp -a downloads/. _site/downloads/
          cp -a builder-bundles _site/builder-bundles
          install -m 0644 downloads/record-chain-builder.mjs _site/builder-bundles/record-chain-builder.mjs

          cmp api/public-home-status.json _site/api/public-home-status.json
          cmp api/record-chain-status.json _site/api/record-chain-status.json
          cmp api/waiting-heartbeat-status.json _site/api/waiting-heartbeat-status.json
          cmp record-chain/chain-tip.json _site/record-chain/chain-tip.json
          cmp record-chain/indexes/statistics.json _site/record-chain/indexes/statistics.json
          cmp record-chain/indexes/record-index.json _site/record-chain/indexes/record-index.json
          cmp downloads/record-chain-builder.mjs _site/downloads/record-chain-builder.mjs
          cmp builder-bundles/download_and_run_builder_bundle.py _site/builder-bundles/download_and_run_builder_bundle.py

      - name: Verify exact Pages artifact contract
        run: |
          set -euo pipefail
          test -f _site/CNAME
          grep -Fxq 'www.trinityaccord.org' _site/CNAME
          python3 scripts/check_public_agent_entrypoints.py _site/api
          python3 scripts/test_pages_builder_artifact_contract.py --site-dir _site
          python3 scripts/verify_retired_builder_bundle_archive.py --site-dir _site
          python3 scripts/check_deployment_freshness_v2.py --site-dir _site
          grep -Fq "BEGIN GENERATED PUBLIC STATUS" _site/index.html
          grep -Fq "Source data digest" _site/index.html
          grep -Fq "Autonomous External Agent Discovery" _site/index.html

      - name: Write immutable source receipt
        env:
          SOURCE_SHA: ${{ needs.verify.outputs.source_sha }}
          REQUESTED_REF: ${{ needs.verify.outputs.requested_ref }}
        run: |
          python3 - <<'PY'
          import json, os
          from pathlib import Path
          receipt = {
              "schema": "trinity-pages-source-receipt.v1",
              "workflow_run_id": os.environ["GITHUB_RUN_ID"],
              "event_name": os.environ["GITHUB_EVENT_NAME"],
              "requested_ref": os.environ["REQUESTED_REF"],
              "source_sha": os.environ["SOURCE_SHA"],
          }
          Path("pages-source-receipt.json").write_text(
              json.dumps(receipt, indent=2, sort_keys=True) + "\n", encoding="utf-8"
          )
          PY

      - name: Upload immutable source receipt
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pages-source-receipt-${{ github.run_id }}
          path: pages-source-receipt.json
          if-no-files-found: error
          retention-days: 30

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout immutable built source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.build.outputs.source_sha }}

      - name: Confirm immutable build/deploy handoff
        run: test "$(git rev-parse HEAD)" = "${{ needs.build.outputs.source_sha }}"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

      - name: Verify live machine contract after edge propagation
        run: |
          set -euo pipefail
          for attempt in $(seq 1 12); do
            echo "Live verification attempt ${attempt}/12"
            if python3 scripts/smoke_live_discovery_contract_v2.py --site "https://www.trinityaccord.org" --strict-digest \
              && python3 scripts/check_deployment_freshness_v2.py --site "https://www.trinityaccord.org"; then
              exit 0
            fi
            sleep 30
          done
          python3 scripts/smoke_live_discovery_contract_v2.py --site "https://www.trinityaccord.org" --strict-digest
          python3 scripts/check_deployment_freshness_v2.py --site "https://www.trinityaccord.org"
