name: Temporary NFT Chain Probe

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  probe:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Compare all indexed NFTs with Ethereum mint events
        env:
          RPC_URL: "https://ethereum-rpc.publicnode.com"
          PROBE_URL: "https://raw.githubusercontent.com/thechurchofagi/trinity-accord/${{ github.event.pull_request.head.sha }}/scripts/probe_nft_identity.mjs"
          TOKEN_INDEX_URL: "https://raw.githubusercontent.com/thechurchofagi/trinity-accord/${{ github.event.pull_request.head.sha }}/token_index.json"
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location "$PROBE_URL" -o "$RUNNER_TEMP/probe_nft_identity.mjs"
          node "$RUNNER_TEMP/probe_nft_identity.mjs"
