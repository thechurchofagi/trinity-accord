name: Temporary NFT Chain Probe

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  probe:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Inspect Ethereum NFT contract interfaces and event history
        env:
          CONTRACT: "0x019372bBee377109b8Eae66d7267f5C4EaAdBb79"
          RPC_URL: "https://ethereum-rpc.publicnode.com"
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          const contract = process.env.CONTRACT.toLowerCase();
          const rpcUrl = process.env.RPC_URL;

          async function rpc(method, params) {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), 30000);
            try {
              const res = await fetch(rpcUrl, {
                method: 'POST',
                headers: {'content-type': 'application/json'},
                body: JSON.stringify({jsonrpc: '2.0', id: 1, method, params}),
                signal: controller.signal,
              });
              const text = await res.text();
              if (!res.ok) throw new Error(`HTTP ${res.status}: ${text.slice(0, 300)}`);
              const body = JSON.parse(text);
              if (body.error) throw new Error(JSON.stringify(body.error));
              return body.result;
            } finally {
              clearTimeout(timer);
            }
          }

          const toHex = n => `0x${n.toString(16)}`;
          const fromHex = h => Number.parseInt(h, 16);
          const hasCode = async block => (await rpc('eth_getCode', [contract, toHex(block)])) !== '0x';
          const call = async data => rpc('eth_call', [{to: contract, data}, 'latest']);
          const supportsData = id => `0x01ffc9a7${id.replace(/^0x/, '')}${'0'.repeat(56)}`;
          const boolResult = value => typeof value === 'string' && BigInt(value) !== 0n;

          const chainId = fromHex(await rpc('eth_chainId', []));
          const latest = fromHex(await rpc('eth_blockNumber', []));
          let lo = 0, hi = latest;
          while (lo < hi) {
            const mid = Math.floor((lo + hi) / 2);
            if (await hasCode(mid)) hi = mid;
            else lo = mid + 1;
          }
          const creationBlock = lo;

          const interfaces = {};
          for (const [name, id] of [
            ['erc165', '0x01ffc9a7'],
            ['erc721', '0x80ac58cd'],
            ['erc721_metadata', '0x5b5e139f'],
            ['erc1155', '0xd9b67a26'],
            ['erc1155_metadata_uri', '0x0e89341c'],
          ]) {
            try { interfaces[name] = boolResult(await call(supportsData(id))); }
            catch (error) { interfaces[name] = {error: String(error?.message || error)}; }
          }

          const slots = {
            implementation: '0x360894a13ba1a3210667c828492db98dca3e2076cc3735a920a3ca505d382bbc',
            beacon: '0xa3f0ad74e5423aebfd80d3ef4346578335a9a72aeaee59ff6cb3582b35133d50',
          };
          const proxy = {};
          for (const [name, slot] of Object.entries(slots)) {
            try { proxy[name] = await rpc('eth_getStorageAt', [contract, slot, 'latest']); }
            catch (error) { proxy[name] = {error: String(error?.message || error)}; }
          }
          try { proxy.implementation_call = await call('0x5c60da1b'); }
          catch (error) { proxy.implementation_call = {error: String(error?.message || error)}; }

          const topicCounts = new Map();
          const topicSamples = new Map();
          let totalLogs = 0;
          let start = creationBlock;
          let chunk = 50000;
          while (start <= latest) {
            const end = Math.min(latest, start + chunk - 1);
            try {
              const logs = await rpc('eth_getLogs', [{address: contract, fromBlock: toHex(start), toBlock: toHex(end)}]);
              totalLogs += logs.length;
              for (const log of logs) {
                const topic0 = (log.topics?.[0] || 'NO_TOPIC').toLowerCase();
                topicCounts.set(topic0, (topicCounts.get(topic0) || 0) + 1);
                if (!topicSamples.has(topic0)) {
                  topicSamples.set(topic0, {
                    transaction_hash: log.transactionHash,
                    block_number: fromHex(log.blockNumber),
                    log_index: fromHex(log.logIndex),
                    topics: log.topics,
                    data_prefix: String(log.data || '').slice(0, 194),
                  });
                }
              }
              start = end + 1;
              if (logs.length < 2000 && chunk < 200000) chunk = Math.min(200000, chunk * 2);
            } catch (error) {
              if (chunk <= 250) throw error;
              chunk = Math.max(250, Math.floor(chunk / 2));
            }
          }

          const summary = {
            contract,
            chain_id: chainId,
            latest_block: latest,
            first_block_with_code: creationBlock,
            interfaces,
            proxy,
            total_logs: totalLogs,
            topic_counts: Object.fromEntries([...topicCounts.entries()].sort()),
            topic_samples: Object.fromEntries([...topicSamples.entries()].sort()),
          };
          console.log('NFT_CONTRACT_SUMMARY=' + JSON.stringify(summary));
          NODE
