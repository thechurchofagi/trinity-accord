name: Temporary NFT Chain Probe

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  probe:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Inspect Ethereum NFT contract interfaces and event history
        env:
          CONTRACT: "0x019372bBee377109b8Eae66d7267f5C4EaAdBb79"
          RPC_URL: "https://ethereum-rpc.publicnode.com"
          PROBE_URL: "https://raw.githubusercontent.com/thechurchofagi/trinity-accord/agent/nft-identity-index/scripts/probe_nft_identity.mjs"
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location "$PROBE_URL" -o "$RUNNER_TEMP/probe_nft_identity.mjs"
          node "$RUNNER_TEMP/probe_nft_identity.mjs"
