name: Current System Integrity

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "scripts/**"
      - "api/**"
      - "record-chain/**"
      - "downloads/record-chain-builder.mjs"
      - "downloads/record-chain-agent-field-guidance.v1.json"
      - "index.md"
      - "sitemap.xml"
      - "requirements-ci.txt"
      - "apps/record_chain_intake_gateway/**"
      - "agent-*.md"
      - "agent-*/**"
      - "external-agent-quickstart.md"
      - "llms.txt"
      - "ai.txt"

permissions:
  contents: read

concurrency:
  group: current-system-integrity-${{ github.ref }}
  cancel-in-progress: false

jobs:
  current-system-tests:
    name: Run current system tests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        # actions/checkout@v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        # actions/setup-python@v5
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Verify Builder receipt boundary fields are synchronized
        run: python3 scripts/check_builder_receipt_boundary_sync.py

      - name: Install CI dependencies
        run: python -m pip install -r requirements-ci.txt

      - name: Run current system tests
        run: python3 scripts/run_current_system_tests.py
