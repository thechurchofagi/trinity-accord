name: Audit Current System Diagnostic

on:
  push:
    branches:
      - agent/audit-main-integrity-hardening

permissions:
  contents: write

jobs:
  diagnose:
    if: contains(github.event.head_commit.message, 'run current-system diagnostic')
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: agent/audit-main-integrity-hardening
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ".node-version"
      - name: Install dependencies
        run: python -m pip install -r requirements-ci.txt -r apps/record_chain_intake_gateway/requirements.txt
      - name: Capture full current-system output
        run: |
          set +e
          python scripts/run_current_system_tests.py > audit-current-system-diagnostic.log 2>&1
          code=$?
          printf '\nEXIT_CODE=%s\n' "$code" >> audit-current-system-diagnostic.log
          cat audit-current-system-diagnostic.log
          exit 0
      - name: Commit diagnostic output
        run: |
          set -euo pipefail
          git config user.name "trinity-audit-bot"
          git config user.email "actions@github.com"
          git add audit-current-system-diagnostic.log
          git commit -m "audit diagnostic output"
          git push origin HEAD:agent/audit-main-integrity-hardening
