name: Auto-regenerate Sitemap

on:
  push:
    branches: [main]
    paths-ignore:
      - 'sitemap.xml'

permissions:
  contents: write

concurrency:
  group: main-write-lock
  cancel-in-progress: false

jobs:
  regenerate-sitemap:
    runs-on: ubuntu-24.04
    # Skip if this commit was an auto-sitemap commit (prevent loop)
    if: "!contains(github.event.head_commit.message, '[skip-sitemap]')"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: main
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Record toolchain provenance
        run: |
          python3 scripts/toolchain_provenance.py > toolchain-provenance.json
          cat toolchain-provenance.json

      - run: python3 -m pip install -r requirements-ci.txt
      - name: Regenerate sitemap
        run: python3 scripts/generate_sitemap.py
      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3; do
            python3 scripts/generate_sitemap.py

            if git diff --quiet -- sitemap.xml; then
              echo "sitemap.xml is already up to date."
              exit 0
            fi

            git add sitemap.xml
            git commit -m "chore: auto-regenerate sitemap [skip-sitemap]"

            if git push origin HEAD:main; then
              exit 0
            fi

            echo "Push failed on attempt ${attempt}; resetting to latest main and regenerating."
            git fetch origin main --prune
            git reset --hard origin/main
            sleep $((attempt * 5))
          done

          echo "::error::Failed to push regenerated sitemap after retries."
          exit 1
