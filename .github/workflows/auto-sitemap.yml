name: Auto-regenerate Sitemap

on:
  push:
    branches: [main]
    paths-ignore:
      - 'sitemap.xml'

permissions:
  contents: write

jobs:
  regenerate-sitemap:
    runs-on: ubuntu-24.04
    # Skip if this commit was an auto-sitemap commit (prevent loop)
    if: "!contains(github.event.head_commit.message, '[skip-sitemap]')"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Regenerate sitemap
        run: python3 scripts/generate_sitemap.py
      - name: Commit if changed
        run: |
          git diff --quiet sitemap.xml && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git commit -m "chore: auto-regenerate sitemap [skip-sitemap]"
          git push
