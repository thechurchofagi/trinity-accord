name: Temporary Diagnose Evidence Profile CI

on:
  push:
    branches:
      - agent/complete-legacy-ar-eth-mirror-audit
  pull_request:
    paths:
      - .github/workflows/temp-diagnose-evidence-profile-ci.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: ".node-version"
      - run: python3 -m pip install -r requirements-ci.txt
      - name: Show P0 command and workflow source
        shell: bash
        run: |
          set -euo pipefail
          grep -R -n -B4 -A8 "Run P0 current fast gate" .github/workflows || true
      - name: Run current system tests with compact diagnostics
        shell: bash
        run: |
          set +e
          python3 scripts/generate_sitemap.py >/tmp/sitemap.log 2>&1
          python3 scripts/run_current_system_tests.py >/tmp/current.log 2>&1
          code=$?
          echo "CURRENT_SYSTEM_EXIT=$code"
          tail -n 100 /tmp/current.log
          exit 0
      - name: Run discovered P0 command with compact diagnostics
        shell: bash
        run: |
          set +e
          workflow_file="$(grep -R -l "Run P0 current fast gate" .github/workflows | head -n1)"
          echo "WORKFLOW_FILE=$workflow_file"
          command_line="$(awk '/name: Run P0 current fast gate/{found=1; next} found && /run:/{sub(/^.*run:[[:space:]]*/, ""); print; exit}' "$workflow_file")"
          echo "P0_COMMAND=$command_line"
          if [[ -z "$command_line" ]]; then
            echo "P0 command not found"
            exit 0
          fi
          bash -lc "$command_line" >/tmp/p0.log 2>&1
          code=$?
          echo "P0_EXIT=$code"
          tail -n 140 /tmp/p0.log
          exit 0
      - name: Run new focused tests
        shell: bash
        run: |
          set +e
          python3 -m pytest -q tests/test_evidence_relationship_profiles.py >/tmp/newtests.log 2>&1
          code=$?
          echo "NEW_TESTS_EXIT=$code"
          cat /tmp/newtests.log
          exit 0
