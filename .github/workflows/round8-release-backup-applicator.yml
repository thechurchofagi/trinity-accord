from __future__ import annotations

import sys
from pathlib import Path

import yaml

ROOT = Path(__file__).resolve().parents[1]
RELEASE_WRITERS = [
    '.github/workflows/backup-nft-arweave-mirror.yml',
    '.github/workflows/backup-nft-cars.yml',
    '.github/workflows/backup-nft-individual-v2.yml',
    '.github/workflows/backup-shenzhen-notary-arweave-release.yml',
    '.github/workflows/mirror-flaw-covenant-videos-release.yml',
    '.github/workflows/mirror-ots-proof-bundle-release.yml',
]


def require(condition: bool, message: str) -> None:
    if not condition:
        print(f'FAIL: {message}', file=sys.stderr)
        raise SystemExit(1)


def read(path: str) -> str:
    target = ROOT / path
    require(target.exists(), f'missing {path}')
    return target.read_text(encoding='utf-8')


def main() -> int:
    for path in RELEASE_WRITERS:
        text = read(path)
        require(isinstance(yaml.safe_load(text), dict), f'invalid workflow mapping: {path}')
        require("github.ref == 'refs/heads/main'" in text or 'repository_dispatch' in text, f'{path} is not main-bound')
        require('ref: main' in text, f'{path} does not checkout current main')
        require('contents: write' in text, f'{path} lacks release write permission')
        require('set -euo pipefail' in text, f'{path} lacks fail-closed shell')

    legacy_wf = read('.github/workflows/backup-nft-individual.yml')
    require('contents: read' in legacy_wf, 'legacy v1 workflow still has Release write permission')
    require('GITHUB_TOKEN' not in legacy_wf, 'legacy v1 workflow still receives a GitHub write token')
    require('--dry-run' in legacy_wf, 'legacy v1 workflow is not read-only')
    legacy_script = read('scripts/backup-nft-individual.mjs')
    require('v1 is retired' in legacy_script, 'legacy v1 direct live invocation is not fail-closed')

    mirror_wf = read('.github/workflows/backup-nft-arweave-mirror.yml')
    for marker in ['RELEASE_SCOPE', 'SOURCE_COMMIT', 'BACKUP_GENERATED_AT', 'contract-${normalized}', 'full-175']:
        require(marker in mirror_wf, f'mirror workflow missing scoped release marker: {marker}')
    mirror = read('scripts/backup-nft-arweave-mirror.mjs')
    require("contract-filtered backup must not target the full-175 release scope" in mirror, 'filtered mirror can still overwrite full release')
    require('expected_nfts: contractFilter ? nftList.length : EXPECTED_NFTS' in mirror, 'filtered manifest still claims 175 expected NFTs')
    require('GENERATED_AT' in mirror, 'mirror archives are not generated from a stable timestamp')
    require(mirror.find('Download & verify CARs') < mirror.find('Clean old assets'), 'mirror deletes the old release before verifying replacement sources')

    v2_wf = read('.github/workflows/backup-nft-individual-v2.yml')
    require('RELEASE_TAG=$release_tag' in v2_wf, 'v2 filtered/full runs do not use commit-scoped tags')
    v2 = read('scripts/backup-nft-individual-v2.mjs')
    for marker in [
        'GITHUB_TOKEN is required for release upload',
        'contract-filtered live backup requires a contract-scoped RELEASE_TAG',
        'Missing expected hash/size',
        'Arweave payload mismatch',
        'Refusing to package incomplete backup',
        'release uploads failed',
        'List release assets failed',
    ]:
        require(marker in v2, f'v2 backup missing fail-closed marker: {marker}')

    shenzhen = read('.github/workflows/backup-shenzhen-notary-arweave-release.yml')
    require(shenzhen.count('ref: main') == 2, 'Shenzhen build/publish jobs are not both pinned to main')
    require('--target "$(git rev-parse HEAD)"' in shenzhen, 'Shenzhen release target does not bind checked-out main')

    print('PASS: Round 8 release backups are main-bound, scoped, and fail closed')
    return 0


if __name__ == '__main__':
    raise SystemExit(main())
