name: Round 8 Release Backup Applicator

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/deep-audit-round8-release-backups'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: agent/deep-audit-round8-release-backups
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Apply confirmed release-backup fixes
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          ROOT = Path('.')

          def write(path: str, content: str) -> None:
              (ROOT / path).write_text(content, encoding='utf-8')

          def replace_once(path: str, old: str, new: str) -> None:
              p = ROOT / path
              text = p.read_text(encoding='utf-8')
              if text.count(old) != 1:
                  raise SystemExit(f'{path}: expected one match, found {text.count(old)} for {old[:80]!r}')
              p.write_text(text.replace(old, new, 1), encoding='utf-8')

          write('.github/workflows/backup-nft-arweave-mirror.yml', '''name: NFT Arweave Mirror (backup only)

on:
  workflow_dispatch:
    inputs:
      contract:
        description: 'Contract address filter (empty = all 175)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (list only, no upload)'
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: release-nft-arweave-mirror
  cancel-in-progress: false

jobs:
  mirror:
    if: ${{ github.ref == 'refs/heads/main' && (github.actor == 'thechurchofagi' || github.actor == 'github-actions[bot]') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - name: Checkout current main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
          ref: main

      - name: Record toolchain provenance
        run: |
          python3 scripts/toolchain_provenance.py > "$RUNNER_TEMP/toolchain-provenance.json"
          cat "$RUNNER_TEMP/toolchain-provenance.json"

      - name: Authorize release writer and derive immutable scope
        env:
          ACTOR: ${{ github.actor }}
          CONTRACT: ${{ inputs.contract }}
        run: |
          set -euo pipefail
          if [[ "$ACTOR" != "thechurchofagi" && "$ACTOR" != "github-actions[bot]" ]]; then
            echo "Unauthorized actor: $ACTOR" >&2
            exit 1
          fi
          source_commit="$(git rev-parse HEAD)"
          generated_at="$(git show -s --format=%cI HEAD)"
          if [ -n "$CONTRACT" ]; then
            [[ "$CONTRACT" =~ ^0x[a-fA-F0-9]{40}$ ]] || { echo "Invalid contract address" >&2; exit 1; }
            normalized="$(printf '%s' "$CONTRACT" | tr '[:upper:]' '[:lower:]')"
            release_tag="nft-arweave-mirror-contract-${normalized#0x}-v1-${source_commit:0:12}"
            release_scope="contract-${normalized}"
          else
            release_tag="nft-arweave-mirror-175-v1-${source_commit:0:12}"
            release_scope="full-175"
          fi
          {
            echo "BACKUP_GENERATED_AT=$generated_at"
            echo "RELEASE_SCOPE=$release_scope"
            echo "RELEASE_TAG=$release_tag"
            echo "SOURCE_COMMIT=$source_commit"
          } >> "$GITHUB_ENV"
          echo "Release tag: $release_tag"

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version: '22'

      - name: Run Arweave to GitHub Release mirror
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          CONTRACT: ${{ inputs.contract }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          args=()
          if [ -n "$CONTRACT" ]; then args+=(--contract "$CONTRACT"); fi
          if [ "$DRY_RUN" = "true" ]; then args+=(--dry-run); fi
          node scripts/backup-nft-arweave-mirror.mjs "${args[@]}"
''')

