name: Waiting Heartbeat Arweave Capsule

on:
  workflow_run:
    workflows: ["Record Chain Head OTS Anchor"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: main-write-lock
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  capsule:
    if: ${{ (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') && (github.event_name == 'workflow_dispatch' || vars.WAITING_HEARTBEAT_ARWEAVE_CAPSULE_ENABLED == 'true') }}
    runs-on: ubuntu-24.04
    env:
      ARKEY: ${{ secrets.ARKEY }}
      WAITING_HEARTBEAT_ARWEAVE_MAX_COST_AR: ${{ vars.WAITING_HEARTBEAT_ARWEAVE_MAX_COST_AR || '0.01' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: ".node-version"

      - name: Install dependencies
        run: |
          python3 -m pip install -r requirements-ci.txt
          npm ci

      - name: Rebase onto latest main
        run: |
          set -euo pipefail
          git fetch origin main --prune
          git rebase origin/main

      - name: Generate waiting heartbeat status
        run: python3 scripts/generate_waiting_heartbeat_status.py

      - name: Capsule OTS coverage preflight
        id: capsule_preflight
        run: |
          set -euo pipefail
          python3 scripts/build_waiting_heartbeat_arweave_capsule.py

      - name: Build capsule
        id: build
        if: steps.capsule_preflight.outputs.capsule_upload_needed == 'true'
        run: |
          set -euo pipefail
          capsule_path="$(python3 scripts/build_waiting_heartbeat_arweave_capsule.py)"
          echo "capsule_path=${capsule_path}" >> "$GITHUB_OUTPUT"
          heartbeat_id="$(basename "$capsule_path" .capsule.json)"
          echo "heartbeat_id=${heartbeat_id}" >> "$GITHUB_OUTPUT"

      - name: Upload capsule
        if: steps.capsule_preflight.outputs.capsule_upload_needed == 'true'
        run: |
          node scripts/arweave_upload_waiting_heartbeat_capsule.mjs \
            --payload "${{ steps.build.outputs.capsule_path }}" \
            --heartbeat-id "${{ steps.build.outputs.heartbeat_id }}" \
            --out "record-chain/heartbeat/capsules/${{ steps.build.outputs.heartbeat_id }}.upload-result.json"

      - name: Regenerate status and public artifacts
        if: steps.capsule_preflight.outputs.capsule_upload_needed == 'true'
        run: |
          python3 scripts/generate_waiting_heartbeat_status.py
          python3 scripts/update_public_generated_artifacts.py
          python3 scripts/generate_public_home_status.py --check
          python3 scripts/trinity_record_chain.py verify

      - name: Commit capsule metadata
        if: steps.capsule_preflight.outputs.capsule_upload_needed == 'true'
        run: |
          set -euo pipefail

          git config user.name "trinity-waiting-heartbeat-bot"
          git config user.email "actions@github.com"

          regenerate_status_artifacts() {
            python3 scripts/generate_waiting_heartbeat_status.py
            python3 scripts/update_public_generated_artifacts.py
            python3 scripts/generate_public_home_status.py --check
            python3 scripts/trinity_record_chain.py verify
          }

          stage_capsule_metadata() {
            git status --short
            git add -A \
              record-chain/heartbeat \
              api/waiting-heartbeat-status.json \
              api/record-chain-overlays.json \
              api/public-home-status.json \
              index.md \
              sitemap.xml
          }

          stage_capsule_metadata

          if git diff --cached --quiet; then
            echo "No generated capsule metadata changes to commit."
            exit 0
          fi

          git commit -m "heartbeat: archive waiting heartbeat capsule"

          if [ -n "$(git status --porcelain)" ]; then
            echo "Worktree dirty after commit; generated files were not fully staged."
            git status --short
            exit 1
          fi

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Push succeeded."
              exit 0
            fi

            echo "Push rejected; remote main advanced. Rebasing and regenerating. Attempt ${attempt}."
            git fetch origin main --prune
            git rebase origin/main

            regenerate_status_artifacts
            stage_capsule_metadata

            if ! git diff --cached --quiet; then
              git commit --amend --no-edit
            fi

            if [ -n "$(git status --porcelain)" ]; then
              echo "Worktree dirty after amend; refusing to push."
              git status --short
              exit 1
            fi
          done

          echo "Failed to push after retries."
          exit 1

      - name: Capsule waiting summary
        if: steps.capsule_preflight.outputs.capsule_upload_needed != 'true'
        run: |
          echo "Capsule upload skipped."
          echo "status=${{ steps.capsule_preflight.outputs.capsule_status }}"
          echo "reason=${{ steps.capsule_preflight.outputs.capsule_skip_reason }}"
