name: Extract NFT Text Descriptions

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract NFT metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json, os, re, time, tarfile, io
          from pathlib import Path
          from concurrent.futures import ThreadPoolExecutor, as_completed
          import urllib.request, urllib.error

          REPO = os.environ.get("GITHUB_REPOSITORY", "thechurchofagi/trinity-accord")
          TOKEN = os.environ.get("GH_TOKEN", "")
          RELEASE_TAG = "nft-arweave-mirror-175-v1"
          OUT_DIR = Path("nft-text-descriptions")
          INDEX_PATH = OUT_DIR / "index.json"
          TI_PATH = Path("token_index.json")

          def api_get(url, accept="application/json"):
              req = urllib.request.Request(url)
              req.add_header("Authorization", f"Bearer {TOKEN}")
              req.add_header("Accept", accept)
              req.add_header("User-Agent", "extractor")
              return urllib.request.urlopen(req, timeout=120)

          with open(TI_PATH) as f:
              token_index = json.load(f)

          if INDEX_PATH.exists():
              with open(INDEX_PATH) as f:
                  index = json.load(f)
              done = {(e["contract"], e["token_id"]) for e in index}
          else:
              index = []
              done = set()

          print(f"Fetching release assets...")
          resp = api_get(f"https://api.github.com/repos/{REPO}/releases/tags/{RELEASE_TAG}")
          asset_map = {a["name"]: a["id"] for a in json.loads(resp.read()).get("assets", [])}
          print(f"Found {len(asset_map)} assets")

          todo = []
          for contract, tokens in token_index.items():
              for token_id in tokens:
                  if (contract, token_id) not in done:
                      name = f"nft-{contract.lower()}-{token_id}.tar"
                      if name in asset_map:
                          todo.append((contract, token_id, asset_map[name]))
                          continue
                      # Try without 0x prefix case variations
                      for a_name, a_id in asset_map.items():
                          if token_id in a_name and contract.lower() in a_name:
                              todo.append((contract, token_id, a_id))
                              break

          print(f"Done: {len(done)}, Todo: {len(todo)}")

          def extract_one(contract, token_id, asset_id):
              url = f"https://api.github.com/repos/{REPO}/releases/assets/{asset_id}"
              try:
                  resp = api_get(url, accept="application/octet-stream")
                  chunks = []
                  total = 0
                  while True:
                      chunk = resp.read(8192)
                      if not chunk:
                          break
                      chunks.append(chunk)
                      total += len(chunk)
                      if total > 500000:
                          break
                  data = b"".join(chunks)
              except Exception as e:
                  return (contract, token_id, f"download error: {e}")

              # Parse tar
              pos = 0
              while pos + 512 <= len(data):
                  header = data[pos:pos+512]
                  if header == b'\x00' * 512:
                      break
                  fname = header[0:100].split(b'\x00')[0].decode('utf-8', errors='replace').strip()
                  sz_oct = header[124:136].split(b'\x00')[0].decode('utf-8', errors='replace').strip()
                  try:
                      sz = int(sz_oct, 8) if sz_oct else 0
                  except:
                      break

                  if fname.endswith('metadata.car'):
                      car = data[pos+512:pos+512+sz]
                      # Try to find JSON in CAR
                      text = car.decode('utf-8', errors='replace')
                      for needle in ['{"name":', '{"Name":', '{"NAME":', '{"description":', '{"Description":', '{"']:
                          idx = text.find(needle)
                          if idx >= 0:
                              depth = 0
                              for i in range(idx, len(text)):
                                  if text[i] == '{': depth += 1
                                  elif text[i] == '}':
                                      depth -= 1
                                      if depth == 0:
                                          try:
                                              obj = json.loads(text[idx:i+1])
                                              name = obj.get("name") or obj.get("Name") or obj.get("NAME") or "Unknown"
                                              desc = obj.get("description") or obj.get("Description") or "No description."
                                              fname_md = f"{contract}_{token_id}.md"
                                              md = f"# {name}\n\n**Contract**: `{contract}`\n\n**Token ID**: `{token_id}`\n\n## Description\n\n{desc}\n"
                                              (OUT_DIR / fname_md).write_text(md, encoding="utf-8")
                                              return (contract, token_id, name)
                                          except:
                                              break
                      return (contract, token_id, "JSON parse failed")
                  padded = ((sz + 511) // 512) * 512
                  pos += 512 + padded
              return (contract, token_id, "no metadata.car")

          success = fail = 0
          for bs in range(0, len(todo), 5):
              batch = todo[bs:bs+5]
              print(f"Batch {bs//5+1}/{(len(todo)+4)//5} ({bs+1}-{bs+len(batch)}/{len(todo)})...")
              with ThreadPoolExecutor(max_workers=5) as ex:
                  for contract, token_id, result in [f.result() for f in [ex.submit(extract_one, c, t, a) for c, t, a in batch]]:
                      if result.startswith(("download", "JSON", "no ")):
                          fail += 1
                          print(f"  FAIL {token_id[-8:]}: {result}")
                      else:
                          success += 1
                          index.append({"contract":contract,"token_id":token_id,"name":result.strip(),"file":f"{contract}_{token_id}.md"})
                          print(f"  OK {token_id[-8:]}: {result[:50]}")
              with open(INDEX_PATH, "w") as f:
                  json.dump(index, f, indent=2, ensure_ascii=False)

          readme = (OUT_DIR / "README.md").read_text()
          remaining = 175 - len(index)
          readme = re.sub(r'- \*\*已完成\*\*: \d+ / \d+', f'- **已完成**: {len(index)} / 175', readme)
          readme = re.sub(r'- \*\*剩余\*\*: \d+', f'- **剩余**: {remaining}', readme)
          readme = re.sub(r'- \*\*最后更新\*\*: [\d-]+', f'- **最后更新**: {time.strftime("%Y-%m-%d")}', readme)
          (OUT_DIR / "README.md").write_text(readme, encoding="utf-8")

          print(f"\n=== DONE === Success: {success}, Failed: {fail}, Total: {len(index)}/175")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nft-text-descriptions/
          git diff --cached --quiet && echo "No changes" && exit 0
          COUNT=$(python3 -c "import json; print(len(json.load(open('nft-text-descriptions/index.json'))))")
          git commit -m "feat: extract NFT text descriptions ($COUNT/175)"
          git push
