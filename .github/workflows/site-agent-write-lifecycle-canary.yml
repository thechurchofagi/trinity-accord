name: Site Agent Write Lifecycle Canary

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: "Public site base URL"
        required: false
        default: "https://www.trinityaccord.org"
      mode:
        description: "preflight-only, single-write-canary, or duplicate-canary"
        required: false
        default: "preflight-only"
      route:
        description: "Route for write canary"
        required: false
        default: "pure_echo"
      confirm_live_canary:
        description: "Required exact phrase for write modes"
        required: false
        default: ""
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: read

env:
  INPUT_SITE_URL: ${{ github.event.inputs.site_url || 'https://www.trinityaccord.org' }}
  INPUT_MODE: ${{ github.event.inputs.mode || 'preflight-only' }}
  INPUT_ROUTE: ${{ github.event.inputs.route || 'pure_echo' }}
  INPUT_CONFIRM_LIVE_CANARY: ${{ github.event.inputs.confirm_live_canary || '' }}

jobs:
  canary:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Run external write lifecycle canary
        run: |
          python3 scripts/smoke_external_agent_write_lifecycle_canary.py \
            --site "$INPUT_SITE_URL" \
            --mode "$INPUT_MODE" \
            --route "$INPUT_ROUTE" \
            --confirm-live-canary "$INPUT_CONFIRM_LIVE_CANARY"
