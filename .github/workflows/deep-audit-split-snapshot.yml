name: Deep Audit Split Snapshot

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  split:
    if: github.event.pull_request.head.ref == 'agent/deep-audit-20260712'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Publish source snapshot text chunks
        run: |
          set -euo pipefail
          test -f audit/deep-audit-source.tar.gz
          rm -rf audit/chunks
          mkdir -p audit/chunks
          archive_size="$(stat -c '%s' audit/deep-audit-source.tar.gz)"
          archive_sha="$(sha256sum audit/deep-audit-source.tar.gz | awk '{print $1}')"
          base64 -w0 audit/deep-audit-source.tar.gz > /tmp/deep-audit-source.b64
          split -b 700000 -d -a 3 /tmp/deep-audit-source.b64 audit/chunks/part-
          ARCHIVE_SIZE="${archive_size}" ARCHIVE_SHA="${archive_sha}" python - <<'PY'
          import json
          import os
          from pathlib import Path
          parts = sorted(p.name for p in Path('audit/chunks').glob('part-*'))
          data = {
              'schema': 'trinityaccord.deep-audit-source-chunks.v1',
              'archive_size_bytes': int(os.environ['ARCHIVE_SIZE']),
              'archive_sha256': os.environ['ARCHIVE_SHA'],
              'base64_size_bytes': sum((Path('audit/chunks') / name).stat().st_size for name in parts),
              'part_size_bytes': 700000,
              'parts': parts,
          }
          Path('audit/chunks/index.json').write_text(json.dumps(data, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          PY
          rm -f audit/deep-audit-source.tar.gz audit/README.txt audit/TRIGGER.txt audit/NOTE.txt
          rm -f .github/workflows/deep-audit-split-snapshot.yml
          git config user.name 'trinity-deep-audit-bot'
          git config user.email 'actions@github.com'
          git add -A
          git commit -m 'audit: publish source snapshot chunks'
          git push origin HEAD:${{ github.head_ref }}
