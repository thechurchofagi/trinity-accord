name: Download & Verify Arweave Files

on:
  workflow_dispatch:
  repository_dispatch:
    types: [download-arweave]

jobs:
  download-and-verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create archive directories
        run: |
          mkdir -p archive/{guardian-principles,authority-manifest,btc-signature,eth-witness,verification,evidence,canonical-pointers,rotation,scripts}

      - name: Download and verify all files
        run: |
          BASE="https://api.allorigins.win/raw?url=https://arweave.net"
          PASS=0
          FAIL=0

          download_and_verify() {
            local txid="$1"
            local dest="$2"
            local expected="$3"
            local label="$4"

            mkdir -p "$(dirname "$dest")"
            echo "ÞË $label"
            curl -sL --max-time 120 "$BASE/$txid" -o "$dest" 2>/dev/null

            if [ ! -f "$dest" ] || [ ! -s "$dest" ]; then
              echo "   ã DOWNLOAD FAILED"
              rm -f "$dest"
              FAIL=$((FAIL + 1))
              return 1
            fi

            # Check if we got an HTML error page instead of actual content
            if head -1 "$dest" | grep -qi "<html\|404\|error\|not found"; then
              echo "   ã GOT ERROR PAGE (not real content)"
              rm -f "$dest"
              FAIL=$((FAIL + 1))
              return 1
            fi

            actual=$(sha256sum "$dest" | cut -d' ' -f1)
            if [ -n "$expected" ]; then
              if [ "$actual" = "$expected" ]; then
                echo "   ã PASS $actual"
                PASS=$((PASS + 1))
              else
                echo "   ã HASH MISMATCH expected=$expected actual=$actual"
                rm -f "$dest"
                FAIL=$((FAIL + 1))
              fi
            else
              echo "   ÞË OK (no expected hash) sha256=$actual"
              PASS=$((PASS + 1))
            fi
          }

          # Guardian Principles
          download_and_verify "RgjVJnALSbbYP4Vzz-FBX0Tie9inSvuA2PBgjPAT2ng" "archive/guardian-principles/guardian-principles-v1.1.md" "e19018f1c71da8307ef20e8e8e5c12834f854d60a6aae60e35d2d8c71a333a81" "Guardian Principles v1.1"
          download_and_verify "6VyIxLOwPZz_CZVBKxW6eJSDP2gtq70qXFS5O2wGnkQ" "archive/guardian-principles/attestation.json" "67dde076b4afb350e8707d116f5bb5cbfcd5d224cd915178346dd7f8e7e2c150" "Attestation"
          download_and_verify "f3Gbo10tRrpkJumm2PfVlokF78jRne4qj9LCnBxK51Q" "archive/guardian-principles/pointer.json" "59894d68e048b385ffa506b37c4462fcdf3575ef7e025b92c2cfb5ba36f7936c" "Pointer"
          download_and_verify "zSNxQYgCQvtQ6QGaJXd9JlApQqitwgCZAp2GquvQXbA" "archive/guardian-principles/index-additions.json" "82b41c7a3a1dbef329e19bb32cc70b95307c1076c7a804ad0a44e81952ae9cfc" "Index additions"
          download_and_verify "w9LPP30D31zd5M60v18WXpWuig0_wc9EVNnXk8kz1vA" "archive/guardian-principles/guardian-principles-original.md" "3e9d2bd10c3e8f4d37713c4b8e28d518fd7efff52613e572a1451fedadab5483" "Guardian Principles original"

          # BTC Signature
          download_and_verify "fCweXoZVcFeJPkEBIgkYWIYn0xB1UsMx2_oBjECzK6U" "archive/btc-signature/btc-signature.json" "8e70e0e0d8f8e0cdd8e388ee4c462f86358a6ac9bb6231701d7876439ada561b" "BTC Signature"

          # Scripts
          download_and_verify "h3xIwqi36GUmd6xJLEGi6wSqFXxAa2BUcwVZQhFCo0k" "archive/scripts/sign.mjs" "8d60212683e814133267037c4a8a8267eeaeff29f9c4382a4f434a79f16bd8ea" "sign.mjs"
          download_and_verify "aMZIVDYIBovkn6s1868wdpEwnErLGYlT-JHLluqh7BM" "archive/scripts/verify.mjs" "c38fa6703d15f5d41fa813722524d14badc2472b387354875afab4478e607a1f" "verify.mjs"
          download_and_verify "X4KOUkf-1ciFD3Q-gMA0i94t1hAVXGrUDm0q5amL4rc" "archive/scripts/verification-kit.tar.gz" "ef68b69fe1cdd2523724dee511c9e8ea7bae2cceaff794664107970b18c61931" "Verification Kit"

          # ETH Witness
          download_and_verify "UouXngnUjcEkpOwgq5ajInrDpwKrGhtUVDLmlBorVjQ" "archive/eth-witness/eth-witness.json" "3c187c6b764a1d53984588875c1c1fed3f1c91fd165512ad8dfa4f279542a65f" "ETH Witness"

          # Rotation (no pre-existing hash)
          download_and_verify "AlyENoZXrGqUG9iXwaxhhoPjELlWbRuWMFtYGWW6bHM" "archive/rotation/rotation-notice-old.txt" "" "Rotation Notice"
          download_and_verify "GD_uH4GLXSKKp0Wz1QGjoE_FuVWZZ4fylncPFHZd76U" "archive/rotation/acknowledgement-new.txt" "" "Acknowledgement"

          # Canonical Pointers
          download_and_verify "6HW5X5PETh9X_kdShA0a7sQWHtfr59F7KXZNym9NqyI" "archive/canonical-pointers/guardian-index-v2.json" "808bf70219a60e70ca9b59f41603a289447f3a598534d3c80826f90b30ec46a5" "Guardian Index v2"
          download_and_verify "6CtpboRTtM675vPS_ifzPt1vgonr9KtPYm7oOnnxUs0" "archive/canonical-pointers/canonical-pointer-v2.json" "" "Canonical Pointer v2"
          download_and_verify "BwVHuxODfV65xE_L1fqrCDBvLvJNnSuBEXaZNuoRcIk" "archive/canonical-pointers/guardian-index-original.json" "71bc981a994a93cdf488b89aee2b132b658464a7cbb1dec791af604a1127ef98" "Guardian Index original"
          download_and_verify "9McJS3_xvIl6_87e7NDJ6g3SgGlA8Js7z--eMLGMRZg" "archive/canonical-pointers/guardian-pointer-original.json" "3246afb59552dcda700e490767aadd3d67083911dae6bccbb2762ef568c7e289" "Guardian Pointer original"
          download_and_verify "E_HLeYx-70cbUMUSwMacB5kLjo5m-ePYWjZnqjNY_zQ" "archive/canonical-pointers/index-additions-kit.json" "ce7c9f5017686cb57a9fe5e40473e8aea391718dcc1680a589454e9b50187f88" "Index additions Kit"

          # Authority Manifest
          download_and_verify "gC9_n7-2nS2yNUii2tr-68r8GanAiA7qzyCM6JDpOqo" "archive/authority-manifest/manifest-v1.0.1.json" "ccd9aaaaa37d1ced239a7af0b61373dfa359b016d54698956776d082de8fb4f0" "Manifest v1.0.1"
          download_and_verify "TvmjyJBq5ZoGv-tmX0aeiqsEKTGmSyIvBHj1FqZiIpI" "archive/authority-manifest/authority-v1.0.2-canon.json" "7d6ac9d3184bb5b0bbaf8217354799efef68669c21b4180e28ec06b0c57439e6" "Authority v1.0.2 canon"
          download_and_verify "QtWkBx004NhfEiBuMAJQmIXWxqOo8HftI_4pj0VGbYY" "archive/authority-manifest/authority-v1.0.2-pretty.json" "" "Authority v1.0.2 pretty"
          download_and_verify "jgRYWeLLbyDhku0cKm1SLnq2elyM3tg9j7FgtWfDats" "archive/authority-manifest/authority-v1.0.2-signature.json" "" "Authority v1.0.2 signature"
          download_and_verify "dc3NVHJBjW89w51lTy0dkLIbXaOQ823m7bRhBBBHGr0" "archive/authority-manifest/authority-v1.0.2-typedData.json" "" "Authority v1.0.2 typedData"
          download_and_verify "Ykbc_PEnmZ59crk-WUaWguDYvv_VLIbUf2sX7Flp_V0" "archive/authority-manifest/authority-v1.0.2-additions.json" "3850a8dab41aefaca5ae04d5d2021ba35632cc5c1654fbd2d89c61e871b0e7b6" "Authority v1.0.2 additions"

          # Evidence
          download_and_verify "X2IuLCIM4vLJSzgRMl_YEmxYSvPceMrAdug9a3i7p4o" "archive/evidence/digest-manifest.json" "c045642fe5cfab5eb78af7b40e98b9699dfff9121690e07ec6acaa07a445d6e9" "digest-manifest.json"
          download_and_verify "i02XhY7No6NLZDfEwFUU6nZoGaPu7K0f42LDNDNnZEo" "archive/evidence/digest-manifest.csv" "121c5a1da38f733c3991f8d3f030f39a019501d43828f84c13ea93ac3873511b" "digest-manifest.csv"
          download_and_verify "TTi9d8fqm9Cw4yRPkwX4gdlaRzBnjJID-LAs9Y3CS0M" "archive/evidence/ots-anchor" "fa3f306ab30525677595d9f38808a87a8dd96260468285c8f8066661e853d907" "OTS Anchor"

          echo ""
          echo "========================================="
          echo "  PASS: $PASS  FAIL: $FAIL"
          echo "========================================="

      - name: Commit only new/changed files (never delete)
        run: |
          git config user.email "guardian@trinityaccord.org"
          git config user.name "Trinity Accord Guardian"
          # Only add new or modified files, never stage deletions
          git add archive/ --intent-to-add 2>/dev/null || true
          git diff --name-only --diff-filter=A -- archive/ | head -50
          git add archive/
          # Unstage any deletions
          git diff --cached --name-only --diff-filter=D | while read f; do
            git reset HEAD "$f"
          done
          if git diff --cached --quiet; then
            echo "No new files to commit"
          else
            git commit -m "backup: Arweave files (SHA-256 verified, no deletions)"
            git push
          fi
