name: Stamp Record Chain Batches with OpenTimestamps

on:
  workflow_dispatch:
  schedule:
    - cron: "33 4 * * *"

permissions:
  contents: write

jobs:
  ots-stamp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install opentimestamps-client
      - run: python scripts/trinity_record_chain.py ots-stamp
      - run: |
          if ! git diff --quiet; then
            git config user.name "trinity-ots-bot"
            git config user.email "actions@github.com"
            git add record-chain/
            git commit -m "Stamp record-chain batches with OTS"
            git push
          fi
