name: Round 7 Full-System Audit

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: round7-system-audit-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  audit:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'audit/deep-round7-system-boundaries'
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: audit/deep-round7-system-boundaries
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Run bounded static repository and live-surface audit
        run: |
          set -euo pipefail
          rm -rf audit-results/round7
          python audit/round7_fast_audit.py . --output audit-results/round7
      - name: Commit deterministic audit report
        run: |
          set -euo pipefail
          git config user.name 'trinity-round7-audit-bot'
          git config user.email 'actions@github.com'
          git add audit-results/round7/report.json audit-results/round7/report.md
          if git diff --cached --quiet; then
            echo 'Round 7 audit report unchanged.'
            exit 0
          fi
          git commit -m 'audit: record round7 bounded static and live findings'
          git push origin HEAD:audit/deep-round7-system-boundaries
