name: One-time dispatch Heartbeat OTS recovery

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-time-dispatch-heartbeat-ots-recovery.yml

permissions:
  contents: write
  actions: write

jobs:
  dispatch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove dispatcher, commit, and dispatch current-tip OTS anchor
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "trinity-heartbeat-repair-bot"
          git config user.email "actions@github.com"
          rm .github/workflows/one-time-dispatch-heartbeat-ots-recovery.yml
          git add .github/workflows/one-time-dispatch-heartbeat-ots-recovery.yml
          git commit -m "ops: remove one-time Heartbeat OTS recovery dispatcher"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              gh workflow run record-chain-head-ots-anchor.yml --repo "$GITHUB_REPOSITORY" --ref main
              exit 0
            fi
            git fetch origin main --prune
            git rebase origin/main
            sleep $((attempt * 5))
          done
          exit 1
