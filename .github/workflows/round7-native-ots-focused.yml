name: Round 7 Native OTS Focused Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  focused:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/deep-audit-round7-native-ots-transaction'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/deep-audit-round7-native-ots-transaction
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '24'
      - name: Install current-system dependencies
        run: python -m pip install -r requirements-ci.txt
      - name: Capture focused contracts
        id: focused
        continue-on-error: true
        run: |
          set +e
          {
            echo '=== compile ==='
            python -m py_compile \
              scripts/run_native_ots_upgrade_verify.py \
              scripts/reconcile_native_ots_generated_state.py \
              scripts/test_native_ots_transaction_behavior.py \
              scripts/test_native_ots_upgrade_workflow_contract.py
            compile_rc=$?
            echo "compile_rc=$compile_rc"
            echo '=== behavior ==='
            python scripts/test_native_ots_transaction_behavior.py
            behavior_rc=$?
            echo "behavior_rc=$behavior_rc"
            echo '=== contract ==='
            python scripts/test_native_ots_upgrade_workflow_contract.py
            contract_rc=$?
            echo "contract_rc=$contract_rc"
            test "$compile_rc" = 0 -a "$behavior_rc" = 0 -a "$contract_rc" = 0
          } > "$RUNNER_TEMP/focused.log" 2>&1
          code=$?
          echo "$code" > "$RUNNER_TEMP/focused.code"
          cat "$RUNNER_TEMP/focused.log"
          exit "$code"
      - name: Capture full current-system result
        id: current
        continue-on-error: true
        run: |
          set +e
          python scripts/run_current_system_tests.py > "$RUNNER_TEMP/current-system.log" 2>&1
          code=$?
          echo "$code" > "$RUNNER_TEMP/current-system.code"
          tail -n 180 "$RUNNER_TEMP/current-system.log"
          exit "$code"
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: round7-native-ots-focused-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/focused.log
            ${{ runner.temp }}/focused.code
            ${{ runner.temp }}/current-system.log
            ${{ runner.temp }}/current-system.code
          retention-days: 7
      - name: Require focused success
        if: always()
        run: |
          test -f "$RUNNER_TEMP/focused.code"
          test -f "$RUNNER_TEMP/current-system.code"
          test "$(cat "$RUNNER_TEMP/focused.code")" = "0"
          test "$(cat "$RUNNER_TEMP/current-system.code")" = "0"
