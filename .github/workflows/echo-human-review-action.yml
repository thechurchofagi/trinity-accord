name: Echo Human Review Action (Retired)

# The issue-comment writer belonged to Gateway v1. New public Echo records use
# the Record-Chain Intake Gateway. This manual, read-only tombstone prevents a
# stale issue comment from activating a legacy repository writer.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  retired:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Explain the current route
        run: |
          echo "Echo issue-comment archival is retired."
          echo "Use the Record-Chain Intake Gateway contract at /api/record-chain-intake-gateway.v1.json."
