name: Temporary Finalize Evidence Context

on:
  pull_request:
    paths:
      - .github/workflows/temp-finalize-evidence-context.yml

permissions:
  contents: write

jobs:
  finalize:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: agent/complete-legacy-ar-eth-mirror-audit
      - name: Stop after one successful finalization
        id: sentinel
        shell: bash
        run: |
          if [[ -f .github/evidence-context-finalized ]]; then
            echo "done=true" >> "$GITHUB_OUTPUT"
          else
            echo "done=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        if: steps.sentinel.outputs.done != 'true'
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        if: steps.sentinel.outputs.done != 'true'
        with:
          node-version-file: ".node-version"
      - name: Install dependencies
        if: steps.sentinel.outputs.done != 'true'
        run: python3 -m pip install -r requirements-ci.txt
      - name: Patch CRL compatibility wording and sitemap
        if: steps.sentinel.outputs.done != 'true'
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path("agent-start.md")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "## Legacy Context Depth (CC) and CRL compatibility",
              "## Legacy Context Depth (CC) and Context Readiness Level (CRL) compatibility",
          )
          text = text.replace(
              "- CC describes reading depth under the old inherited ladder.\n- The sufficiency boolean says whether the selected action can honestly be performed.",
              "- Context Depth (CC) describes reading depth under the old inherited ladder.\n- Context Readiness Level (CRL), expressed by the sufficiency declaration, says whether the selected action can honestly be performed.",
          )
          path.write_text(text, encoding="utf-8")
          PY
          python3 scripts/generate_sitemap.py
      - name: Validate evidence profile tests
        if: steps.sentinel.outputs.done != 'true'
        run: >-
          python3 -m pytest -q
          tests/test_evidence_relationship_profiles.py
          tests/test_legacy_pointer_coverage.py
      - name: Validate P0 current gate
        if: steps.sentinel.outputs.done != 'true'
        run: python3 scripts/run_ci_group.py p0-current
      - name: Validate full current system
        if: steps.sentinel.outputs.done != 'true'
        run: python3 scripts/run_current_system_tests.py
      - name: Validate Builder receipt boundary
        if: steps.sentinel.outputs.done != 'true'
        run: python3 scripts/check_builder_receipt_boundary_sync.py
      - name: Validate Builder oath and help
        if: steps.sentinel.outputs.done != 'true'
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/test_builder_oath_readback_canonical_output.py
          node downloads/record-chain-builder.mjs --help >/tmp/record-chain-builder-help.txt
          test -s /tmp/record-chain-builder-help.txt
      - name: Validate Render deploy boundary
        if: steps.sentinel.outputs.done != 'true'
        run: python3 scripts/test_render_deploy_boundary_contract.py
      - name: Validate Gateway schema parity
        if: steps.sentinel.outputs.done != 'true'
        run: python3 scripts/test_gateway_schema_shadow_parity.py
      - name: Validate Gateway runtime contract
        if: steps.sentinel.outputs.done != 'true'
        run: python3 scripts/test_record_chain_intake_gateway_contract.py
      - name: Commit final compatibility files
        if: steps.sentinel.outputs.done != 'true'
        shell: bash
        run: |
          set -euo pipefail
          printf 'validated\n' > .github/evidence-context-finalized
          git add agent-start.md sitemap.xml .github/evidence-context-finalized
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: finalize evidence context compatibility"
          git push origin HEAD:agent/complete-legacy-ar-eth-mirror-audit
