name: Temporary OTS Head Recovery

on:
  push:
    branches:
      - agent/release-main-lock-before-pages
    paths:
      - ".github/workflows/temporary-ots-head-recovery.yml"

permissions:
  contents: write

jobs:
  stamp:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout recovery branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: agent/release-main-lock-before-pages

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install native OTS dependencies
        run: python3 -m pip install -r requirements-ci.txt

      - name: Stamp and verify current native chain tip
        run: |
          set -euo pipefail
          python3 scripts/trinity_record_chain.py verify
          python3 scripts/ots_anchor_native_record_chain_head.py --mode stamp --overwrite
          python3 scripts/check_native_ots_latest_matches_chain_tip.py

      - name: Commit proof to recovery branch
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add record-chain/ots/native-anchors api/record-chain-native-ots-latest.json
          git diff --cached --check
          git commit -m "anchor: stamp native record-chain head with OTS"
          git push origin HEAD:agent/release-main-lock-before-pages
