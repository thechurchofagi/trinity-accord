name: One-time dispatch Native OTS verify

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-time-dispatch-native-ots-verify.yml

permissions:
  contents: write
  actions: write

jobs:
  dispatch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main

      - name: Dispatch verify-only run and remove this workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh workflow run native-ots-upgrade-watch.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            -f mode=verify_only

          git config user.name "trinity-native-ots-dispatch-bot"
          git config user.email "actions@github.com"
          rm .github/workflows/one-time-dispatch-native-ots-verify.yml
          git add .github/workflows/one-time-dispatch-native-ots-verify.yml
          git commit -m "ops: remove one-time Native OTS verification dispatcher"

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git fetch origin main --prune
            git rebase origin/main
            sleep $((attempt * 5))
          done
          exit 1
