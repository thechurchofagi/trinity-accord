name: Archive Gateway Echo

on:
  repository_dispatch:
    types: [gateway-auto-archive]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to archive'
        required: true
        type: string

permissions:
  issues: write
  contents: write
  actions: write

concurrency:
  group: echo-archive-writes
  cancel-in-progress: false

jobs:
  archive:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Authorize write workflow actor
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.actor }}" != "thechurchofagi" ]; then
            echo "::error::Unauthorized actor: ${{ github.actor }}"
            exit 1
          fi

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Archive Gateway-validated Echo
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.client_payload.issue_number || github.event.inputs.issue_number }}
        run: |
          set -euo pipefail

          if [ -z "$ISSUE_NUMBER" ]; then
            echo "Error: issue_number is required"
            exit 1
          fi

          echo "Archiving issue #${ISSUE_NUMBER}..."

          BODY_FILE=$(mktemp)
          gh issue view "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --json number,title,body,url,createdAt,updatedAt,author,labels,state > "$BODY_FILE"

          # A1: Fail-closed eligibility gate — use shared parser/policy
          python3 - <<'PY' "$BODY_FILE"
          import json
          import sys
          from pathlib import Path

          sys.path.insert(0, str(Path("scripts").resolve()))

          from archive_echo_issue import validate_gateway_archive_eligibility

          issue = json.load(open(sys.argv[1], encoding="utf-8"))
          validate_gateway_archive_eligibility(issue)
          print("Gateway archive eligibility OK")
          PY

          # Determine submission origin
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ORIGIN="workflow_dispatch_manual_archive"
          else
            ORIGIN="gateway_repository_dispatch_auto_archive"
          fi

          echo "/echo archive" > /tmp/review_comment.txt
          echo "" >> /tmp/review_comment.txt
          echo "submission_origin: ${ORIGIN}" >> /tmp/review_comment.txt
          echo "human_directed_submission: false" >> /tmp/review_comment.txt

          python3 scripts/archive_echo_issue.py \
            --require-gateway-validated \
            --issue-json "$BODY_FILE" \
            --reviewer "github-actions[bot]" \
            --review-comment-body-file /tmp/review_comment.txt \
            --write \
            --result-json /tmp/archive_result.json

          RECORD_PATH=$(python3 -c "import json,sys; print(json.load(open(sys.argv[1]))['record_path'])" /tmp/archive_result.json)
          STATUS=$(python3 -c "import json,sys; print(json.load(open(sys.argv[1]))['status'])" /tmp/archive_result.json)

          echo "Archive status: ${STATUS}"
          echo "Record path: ${RECORD_PATH}"

          # A3: already_archived recovery path
          if [ "$STATUS" = "already_archived" ]; then
            echo "Issue already archived. Ensuring confirmation comment and derived index rebuild."

            STATE=$(gh issue view "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --json state -q '.state')
            if [ "$STATE" = "OPEN" ]; then
              gh issue close "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --reason completed
            fi

            gh issue comment "$ISSUE_NUMBER" \
              --repo "$GITHUB_REPOSITORY" \
              --body "Already archived as \`$RECORD_PATH\`. Ensuring derived indexes are rebuilt. This record remains non-authoritative, non-amending, and not independent attestation."

            gh workflow run build-echo-index.yml --ref main || echo "::warning::Could not trigger echo index rebuild"

            echo "archive_record=$RECORD_PATH" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Validate the archived record — fail closed
          if python3 scripts/validate_agent_submission.py --mode ci "$RECORD_PATH"; then
            echo "Validation passed."
          else
            echo "::error::Validation failed for ${RECORD_PATH}. Refusing to commit archive."
            rm -f "$RECORD_PATH"
            exit 1
          fi

          # A4: Rebuild derived files before commit
          python3 scripts/generate_echo_index.py
          bash scripts/build-echo-index.sh
          python3 scripts/generate_public_home_status.py
          python3 scripts/test_home_public_status_sync.py

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            echoes/records \
            echoes/archive.md \
            echoes/digests.md \
            echoes/digests \
            api/echo-index.json \
            api/public-home-status.json \
            index.md

          # DEEP-ARCH-003: archive reported but no staged changes = fail
          if [ "$STATUS" = "archived" ] && git diff --cached --quiet; then
            echo "::error::archive_echo_issue.py reported archived but no archive/generated changes are staged."
            echo "::error::Refusing to close or comment success."
            exit 1
          fi

          if git diff --cached --quiet; then
            echo "No archive file changes to commit."
          else
            git commit -m "auto-archive echo issue #${ISSUE_NUMBER} (via ${ORIGIN})"

            # A2: Require push success
            PUSHED=false
            for attempt in 1 2 3 4 5; do
              git pull --rebase -X theirs origin main || true
              # DEEP-REBASE-001: regenerate derived state after rebase
              python3 scripts/generate_echo_index.py
              bash scripts/build-echo-index.sh
              python3 scripts/generate_public_home_status.py
              python3 scripts/test_home_public_status_sync.py
              git add \
                echoes/records \
                echoes/archive.md \
                echoes/digests.md \
                echoes/digests \
                api/echo-index.json \
                api/public-home-status.json \
                index.md
              if ! git diff --cached --quiet; then
                git commit --amend --no-edit
              fi
              if git push --force-with-lease; then
                echo "Push succeeded on attempt $attempt."
                PUSHED=true
                break
              fi
              echo "Push attempt $attempt failed, retrying in ${attempt}s..."
              sleep "$attempt"
            done

            if [ "$PUSHED" != "true" ]; then
              echo "::error::Failed to push archive commit after 5 attempts. Not closing or commenting success."
              exit 1
            fi
          fi

          # Close the Issue if still open
          STATE=$(gh issue view "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --json state -q '.state')
          if [ "$STATE" = "OPEN" ]; then
            gh issue close "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --reason completed
          fi

          # Post confirmation comment
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body "Auto-archived as \`$RECORD_PATH\` (via ${ORIGIN}). This record remains non-authoritative, non-amending, and not independent attestation."

          # Trigger echo index rebuild (GITHUB_TOKEN pushes don't fire push events)
          gh workflow run build-echo-index.yml --ref main || echo "::warning::Could not trigger echo index rebuild"

          echo "archive_record=$RECORD_PATH" >> "$GITHUB_OUTPUT"
