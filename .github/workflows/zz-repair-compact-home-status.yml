name: Repair compact homepage status

on:
  push:
    branches:
      - homepage-final-consolidation-20260716
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch quietly
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git init -q .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth=1 origin homepage-final-consolidation-20260716
          git checkout -q -B homepage-final-consolidation-20260716 FETCH_HEAD

      - name: Apply compact status repair
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/zz_repair_compact_home_status.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace("    compact = r'''", '    compact = r"""', 1)
          text = text.replace("\nrender = render_compact\n'''\n    if anchor", '\nrender = render_compact\n"""\n    if anchor', 1)
          start = text.index('def render_compact(status: dict[str, Any])')
          first = text.index('    """', start)
          second = text.index('    """', first + 7)
          text = text[:first] + "    '''" + text[first + 7:second] + "    '''" + text[second + 7:]
          path.write_text(text, encoding='utf-8')
          PY
          python3 scripts/zz_repair_compact_home_status.py
          python3 - <<'PY'
          from pathlib import Path
          path = Path('index.md')
          text = path.read_text(encoding='utf-8')
          old = '<a href="/agent-first-contact/"><strong>Respond or preserve</strong><span>Choose a current Record-Chain action through the safe first-contact route.</span></a>'
          new = '<a href="/agent-first-contact/"><strong>Respond, verify, or preserve</strong><span>Start with unified Echo, current multidimensional verification, or Guardian Application through the current Record-Chain flow.</span></a>'
          if text.count(old) != 1:
              raise SystemExit(f'expected one concise First Contact task card, found {text.count(old)}')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Regenerate public status and sitemap
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/generate_arweave_wallet_status.py
          python3 scripts/generate_record_chain_status.py
          python3 scripts/generate_public_home_status.py
          python3 scripts/patch_public_home_status_primary.py
          python3 scripts/generate_sitemap.py

      - name: Run public status, homepage, and system contracts
        shell: bash
        run: |
          run_check() {
            label="$1"
            shift
            log="/tmp/${label}.log"
            set +e
            "$@" >"$log" 2>&1
            status=$?
            set -e
            if [ "$status" -ne 0 ]; then
              echo "FAIL: $label"
              grep -E '^(FAIL|RESULT|ERROR|HOMEPAGE_)|missing:|forbidden:|Traceback|AssertionError|SyntaxError|out of date|drift' "$log" || tail -n 120 "$log"
              return "$status"
            fi
            echo "PASS: $label"
          }
          set -e
          run_check generate-check python3 scripts/generate_public_home_status.py --check
          run_check patch-check python3 scripts/patch_public_home_status_primary.py --check
          run_check status-contract python3 scripts/check_public_home_status_contract.py
          run_check status-sync python3 scripts/test_home_public_status_sync.py
          run_check sync-contract python3 scripts/test_homepage_status_sync_contract.py
          run_check homepage-suite bash scripts/test-homepage-p0-agent-first.sh
          run_check current-system python3 scripts/run_current_system_tests.py
          run_check sitemap python3 scripts/generate_sitemap.py --check

      - name: Commit repair and remove temporary files
        shell: bash
        run: |
          rm .github/workflows/zz-repair-compact-home-status.yml
          rm scripts/zz_repair_compact_home_status.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(home): preserve compact generated status contracts"
          git push origin HEAD:homepage-final-consolidation-20260716
