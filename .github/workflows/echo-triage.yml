name: Echo Issue Triage (Legacy Stub)

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to triage (legacy mode)"
        required: true
        type: string

permissions:
  issues: read
  contents: read

jobs:
  legacy-notice:
    runs-on: ubuntu-24.04
    timeout-minutes: 2

    steps:
      - name: Print legacy notice
        run: |
          echo "=========================================="
          echo "  LEGACY WORKFLOW NOTICE"
          echo "=========================================="
          echo ""
          echo "The Echo Issue Triage workflow has been disabled."
          echo ""
          echo "Gateway v1 APIs are now in legacy status."
          echo "New submissions should use the native record-chain:"
          echo "  scripts/trinity_record_builder.py"
          echo ""
          echo "The original workflow has been preserved at:"
          echo "  legacy/gateway-v1/workflows/echo-triage.yml"
          echo ""
          echo "For more information, see:"
          echo "  api/gateway-v1-legacy-status.json"
          echo "  api/record-chain-status.json"
          echo ""
          echo "=========================================="
          echo "  Issue requested: ${{ github.event.inputs.issue_number }}"
          echo "=========================================="
          echo ""
          echo "This workflow_dispatch trigger exists only for emergency manual use."
          echo "No automatic triage is performed."
