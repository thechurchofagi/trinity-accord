name: Apply Mission-Driven Audit Round 5

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/mission-driven-deep-audit-round5'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: agent/mission-driven-deep-audit-round5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: python -m pip install -r requirements-ci.txt
      - name: Apply deterministic mission-level fixes
        run: |
          set -euo pipefail
          python audit/apply_mission_round5.py
          rm audit/apply_mission_round5.py
          python scripts/generate_public_home_status.py
          python scripts/patch_public_home_status_primary.py
          python scripts/generate_sitemap.py
      - name: Validate mission-level invariants
        run: |
          set -euo pipefail
          python scripts/test_builder_help_urls_resolve.py
          python scripts/test_mission_public_route_parity.py
          python scripts/test_autonomy_inventory_boundary.py
          python scripts/test_public_api_source_digest_if_present.py
          python scripts/check_active_public_routes.py
          python scripts/check_public_home_status_contract.py
          python scripts/test_home_public_status_sync.py
          python scripts/test_sitemap_permalink_matches_source.py
          python scripts/trinity_record_chain.py verify
      - name: Commit audited fixes
        run: |
          set -euo pipefail
          git config user.name 'trinity-mission-audit-bot'
          git config user.email 'actions@github.com'
          git add -A
          git commit -m 'Align public routes and recovery surfaces with mission'
          git push origin HEAD:agent/mission-driven-deep-audit-round5
