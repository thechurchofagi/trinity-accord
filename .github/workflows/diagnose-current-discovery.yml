name: Diagnose Current Discovery

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract:
    name: ${{ matrix.test }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        test:
          - scripts/test_public_api_source_digest_if_present.py
          - scripts/test_discovery_entrypoints_cover_full_agent_journey.py
          - scripts/test_pages_build_contains_agent_discovery.py
          - scripts/test_external_agent_entrypoint_journey_smoke_contract.py
          - scripts/test_external_agent_docs_zero_clone_alignment.py
          - scripts/test_external_agent_docs_core_routes_clarity.py
          - scripts/test_zero_clone_routes_in_first_contact.py
          - scripts/test_zero_clone_docs_cover_all_agent_types.py
          - scripts/test_legacy_isolation_contract.py
          - scripts/test_public_wording_phase6_contract.py
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: python3 -m pip install -r requirements-ci.txt
      - run: python3 ${{ matrix.test }}
