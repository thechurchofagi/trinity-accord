name: Temporary simple post-659 port runner

on:
  push:
    branches:
      - agent/full-public-action-matrix-post-659

permissions:
  contents: write

jobs:
  port:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/full-public-action-matrix-post-659
          fetch-depth: 0
          persist-credentials: true
      - name: Execute stored port script
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import subprocess

          lines = Path('.github/workflows/temp-port-full-action-audit.yml').read_text(encoding='utf-8').splitlines()
          marker = '      - name: Port unique audit coverage onto current main'
          start = lines.index(marker)
          run_line = next(i for i in range(start + 1, len(lines)) if lines[i] == '        run: |')
          end = next(i for i in range(run_line + 1, len(lines)) if lines[i].startswith('      - name:'))
          script_lines = []
          for line in lines[run_line + 1:end]:
              if line.startswith('          '):
                  script_lines.append(line[10:])
              else:
                  script_lines.append(line)
          script = '\n'.join(script_lines) + '\n'
          subprocess.run(['bash', '-lc', script], check=True)
          PY
          rm -f .github/workflows/temp-run-port-simple.yml
      - name: Commit permanent audit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "trinity-accord-audit-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "audit: port full action matrix after PR659"
          git pull --rebase origin agent/full-public-action-matrix-post-659
          git push origin HEAD:agent/full-public-action-matrix-post-659
