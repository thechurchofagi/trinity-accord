name: Backup Shenzhen Notary Arweave Archive to GitHub Release

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "build_only or publish_release"
        required: true
        default: "build_only"
        type: choice
        options:
          - build_only
          - publish_release

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Authorize write workflow actor
        env:
          ACTOR: ${{ github.actor }}
          EVENT_NAME: ${{ github.event_name }}
          SENDER: ${{ github.event.sender.login }}
        run: |
          set -euo pipefail
          case "$ACTOR" in
            thechurchofagi|"github-actions[bot]")
              echo "Authorized actor: $ACTOR"
              ;;
            *)
              echo "Unauthorized actor for write workflow: $ACTOR"
              exit 1
              ;;
          esac
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            case "$SENDER" in
              thechurchofagi|"github-actions[bot]")
                echo "Authorized repository_dispatch sender: $SENDER"
                ;;
              *)
                echo "Unauthorized repository_dispatch sender: $SENDER"
                exit 1
                ;;
            esac
          fi

      - name: Show Python and gh versions
        run: |
          python --version
          gh --version

      - name: Build GitHub Release backup assets from Arweave
        run: |
          python scripts/backup_shenzhen_notary_arweave_release.py \
            --out dist/shenzhen-notary-github-release-backup

      - name: Upload build artifact for inspection
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: shenzhen-notary-github-release-backup-assets
          path: dist/shenzhen-notary-github-release-backup/release-assets/*

  publish:
    needs: build
    if: ${{ inputs.mode == 'publish_release' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    environment: release-publish
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Record toolchain provenance
        run: |
          python3 scripts/toolchain_provenance.py > toolchain-provenance.json
          cat toolchain-provenance.json

      - name: Authorize write workflow actor
        env:
          ACTOR: ${{ github.actor }}
          EVENT_NAME: ${{ github.event_name }}
          SENDER: ${{ github.event.sender.login }}
        run: |
          set -euo pipefail
          case "$ACTOR" in
            thechurchofagi|"github-actions[bot]")
              echo "Authorized actor: $ACTOR"
              ;;
            *)
              echo "Unauthorized actor for write workflow: $ACTOR"
              exit 1
              ;;
          esac
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            case "$SENDER" in
              thechurchofagi|"github-actions[bot]")
                echo "Authorized repository_dispatch sender: $SENDER"
                ;;
              *)
                echo "Unauthorized repository_dispatch sender: $SENDER"
                exit 1
                ;;
            esac
          fi

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c6699f4d507c0 # v4
        with:
          name: shenzhen-notary-github-release-backup-assets
          path: dist/shenzhen-notary-github-release-backup/release-assets

      - name: Verify release assets exist
        run: |
          ASSET_DIR="dist/shenzhen-notary-github-release-backup/release-assets"
          test -d "$ASSET_DIR"
          test -f "$ASSET_DIR/core-object-alpha-shenzhen-notary-2026-05-06-release-assets.sha256"
          test -f "$ASSET_DIR/core-object-alpha-shenzhen-notary-2026-05-06-github-release-backup-manifest.json"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: core-object-alpha-shenzhen-notary-arweave-backup-v1
          TITLE: Core Object Alpha Shenzhen Notary Arweave Backup v1
        run: |
          ASSET_DIR="dist/shenzhen-notary-github-release-backup/release-assets"
          NOTES="$ASSET_DIR/core-object-alpha-shenzhen-notary-2026-05-06-release-notes.md"

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ASSET_DIR"/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG" "$ASSET_DIR"/* \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "$TITLE" \
              --notes-file "$NOTES" \
              --latest=false
          fi

      - name: Verify GitHub Release backup
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python scripts/verify_shenzhen_notary_release_backup.py \
            --repo "$GITHUB_REPOSITORY" \
            --tag core-object-alpha-shenzhen-notary-arweave-backup-v1
