name: Verify Deep Audit Round 6 Live Surfaces

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    if: github.event.pull_request.head.ref == 'ops/deploy-deep-audit-round6'
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - name: Verify main Gateway, Pages, and legacy suspension
        env:
          RENDER: ${{ secrets.RENDER }}
        run: |
          python - <<'PY'
          import json, os, urllib.error, urllib.request
          token=os.environ['RENDER']
          req=urllib.request.Request('https://api.render.com/v1/services?limit=100',headers={'Authorization':f'Bearer {token}','Accept':'application/json'})
          with urllib.request.urlopen(req,timeout=30) as r:services=json.loads(r.read())
          legacy=next((x.get('service') for x in services if isinstance(x,dict) and isinstance(x.get('service'),dict) and x['service'].get('name')=='trinity-agent-issue-gateway'),None)
          if not legacy:raise SystemExit('legacy Render service not found')
          if legacy.get('suspended')!='suspended' or 'user' not in (legacy.get('suspenders') or []):
              raise SystemExit(f'legacy service no longer deliberately user-suspended: {legacy.get("suspended")} {legacy.get("suspenders")}')
          print(json.dumps({'legacy_service':legacy.get('name'),'suspended':legacy.get('suspended'),'suspenders':legacy.get('suspenders')},sort_keys=True))

          def request(url,post=False):
              r=urllib.request.Request(url,data=b'{}' if post else None,headers={'Content-Type':'application/json','Cache-Control':'no-cache'},method='POST' if post else 'GET')
              try:
                  with urllib.request.urlopen(r,timeout=60) as response:return response.status,response.read()
              except urllib.error.HTTPError as exc:return exc.code,exc.read()

          status,raw=request('https://trinity-record-chain-gateway.onrender.com/record-chain/preflight',True)
          data=json.loads(raw)
          def urls(v):
              out=[]
              if isinstance(v,dict):
                  for k,x in v.items():
                      if k=='helper_url' and isinstance(x,str):out.append(x)
                      out.extend(urls(x))
              elif isinstance(v,list):
                  for x in v:out.extend(urls(x))
              return out
          helper=urls(data)
          expected='https://www.trinityaccord.org/docs/record-chain-builder-help/#validation-errors'
          if expected not in helper:raise SystemExit(f'main Gateway recovery URL not live: {helper}')
          print(json.dumps({'main_gateway_preflight_status':status,'deployed_at':(data.get('gateway_runtime') or {}).get('deployed_at'),'helper_url':expected},sort_keys=True))

          status,html=request('https://www.trinityaccord.org/docs/record-chain-builder-help/')
          text=html.decode('utf-8','replace')
          if status!=200 or 'id="validation-errors"' not in text or 'id="security-violations"' not in text:
              raise SystemExit('round6 Pages recovery anchors are not live')
          print('PASS: Pages recovery anchors are live')
          PY
