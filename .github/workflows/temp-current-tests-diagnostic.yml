name: Temporary current tests diagnostic

on:
  push:
    branches:
      - agent/end-to-end-action-audit
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnose:
    if: >-
      (github.event_name == 'push' || github.head_ref == 'agent/end-to-end-action-audit') &&
      !startsWith(github.event.head_commit.message || '', 'diagnostics: current tests')
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/end-to-end-action-audit
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: ".node-version"
      - run: python3 -m pip install -r requirements-ci.txt
      - name: Persist exact failure tail
        shell: bash
        run: |
          set +e
          python3 scripts/generate_sitemap.py
          python3 scripts/run_current_system_tests.py > /tmp/current-tests.log 2>&1
          status=$?
          mkdir -p diagnostics
          {
            echo "exit_status=$status"
            echo "head=$(git rev-parse HEAD)"
            echo "===== CURRENT TESTS OUTPUT TAIL ====="
            tail -n 700 /tmp/current-tests.log
          } > diagnostics/current-tests-final.txt
          git config user.name "trinity-accord-audit-bot"
          git config user.email "actions@users.noreply.github.com"
          git add diagnostics/current-tests-final.txt
          git commit -m "diagnostics: current tests failure"
          git pull --rebase origin agent/end-to-end-action-audit
          git push origin HEAD:agent/end-to-end-action-audit
