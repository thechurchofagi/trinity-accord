name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        # actions/checkout@v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Setup Pages
        # actions/configure-pages@v5
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b
      - name: Build with Jekyll
        # actions/jekyll-build-pages@v1
        uses: actions/jekyll-build-pages@44a6e6beabd48582f863aeeb6cb2151cc1716697
        with:
          source: ./
          destination: ./_site
      - name: Restore committed static API, builder, and bundles
        run: |
          set -euo pipefail

          # The public API/status files are generated and validated before merge.
          # Do not regenerate them during Pages deployment, because that can create
          # a deployment-only state that differs from main. Publish committed artifacts.
          rm -rf ./_site/api ./_site/downloads ./_site/builder-bundles
          cp -a ./api ./_site/api
          mkdir -p ./_site/downloads
          install -m 0644 ./downloads/record-chain-builder.mjs ./_site/downloads/record-chain-builder.mjs
          cp -a ./builder-bundles ./_site/builder-bundles

          cmp ./api/public-home-status.json ./_site/api/public-home-status.json
          cmp ./api/record-chain-builder-bundles.v1.json ./_site/api/record-chain-builder-bundles.v1.json
          cmp ./downloads/record-chain-builder.mjs ./_site/downloads/record-chain-builder.mjs

          python3 - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          root = Path('.')
          builder = root / '_site' / 'downloads' / 'record-chain-builder.mjs'
          manifest = json.loads((root / '_site' / 'api' / 'record-chain-builder-bundles.v1.json').read_text())
          expected = manifest['canonical_builder']
          actual_sha = hashlib.sha256(builder.read_bytes()).hexdigest()
          actual_size = builder.stat().st_size
          if actual_sha != expected['sha256']:
              raise SystemExit(f'builder sha mismatch: {actual_sha} != {expected["sha256"]}')
          if actual_size != expected['size_bytes']:
              raise SystemExit(f'builder size mismatch: {actual_size} != {expected["size_bytes"]}')

          status = json.loads((root / '_site' / 'api' / 'public-home-status.json').read_text())
          tech = status.get('technical_health', {})
          wallet = tech.get('arweave_wallet', {})
          if tech.get('ots') != 'upgraded':
              raise SystemExit(f'public status OTS not upgraded: {tech.get("ots")}')
          if wallet.get('balance_ar') != '2.878082248532':
              raise SystemExit(f'public status wallet balance mismatch: {wallet.get("balance_ar")}')
          PY

          ls -l ./_site/downloads/record-chain-builder.mjs
      - name: Upload artifact
        # actions/upload-pages-artifact@v3
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        # actions/deploy-pages@v4
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
