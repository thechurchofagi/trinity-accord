name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        # actions/checkout@v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Setup Python
        # actions/setup-python@v5
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - name: Install CI dependencies
        run: python -m pip install -r requirements-ci.txt
      - name: Regenerate public homepage status for deployment
        run: |
          python scripts/generate_public_home_status.py
          python scripts/ensure_public_home_status_block.py
          python scripts/patch_public_home_status_primary.py
      - name: Setup Pages
        # actions/configure-pages@v5
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b
      - name: Build with Jekyll
        # actions/jekyll-build-pages@v1
        uses: actions/jekyll-build-pages@44a6e6beabd48582f863aeeb6cb2151cc1716697
        with:
          source: ./
          destination: ./_site
      - name: Restore static Record-Chain builder download
        run: |
          set -euo pipefail
          sudo install -D -m 0644 ./downloads/record-chain-builder.mjs ./_site/downloads/record-chain-builder.mjs
          test -s ./_site/downloads/record-chain-builder.mjs
          ls -l ./_site/downloads/record-chain-builder.mjs
      - name: Upload artifact
        # actions/upload-pages-artifact@v3
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        # actions/deploy-pages@v4
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
