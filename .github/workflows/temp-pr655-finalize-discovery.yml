name: Temporary PR655 finalize verification discovery

on:
  push:
    branches:
      - agent/verification-model-cleanup

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/verification-model-cleanup
          fetch-depth: 0
          persist-credentials: true
      - name: Update current verification discovery sources
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          def load(path):
              return json.loads(Path(path).read_text(encoding='utf-8'))

          def save(path, data):
              Path(path).write_text(json.dumps(data, indent=2, ensure_ascii=False) + '\n', encoding='utf-8')

          action_path = 'api/context-action-profiles.v1.json'
          action = load(action_path)
          action['verification_procedures'] = '/api/verification-procedures.v1.json'
          action['verification_claim_model'] = '/api/verification-claim-model.v1.json'
          verification = next(item for item in action['profiles'] if item['id'] == 'verification')
          if '/api/verification-procedures.v1.json' not in verification['must_load']:
              verification['must_load'].insert(5, '/api/verification-procedures.v1.json')
          verification['must_perform'] = [
              'define bounded claim and claims not made',
              'state exact targets',
              'state evidence relationships checked',
              'perform and record fresh operations',
              'record per-target result including mismatch, unavailable, inconclusive or error',
              'choose the weakest supported digital profile',
              'report physical observation and external witness separately',
              'report limitations and corrections or supersession status'
          ]
          verification['allowed_outputs'] = [
              'context_only',
              'reference_checked',
              'integrity_checked',
              'independent_reproduction',
              'full_public_digital'
          ]
          save(action_path, action)

          profiles_path = 'api/verification-profiles.v1.json'
          profiles = load(profiles_path)
          profiles['procedures'] = '/api/verification-procedures.v1.json'
          profiles['quick_map'] = '/api/verification-quick-map.json'
          profiles['agent_cheatsheet'] = '/api/agent-verification-cheatsheet.v1.json'
          reference = next(item for item in profiles['digital_profiles'] if item['id'] == 'reference_checked')
          if 'access_time' not in reference['minimum_evidence']:
              reference['minimum_evidence'].insert(4, 'access_time')
          profiles['legacy_compatibility']['policy'] = (
              'V0-V5 remain Builder/archive compatibility metadata for new records. '
              'V4+, V6, V7 and V8 remain visible only in historical records and legacy compatibility documentation.'
          )
          save(profiles_path, profiles)

          first_path = 'api/agent-first-contact.json'
          first = load(first_path)
          first['version'] = '2.2.0'
          first['updated_at'] = '2026-07-14T00:00:00Z'
          first['current_verification_model'] = {
              'procedures': '/api/verification-procedures.v1.json',
              'profiles': '/api/verification-profiles.v1.json',
              'claim_model': '/api/verification-claim-model.v1.json',
              'relationships': '/api/evidence-relationship-map.v1.json',
              'legacy_builder_values': ['V0', 'V1', 'V2', 'V3', 'V4', 'V5'],
              'historical_only_labels': ['V4+', 'V6', 'V7', 'V8']
          }
          rewritten = []
          for route in first['choose_one']:
              intent = route.get('intent')
              if intent == 'verify_v0_v5_agent_declared':
                  route['intent'] = 'verify_current_model'
                  route['action'] = 'VERIFY_CURRENT_MODEL'
                  route['flow'] = [
                      'select the verification action profile',
                      'read /api/verification-procedures.v1.json before choosing a claim',
                      'perform and record fresh operations',
                      'populate all multidimensional verification fields',
                      'use V0-V5 only as Builder compatibility metadata',
                      'use DOWNLOAD_BUILDER_READ_GUIDANCE_BUILD_PREFLIGHT_SUBMIT_SAVE_RECEIPT with record_type=verification',
                      'do not skip Builder manifest verification, field guidance, exact oath/readback, doctor, receipt save, or public status readback'
                  ]
                  for required in [
                      '/api/verification-procedures.v1.json',
                      '/api/verification-claim-model.v1.json',
                      '/api/verification-quick-map.json'
                  ]:
                      if required not in route['read']:
                          route['read'].append(required)
                  rewritten.append(route)
              elif intent == 'verify_v6_plus_strict_evidence':
                  rewritten.append({
                      'intent': 'physical_or_strict_evidence_verification',
                      'action': 'USE_CURRENT_DIMENSIONS_AND_STRICT_EVIDENCE_WHEN_REQUIRED',
                      'status': 'current',
                      'note': 'Do not request V6, V7 or V8 as new levels. Use physical_observation and external_witness dimensions, and use strict Evidence Input plus Claim Gate for machine-evaluated technical evidence.',
                      'flow': [
                          'read /api/verification-procedures.v1.json',
                          'choose physical_observation and external_witness independently from digital_profile',
                          'for machine-evaluated evidence create fresh Evidence Input',
                          'run Claim Gate and generated-report validation',
                          'use a V0-V5 Builder compatibility value for any public Record-Chain submission'
                      ],
                      'read': [
                          '/agent-verify/',
                          '/verification-procedures/',
                          '/api/verification-procedures.v1.json',
                          '/api/verification-profiles.v1.json',
                          '/api/verification-claim-model.v1.json',
                          '/api/evidence-relationship-map.v1.json',
                          '/api/evidence-input-schema.v1.json',
                          '/api/claim-gate-rules.json'
                      ],
                      'public_gateway_route_enabled': True
                  })
              else:
                  rewritten.append(route)
          first['choose_one'] = rewritten
          save(first_path, first)

          guidance_path = 'downloads/record-chain-agent-field-guidance.v1.json'
          guidance = load(guidance_path)
          guidance['version'] = '1.4.0'
          guidance['verification_sources'] = {
              'procedures': '/api/verification-procedures.v1.json',
              'profiles': '/api/verification-profiles.v1.json',
              'claim_model': '/api/verification-claim-model.v1.json',
              'relationships': '/api/evidence-relationship-map.v1.json'
          }
          v = guidance['record_types']['verification']
          v['not_for'] = [
              'unperformed checks',
              'retired V4+/V6/V7/V8 level claims',
              'authority',
              'governance',
              'attestation'
          ]
          v['before_build'] = [
              'Read /api/verification-procedures.v1.json and perform only the claimed current operations.',
              'Describe only verification actions actually performed in the current work.',
              'Use V0-V5 only as legacy Builder compatibility metadata.',
              'Populate digital profile, evidence relationships, physical observation, external witness, coverage scope, limitations, claims not made, and corrections/supersession status.',
              'V4+, V6, V7, and V8 are historical-only and must not be used for a new public submission.',
              'Physical observation, notarization, or external witness never automatically raises digital verification or creates authority.'
          ]
          v['current_procedures'] = '/api/verification-procedures.v1.json'
          save(guidance_path, guidance)
          PY
          python3 -m json.tool api/context-action-profiles.v1.json >/dev/null
          python3 -m json.tool api/verification-profiles.v1.json >/dev/null
          python3 -m json.tool api/agent-first-contact.json >/dev/null
          python3 -m json.tool downloads/record-chain-agent-field-guidance.v1.json >/dev/null
          rm -f .github/workflows/temp-pr655-finalize-discovery.yml
      - name: Commit permanent discovery migration
        shell: bash
        run: |
          git config user.name "trinity-accord-verification-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "verification: finalize current discovery and Builder guidance"
          git push origin HEAD:agent/verification-model-cleanup
