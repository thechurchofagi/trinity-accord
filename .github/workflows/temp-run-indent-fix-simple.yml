name: Temporary simple correction repair runner

on:
  push:
    branches:
      - agent/full-public-action-matrix-post-659

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/full-public-action-matrix-post-659
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Execute stored correction repair
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import subprocess

          source = Path('.github/workflows/temp-fix-correction-indent.yml')
          lines = source.read_text(encoding='utf-8').splitlines()
          marker = '      - name: Repair exact blocks and validate syntax'
          start = lines.index(marker)
          run_line = next(i for i in range(start + 1, len(lines)) if lines[i] == '        run: |')
          end = next(i for i in range(run_line + 1, len(lines)) if lines[i].startswith('      - name:'))
          script_lines = [line[10:] if line.startswith('          ') else line for line in lines[run_line + 1:end]]
          subprocess.run(['bash', '-lc', '\n'.join(script_lines) + '\n'], check=True)
          PY
          rm -f .github/workflows/temp-run-indent-fix-simple.yml
          rm -f audit-indent-trigger.txt audit-indent-trigger-2.txt
      - name: Commit repaired permanent audit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "trinity-accord-audit-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "audit: repair correction binding blocks"
          git pull --rebase origin agent/full-public-action-matrix-post-659
          git push origin HEAD:agent/full-public-action-matrix-post-659
