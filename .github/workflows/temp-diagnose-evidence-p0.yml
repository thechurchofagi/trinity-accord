name: Temporary Diagnose Evidence P0

on:
  pull_request:
    paths:
      - .github/workflows/temp-diagnose-evidence-p0.yml

permissions:
  contents: write

jobs:
  diagnose:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: agent/complete-legacy-ar-eth-mirror-audit
      - name: Stop after diagnostic is captured
        id: sentinel
        shell: bash
        run: |
          if [[ -f .github/evidence-p0-diagnostic-done ]]; then
            echo "done=true" >> "$GITHUB_OUTPUT"
          else
            echo "done=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        if: steps.sentinel.outputs.done != 'true'
        with:
          python-version: "3.12"
      - name: Install dependencies
        if: steps.sentinel.outputs.done != 'true'
        run: python3 -m pip install -r requirements-ci.txt
      - name: Apply pending compatibility patches
        if: steps.sentinel.outputs.done != 'true'
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import json

          index_path = Path("archive/legacy-pointers/index.json")
          data = json.loads(index_path.read_text(encoding="utf-8"))
          cols = data["arweave_columns"]
          for row in data["arweave"]:
              if row[cols.index("txid")] == "RgjVJnALSbbYP4Vzz-FBX0Tie9inSvuA2PBgjPAT2ng":
                  row[cols.index("sha256")] = "e19018f1c71da8307ef20e8e8e5c12834f854d60a6aae60e35d2d8c71a333a81"
          index_path.write_text(json.dumps(data, ensure_ascii=False, separators=(",", ":")) + "\n", encoding="utf-8")

          path = Path("agent-start.md")
          text = path.read_text(encoding="utf-8")
          text = text.replace("## Legacy Context Depth (CC) and CRL compatibility", "## Legacy Context Depth (CC) and Context Readiness Level (CRL) compatibility")
          text = text.replace("- CC describes reading depth under the old inherited ladder.\n- The sufficiency boolean says whether the selected action can honestly be performed.", "- Context Depth (CC) describes reading depth under the old inherited ladder.\n- Context Readiness Level (CRL), expressed by the sufficiency declaration, says whether the selected action can honestly be performed.")
          path.write_text(text, encoding="utf-8")
          PY
          python3 scripts/generate_sitemap.py
      - name: Capture P0 output
        if: steps.sentinel.outputs.done != 'true'
        shell: bash
        run: |
          set +e
          python3 scripts/run_ci_group.py p0-current > p0-evidence-diagnostic.txt 2>&1
          code=$?
          printf '\nexit_code=%s\n' "$code" >> p0-evidence-diagnostic.txt
          printf 'captured\n' > .github/evidence-p0-diagnostic-done
          exit 0
      - name: Commit diagnostic output
        if: steps.sentinel.outputs.done != 'true'
        shell: bash
        run: |
          set -euo pipefail
          git add p0-evidence-diagnostic.txt .github/evidence-p0-diagnostic-done
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "ci: capture evidence P0 diagnostic"
          git push origin HEAD:agent/complete-legacy-ar-eth-mirror-audit
