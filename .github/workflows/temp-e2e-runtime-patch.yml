name: Temporary focused runtime patch

on:
  push:
    branches:
      - agent/end-to-end-action-audit
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: >-
      (github.event_name == 'push' || github.head_ref == 'agent/end-to-end-action-audit') &&
      !startsWith(github.event.head_commit.message || '', 'audit: apply focused runtime fixes')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/end-to-end-action-audit
          fetch-depth: 0
          persist-credentials: true
      - name: Apply fixes and clean diagnostics
        run: |
          python3 scripts/temp_apply_e2e_runtime_patch.py
          rm -f scripts/temp_apply_e2e_runtime_patch.py
          rm -f .github/workflows/temp-e2e-runtime-patch.yml
          rm -rf diagnostics
      - name: Commit permanent fixes
        run: |
          git config user.name "trinity-accord-audit-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "audit: apply focused runtime fixes"
          git push origin HEAD:agent/end-to-end-action-audit
