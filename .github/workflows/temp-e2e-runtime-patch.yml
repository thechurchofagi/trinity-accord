name: Temporary focused runtime patch

on:
  push:
    branches:
      - agent/end-to-end-action-audit

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !startsWith(github.event.head_commit.message, 'audit: apply focused runtime fixes') }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/end-to-end-action-audit
          fetch-depth: 0
          persist-credentials: true
      - name: Apply fixes and clean diagnostics
        run: |
          python3 scripts/temp_apply_e2e_runtime_patch.py
          rm -f scripts/temp_apply_e2e_runtime_patch.py
          rm -f .github/workflows/temp-e2e-runtime-patch.yml
          rm -f diagnostics/e2e-action-smoke.txt
          rm -f diagnostics/e2e-action-smoke2.json
          rm -f diagnostics/e2e-audit-inventory.txt
          rm -f diagnostics/e2e-builder-help.txt
          rm -f diagnostics/trigger-e2e-apply.txt
          rm -f diagnostics/trigger-smoke2.txt
      - name: Commit permanent fixes
        run: |
          git config user.name "trinity-accord-audit-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "audit: apply focused runtime fixes"
          git push origin HEAD:agent/end-to-end-action-audit
