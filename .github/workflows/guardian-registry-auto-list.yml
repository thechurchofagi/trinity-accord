name: Guardian Registry Auto-List (Legacy Stub)

on:
  workflow_dispatch:
    inputs:
      listing_issue:
        description: "Active Registry Listing Request issue number (legacy mode)"
        required: true
        type: string
      source_issue:
        description: "Source Guardian self-registration issue number (legacy mode)"
        required: false
        type: string

permissions:
  contents: read
  issues: read

jobs:
  legacy-notice:
    runs-on: ubuntu-24.04
    timeout-minutes: 2

    steps:
      - name: Print legacy notice
        run: |
          echo "=========================================="
          echo "  LEGACY WORKFLOW NOTICE"
          echo "=========================================="
          echo ""
          echo "The Guardian Registry Auto-List workflow has been disabled."
          echo ""
          echo "Gateway v1 APIs are now in legacy status."
          echo "New submissions should use the native record-chain:"
          echo "  scripts/trinity_record_builder.py"
          echo ""
          echo "The original workflow has been preserved at:"
          echo "  legacy/gateway-v1/workflows/guardian-registry-auto-list.yml"
          echo ""
          echo "For more information, see:"
          echo "  api/gateway-v1-legacy-status.json"
          echo "  api/record-chain-status.json"
          echo ""
          echo "=========================================="
          echo "  Listing issue: ${{ github.event.inputs.listing_issue }}"
          echo "  Source issue: ${{ github.event.inputs.source_issue || 'N/A' }}"
          echo "=========================================="
          echo ""
          echo "This workflow_dispatch trigger exists only for emergency manual use."
          echo "No automatic registry listing is performed."
