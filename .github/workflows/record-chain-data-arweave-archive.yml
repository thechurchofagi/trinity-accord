name: Legacy Hash-Chain Data Archive Audit (Retired)

# This workflow is intentionally read-only.
#
# The source files below are the frozen legacy hash-chain view at height 15,
# not the current native Record-Chain. Historical Arweave transactions and
# registry files are preserved as evidence, but this workflow must never create
# another paid upload or modify repository state. Current native archives are
# produced only by record-chain-arweave-archive.yml.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Historical bundle audit mode"
        required: true
        default: "snapshot"
        type: choice
        options:
          - snapshot
          - delta
      from_height_exclusive:
        description: "Legacy delta start height (delta mode only)"
        required: false
        default: "0"
        type: string
      to_height_inclusive:
        description: "Legacy delta end height; empty means frozen legacy head"
        required: false
        default: ""
        type: string
      snapshot_height:
        description: "Legacy snapshot height; empty means frozen legacy head"
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: legacy-hash-chain-data-archive-audit
  queue: max
  cancel-in-progress: false

env:
  INPUT_MODE: ${{ inputs.mode }}
  INPUT_TO_HEIGHT_INCLUSIVE: ${{ inputs.to_height_inclusive }}
  INPUT_FROM_HEIGHT_EXCLUSIVE: ${{ inputs.from_height_exclusive }}
  INPUT_SNAPSHOT_HEIGHT: ${{ inputs.snapshot_height }}

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout current main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
          ref: main

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Confirm legacy-only source boundary
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          head = json.loads(Path("api/record-chain-head.json").read_text(encoding="utf-8"))
          required = {
              "legacy_hash_chain_view": True,
              "historical_archive_only": True,
              "not_current_native_record_chain_head": True,
          }
          failed = [key for key, value in required.items() if head.get(key) is not value]
          if failed:
              raise SystemExit(f"legacy source boundary missing: {failed}")
          print(
              "Historical audit only:",
              f"legacy_height={head.get('height')}",
              f"replacement={head.get('replacement_native_chain_tip')}",
          )
          PY

      - name: Verify frozen legacy hash-chain view
        run: |
          set -euo pipefail
          python3 scripts/verify_record_chain_integrity.py \
            --ledger record-chain/hash-chain/main.chain.jsonl \
            --head api/record-chain-head.json \
            --chain-id trinity-record-chain-main \
            --verify-payload-files \
            --base-dir .

      - name: Build an ephemeral deterministic historical bundle
        id: build
        run: |
          set -euo pipefail
          out_dir="$RUNNER_TEMP/legacy-data-bundles"
          mkdir -p "$out_dir"
          if [ "$INPUT_MODE" = "delta" ]; then
            to_height="$INPUT_TO_HEIGHT_INCLUSIVE"
            if [ -z "$to_height" ]; then
              to_height="$(python3 -c 'import json; print(json.load(open("api/record-chain-head.json"))["height"])')"
            fi
            python3 scripts/build_record_chain_data_arweave_bundle.py \
              --mode delta \
              --from-height-exclusive "$INPUT_FROM_HEIGHT_EXCLUSIVE" \
              --to-height-inclusive "$to_height" \
              --out-dir "$out_dir" | tee "$RUNNER_TEMP/legacy-data-build.json"
          else
            height="$INPUT_SNAPSHOT_HEIGHT"
            if [ -z "$height" ]; then
              height="$(python3 -c 'import json; print(json.load(open("api/record-chain-head.json"))["height"])')"
            fi
            python3 scripts/build_record_chain_data_arweave_bundle.py \
              --mode snapshot \
              --height "$height" \
              --out-dir "$out_dir" | tee "$RUNNER_TEMP/legacy-data-build.json"
          fi
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          from pathlib import Path
          data = json.loads(Path(os.environ["RUNNER_TEMP"] + "/legacy-data-build.json").read_text())
          print("bundle_file=" + data["bundle_file"])
          PY

      - name: Verify ephemeral bundle and historical registry
        run: |
          set -euo pipefail
          python3 scripts/verify_record_chain_data_arweave_bundle.py \
            --bundle-file "${{ steps.build.outputs.bundle_file }}"
          python3 scripts/verify_record_chain_data_arweave_registry.py \
            --registry record-chain/arweave-data-registry.json \
            --verify-local-bundles \
            --allow-known-historical-duplicates

      - name: Prove audit did not mutate repository state
        run: |
          set -euo pipefail
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Retired archive audit modified the repository working tree."
            git status --short
            exit 1
          fi
          echo "PASS: no repository files, wallet state, or archive registries changed."

      - name: Upload ephemeral audit bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: legacy-hash-chain-data-audit-${{ github.run_id }}
          path: ${{ runner.temp }}/legacy-data-bundles/
          retention-days: 14
