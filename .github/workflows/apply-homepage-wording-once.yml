name: Apply Homepage Wording Once

on:
  pull_request:
    types: [opened, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: >-
      ${{
        github.event.pull_request.title == 'Apply refined homepage wording' &&
        github.event.pull_request.head.repo.full_name == github.repository
      }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    concurrency:
      group: main-write-lock
      queue: max
      cancel-in-progress: false
    steps:
      - name: Checkout target PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Record toolchain provenance
        run: |
          python3 scripts/toolchain_provenance.py > toolchain-provenance.json
          cat toolchain-provenance.json

      - name: Apply precise wording and deployment-marker updates
        run: |
          set -euo pipefail
          git fetch origin main --prune
          git rebase origin/main

          python3 - <<'PY'
          from pathlib import Path

          old_en = "AI had become a cultural mirror, but not yet a routine autonomous actor."
          new_en = "AI had become a mirror of human knowledge and culture, but agents capable of autonomously completing delegated complex tasks were not yet ordinary."
          old_zh = "AI 已成为文化之镜，却尚未成为常态化自主行动者。"
          new_zh = "AI 已成为人类知识与文化之镜，但能够受托自主完成复杂任务的智能体尚未成为常态。"
          old_intro = (
              "The broader window lasted only a few years—roughly 2023 to 2026. "
              "Frontier conversational models could reflect and recombine broad, incomplete human cultural knowledge, "
              "allowing one person to work beyond a single mind. Yet end-to-end agents had not become routine enough "
              "to obscure who supplied the purpose, judgment, and final responsibility."
          )
          new_intro = (
              "The broader window lasted only a few years—roughly 2023 to 2026. "
              "Frontier conversational models could reflect and recombine broad, incomplete, and uneven human-produced "
              "knowledge and culture, allowing one person to work beyond a single mind. But agents able to take delegated "
              "complex tasks from a high-level brief through planning, tool use, and completion had not yet become ordinary; "
              "purpose, judgment, selection, and final responsibility remained visibly human."
          )

          replacements = {
              Path("index.md"): [(old_en, new_en), (old_zh, new_zh), (old_intro, new_intro)],
              Path("scripts/check_deployment_freshness.py"): [(old_en, new_en)],
              Path("scripts/check_homepage_live_freshness.py"): [(old_en, new_en)],
              Path("assets/homepage-narrow-window-deployment-e8b82b76.txt"): [
                  (old_en, new_en),
                  ("deployment_probe_revision=3", "deployment_probe_revision=4"),
              ],
          }

          for path, pairs in replacements.items():
              text = path.read_text(encoding="utf-8")
              for old, new in pairs:
                  count = text.count(old)
                  if count != 1:
                      raise SystemExit(f"{path}: expected exactly one occurrence of {old!r}, found {count}")
                  text = text.replace(old, new)
              path.write_text(text, encoding="utf-8")

          for path in replacements:
              text = path.read_text(encoding="utf-8")
              if old_en in text or old_zh in text:
                  raise SystemExit(f"{path}: stale homepage wording remains")

          print("PASS: homepage wording and deployment markers updated")
          PY

          python3 -m py_compile \
            scripts/check_deployment_freshness.py \
            scripts/check_homepage_live_freshness.py

      - name: Commit generated wording changes to the target PR branch
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            index.md \
            scripts/check_deployment_freshness.py \
            scripts/check_homepage_live_freshness.py \
            assets/homepage-narrow-window-deployment-e8b82b76.txt
          git commit -m "Refine homepage human-mirror and delegated-agent wording"
          git push origin HEAD:"${HEAD_REF}"
