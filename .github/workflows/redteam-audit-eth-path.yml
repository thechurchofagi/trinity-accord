name: Red-Team Audit (ETH Path)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: redteam-audit-eth-path
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      GITHUB_REPO: thechurchofagi/trinity-accord
      GITHUB_TOKEN: ${{ github.token }}
      ARWEAVE_GATEWAYS: https://arweave.net,https://g8way.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select ETH RPC secret
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${ETHEREUMMAINNET:-}" ]; then
            echo "EFFECTIVE_ETH_RPC_URL=${ETHEREUMMAINNET}" >> "$GITHUB_ENV"
            echo "Using ETHEREUMMAINNET secret"
          elif [ -n "${ETH_RPC_URL:-}" ]; then
            echo "EFFECTIVE_ETH_RPC_URL=${ETH_RPC_URL}" >> "$GITHUB_ENV"
            echo "Using ETH_RPC_URL secret"
          else
            echo "EFFECTIVE_ETH_RPC_URL=" >> "$GITHUB_ENV"
            echo "No ETH RPC secret found"
          fi
        env:
          ETHEREUMMAINNET: ${{ secrets.ETHEREUMMAINNET }}
          ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}

      - name: Write and run audit
        shell: bash
        run: |
          set -euo pipefail

          AUDIT_DIR="/tmp/trinity-full-redteam-audit"
          mkdir -p "$AUDIT_DIR"

          # Decode audit script from base64
          cat > /tmp/decode_audit.py << 'DECODEPY'
          import base64, sys
          b64 = sys.stdin.read().strip()
          sys.stdout.buffer.write(base64.b64decode(b64))
          DECODEPY

          # Write the base64-encoded script
          cat > /tmp/audit_script.b64 << 'B64EOF'
          
          B64EOF

          python3 /tmp/decode_audit.py < /tmp/audit_script.b64 > "$AUDIT_DIR/trinity_full_redteam_audit.py"

          echo "ETH_RPC available: $([ -n "${EFFECTIVE_ETH_RPC_URL:-}" ] && echo YES || echo NO)"
          echo "Script written to $AUDIT_DIR/trinity_full_redteam_audit.py"

          set +e
          python3 "$AUDIT_DIR/trinity_full_redteam_audit.py"
          AUDIT_RC=$?
          set -e
          echo "AUDIT_RC=$AUDIT_RC"
          echo "$AUDIT_RC" > "$AUDIT_DIR/audit_exit_code.txt"

          # Copy with eth_path2 suffix
          cp "$AUDIT_DIR/trinity_redteam_full_audit_report.md" "$AUDIT_DIR/trinity_redteam_full_audit_report_eth_path2.md"
          cp "$AUDIT_DIR/trinity_redteam_full_audit_report.json" "$AUDIT_DIR/trinity_redteam_full_audit_report_eth_path2.json"

          echo "Reports written."

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: trinity-redteam-audit-eth-path2
          path: |
            /tmp/trinity-full-redteam-audit/trinity_redteam_full_audit_report_eth_path2.md
            /tmp/trinity-full-redteam-audit/trinity_redteam_full_audit_report_eth_path2.json
            /tmp/trinity-full-redteam-audit/audit_exit_code.txt
