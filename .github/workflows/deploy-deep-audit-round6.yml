name: Deploy Deep Audit Round 6 Surfaces

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: write

jobs:
  deploy-and-verify:
    if: github.event.pull_request.head.ref == 'ops/deploy-deep-audit-round6'
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Ensure current Gateway round6 deployment
        env:
          RENDER: ${{ secrets.RENDER }}
        run: |
          set -euo pipefail
          python - <<'PY' > /tmp/current-state.json
          import json, urllib.error, urllib.request
          req=urllib.request.Request('https://trinity-record-chain-gateway.onrender.com/record-chain/preflight',data=b'{}',headers={'Content-Type':'application/json'},method='POST')
          try:
              with urllib.request.urlopen(req,timeout=90) as r: data=json.loads(r.read())
          except urllib.error.HTTPError as e:
              try: data=json.loads(e.read())
              except Exception: data={}
          def urls(v):
              out=[]
              if isinstance(v,dict):
                  for k,x in v.items():
                      if k=='helper_url' and isinstance(x,str): out.append(x)
                      out.extend(urls(x))
              elif isinstance(v,list):
                  for x in v: out.extend(urls(x))
              return out
          print(json.dumps({'deployed_at':(data.get('gateway_runtime') or {}).get('deployed_at',''),'helper_urls':urls(data)}))
          PY
          cat /tmp/current-state.json
          if python - <<'PY'
          import json
          d=json.load(open('/tmp/current-state.json'))
          raise SystemExit(0 if 'https://www.trinityaccord.org/docs/record-chain-builder-help/#validation-errors' in d.get('helper_urls',[]) else 1)
          PY
          then
            echo 'Current Gateway already exposes round6 recovery metadata; no duplicate deploy.'
            echo false > /tmp/current-deploy-triggered
          else
            python scripts/render_manual_deploy.py --service trinity-record-chain-gateway --deploy
            echo true > /tmp/current-deploy-triggered
          fi
      - name: Trigger retired legacy Gateway tombstone deploy
        id: legacy_deploy
        continue-on-error: true
        env:
          RENDER: ${{ secrets.RENDER }}
        run: |
          set +e
          python scripts/render_manual_deploy.py --service trinity-agent-issue-gateway --deploy --allow-legacy > /tmp/legacy-deploy.log 2>&1
          code=$?
          echo "$code" > /tmp/legacy-deploy-exit
          cat /tmp/legacy-deploy.log
          exit "$code"
      - name: Show legacy deploy result
        if: always()
        run: |
          echo "legacy_deploy_outcome=${{ steps.legacy_deploy.outcome }}"
          cat /tmp/legacy-deploy.log 2>/dev/null || true
          cat /tmp/legacy-deploy-exit 2>/dev/null || true
      - name: Dispatch official Pages deployment
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json, os, urllib.request
          repo=os.environ['GITHUB_REPOSITORY']; token=os.environ['GH_TOKEN']
          req=urllib.request.Request(
              f'https://api.github.com/repos/{repo}/actions/workflows/deploy-pages.yml/dispatches',
              data=json.dumps({'ref':'main'}).encode(),
              headers={'Authorization':f'Bearer {token}','Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'},
              method='POST')
          with urllib.request.urlopen(req,timeout=30) as response:
              if response.status != 204: raise SystemExit(f'unexpected dispatch status {response.status}')
          print('PASS: official Pages deployment dispatched')
          PY
      - name: Verify current Gateway health, readiness and recovery
        if: always()
        run: |
          python - <<'PY'
          import json,time,urllib.error,urllib.request
          base='https://trinity-record-chain-gateway.onrender.com'
          def request(path,post=False):
              req=urllib.request.Request(base+path,data=b'{}' if post else None,headers={'Content-Type':'application/json'} if post else {},method='POST' if post else 'GET')
              try:
                  with urllib.request.urlopen(req,timeout=45) as r:return r.status,json.loads(r.read())
              except urllib.error.HTTPError as e:
                  try:return e.code,json.loads(e.read())
                  except Exception:return e.code,{}
              except Exception:return 0,{}
          def urls(v):
              out=[]
              if isinstance(v,dict):
                  for k,x in v.items():
                      if k=='helper_url' and isinstance(x,str):out.append(x)
                      out.extend(urls(x))
              elif isinstance(v,list):
                  for x in v:out.extend(urls(x))
              return out
          last={}
          for _ in range(120):
              ps,p=request('/record-chain/preflight',True); hs,h=request('/healthz'); rs,r=request('/record-chain/readiness')
              helper=urls(p); last={'preflight_status':ps,'deployed_at':(p.get('gateway_runtime') or {}).get('deployed_at',''),'health_status':hs,'health':h,'readiness_status':rs,'readiness':r,'helper_urls':helper}
              if hs==200 and h.get('ok') is True and rs==200 and r.get('submit_ready') is True and 'https://www.trinityaccord.org/docs/record-chain-builder-help/#validation-errors' in helper:
                  print(json.dumps(last,sort_keys=True)); raise SystemExit(0)
              time.sleep(10)
          print(json.dumps(last,sort_keys=True)); raise SystemExit('current Gateway did not reach verified round6 state')
          PY
      - name: Verify retired legacy Gateway tombstone semantics
        if: always()
        run: |
          python - <<'PY'
          import json,time,urllib.error,urllib.request
          base='https://trinity-agent-issue-gateway.onrender.com'
          def request(path,post=False):
              req=urllib.request.Request(base+path,data=b'{}' if post else None,headers={'Content-Type':'application/json'} if post else {},method='POST' if post else 'GET')
              try:
                  with urllib.request.urlopen(req,timeout=60) as r:return r.status,json.loads(r.read())
              except urllib.error.HTTPError as e:
                  try:return e.code,json.loads(e.read())
                  except Exception:return e.code,{}
              except Exception:return 0,{}
          last={}
          for _ in range(120):
              hs,h=request('/health'); rs,r=request('/readiness'); vs,v=request('/gateway/version'); ps,p=request('/gateway/preflight',True); ss,s=request('/agent-submit',True)
              last={'health_status':hs,'health':h,'readiness_status':rs,'readiness':r,'version_status':vs,'version':v,'preflight_status':ps,'preflight':p,'submit_status':ss,'submit':s}
              first=v.get('deployed_at')
              ok=(hs==200 and h.get('retired') is True and h.get('accepts_submissions') is False and h.get('production_render_enabled') is False and rs==503 and r.get('retired') is True and r.get('ready') is False and r.get('accepts_submissions') is False and vs==200 and v.get('retired') is True and v.get('accepts_submissions') is False and v.get('production_render_enabled') is False and bool(first) and ps==410 and ss==410)
              if ok:
                  time.sleep(3); vs2,v2=request('/gateway/version')
                  if vs2==200 and v2.get('deployed_at')==first:
                      last['version_second_read']=v2; print(json.dumps(last,sort_keys=True)); raise SystemExit(0)
              time.sleep(10)
          print(json.dumps(last,sort_keys=True)); raise SystemExit('legacy Gateway did not reach truthful retired tombstone state')
          PY
      - name: Verify Pages recovery anchors are live
        if: always()
        run: |
          python - <<'PY'
          import time,urllib.request
          url='https://www.trinityaccord.org/docs/record-chain-builder-help/'; last=''
          for _ in range(90):
              try:
                  req=urllib.request.Request(url,headers={'Cache-Control':'no-cache','User-Agent':'trinity-round6-verifier'})
                  with urllib.request.urlopen(req,timeout=45) as r:last=r.read().decode('utf-8','replace')
                  if 'id="validation-errors"' in last and 'id="security-violations"' in last:
                      print('PASS: round6 recovery anchors are live'); raise SystemExit(0)
              except Exception as exc:last=type(exc).__name__
              time.sleep(10)
          raise SystemExit(f'Pages recovery anchors not live: {last[:200]}')
          PY
