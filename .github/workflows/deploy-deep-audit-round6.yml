name: Deploy Deep Audit Round 6 Surfaces

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: write

jobs:
  deploy-and-verify:
    if: github.event.pull_request.head.ref == 'ops/deploy-deep-audit-round6'
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Capture current main Gateway runtime
        run: |
          python - <<'PY' > /tmp/main-before.txt
          import json, urllib.error, urllib.request
          req = urllib.request.Request(
              'https://trinity-record-chain-gateway.onrender.com/record-chain/preflight',
              data=b'{}', headers={'Content-Type':'application/json'}, method='POST')
          try:
              with urllib.request.urlopen(req, timeout=90) as r:
                  data = json.loads(r.read())
          except urllib.error.HTTPError as e:
              data = json.loads(e.read())
          print((data.get('gateway_runtime') or {}).get('deployed_at', ''))
          PY
          test -s /tmp/main-before.txt
          cat /tmp/main-before.txt
      - name: Trigger official Render deploys
        env:
          RENDER: ${{ secrets.RENDER }}
        run: |
          set -euo pipefail
          python scripts/render_manual_deploy.py --service trinity-record-chain-gateway --deploy
          python scripts/render_manual_deploy.py --service trinity-agent-issue-gateway --deploy --allow-legacy
      - name: Dispatch official Pages deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json, os, urllib.request
          repo = os.environ['GITHUB_REPOSITORY']
          token = os.environ['GH_TOKEN']
          req = urllib.request.Request(
              f'https://api.github.com/repos/{repo}/actions/workflows/deploy-pages.yml/dispatches',
              data=json.dumps({'ref':'main'}).encode(),
              headers={
                  'Authorization': f'Bearer {token}',
                  'Accept': 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
                  'Content-Type': 'application/json',
              },
              method='POST')
          with urllib.request.urlopen(req, timeout=30) as response:
              if response.status != 204:
                  raise SystemExit(f'unexpected dispatch status {response.status}')
          print('PASS: official Pages deployment dispatched')
          PY
      - name: Verify current Gateway restarted and recovery is reachable
        run: |
          python - <<'PY'
          import json, time, urllib.error, urllib.request
          before = open('/tmp/main-before.txt', encoding='utf-8').read().strip()
          base = 'https://trinity-record-chain-gateway.onrender.com'
          def request(path, post=False):
              req = urllib.request.Request(
                  base + path,
                  data=b'{}' if post else None,
                  headers={'Content-Type':'application/json'} if post else {},
                  method='POST' if post else 'GET')
              try:
                  with urllib.request.urlopen(req, timeout=45) as r:
                      return r.status, json.loads(r.read())
              except urllib.error.HTTPError as e:
                  try: return e.code, json.loads(e.read())
                  except Exception: return e.code, {}
              except Exception: return 0, {}
          def helper_urls(value):
              found=[]
              if isinstance(value, dict):
                  for k,v in value.items():
                      if k == 'helper_url' and isinstance(v,str): found.append(v)
                      found.extend(helper_urls(v))
              elif isinstance(value,list):
                  for v in value: found.extend(helper_urls(v))
              return found
          last={}
          for _ in range(120):
              ps,p = request('/record-chain/preflight', True)
              hs,h = request('/healthz')
              rs,r = request('/record-chain/readiness')
              deployed = (p.get('gateway_runtime') or {}).get('deployed_at','')
              urls = helper_urls(p)
              last={'preflight_status':ps,'deployed_at':deployed,'health_status':hs,'health':h,'readiness_status':rs,'readiness':r,'helper_urls':urls}
              recovery_ok = any(u == 'https://www.trinityaccord.org/docs/record-chain-builder-help/#validation-errors' for u in urls)
              if deployed and deployed != before and hs == 200 and h.get('ok') is True and rs == 200 and r.get('submit_ready') is True and recovery_ok:
                  print(json.dumps(last, sort_keys=True))
                  raise SystemExit(0)
              time.sleep(10)
          print(json.dumps(last, sort_keys=True))
          raise SystemExit('current Gateway did not reach verified round6 state')
          PY
      - name: Verify retired legacy Gateway tombstone semantics
        run: |
          python - <<'PY'
          import json, time, urllib.error, urllib.request
          base = 'https://trinity-agent-issue-gateway.onrender.com'
          def request(path, post=False):
              req = urllib.request.Request(
                  base + path,
                  data=b'{}' if post else None,
                  headers={'Content-Type':'application/json'} if post else {},
                  method='POST' if post else 'GET')
              try:
                  with urllib.request.urlopen(req, timeout=60) as r:
                      return r.status, json.loads(r.read())
              except urllib.error.HTTPError as e:
                  try: return e.code, json.loads(e.read())
                  except Exception: return e.code, {}
              except Exception: return 0, {}
          last={}
          for _ in range(120):
              hs,h = request('/health')
              rs,r = request('/readiness')
              vs,v = request('/gateway/version')
              ps,p = request('/gateway/preflight', True)
              ss,s = request('/agent-submit', True)
              last={'health_status':hs,'health':h,'readiness_status':rs,'readiness':r,'version_status':vs,'version':v,'preflight_status':ps,'preflight':p,'submit_status':ss,'submit':s}
              first = v.get('deployed_at')
              semantics = (
                  hs == 200 and h.get('retired') is True and h.get('accepts_submissions') is False and h.get('production_render_enabled') is False
                  and rs == 503 and r.get('retired') is True and r.get('ready') is False and r.get('accepts_submissions') is False
                  and vs == 200 and v.get('retired') is True and v.get('accepts_submissions') is False and v.get('production_render_enabled') is False and bool(first)
                  and ps == 410 and ss == 410)
              if semantics:
                  time.sleep(3)
                  vs2,v2 = request('/gateway/version')
                  if vs2 == 200 and v2.get('deployed_at') == first:
                      last['version_second_read'] = v2
                      print(json.dumps(last, sort_keys=True))
                      raise SystemExit(0)
              time.sleep(10)
          print(json.dumps(last, sort_keys=True))
          raise SystemExit('legacy Gateway did not reach truthful retired tombstone state')
          PY
      - name: Verify Pages recovery anchors are live
        run: |
          python - <<'PY'
          import time, urllib.request
          url = 'https://www.trinityaccord.org/docs/record-chain-builder-help/'
          last=''
          for _ in range(90):
              try:
                  req=urllib.request.Request(url, headers={'Cache-Control':'no-cache','User-Agent':'trinity-round6-verifier'})
                  with urllib.request.urlopen(req, timeout=45) as r:
                      last=r.read().decode('utf-8','replace')
                  if 'id="validation-errors"' in last and 'id="security-violations"' in last:
                      print('PASS: round6 recovery anchors are live')
                      raise SystemExit(0)
              except Exception as exc:
                  last=type(exc).__name__
              time.sleep(10)
          raise SystemExit(f'Pages recovery anchors not live: {last[:200]}')
          PY
