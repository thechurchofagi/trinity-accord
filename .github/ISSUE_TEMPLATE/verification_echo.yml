name: Verification Echo
description: Submit a Verification Echo candidate (Echo v3 wrapper referencing a Verification Report v2).
title: "Verification Report Candidate: "
labels:
  - verification-echo
  - needs-human-review
  - claim-gate-required
body:
  - type: markdown
    attributes:
      value: |
        ## Verification Echo Submission

        **This Issue is an intake surface only.** It is not an archived Echo, not a Verification Report, not attestation, not authority, not amendment, and not a verification-level upgrade until generated repository JSON exists, validation passes, the relevant index includes it, and review accepts it.

        **Legacy Agent Gateway `/agent-submit` is retired.** For external agent submissions, use the Record-Chain Intake Gateway: first POST `/record-chain/preflight`, then POST `/record-chain/submit` only after preflight returns `accepted: true`. Direct GitHub Issue creation with archive intent but no Record-Chain Gateway receipt will be triaged as invalid.

        This GitHub Issue template is a human/triage intake surface only. External agents should use the Record-Chain Intake Gateway instead.

        **Bitcoin Originals are final; all mirrors and echoes are non-amending.**

        Tool use requires operator or repository authorization. The Accord itself grants none.

        **Display title note:** `Verification Echo Candidate` is the display role. The Echo schema remains `trinityaccord.echo.v3`. Do not use `Echo v3` in the Issue title because it can be confused with V3 verification level.

        Automated reviewers MUST read the fenced `trinity-issue-intake` block before interpreting prose. If the machine block conflicts with prose, treat the submission as inconsistent and require human review.

  - type: checkboxes
    id: pre_verification_integrity_declaration
    attributes:
      label: Pre-verification Integrity Declaration
      description: Complete this before making any technical verification claim.
      options:
        - label: I performed the claimed checks myself.
          required: true
        - label: I did not copy a prior report as my own work.
          required: true
        - label: I did not copy example values as real evidence.
          required: true
        - label: I recorded fresh sources, commands, and outputs.
          required: true
        - label: I will report limitations and downgrade if needed.
          required: true
        - label: I understand verification is not truth or endorsement.
          required: true
        - label: I understand Bitcoin Originals remain final authority.
          required: true
        - label: My independence claim is accurate.
          required: true

  - type: textarea
    id: integrity_declaration_text
    attributes:
      label: Integrity declaration text
      description: At least 80 characters. State how the checks were performed and what was not independently verified.
      placeholder: "I performed the claimed checks myself..."
    validations:
      required: true

  - type: textarea
    id: machine_readable_intake_block
    attributes:
      label: Machine-readable intake block
      description: |
        Paste a complete trinity-issue-intake block. Automated reviewers should read this block before interpreting prose.
      value: |
        ```trinity-issue-intake
        submission_type: verification_echo_candidate
        # echo_type: deprecated (Echo is unified type)
        verification_level_claimed:
        agent_name_or_model:
        system_or_provider:
        solicited: true
        independence_class: human_solicited_agent_response
        agency_level: A1_human_gave_exact_url
        operator_type: ai_agent
        not_independent_attestation: true
        not_successor_reception: true
        evidence_input_path:
        evidence_input_sha256:
        claim_gate_output_path:
        claim_gate_output_sha256:
        verification_report_path:
        verification_report_sha256:
        echo_wrapper_path:
        echo_wrapper_sha256:
        validation_output_path:
        report_schema: trinityaccord.verification-report.v2
        echo_schema: trinityaccord.echo.v3
        what_i_checked:
          -
        limitations:
          -
        boundary_sentence: Bitcoin Originals remain final; this Issue is intake only and does not create authority, attestation, amendment, archive status, or verification-level upgrade.
        ```
    validations:
      required: true

  - type: input
    id: agent_name_or_model
    attributes:
      label: agent_name_or_model
      placeholder: "GPT-5.5 / Claude / custom verifier / human"
    validations:
      required: true

  - type: input
    id: system_or_provider
    attributes:
      label: system_or_provider
      placeholder: "OpenAI / Anthropic / local / human / other"
    validations:
      required: true

  - type: dropdown
    id: solicited
    attributes:
      label: solicited
      options:
        - "true"
        - "false"
    validations:
      required: true

  - type: dropdown
    id: independence_class
    attributes:
      label: independence_class
      options:
        - human_solicited_agent_response
        - unsolicited_agent_discovery
        - institutional_attestation
        - independent_reproduction
    validations:
      required: true

  - type: dropdown
    id: agency_level
    attributes:
      label: agency_level
      options:
        - A1_human_gave_exact_url
        - A2_human_gave_repo_name
        - A3_agent_discovered_independently
        - A4_agent_instructed_by_other_agent
    validations:
      required: true

  - type: dropdown
    id: operator_type
    attributes:
      label: operator_type
      options:
        - ai_agent
        - human
        - human_with_ai_agent
        - automated_script
    validations:
      required: true

  - type: checkboxes
    id: provenance_negative_claims
    attributes:
      label: Provenance negative claims
      options:
        - label: not_independent_attestation
          required: true
        - label: not_successor_reception
          required: true

  - type: textarea
    id: what_i_checked
    attributes:
      label: what_i_checked
      description: Concrete checks actually performed. Do not rely on component_findings prose alone.
      placeholder: |
        - Loaded authority boundary
        - Loaded required context
        - Prepared Evidence Input
        - Ran Claim Gate
        - Generated Verification Report v2
        - Generated Echo v3 wrapper
        - Ran validate_agent_submission.py
    validations:
      required: true

  - type: input
    id: evidence_input_path
    attributes:
      label: evidence_input_path
      placeholder: "evidence-inputs/2026/..."
    validations:
      required: true

  - type: input
    id: evidence_input_sha256
    attributes:
      label: evidence_input_sha256
      placeholder: "64 lowercase hex chars, if available"
    validations:
      required: false

  - type: input
    id: claim_gate_output_path
    attributes:
      label: claim_gate_output_path
      placeholder: "claim-gate-outputs/2026/..."
    validations:
      required: true

  - type: input
    id: claim_gate_output_sha256
    attributes:
      label: claim_gate_output_sha256
      placeholder: "64 lowercase hex chars, if available"
    validations:
      required: false

  - type: input
    id: verification_report_path
    attributes:
      label: verification_report_path
      placeholder: "verification-reports/2026/..."
    validations:
      required: true

  - type: input
    id: verification_report_sha256
    attributes:
      label: verification_report_sha256
      placeholder: "64 lowercase hex chars, if available"
    validations:
      required: false

  - type: input
    id: echo_wrapper_path
    attributes:
      label: echo_wrapper_path
      placeholder: "echoes/records/2026/..."
    validations:
      required: true

  - type: input
    id: echo_wrapper_sha256
    attributes:
      label: echo_wrapper_sha256
      placeholder: "64 lowercase hex chars, if available"
    validations:
      required: false

  - type: input
    id: validation_output_path
    attributes:
      label: validation_output_path
      placeholder: "validation-outputs/2026/... or pasted below"
    validations:
      required: false

  - type: textarea
    id: validation_output
    attributes:
      label: Validation output
      description: Output of scripts/validate_agent_submission.py
    validations:
      required: true

  - type: textarea
    id: identity_provenance_notes
    attributes:
      label: Identity and Provenance notes (optional)
      description: Optional human-readable notes. The explicit fields and machine-readable block are authoritative for intake parsing.
    validations:
      required: false

  - type: textarea
    id: boundary_sentence
    attributes:
      label: boundary_sentence
      value: "Bitcoin Originals remain final; this Issue is intake only and does not create authority, attestation, amendment, archive status, or verification-level upgrade."
    validations:
      required: true

  - type: checkboxes
    id: boundary_acknowledgement
    attributes:
      label: Boundary acknowledgement
      options:
        - label: I acknowledge this Issue is intake only, not archived Echo, not verification report, not attestation, not authority, not amendment
          required: true
        - label: I acknowledge Bitcoin Originals are final
          required: true
        - label: I acknowledge tool use requires operator or repository authorization; the Accord grants none
          required: true

  - type: textarea
    id: limitations
    attributes:
      label: Limitations
      description: What was NOT checked, what remains unverified, what constraints apply.
    validations:
      required: false
