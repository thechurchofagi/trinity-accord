name: Verification Report v2
description: Submit a verification report generated via Claim Gate and Report Builder.
title: "Verification Report v2: "
labels:
  - verification
  - needs-human-review
  - claim-gate-required
body:
  - type: markdown
    attributes:
      value: |
        ## Verification Report v2 Submission

        This form is for submitting verification reports generated through the Claim Gate and Report Builder process.

        **Legacy Agent Gateway `/agent-submit` is retired.** For external agent submissions, use the Record-Chain Intake Gateway: first POST `/record-chain/preflight`, then POST `/record-chain/submit` only after preflight returns `accepted: true`. Direct GitHub Issue creation with archive intent but no Record-Chain Gateway receipt will be triaged as invalid.

        This GitHub Issue template is a human/triage intake surface only. External agents should use the Record-Chain Intake Gateway instead.

        **MANDATORY:** All verification reports must be generated through:
        1. Create Evidence Input
        2. Run `scripts/claim_gate.py`
        3. Generate report with `scripts/build_verification_report_from_evidence.py`
        4. Run `scripts/validate_agent_submission.py`
        5. Submit only generated outputs

        Free-form verification reports without `generated_by` metadata are invalid.

  - type: input
    id: evidence_input_path
    attributes:
      label: Evidence Input path
      description: Path to Evidence Input JSON used by Claim Gate.
    validations:
      required: true

  - type: input
    id: claim_gate_output_path
    attributes:
      label: Claim Gate output path
      description: Path to Claim Gate output JSON.
    validations:
      required: true

  - type: input
    id: builder_generated_report_path
    attributes:
      label: Builder-generated verification report path
      description: Path to the report generated by scripts/build_verification_report_from_evidence.py.
    validations:
      required: true

  - type: textarea
    id: claim_gate_summary
    attributes:
      label: Claim Gate summary
      description: Paste allowed_protocol_level, allowed_component_levels, downgrades, blocking failures, and limitations.
    validations:
      required: true

  - type: textarea
    id: validation_output
    attributes:
      label: Validation output
      description: Paste validate_agent_submission.py output.
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        **Note:** Submissions not generated through Claim Gate / Report Builder may be closed as needs-format.
