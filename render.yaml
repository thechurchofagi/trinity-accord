# deploy-trigger: 2026-05-30T01:35:00Z — v30.10 fix E8/E9 in server.js PURE_ECHO_TYPES
services:
  - type: web_service
    name: trinity-agent-issue-gateway
    runtime: node
    region: oregon
    plan: free
    rootDir: examples/github-app-backend
    buildCommand: pip install -r ../../requirements-ci.txt && yarn
    startCommand: yarn start
    healthCheckPath: /health
    autoDeploy: true
    branch: main
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"

  - type: web
    name: trinity-record-chain-gateway
    runtime: python
    region: oregon
    plan: starter
    rootDir: apps/record_chain_intake_gateway
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: TRINITY_REPO_FULL_NAME
        value: thechurchofagi/trinity-accord
      - key: TRINITY_TARGET_BRANCH
        value: main
      - key: TRINITY_GITHUB_TOKEN
        sync: false
      - key: TRINITY_GATEWAY_BASE_URL
        value: https://trinity-record-chain-gateway.onrender.com
      - key: TRINITY_GATEWAY_RUNTIME_VERSION
        value: v1
      - key: TRINITY_MAX_SUBMISSION_BYTES
        value: "524288"
      - key: TRINITY_SUBMIT_WRITE_MODE
        value: github_contents_pending
      - key: TRINITY_APPEND_WORKFLOW_FILE
        value: record-chain-append.yml
